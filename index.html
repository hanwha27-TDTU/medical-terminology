let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  if (toastTimer) clearTimeout(toastTimer);
  t.textContent = msg;
  t.classList.add('show');
  toastTimer = setTimeout(() => {
    t.classList.remove('show');
    toastTimer = null;
  }, 2400);
}

// ─── TTS ───
let ttsSpeed = 0.9;
let currentUtterance = null;
let speakingBtn = null;

function speakText(e, text, type, id) {
  e?.stopPropagation();
  if (!window.speechSynthesis) { showToast('⚠️ 이 브라우저는 TTS를 지원하지 않습니다'); return; }
  if (!String(text || '').trim()) { showToast('⚠️ 읽을 영어 문장이 없습니다'); return; }

  const fallbackBtnId = `speak-${type}-${id}`;
  const clickedBtn = e?.currentTarget?.classList?.contains('speak-btn') ? e.currentTarget : null;
  const btnId = clickedBtn?.id || fallbackBtnId;
  const btn = clickedBtn || document.getElementById(fallbackBtnId);

  // Stop if already speaking same button
  if (speakingBtn === btnId && speechSynthesis.speaking) {
    speechSynthesis.cancel();
    if (btn) btn.classList.remove('speaking');
    speakingBtn = null;
    return;
  }

  // Stop previous
  speechSynthesis.cancel();
  if (speakingBtn) {
    const prev = document.getElementById(speakingBtn);
    if (prev) prev.classList.remove('speaking');
  }

  const utter = new SpeechSynthesisUtterance(String(text || ''));
  utter.lang = 'en-US';
  utter.rate = ttsSpeed;
  utter.pitch = 1.0;

  // Prefer high-quality US English voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.lang === 'en-US' && (v.name.includes('Samantha') || v.name.includes('Google') || v.name.includes('Alex') || v.name.includes('Natural'))
  ) || voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utter.voice = preferred;

  utter.onstart = () => {
    speakingBtn = btnId;
    if (btn) btn.classList.add('speaking');
  };
  utter.onend = utter.onerror = () => {
    if (btn) btn.classList.remove('speaking');
    if (speakingBtn === btnId) speakingBtn = null;
  };

  speechSynthesis.speak(utter);
  currentUtterance = utter;
}

// Load voices (async in some browsers)
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// 앱 초기화: Supabase가 있으면 클라우드를 기준본으로 사용
async function initApp() {
  applyThemeMode(getSavedThemeMode());
  const { localCount, drugCount, formulaCount } = await loadLocalCacheForStartup();
  const learning = getLearningStateMap();
  const learnedBookmarkIds = Object.values(learning).filter(s => s?.bookmarked).map(s => Number(s.termId)).filter(Number.isFinite);
  if (learnedBookmarkIds.length) bookmarks = new Set([...bookmarks, ...learnedBookmarkIds]);
  bookmarks.forEach(id => {
    const key = String(id);
    if (!learning[key]) {
      learning[key] = {
        termId: Number(id),
        bookmarked: true,
        correctCount: 0,
        wrongCount: 0,
        studyStatus: 'new',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      };
    }
  });
  saveLearningStateMap(learning);
  if (localCount > 0 || drugCount > 0 || formulaCount > 0) {
    const cacheLabel = _localCacheBackend.includes('IndexedDB') ? 'IndexedDB 캐시' : '로컬 캐시';
    showToast(getSupabaseConfig()
      ? `📱 ${cacheLabel} ${localCount}개 · 약물 ${drugCount}개 · 공식 ${formulaCount}개 표시 · 클라우드 기준본 확인 중`
      : `📱 ${cacheLabel} ${localCount}개 · 약물 ${drugCount}개 · 공식 ${formulaCount}개 복원됨`);
    updateBookmarkCount();
    applyFilters();
  }

  if (getSupabaseConfig()) {
    try {
      await syncWithCloud();
    } catch (e) {
      console.error('Initial sync failed:', e);
      showToast('⚠️ 동기화 실패 · 개발자 정보에서 Supabase 설정 SQL을 확인하세요');
    }
  } else if (localCount === 0 && drugCount === 0 && formulaCount === 0) {
    applyFilters();
  }
}

        <button class="drawer-action-btn" id="drawerBookmarkBtn" onclick="drawerToggleBookmark()" title="즐겨찾기" aria-label="용어 즐겨찾기 전환">☆</button>
        <button class="drawer-action-btn" onclick="drawerOpenEdit()" title="편집" aria-label="용어 편집">✏️</button>
        <button class="drawer-close-btn" onclick="closeDrawer()" title="닫기" aria-label="용어 상세 닫기">×</button>
      </div>
    </div>
    <div class="drawer-nav">
      <button class="drawer-nav-btn" id="drawerPrevBtn" onclick="drawerNavigate(-1)">◀ 이전</button>
      <div class="drawer-nav-count" id="drawerNavCount"></div>
      <button class="drawer-nav-btn" id="drawerNextBtn" onclick="drawerNavigate(1)">다음 ▶</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </div>
  <!-- ═══════════════════════════════════ -->

  <!-- ═══════════ DRUG DRAWER ═══════════ -->
  <div class="term-drawer-overlay" id="drugDrawerOverlay" onclick="closeDrugDrawer()"></div>
  <div class="term-drawer" id="drugDrawer">
    <div class="drawer-handle"><div class="drawer-handle-bar"></div></div>
    <div class="drawer-header">
      <div class="drawer-header-left">
        <div class="drawer-title-ko" id="drugDrawerTitle">—</div>
        <div class="drawer-title-en" id="drugDrawerSubtitle">약물명 및 정보</div>
      </div>
      <div class="drawer-header-right">
        <button class="drawer-action-btn" onclick="drugDrawerOpenEdit()" title="편집" aria-label="약물 항목 편집">✏️</button>
        <button class="drawer-close-btn" onclick="closeDrugDrawer()" title="닫기" aria-label="약물 상세 닫기">×</button>
      </div>
    </div>
    <div class="drawer-nav">
      <button class="drawer-nav-btn" id="drugDrawerPrevBtn" onclick="drugDrawerNavigate(-1)">◀ 이전</button>
      <div class="drawer-nav-count" id="drugDrawerNavCount"></div>
      <button class="drawer-nav-btn" id="drugDrawerNextBtn" onclick="drugDrawerNavigate(1)">다음 ▶</button>
    </div>
    <div class="drawer-body" id="drugDrawerBody"></div>
  </div>
  <!-- ═══════════════════════════════════ -->

</body>
</html>
