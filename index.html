<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Bugeon 의학용어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  TERM DRAWER
// ═══════════════════════════════════════════════════════
let _drawerTermId   = null;   // 현재 열린 용어 ID
let _drawerTermList = [];     // 현재 필터된 목록 (이전/다음 네비게이션용)
let _drawerDrugId   = null;   // 현재 열린 약물 ID
let _drawerDrugList = [];     // 현재 필터된 약물 목록
const THEME_STORAGE_KEY = 'kma_medical_terms_v2_theme';

function getSavedThemeMode() {
  try {
    return localStorage.getItem(THEME_STORAGE_KEY) === 'light' ? 'light' : 'dark';
  } catch {
    return 'dark';
  }
}

function applyThemeMode(mode) {
  const next = mode === 'light' ? 'light' : 'dark';
  document.documentElement.dataset.theme = next;
  const btn = document.getElementById('themeToggleBtn');
  if (btn) {
    btn.innerHTML = next === 'light'
      ? '🌙 <span class="wide-label">다크모드</span><span class="mobile-label" style="display:none">다크</span>'
      : '☀️ <span class="wide-label">라이트모드</span><span class="mobile-label" style="display:none">라이트</span>';
    btn.title = next === 'light' ? '다크모드로 전환' : '라이트모드로 전환';
  }
}

function toggleThemeMode() {
  const current = document.documentElement.dataset.theme === 'light' ? 'light' : 'dark';
  const next = current === 'light' ? 'dark' : 'light';
  applyThemeMode(next);
  try { localStorage.setItem(THEME_STORAGE_KEY, next); } catch {}
  if (typeof showToast === 'function') showToast(next === 'light' ? '☀️ 라이트모드로 전환됨' : '🌙 다크모드로 전환됨');
}

applyThemeMode(getSavedThemeMode());

function openDrawer(id) {
  const t = TERMS.find(x => x.id === id);
  if (!t) return;

  _drawerTermId   = id;
  expandedId      = id;  // 카드 강조 유지

  // 현재 필터된 목록 스냅샷 (네비게이션용)
  _drawerTermList = _lastFilteredTerms || TERMS;

  _renderDrawerContent(t);
  _updateDrawerNav();

  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('termDrawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('termDrawer').classList.remove('open');
  document.body.style.overflow = '';
  expandedId = null;
  _drawerTermId = null;
  // 카드 강조만 제거 (리렌더 없이)
  document.querySelectorAll('.term-card.expanded').forEach(el => el.classList.remove('expanded'));
}

function drawerNavigate(dir) {
  const idx = _drawerTermList.findIndex(x => x.id === _drawerTermId);
  if (idx === -1) return;
  const next = _drawerTermList[idx + dir];
  if (!next) return;
  openDrawer(next.id);
  // 해당 카드로 부드럽게 스크롤
  setTimeout(() => {
    const card = document.getElementById('card-' + next.id);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 80);
}

function _updateDrawerNav() {
  const idx   = _drawerTermList.findIndex(x => x.id === _drawerTermId);
  const total = _drawerTermList.length;
  document.getElementById('drawerNavCount').textContent = total ? `${idx + 1} / ${total}` : '';
  document.getElementById('drawerPrevBtn').disabled = idx <= 0;
  document.getElementById('drawerNextBtn').disabled = idx >= total - 1;
}

function drawerToggleBookmark() {
  if (!_drawerTermId) return;
  if (bookmarks.has(_drawerTermId)) {
    bookmarks.delete(_drawerTermId);
    showToast('즐겨찾기에서 제거됨');
  } else {
    bookmarks.add(_drawerTermId);
    showToast('⭐ 즐겨찾기에 추가됨');
  }
  safeSetItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  updateLearningState(_drawerTermId, { bookmarked: bookmarks.has(_drawerTermId) });
  updateBookmarkCount();
  _syncDrawerBookmarkBtn();
  // 목록 카드의 즐겨찾기 버튼도 갱신 (리렌더 없이)
  const card = document.getElementById('card-' + _drawerTermId);
  if (card) {
    const btn = card.querySelector('.bookmark-btn');
    if (btn) {
      const saved = bookmarks.has(_drawerTermId);
      btn.textContent = saved ? '⭐' : '☆';
      btn.classList.toggle('saved', saved);
    }
  }
}

function _syncDrawerBookmarkBtn() {
  const btn = document.getElementById('drawerBookmarkBtn');
  if (!btn || !_drawerTermId) return;
  const saved = bookmarks.has(_drawerTermId);
  btn.textContent = saved ? '⭐' : '☆';
  btn.classList.toggle('starred', saved);
}

function drawerOpenEdit() {
  if (!_drawerTermId) return;
  const termId = _drawerTermId;
  closeDrawer();
  setTimeout(() => openEditModal({ stopPropagation: () => {} }, termId), 120);
}

function _renderDrawerContent(t) {
  const termId = Number(t.id) || 0;
  // 헤더 업데이트
  document.getElementById('drawerTitleKo').textContent = t.ko || t.en || '—';
  document.getElementById('drawerTitleEn').textContent = t.en || '';
  _syncDrawerBookmarkBtn();

  // 완성도 배지
  const missing = [];
  if (!t.ko)     missing.push('KO');
  if (!t.uz)     missing.push('UZ');
  if (!t.def_ko) missing.push('정의');
  if (!t.def_en) missing.push('Def');
  if (!t.def_uz) missing.push('Uz');
  if (!t.usmle)  missing.push('USMLE');
  if (!t.ipa)    missing.push('IPA');
  const badgeHtml = missing.length
    ? `<span class="drawer-complete-badge" style="color:#f85149;background:rgba(248,81,73,0.1);border-color:rgba(248,81,73,0.3)">✗ ${missing.join(' · ')}</span>`
    : `<span class="drawer-complete-badge" style="color:#3fb950;background:rgba(63,185,80,0.1);border-color:rgba(63,185,80,0.3)">✓ 완성</span>`;

  // 카테고리 배지
  const catHtml = `
    <span style="font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;color:var(--text3)">${escapeHtml(conceptDisplay(t.concept_category))}</span>
    <span style="font-size:11px;background:rgba(88,166,255,0.08);border:1px solid rgba(88,166,255,0.3);border-radius:6px;padding:2px 8px;color:#74b0ff">${escapeHtml(categoryDisplay(t.category))}</span>`;

  // 링크 버튼들
  const linksHtml = `
    <div class="drawer-links">
      <a class="drawer-link-btn" href="https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(t.en)}" target="_blank" rel="noopener noreferrer">PubMed</a>
      <a class="drawer-link-btn" href="${youtubeSearchUrl(t)}" target="_blank" rel="noopener noreferrer">YouTube</a>
      <a class="drawer-link-btn" href="${googleUsageSearchUrl(t)}" target="_blank" rel="noopener noreferrer">Google 사용례</a>
      <button class="drawer-link-btn" onclick="showICD11ForTerm(${termId});">ICD-11</button>
      <a class="drawer-link-btn" href="https://medlineplus.gov/search.html?query=${encodeURIComponent(t.en)}" target="_blank" rel="noopener noreferrer">MedlinePlus</a>
      <a class="drawer-link-btn" href="https://clinicaltrials.gov/search?cond=${encodeURIComponent(t.en)}&recrs=a" target="_blank" rel="noopener noreferrer">ClinicalTrials</a>
      <a class="drawer-link-btn" href="https://www.fda.gov/search?s=${encodeURIComponent(t.en)}" target="_blank" rel="noopener noreferrer">FDA</a>
    </div>`;

  document.getElementById('drawerBody').innerHTML = `
    <!-- 상단 메타 -->
    <div class="drawer-section" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 18px">
      ${catHtml}
      ${badgeHtml}
    </div>

    <!-- 한국어 -->
    <div class="drawer-section">
      <div class="drawer-lang-badge" style="background:var(--tag-ko);color:#74b0ff;border:1px solid #1d4ed8">🇰🇷 한국어</div>
      ${t.ko
        ? `<div class="drawer-term-main" style="font-family:'Noto Serif KR',serif">${escapeHtml(t.ko)}</div>`
        : `<div class="drawer-missing">한국어 명칭 없음</div>`}
      ${t.def_ko
        ? `<div class="drawer-term-def" style="margin-top:6px">${escapeHtml(t.def_ko)}</div>`
        : `<div class="drawer-missing">한국어 정의 없음</div>`}
    </div>

    <!-- 영어 -->
    <div class="drawer-section">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px">
        <div class="drawer-lang-badge" style="background:var(--tag-en);color:#4ade80;border:1px solid #166534;margin-bottom:0">🇺🇸 English</div>
        <button class="speak-btn" id="drawer-speak-term" onclick="speakTermField(event,${termId},'en','term')" aria-label="영어 용어 발음 듣기">
          <div class="wave"><span></span><span></span><span></span><span></span></div>
          발음 듣기
        </button>
      </div>
      ${t.en
        ? `<div class="drawer-term-main">${escapeHtml(t.en)}</div>`
        : `<div class="drawer-missing">영어 명칭 없음</div>`}
      ${t.ipa ? `
        <div class="drawer-ipa">
          <span style="font-size:10px;color:var(--text3);font-family:'Noto Sans KR',sans-serif">IPA</span>
          ${escapeHtml(t.ipa)}
        </div>
        <div class="drawer-ipa-tip">Cambridge 방식 · 강세: ˈ(1차) ˌ(2차) · 장모음: ː</div>` : ''}
      ${t.def_en
        ? `<div class="drawer-term-def" style="margin-top:6px">${escapeHtml(t.def_en)}</div>`
        : `<div class="drawer-missing">영어 정의 없음</div>`}

// 키보드 단축키: ESC=닫기, ←→=이전/다음
document.addEventListener('keydown', e => {
  if (!document.getElementById('termDrawer').classList.contains('open')) return;
  if (e.key === 'Escape')     closeDrawer();
  if (e.key === 'ArrowRight') drawerNavigate(1);
  if (e.key === 'ArrowLeft')  drawerNavigate(-1);
});

function openDrugDrawer(id) {
  const d = DRUGS.find(x => Number(x.id) === Number(id));
  if (!d) {
    if (typeof showToast === 'function') showToast('⚠️ 약물 항목을 찾지 못했습니다');
    return;
  }
  _drawerDrugId = Number(id);
  try {
    _drawerDrugList = filterDrugsForQuery(document.getElementById('searchInput')?.value || '');
  } catch {
    _drawerDrugList = DRUGS.filter(x => !x.deletedAt);
  }
  _renderDrugDrawerContent(d);
  _updateDrugDrawerNav();
  document.getElementById('drugDrawerOverlay')?.classList.add('open');
  document.getElementById('drugDrawer')?.classList.add('open');
  document.body.style.overflow = 'hidden';
  document.querySelectorAll('.drug-card.selected').forEach(el => el.classList.remove('selected'));
  document.getElementById('drug-card-' + Number(id))?.classList.add('selected');
}

function closeDrugDrawer() {
  document.getElementById('drugDrawerOverlay')?.classList.remove('open');
  document.getElementById('drugDrawer')?.classList.remove('open');
  document.body.style.overflow = '';
  _drawerDrugId = null;
  document.querySelectorAll('.drug-card.selected').forEach(el => el.classList.remove('selected'));
}

function drugDrawerNavigate(dir) {
  const idx = _drawerDrugList.findIndex(x => Number(x.id) === Number(_drawerDrugId));
  if (idx === -1) return;
  const next = _drawerDrugList[idx + dir];
  if (!next) return;
  openDrugDrawer(next.id);
  setTimeout(() => {
    const card = document.getElementById('drug-card-' + Number(next.id));
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 80);
}

function _updateDrugDrawerNav() {
  const idx = _drawerDrugList.findIndex(x => Number(x.id) === Number(_drawerDrugId));
  const total = _drawerDrugList.length;
  const count = document.getElementById('drugDrawerNavCount');
  const prev = document.getElementById('drugDrawerPrevBtn');
  const next = document.getElementById('drugDrawerNextBtn');
  if (count) count.textContent = total && idx >= 0 ? `${idx + 1} / ${total}` : '';
  if (prev) prev.disabled = idx <= 0;
  if (next) next.disabled = idx < 0 || idx >= total - 1;
}

function drugDrawerOpenEdit() {
  if (!_drawerDrugId) return;
  const drugId = _drawerDrugId;
  closeDrugDrawer();
  setTimeout(() => openDrugEditModal({ stopPropagation: () => {} }, drugId), 120);
}

function _renderDrugDrawerContent(d) {
  const title = drugDisplayName(d);
  const subtitle = [d.ko_name, d.brand_name].filter(Boolean).join(' · ');
  const chips = drugPrimaryChipLabels(d);

  const body = document.getElementById('drugDrawerBody');
  const titleEl = document.getElementById('drugDrawerTitle');
  const subEl = document.getElementById('drugDrawerSubtitle');
  if (titleEl) titleEl.textContent = title;
  if (subEl) subEl.textContent = subtitle || '약물명 및 정보';
  if (!body) return;

  body.innerHTML = `
    <div class="drawer-section" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 18px">
      ${chips.map(chip => `<span class="drug-chip">${escapeHtml(chip)}</span>`).join('')}
    </div>
    <div class="drawer-section">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px">
        <div class="drawer-lang-badge" style="background:rgba(251,191,36,0.13);color:#fbbf24;border:1px solid #92400e;margin-bottom:0">💊 약물 개요</div>
        <button class="speak-btn" id="speak-drug-drawer-${Number(d.id)}" onclick="speakDrugName(event,${Number(d.id)},'drug-drawer')" title="약물명(영어) 발음 듣기" aria-label="약물명 영어 발음 듣기">
          <div class="wave"><span></span><span></span><span></span><span></span></div>
          발음 듣기
        </button>
      </div>
      <div class="drawer-term-main">${escapeHtml(title)}</div>
      ${subtitle ? `<div class="drawer-term-def" style="margin-top:6px">${escapeHtml(subtitle)}</div>` : ''}
      <div class="tts-speed-row" style="margin-top:10px">
        <span class="tts-speed-label">🐢 속도</span>
        <input class="tts-speed-slider" type="range" min="0.5" max="1.5" step="0.1" value="${ttsSpeed}" oninput="ttsSpeed=parseFloat(this.value);document.querySelectorAll('.tts-speed-val').forEach(el=>el.textContent=ttsSpeed.toFixed(1)+'×')">
        <span class="tts-speed-val">${ttsSpeed.toFixed(1)}×</span>
      </div>
    </div>
    <div class="drawer-section">
      ${drugBasicCardHtml(d)}
    </div>
    <div class="drawer-section">
      ${drugAdvancedInfoHtml(d)}
    </div>
  `;
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('drugDrawer')?.classList.contains('open')) return;
  if (e.key === 'Escape') closeDrugDrawer();
  if (e.key === 'ArrowRight') drugDrawerNavigate(1);
  if (e.key === 'ArrowLeft') drugDrawerNavigate(-1);
});

    align-items: center;
    height: 14px;

    display: inline-block;
    width: 3px;
    background: var(--accent2);
    border-radius: 2px;
    height: 6px;
    transition: height 0.1s;
  }

  .speak-btn.speaking .wave span:nth-child(2) { animation: bar 0.6s infinite 0.1s; }
  .speak-btn.speaking .wave span:nth-child(3) { animation: bar 0.6s infinite 0.2s; }
  .speak-btn.speaking .wave span:nth-child(4) { animation: bar 0.6s infinite 0.15s; }

  @keyframes bar {
    0%, 100% { height: 3px; }
    50% { height: 13px; }

  .ipa-block {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(210,153,34,0.08);
    border: 1px solid rgba(210,153,34,0.25);
    border-radius: 8px;
    padding: 5px 11px;
    margin: 6px 0 4px;
  }

  .ipa-label {
    font-size: 9px;
    color: var(--accent3);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    white-space: nowrap;
  }

  .ipa-text {
    font-family: 'Noto Sans KR', 'DejaVu Sans', serif;
    font-size: 14px;
    color: var(--accent3);
    letter-spacing: 0.5px;
    line-height: 1.4;
  }

  .ipa-tip {
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 6px;
    line-height: 1.5;
  }

  /* Highlight on search */
  .highlight {
    background: rgba(210,153,34,0.25);
    color: var(--accent3);
    border-radius: 3px;
    padding: 0 2px;
  }

  /* Bookmark button */
  .bookmark-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 16px;
    cursor: pointer;
    padding: 2px;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .bookmark-btn:hover { color: var(--accent3); }
  .bookmark-btn.saved { color: var(--accent3); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text3);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 15px; color: var(--text2); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    backdrop-filter: blur(12px);
  }

  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    color: var(--text3);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    transition: color 0.15s;
  }

  .nav-btn .nav-icon { font-size: 20px; }
  .nav-btn.active { color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text2);
    opacity: 0;
    transition: all 0.3s;
    z-index: 10000;
    max-width: min(92vw, 520px);
    white-space: normal;
    text-align: center;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Count badge */
  .count-badge {
    background: var(--accent);
    color: #0d1117;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 6px;
  }

  .result-info {
    font-size: 11px;
    color: var(--text3);
    padding: 8px 0 4px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .term-card { animation: fadeIn 0.2s ease both; }

  /* ── New API Badges ── */
  .api-badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }

  .api-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }

  .api-tag.icd11   { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid #5b21b6; }
  .api-tag.fda     { background: rgba(248,81,73,0.10);  color: #f87171; border: 1px solid #991b1b; }
  .api-tag.rxclass { background: rgba(251,191,36,0.10); color: #fbbf24; border: 1px solid #92400e; }
  .api-tag.trials  { background: rgba(34,197,94,0.10);  color: #4ade80; border: 1px solid #166534; }

  /* ── Search Autocomplete ── */
  .autocomplete-wrap { position: relative; }

  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 10px;
    z-index: 300;
    max-height: 240px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .autocomplete-list:empty { display: none; }

  .ac-item {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }

  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover { background: rgba(88,166,255,0.08); }

  .ac-name {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }

  .ac-code {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
    font-family: monospace;
  }

  .ac-source {
    font-size: 9px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    float: right;
    margin-top: 1px;
  }

  /* ── FDA Warning panel ── */
  .fda-panel {
    background: rgba(248,81,73,0.05);
    border-left: 3px solid #f85149;
    border-radius: 0 6px 6px 0;
    padding: 8px 10px;
    margin-top: 6px;
  }

  .fda-panel .fda-title {
    font-size: 10px;
    color: #f87171;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 4px;
  }

  .fda-panel .fda-text {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.55;
  }

  /* ── Trials badge ── */
  .trials-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: #4ade80;
    text-decoration: none;
    margin-top: 6px;
  }

  .trials-link:hover { background: rgba(34,197,94,0.15); }

  /* ═══════════════════════════════════════
     TERM DRAWER — 오른쪽 슬라이드 패널
     모바일: 하단 Bottom Sheet
  ═══════════════════════════════════════ */
  .term-drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0);
    z-index: 400;
    pointer-events: none;
    transition: background 0.3s ease;
  }
  .term-drawer-overlay.open {
    background: rgba(0,0,0,0.55);
    pointer-events: all;
  }

  .term-drawer {
    position: fixed;
    top: 0;
    right: 0;
    height: 100%;
    width: min(480px, 92vw);
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 401;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.32s cubic-bezier(0.32,0,0,1);
    box-shadow: -8px 0 40px rgba(0,0,0,0.45);
    overflow: hidden;
  }
  .term-drawer.open {
    transform: translateX(0);
  }

  /* 드로어 헤더 */
  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    gap: 10px;
  }
  .drawer-header-left {
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
    flex: 1;
  }
  .drawer-title-ko {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .drawer-title-en {
    font-size: 13px;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .drawer-header-right {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .drawer-action-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 14px;
    color: var(--text2);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .drawer-action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .drawer-action-btn.starred { color: var(--accent3); border-color: var(--accent3); }
  .drawer-close-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 22px;
    cursor: pointer;
    padding: 4px 6px;
    line-height: 1;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
  }
  .drawer-close-btn:hover { color: var(--text); background: var(--surface2); }

  /* 드로어 네비게이션 (이전/다음) */
  .drawer-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .drawer-nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .drawer-nav-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .drawer-nav-btn:disabled { opacity: 0.3; cursor: default; }
  .drawer-nav-count {
    flex: 1;
    text-align: center;
    font-size: 11px;
    color: var(--text3);
  }

  /* 드로어 바디 */
  .drawer-body {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }
  .drawer-body::-webkit-scrollbar { width: 4px; }
  .drawer-body::-webkit-scrollbar-track { background: transparent; }
  .drawer-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .drawer-section {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .drawer-section:last-child { border-bottom: none; }
  .drawer-lang-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    border-radius: 6px;
    padding: 3px 10px;
    margin-bottom: 10px;
  }
  .drawer-term-main {
    font-size: 17px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
    line-height: 1.35;
  }
  .drawer-term-def {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
  }
  .drawer-ipa {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-family: monospace;
    font-size: 13px;
    color: #c9a4ff;
    margin: 6px 0 4px;
  }
  .drawer-ipa-tip {
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .drawer-speak-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .drawer-missing {
    font-size: 11px;
    color: var(--text3);
    font-style: italic;
    padding: 8px 0;
  }
  .drawer-usmle-text {
    font-family: monospace;
    font-size: 12px;
    color: var(--text2);
    line-height: 1.7;
    white-space: pre-wrap;
  }
  .drawer-links {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .drawer-link-btn {
    text-decoration: none;
    border-radius: 8px;
    padding: 5px 11px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .drawer-link-btn:hover {
    background: var(--add-active-bg);
    border-color: var(--add-active-border);
    color: var(--add-active-text);
  }
  html[data-theme="light"] .drawer-link-btn {
    background: #ffffff;
    border-color: #d7e0ee;
    color: #475569;
    box-shadow: 0 1px 2px rgba(15,23,42,0.03);
  }
  html[data-theme="light"] .drawer-link-btn:hover {
    background: #eef6ff;
    border-color: #bfdbfe;
    color: #1d4ed8;
  }
  .drawer-complete-badge {
    font-size: 10px;
    border-radius: 6px;
    padding: 2px 8px;
    border: 1px solid;
  }

  /* 모바일: Bottom Sheet */
  @media (max-width: 600px) {
    .term-drawer {
      top: auto;
      bottom: 0;
      right: 0;
      left: 0;
      width: 100%;
      height: 88vh;
      border-left: none;
      border-top: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      transform: translateY(100%);
      box-shadow: 0 -8px 40px rgba(0,0,0,0.5);
    }
    .term-drawer.open { transform: translateY(0); }
    /* Bottom Sheet 핸들 */
    .drawer-handle {
      display: flex !important;
    }
  }
  .drawer-handle {
    display: none;
    justify-content: center;
    padding: 10px 0 2px;
    background: var(--bg);
    flex-shrink: 0;
  }
  .drawer-handle-bar {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
  }

  /* 카드 hover 커서 변경 (더이상 expand 아닌 drawer 열기) */
  .term-card { cursor: pointer; }
  .term-card .term-detail { display: none !important; }
  .term-card .chevron { display: none !important; }
  .term-card.expanded { border-color: var(--accent); }

  @media (max-width: 600px) {
    header {
      padding: 14px 14px 12px;
    }

    main {
      padding: 12px 12px calc(88px + env(safe-area-inset-bottom));
    }

    .header-top {
      gap: 8px;
    }

    .logo-badge {
      width: 44px;
      height: 44px;
    }

    .header-titles h1 {
      font-size: 16px;
    }

    .header-titles p {
      font-size: 11px;
    }

    .data-header-btn,
    .kma-header-btn,
    .settings-header-btn,
    .category-stats-header-btn,
    .developer-header-btn,
    .theme-toggle-btn {
      flex: 1 1 calc(25% - 8px);
      min-width: 70px;
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 8px;
      font-size: 11px;
      text-align: center;
    }

    .final-save-header-btn,
    .version-check-header-btn {
      flex: 1 1 calc(50% - 6px);
      min-width: 142px;
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 10px;
      font-size: 11px;
      text-align: center;
    }

    .search-input {
      min-height: 46px;
      font-size: 14px;
    }

    header + div {
      padding: 6px 12px 0 !important;
    }

    header + div > button,
    header + div > select {
      flex: 1 1 100%;
      min-height: 36px;
    }

    .section-label {
      margin-top: 14px;
    }

    .inline-add-btn {
      width: 100%;
      min-height: 38px;
      justify-content: center;
    }

    .list-action-bar {
      align-items: stretch;
      padding: 10px;
      border-radius: 12px;
    }

    .list-action-text {
      width: 100%;
      line-height: 1.5;
    }

    .list-action-buttons {
      width: 100%;
    }

    .list-mini-btn {
      flex: 1 1 100%;
      min-height: 36px;
    }

    .term-card {
      border-radius: 13px;
      margin-bottom: 12px;
    }

    .term-header {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      align-items: start;
      gap: 8px 10px;
      padding: 14px 12px;
    }

    .term-select-wrap {
      grid-column: 1;
      grid-row: 1;
      width: 30px;
      height: 30px;
      margin-top: 2px;
    }

    .term-main {
      grid-column: 2;
      grid-row: 1;
      width: 100%;
      min-width: 0;
    }

    .term-korean,
    .term-english,
    .term-uzbek {
      max-width: 100%;
      overflow-wrap: break-word;
      word-break: keep-all;
      line-height: 1.45;
    }

    .term-korean {
      font-size: 15px;
      margin-bottom: 4px;
    }

    .term-english {
      font-size: 15px;
    }

    .term-uzbek {
      font-size: 14px;
      margin-top: 4px;
    }

    .term-meta-row {
      grid-column: 2;
      grid-row: 2;
      width: 100%;
      max-width: none;
      justify-content: flex-start;
      gap: 6px;
      min-width: 0;
    }

    .term-category {
      max-width: 100%;
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .term-complete-badge {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      margin-right: 0 !important;
    }

    .bookmark-btn {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 9px;
      background: rgba(255,255,255,0.03);
    }

    .drug-card {
      padding: 13px 12px;
      border-radius: 13px;
    }

    .drug-head {
      flex-direction: column;
      gap: 8px;
    }

    .drug-head-actions {
      width: 100%;
      justify-content: flex-start;
    }

    .drug-section-grid {
      grid-template-columns: 1fr;
    }

    .drug-definition-grid {
      grid-template-columns: 1fr;
    }

    .bottom-nav {
      padding-bottom: env(safe-area-inset-bottom);
    }
  }

  @media (max-width: 420px) {
    header {
      padding-left: 10px;
      padding-right: 10px;
    }

    main {
      padding-left: 10px;
      padding-right: 10px;
    }

    .library-mode-bar,
    .top-tool-row,
    .filter-group,
    .stats-bar {
      padding-left: 10px;
      padding-right: 10px;
    }

    .library-mode-switch {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    }

    .library-mode-btn {
      width: 100%;
      padding-left: 8px;
      padding-right: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .library-mode-hint {
      flex-basis: 100%;
    }

    .data-header-btn,
    .kma-header-btn,
    .settings-header-btn,
    .category-stats-header-btn,
    .developer-header-btn {
      flex-basis: calc(50% - 6px);
    }

    .final-save-header-btn,
    .version-check-header-btn {
      flex-basis: 100%;
      min-width: 0;
    }
  }

</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-badge">🩺</div>
    <div class="header-titles">
      <h1 onclick="switchTab('search', document.querySelector('.nav-btn'))" style="cursor:pointer" title="홈으로">Dr. Bugeon의 의학용어</h1>
      <p>Medical Terminology · Tibbiy terminologiya</p>
    </div>
    <button id="themeToggleBtn" class="theme-toggle-btn" onclick="toggleThemeMode()" title="라이트모드로 전환">☀️ <span class="wide-label">라이트모드</span><span class="mobile-label" style="display:none">라이트</span></button>
    <button class="data-header-btn" onclick="switchTab('export', getNavButton('export'))" title="가져오기 · 백업 · 동기화 데이터 관리">📁 <span class="wide-label">데이터</span><span class="mobile-label" style="display:none">데이터</span></button>
    <button class="kma-header-btn" onclick="openKmaTermSearch(event)" title="대한의사협회 의학용어 검색을 화면 크기에 맞는 새 창으로 열기">🔎 <span class="wide-label">대한의사협회 용어검색</span><span class="mobile-label" style="display:none">KMA 검색</span></button>

<script>
// ─── Data ───
const TERMS = [];
const DRUGS = [];
const FORMULAS = [];
const TERMS_STORAGE_KEY = 'kma_medical_terms_v2_terms';
const TERMS_STORAGE_META_KEY = 'kma_medical_terms_v2_meta';
const DRUGS_STORAGE_KEY = 'kma_medical_terms_v2_drugs';
const DRUGS_STORAGE_META_KEY = 'kma_medical_terms_v2_drugs_meta';
const FORMULAS_STORAGE_KEY = 'kma_medical_terms_v2_formulas';
const FORMULAS_STORAGE_META_KEY = 'kma_medical_terms_v2_formulas_meta';
const AI_CONFIG_STORAGE_KEY = 'kma_medical_terms_v2_ai_config';
const SUPABASE_CONFIG_KEY = 'kma_supabase_config';
const SYNC_META_STORAGE_KEY = 'kma_medical_terms_v2_sync_meta';
const LEARNING_STORAGE_KEY = 'kma_medical_terms_v2_learning';
const TOMBSTONE_STORAGE_KEY = 'kma_medical_terms_v2_tombstones';
const DRUG_TOMBSTONE_STORAGE_KEY = 'kma_medical_terms_v2_drug_tombstones';
const FORMULA_TOMBSTONE_STORAGE_KEY = 'kma_medical_terms_v2_formula_tombstones';
const DEVICE_ID_STORAGE_KEY = 'kma_medical_terms_v2_device_id';
const LOCAL_CACHE_DB_NAME = 'kma_medical_terms_v2_indexed_cache';
const LOCAL_CACHE_STORE = 'kv';
const LOCAL_CACHE_META_KEY = 'kma_medical_terms_v2_cache_meta';
const SYNC_META_TABLE = 'language_sync_meta';
const LEARNING_TABLE = 'medical_term_learning_state';
const DRUGS_TABLE = 'medical_drugs';
const FORMULAS_TABLE = 'medical_formulas';
const CANONICAL_META_KEY = 'medical_terms_canonical_version';
const DRUG_CANONICAL_META_KEY = 'medical_drugs_canonical_version';
const CANONICAL_REVISION_META_KEY = 'medical_terms_canonical_revision';
const CANONICAL_DEVICE_ID_META_KEY = 'medical_terms_canonical_device_id';
const CANONICAL_DEVICE_LABEL_META_KEY = 'medical_terms_canonical_device_label';
const CANONICAL_ACTIVE_COUNT_META_KEY = 'medical_terms_canonical_active_count';
const CANONICAL_DELETED_COUNT_META_KEY = 'medical_terms_canonical_deleted_count';
const CANONICAL_RECORD_IDS_HASH_META_KEY = 'medical_terms_canonical_record_ids_hash';
const CANONICAL_SNAPSHOT_HASH_META_KEY = 'medical_terms_canonical_snapshot_hash';
const DRUG_CANONICAL_ACTIVE_COUNT_META_KEY = 'medical_drugs_canonical_active_count';
const DRUG_CANONICAL_DELETED_COUNT_META_KEY = 'medical_drugs_canonical_deleted_count';
const DRUG_CANONICAL_RECORD_IDS_HASH_META_KEY = 'medical_drugs_canonical_record_ids_hash';
const DRUG_CANONICAL_SNAPSHOT_HASH_META_KEY = 'medical_drugs_canonical_snapshot_hash';
const FORMULA_CANONICAL_META_KEY = 'medical_formulas_canonical_version';
const FORMULA_CANONICAL_ACTIVE_COUNT_META_KEY = 'medical_formulas_canonical_active_count';
const FORMULA_CANONICAL_DELETED_COUNT_META_KEY = 'medical_formulas_canonical_deleted_count';
const FORMULA_CANONICAL_RECORD_IDS_HASH_META_KEY = 'medical_formulas_canonical_record_ids_hash';
const FORMULA_CANONICAL_SNAPSHOT_HASH_META_KEY = 'medical_formulas_canonical_snapshot_hash';
const TOMBSTONE_PRUNE_DAYS = 90;

function safeSetItem(key, value, options = {}) {
  try {
    localStorage.setItem(key, value);
    return true;
  } catch (err) {
    console.warn('localStorage save failed:', key, err);
    if (!options.silent && typeof showToast === 'function') {
      showToast(options.message || '⚠️ 브라우저 저장공간 부족으로 일부 설정을 저장하지 못했습니다');
    }
    return false;
  }
}

let _localCacheDbPromise = null;
let _localCacheWarned = false;
let _localTombstonesCache = null;
let _localDrugTombstonesCache = null;
let _localFormulaTombstonesCache = null;
let _learningStateCache = null;
let _localCacheBackend = 'localStorage';

function localCacheSupported() {
  return typeof indexedDB !== 'undefined';
}

function openLocalCacheDb() {
  if (!localCacheSupported()) return Promise.resolve(null);
  if (_localCacheDbPromise) return _localCacheDbPromise;
  _localCacheDbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(LOCAL_CACHE_DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(LOCAL_CACHE_STORE)) {
        db.createObjectStore(LOCAL_CACHE_STORE, { keyPath: 'key' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error || new Error('IndexedDB open failed'));
  }).catch(err => {
    _localCacheDbPromise = null;
    throw err;
  });
  return _localCacheDbPromise;
}

async function idbGetValue(key) {
  const db = await openLocalCacheDb();
  if (!db) return undefined;
  return new Promise((resolve, reject) => {
    const tx = db.transaction(LOCAL_CACHE_STORE, 'readonly');
    const req = tx.objectStore(LOCAL_CACHE_STORE).get(key);
    req.onsuccess = () => resolve(req.result?.value);
    req.onerror = () => reject(req.error || new Error(`IndexedDB read failed: ${key}`));
  });
}

async function idbSetValue(key, value) {
  const db = await openLocalCacheDb();
  if (!db) throw new Error('IndexedDB unavailable');
  return new Promise((resolve, reject) => {
    const tx = db.transaction(LOCAL_CACHE_STORE, 'readwrite');
    tx.objectStore(LOCAL_CACHE_STORE).put({ key, value, updatedAt: new Date().toISOString() });
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error || new Error(`IndexedDB write failed: ${key}`));
    tx.onabort = () => reject(tx.error || new Error(`IndexedDB write aborted: ${key}`));
  });
}

function rememberLocalCacheMeta(partial = {}) {
  const current = safeJsonParse(localStorage.getItem(LOCAL_CACHE_META_KEY), {}) || {};
  safeSetItem(LOCAL_CACHE_META_KEY, JSON.stringify({
    ...current,
    ...partial,
    backend: _localCacheBackend,
    updatedAt: new Date().toISOString(),
  }), { silent: true });
}

function scheduleLargeCacheWrite(key, value, metaKey, meta = {}) {
  const payload = Array.isArray(value) ? [...value] : value;
  const metaPayload = {
    ...meta,
    cacheBackend: localCacheSupported() ? 'IndexedDB' : 'localStorage',
    savedAt: new Date().toISOString(),
  };
  if (metaKey) safeSetItem(metaKey, JSON.stringify(metaPayload), { silent: true });

  if (!localCacheSupported()) {
    _localCacheBackend = 'localStorage';
    rememberLocalCacheMeta({ lastFallbackKey: key });
    return safeSetItem(key, JSON.stringify(payload), { silent: true });
  }

  _localCacheBackend = 'IndexedDB';
  rememberLocalCacheMeta({ lastWriteKey: key });
  idbSetValue(key, payload)
    .then(() => {
      try { localStorage.removeItem(key); } catch (_) {}
      if (metaKey) safeSetItem(metaKey, JSON.stringify({ ...metaPayload, cacheBackend: 'IndexedDB' }), { silent: true });
      _localCacheWarned = false;
    })
    .catch(err => {
      console.warn('IndexedDB cache write failed:', key, err);
      _localCacheBackend = 'localStorage';
      rememberLocalCacheMeta({ lastErrorKey: key, lastError: err?.message || String(err) });
      const ok = safeSetItem(key, JSON.stringify(payload), { silent: true });
      if (!ok && !_localCacheWarned && typeof showToast === 'function') {
        _localCacheWarned = true;
        showToast('⚠️ 로컬 캐시 저장 실패 · Supabase 저장은 계속 시도됩니다');
      }
    });
  return true;
}

async function readLargeCacheValue(key, fallback = []) {
  if (localCacheSupported()) {
    try {
      const value = await idbGetValue(key);
      if (value !== undefined && value !== null) {
        _localCacheBackend = 'IndexedDB';
        return value;
      }
    } catch (err) {
      console.warn('IndexedDB cache read failed:', key, err);
    }
  }
  const stored = safeJsonParse(localStorage.getItem(key), fallback);
  if (stored !== undefined && stored !== null) {
    if (localCacheSupported() && ((Array.isArray(stored) && stored.length) || (!Array.isArray(stored) && Object.keys(stored || {}).length))) {
      scheduleLargeCacheWrite(key, stored, null, { migratedFrom: 'localStorage' });
    }
    _localCacheBackend = localCacheSupported() ? 'IndexedDB+legacy' : 'localStorage';
    return stored;
  }
  return fallback;
}

function getDeviceId() {
  let id = localStorage.getItem(DEVICE_ID_STORAGE_KEY);
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : `device-${Date.now()}-${Math.random().toString(16).slice(2)}`);
    safeSetItem(DEVICE_ID_STORAGE_KEY, id, { silent: true });
  }
  return id;
}

function shortDeviceId(id = getDeviceId()) {
  return String(id || '').replace(/[^a-zA-Z0-9]/g, '').slice(-8) || 'unknown';
}

function getDeviceReadableLabel() {
  const ua = navigator.userAgent || '';
  const type = /iPad|Tablet|Android(?!.*Mobile)/i.test(ua) ? '태블릿' : (/Mobi|iPhone|Android/i.test(ua) ? '휴대폰' : 'PC');
  const os = /Windows/i.test(ua) ? 'Windows'
    : /Mac OS|Macintosh/i.test(ua) ? 'macOS'
    : /Android/i.test(ua) ? 'Android'
    : /iPhone|iPad|iOS/i.test(ua) ? 'iOS'
    : /Linux/i.test(ua) ? 'Linux'
    : 'OS 확인불가';
  const browser = /Edg\//i.test(ua) ? 'Edge'
    : /Chrome\//i.test(ua) ? 'Chrome'
    : /Firefox\//i.test(ua) ? 'Firefox'
    : /Safari\//i.test(ua) ? 'Safari'
    : 'Browser 확인불가';
  return `${type} · ${os} · ${browser} · id ${shortDeviceId()}`;
}

function stableForHash(value) {
  if (Array.isArray(value)) return value.map(stableForHash);
  if (value && typeof value === 'object') {
    return Object.keys(value).sort().reduce((acc, key) => {
      acc[key] = stableForHash(value[key]);
      return acc;
    }, {});
  }
  return value == null ? null : value;
}

function simpleHashText(text) {
  let h1 = 0xdeadbeef ^ text.length;
  let h2 = 0x41c6ce57 ^ text.length;
  for (let i = 0; i < text.length; i++) {
    const ch = text.charCodeAt(i);
    h1 = Math.imul(h1 ^ ch, 2654435761);
    h2 = Math.imul(h2 ^ ch, 1597334677);
  }
  h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
  h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
  return `${(h2 >>> 0).toString(16).padStart(8, '0')}${(h1 >>> 0).toString(16).padStart(8, '0')}`;
}

function canonicalTermHashPayload(terms) {
  return dedupeTermsById(terms)
    .filter(t => !t.deletedAt)
    .sort((a, b) => String(a.id).localeCompare(String(b.id), 'en', { numeric: true }))
    .map(t => stableForHash({
      id: String(t.id),
      ko: t.ko || '',
      en: t.en || '',
      uz: t.uz || '',
      category: t.category || '',
      concept_category: t.concept_category || '',
      system_tags: Array.isArray(t.system_tags) ? t.system_tags : [],
      def_ko: t.def_ko || '',
      def_en: t.def_en || '',
      def_uz: t.def_uz || '',
      usmle: t.usmle || '',
      ipa: t.ipa || '',
      refs: Array.isArray(t.refs) ? t.refs : [],
      icd11: t.icd11 || null,
      fdaDrug: t.fdaDrug || null,
      rxclassATC: t.rxclassATC || null,
      trials: t.trials || null,
      createdAt: t.createdAt || '',
      updatedAt: t.updatedAt || '',
    }));
}

function computeRecordIdsHash(terms) {
  const ids = dedupeTermsById(terms)
    .filter(t => !t.deletedAt)
    .map(t => String(t.id))
    .sort((a, b) => a.localeCompare(b, 'en', { numeric: true }));
  return simpleHashText(ids.join('|'));
}

function computeSnapshotHash(terms) {
  return simpleHashText(JSON.stringify(canonicalTermHashPayload(terms)));
}

function canonicalDrugHashPayload(drugs) {
  return dedupeDrugsById(drugs)
    .filter(d => !d.deletedAt)
    .sort((a, b) => String(a.id).localeCompare(String(b.id), 'en', { numeric: true }))
    .map(d => stableForHash({
      id: String(d.id),
      generic_name: d.generic_name || '',
      ko_name: d.ko_name || '',
      brand_name: d.brand_name || '',
      drug_class: d.drug_class || '',
      same_class_drugs: d.same_class_drugs || '',
      drug_form: d.drug_form || '',
      atc_class: d.atc_class || '',
      target: d.target || '',
      route: d.route || '',
      concept_category: d.concept_category || 'Pharmacology',
      category: d.category || '',
      system_tags: Array.isArray(d.system_tags) ? d.system_tags : [],
      usmle_yield: d.usmle_yield || '',
      ipa: d.ipa || '',
      definition_ko: d.definition_ko || '',
      definition_en: d.definition_en || '',
      definition_uz: d.definition_uz || '',
      causal_chain: d.causal_chain || '',
      why: d.why || '',
      moa: d.moa || '',
      clinical_uses: d.clinical_uses || '',
      adverse_effects: d.adverse_effects || '',
      precautions: d.precautions || '',
      usmle_strategy: d.usmle_strategy || '',
      memory_line: d.memory_line || '',
      refs: Array.isArray(d.refs) ? d.refs : [],
      createdAt: d.createdAt || '',
      updatedAt: d.updatedAt || '',
    }));
}

function computeDrugRecordIdsHash(drugs) {
  const ids = dedupeDrugsById(drugs)
    .filter(d => !d.deletedAt)
    .map(d => String(d.id))
    .sort((a, b) => a.localeCompare(b, 'en', { numeric: true }));
  return simpleHashText(ids.join('|'));
}

function computeDrugSnapshotHash(drugs) {
  return simpleHashText(JSON.stringify(canonicalDrugHashPayload(drugs)));
}

function canonicalFormulaHashPayload(formulas) {
  return dedupeFormulasById(formulas)
    .filter(f => !f.deletedAt)
    .sort((a, b) => String(a.id).localeCompare(String(b.id), 'en', { numeric: true }))
    .map(f => stableForHash({
      id: String(f.id),
      name: f.name || '',
      short_name: f.short_name || '',
      formula: f.formula || '',
      category: f.category || '',
      system: f.system || '',
      use_case: f.use_case || '',
      normal_range: f.normal_range || '',
      interpretation: f.interpretation || '',
      example: f.example || '',
      memory_tip: f.memory_tip || '',
      usmle_trap: f.usmle_trap || '',
      variables: f.variables || '',
      createdAt: f.createdAt || '',
      updatedAt: f.updatedAt || '',
    }));
}

function computeFormulaRecordIdsHash(formulas) {
  const ids = dedupeFormulasById(formulas)
    .filter(f => !f.deletedAt)
    .map(f => String(f.id))
    .sort((a, b) => a.localeCompare(b, 'en', { numeric: true }));
  return simpleHashText(ids.join('|'));
}

function computeFormulaSnapshotHash(formulas) {
  return simpleHashText(JSON.stringify(canonicalFormulaHashPayload(formulas)));
}

// Supabase에서 전체 로드
async function sbLoadAll() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  try {
    const rows = [];
    const pageSize = 1000;
    for (let offset = 0; ; offset += pageSize) {
      const res = await fetch(`${cfg.url}/rest/v1/medical_terms?select=*&order=updated_at.desc&limit=${pageSize}&offset=${offset}`, {
        headers: sbHeaders()
      });
      if (!res.ok) return null;
      const page = await res.json();
      if (!Array.isArray(page)) return null;
      rows.push(...page);
      if (page.length < pageSize) break;
    }
    return dedupeTermsById(rows.map(rowToTerm));
  } catch(e) { console.warn('Supabase load failed:', e); return null; }
}

async function sbLoadCanonicalMeta() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  try {
    const res = await fetch(`${cfg.url}/rest/v1/${SYNC_META_TABLE}?key=eq.${CANONICAL_META_KEY}&select=value,updated_at&limit=1`, {
      headers: sbHeaders()
    });
    if (!res.ok) throw new Error(`meta load failed: ${res.status}`);
    const rows = await res.json();
    if (!rows?.length) return { version: null, updatedAt: null, missing: true };
    return { version: rows[0].value || null, updatedAt: rows[0].updated_at || null, missing: false };
  } catch (e) {
    console.warn('Supabase canonical meta load failed:', e);
    return null;
  }
}

function hasCanonicalVersion(meta) {
  return !!(meta && String(meta.version || '').trim() && (Date.parse(meta.updatedAt || '') || 0));
}

async function sbLoadSyncMetaMap() {
  const cfg = getSupabaseConfig();
  if (!cfg) return {};
  const res = await fetch(`${cfg.url}/rest/v1/${SYNC_META_TABLE}?select=key,value,updated_at`, {
    headers: sbHeaders()
  });
  if (!res.ok) throw new Error(`sync meta load failed: ${res.status} ${await res.text()}`);
  const rows = await res.json();
  return (Array.isArray(rows) ? rows : []).reduce((acc, row) => {
    acc[row.key] = { value: row.value || '', updatedAt: row.updated_at || null };
    return acc;
  }, {});
}

async function sbSetSyncMetaRows(rows) {

    method: 'POST',
    headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify(rows)
  });
  if (!res.ok) throw new Error(`sync meta save failed: ${res.status} ${await res.text()}`);
  return true;
}

async function sbSetCanonicalSnapshotMeta(version, activeTerms, options = {}) {
  const now = new Date().toISOString();
  const metaMap = options.metaMap || {};
  const previousRevision = Number(metaMap[CANONICAL_REVISION_META_KEY]?.value) || 0;
  const revision = previousRevision + 1;
  const cloudTerms = Array.isArray(options.cloudTerms) ? options.cloudTerms : [];
  const removedCloudTerms = Array.isArray(options.removedCloudTerms) ? options.removedCloudTerms : [];
  const deletedCount = cloudTerms.filter(t => t.deletedAt).length + removedCloudTerms.length;
  const snapshotHash = computeSnapshotHash(activeTerms);
  const recordIdsHash = computeRecordIdsHash(activeTerms);
  await sbSetSyncMetaRows([
    { key: CANONICAL_META_KEY, value: version, updated_at: now },
    { key: CANONICAL_REVISION_META_KEY, value: String(revision), updated_at: now },
    { key: CANONICAL_DEVICE_ID_META_KEY, value: getDeviceId(), updated_at: now },
    { key: CANONICAL_DEVICE_LABEL_META_KEY, value: getDeviceReadableLabel(), updated_at: now },
    { key: CANONICAL_ACTIVE_COUNT_META_KEY, value: String(activeTerms.length), updated_at: now },
    { key: CANONICAL_DELETED_COUNT_META_KEY, value: String(deletedCount), updated_at: now },
    { key: CANONICAL_RECORD_IDS_HASH_META_KEY, value: recordIdsHash, updated_at: now },
    { key: CANONICAL_SNAPSHOT_HASH_META_KEY, value: snapshotHash, updated_at: now },
  ]);
  return { revision, updatedAt: now, snapshotHash, recordIdsHash, deletedCount };
}

// 현재 기기 데이터로 클라우드 최종본 덮어쓰기: 데이터 저장이 모두 성공한 뒤 canonical_version 갱신
async function sbPushAll(options = {}) {
  const cfg = getSupabaseConfig();
  if (!cfg) { showToast('⚠️ Supabase 설정을 먼저 저장하세요'); return; }
  const { confirmOverwrite = false } = options;
  if (confirmOverwrite) {
    const ok = window.confirm(
      `현재 이 기기의 용어 ${TERMS.length}개, 약물 ${DRUGS.length}개, 공식 ${FORMULAS.length}개로 클라우드 최종본을 덮어쓸까요?\n\n` +
      `현재 이 기기에 없는 항목은 PC·모바일·태블릿 등 다른 기기에 있더라도 최종본에서 제외될 수 있습니다.\n` +
      `먼저 데이터 관리에서 전체 백업 JSON을 저장하는 것을 권장합니다.`
    );
    if (!ok) return;
  }
  try {
    const cleanTerms = dedupeTermsById(TERMS).filter(t => !t.deletedAt);
    const cleanDrugs = dedupeDrugsById(DRUGS).filter(d => !d.deletedAt);
    const cleanFormulas = dedupeFormulasById(FORMULAS).filter(f => !f.deletedAt);
    showToast('☁️ 새 기준본을 안전하게 저장 중...');
    const cloudTerms = await sbLoadAll();
    if (cloudTerms === null) throw new Error('기존 클라우드 데이터를 읽지 못했습니다.');
    const cloudDrugs = await sbLoadAllDrugs();
    if (cloudDrugs === null) throw new Error('약물 테이블을 읽지 못했습니다. 통합 SQL을 먼저 실행해주세요.');
    const cloudFormulas = await sbLoadAllFormulas();
    if (cloudFormulas === null) throw new Error('공식 테이블을 읽지 못했습니다. 통합 SQL을 먼저 실행해주세요.');
    const metaMap = await sbLoadSyncMetaMap();
    const pendingVersion = `${Date.now()}-${getDeviceId()}`;
    saveLocalSyncMeta({
      pendingCanonicalVersion: pendingVersion,
      pendingCanonicalAt: new Date().toISOString(),
      pendingCanonicalCount: cleanTerms.length + cleanDrugs.length + cleanFormulas.length,
      pendingCanonicalStatus: 'uploading'
    });
    const rows = cleanTerms.map(termToRow);
    await sbBatchUpsertRows(rows);
    await sbBatchUpsertDrugRows(cleanDrugs.map(drugToRow));
    await sbBatchUpsertFormulaRows(cleanFormulas.map(formulaToRow));

    const localIds = new Set(cleanTerms.map(t => String(t.id)));
    const removedCloudTerms = cloudTerms.filter(t => !t.deletedAt && !localIds.has(String(t.id)));
    for (const oldTerm of removedCloudTerms) {
      const ok = await sbDeleteTerm(oldTerm.id);
      if (!ok) throw new Error(`누락 항목 삭제 표시 실패: ${oldTerm.id}`);
    }
    const localDrugIds = new Set(cleanDrugs.map(d => String(d.id)));
    const removedCloudDrugs = cloudDrugs.filter(d => !d.deletedAt && !localDrugIds.has(String(d.id)));
    const removedCloudDrugTombstones = [];
    for (const oldDrug of removedCloudDrugs) {
      const deletedAt = new Date().toISOString();
      const ok = await sbDeleteDrug(oldDrug.id, deletedAt);
      if (!ok) throw new Error(`누락 약물 삭제 표시 실패: ${oldDrug.id}`);
      removedCloudDrugTombstones.push(normalizeDrugForStorage({ ...oldDrug, updatedAt: deletedAt, deletedAt }));
    }
    const localFormulaIds = new Set(cleanFormulas.map(f => String(f.id)));
    const removedCloudFormulas = cloudFormulas.filter(f => !f.deletedAt && !localFormulaIds.has(String(f.id)));
    const removedCloudFormulaTombstones = [];
    for (const oldFormula of removedCloudFormulas) {
      const deletedAt = new Date().toISOString();
      const ok = await sbDeleteFormula(oldFormula.id, deletedAt);
      if (!ok) throw new Error(`누락 공식 삭제 표시 실패: ${oldFormula.id}`);
      removedCloudFormulaTombstones.push(normalizeFormulaForStorage({ ...oldFormula, updatedAt: deletedAt, deletedAt }));
    }

    saveLocalSyncMeta({ pendingCanonicalStatus: 'learning-saving' });
    await pushLocalLearningStateToCloud();

    saveLocalSyncMeta({ pendingCanonicalStatus: 'meta-saving' });
    const canonicalSnapshot = await sbSetCanonicalSnapshotMeta(pendingVersion, cleanTerms, {
      cloudTerms,
      removedCloudTerms,
      metaMap
    });
    await sbSetSyncMetaRows([
      { key: DRUG_CANONICAL_META_KEY, value: pendingVersion, updated_at: canonicalSnapshot.updatedAt },
      { key: DRUG_CANONICAL_ACTIVE_COUNT_META_KEY, value: String(cleanDrugs.length), updated_at: canonicalSnapshot.updatedAt },
      { key: DRUG_CANONICAL_DELETED_COUNT_META_KEY, value: String(cloudDrugs.filter(d => d.deletedAt).length + removedCloudDrugs.length), updated_at: canonicalSnapshot.updatedAt },
      { key: DRUG_CANONICAL_RECORD_IDS_HASH_META_KEY, value: computeDrugRecordIdsHash(cleanDrugs), updated_at: canonicalSnapshot.updatedAt },
      { key: DRUG_CANONICAL_SNAPSHOT_HASH_META_KEY, value: computeDrugSnapshotHash(cleanDrugs), updated_at: canonicalSnapshot.updatedAt },
      { key: FORMULA_CANONICAL_META_KEY, value: pendingVersion, updated_at: canonicalSnapshot.updatedAt },
      { key: FORMULA_CANONICAL_ACTIVE_COUNT_META_KEY, value: String(cleanFormulas.length), updated_at: canonicalSnapshot.updatedAt },
      { key: FORMULA_CANONICAL_DELETED_COUNT_META_KEY, value: String(cloudFormulas.filter(f => f.deletedAt).length + removedCloudFormulas.length), updated_at: canonicalSnapshot.updatedAt },
      { key: FORMULA_CANONICAL_RECORD_IDS_HASH_META_KEY, value: computeFormulaRecordIdsHash(cleanFormulas), updated_at: canonicalSnapshot.updatedAt },
      { key: FORMULA_CANONICAL_SNAPSHOT_HASH_META_KEY, value: computeFormulaSnapshotHash(cleanFormulas), updated_at: canonicalSnapshot.updatedAt },
    ]);
    TERMS.length = 0;
    TERMS.push(...cleanTerms);
    saveTermsToLocalStorage();
    DRUGS.length = 0;
    DRUGS.push(...cleanDrugs);
    saveDrugsToLocalStorage();
    FORMULAS.length = 0;
    FORMULAS.push(...cleanFormulas);
    saveFormulasToLocalStorage();
    saveLocalDrugTombstones([
      ...cloudDrugs.filter(d => d.deletedAt),
      ...removedCloudDrugTombstones
    ]);
    saveLocalFormulaTombstones([
      ...cloudFormulas.filter(f => f.deletedAt),
      ...removedCloudFormulaTombstones
    ]);
    clearPendingCanonicalStatus({
      canonicalVersion: pendingVersion,
      canonicalRevision: canonicalSnapshot.revision,
      lastCanonicalPushAt: canonicalSnapshot.updatedAt,
      lastCanonicalSnapshotHash: canonicalSnapshot.snapshotHash,
      lastCanonicalRecordIdsHash: canonicalSnapshot.recordIdsHash
    });
    updateBookmarkCount();
    applyFilters();
    showToast(`☁️ 이 기기 데이터로 클라우드 최종본을 덮어썼습니다 (용어 ${cleanTerms.length} · 약물 ${cleanDrugs.length} · 공식 ${cleanFormulas.length} · rev ${canonicalSnapshot.revision})`);
  } catch(e) {
    console.error('Canonical push failed:', e);
    saveLocalSyncMeta({ pendingCanonicalStatus: 'failed', pendingCanonicalError: String(e?.message || e) });
    showToast('⚠️ 클라우드 최종본 덮어쓰기 실패 · 데이터 탭에서 다시 실행하세요');
  }
}

function reconcilePendingCanonicalStatus(canonicalMeta) {
  const localMeta = getLocalSyncMeta();
  if (!localMeta.pendingCanonicalStatus) return true;
  const pendingVersion = localMeta.pendingCanonicalVersion;
  if (pendingVersion && canonicalMeta?.version === pendingVersion) {
    clearPendingCanonicalStatus({
      canonicalVersion: pendingVersion,
      lastCanonicalPushAt: canonicalMeta.updatedAt || new Date().toISOString(),

function safeJsonParse(value, fallback) {
  try { return JSON.parse(value); } catch { return fallback; }
}

function cleanTermString(value) {
  return String(value || '').trim();
}

function capitalizeTermInitial(value) {
  const text = cleanTermString(value);
  if (!text) return '';

  const firstLetterIndex = text.search(/[A-Za-zÀ-ÖØ-öø-ÿ]/);
  if (firstLetterIndex === -1) return text;

  const firstWord = text.slice(firstLetterIndex).split(/\s+/)[0] || '';
  if (/[A-ZÀ-ÖØ-Þ]/.test(firstWord.slice(1))) return text; // preserve pH, mRNA, eGFR, etc.

  return text.slice(0, firstLetterIndex)
    + text.charAt(firstLetterIndex).toLocaleUpperCase('en-US')
    + text.slice(firstLetterIndex + 1);
}

function normalizeConceptCategory(value, source = {}) {
  const raw = cleanTermString(value || source.conceptCategory || source.concept);
  if (CONCEPT_CATEGORIES.includes(raw)) return raw;
  const legacy = cleanTermString(source.category || source.system);
  if (legacy === 'Pharmacology' || legacy === 'Pathology') return legacy;
  return 'Other / Unclassified';
}

function normalizeSystemCategory(value) {
  const raw = cleanTermString(value);
  const aliases = {
    'GI & Hepato': 'GI & Hepatobiliary',
    'GI': 'GI & Hepatobiliary',
    'Gastrointestinal': 'GI & Hepatobiliary',
    'Respiratory': 'Pulmonary',
    'Neuro': 'Neurology',
    'Heme/Onc': 'Hematology & Oncology',
    'Hematology': 'Hematology & Oncology',
    'Infectious': 'Infectious Disease',
    'MSK': 'Musculoskeletal',
    'Derm': 'Dermatology',
    'Eye': 'Ophthalmology',
    'Oral cavity': 'ENT',
    'Pharmacology': 'General',
    'Pathology': 'General',
  };
  const mapped = aliases[raw] || raw;
  if (VALID_CATS.includes(mapped)) return mapped;
  if (CONCEPT_CATEGORIES.includes(mapped)) return 'General';
  return raw ? '기타' : 'General';
}

function normalizeSystemTags(value) {
  const raw = Array.isArray(value)
    ? value
    : String(value || '').split(/[,;|]/);
  return [...new Set(raw
    .map(v => cleanTermString(v))
    .filter(Boolean)
    .map(normalizeSystemCategory)
    .filter(Boolean))];
}

function normalizeTermForStorage(t) {
  const now = new Date().toISOString();
  const category = normalizeSystemCategory(t.system || t.category);
  const conceptCategory = normalizeConceptCategory(t.concept_category || t.conceptCategory, t);
  const deletedAt = t.deletedAt || t.deleted_at || null;
  const updatedAt = t.updatedAt || t.updated_at || deletedAt || now;
  return {
    id: Number(t.id) || nextTermId(),
    ko: cleanTermString(t.ko),
    en: capitalizeTermInitial(t.en),
    uz: capitalizeTermInitial(t.uz),
    category,
    concept_category: conceptCategory,
    conceptCategory,
    system_tags: normalizeSystemTags(t.system_tags || t.systemTags || t.tags),
    def_ko: cleanTermString(t.def_ko),
    def_en: cleanTermString(t.def_en),
    def_uz: cleanTermString(t.def_uz),
    usmle: cleanTermString(t.usmle),
    ipa: cleanTermString(t.ipa),
    refs: Array.isArray(t.refs) ? t.refs : [],
    icd11: t.icd11 || null,
    fdaDrug: t.fdaDrug || null,
    rxclassATC: t.rxclassATC || null,
    trials: t.trials || null,
    createdAt: t.createdAt || t.created_at || updatedAt || now,
    updatedAt,
    deletedAt,
    hiddenAt: t.hiddenAt || null,
  };
}

function normalizeDrugForStorage(d) {
  const now = new Date().toISOString();
  const generic = cleanTermString(d.generic_name || d.genericName || d.en || d.ingredient);
  const koName = cleanTermString(d.ko_name || d.koName || d.ko);
  const brand = cleanTermString(d.brand_name || d.brandName || d.brand);
  const category = normalizeSystemCategory(d.category || d.system || 'General');
  return {
    id: Number(d.id) || nextDrugId(),
    generic_name: capitalizeTermInitial(generic),
    ko_name: koName,
    brand_name: capitalizeTermInitial(brand),
    drug_class: cleanTermString(d.drug_class || d.drugClass),
    same_class_drugs: cleanTermString(d.same_class_drugs || d.sameClassDrugs || d.class_drugs || d.related_drugs),
    drug_form: cleanTermString(d.drug_form || d.drugForm || d.form),
    atc_class: cleanTermString(d.atc_class || d.atcClass || d.atc || d.rxclass_atc),
    target: cleanTermString(d.target),
    route: cleanTermString(d.route),
    concept_category: 'Pharmacology',
    category,
    system_tags: normalizeSystemTags(d.system_tags || d.systemTags || d.tags),
    usmle_yield: cleanTermString(d.usmle_yield || d.usmleYield || 'Moderate Yield'),
    ipa: cleanTermString(d.ipa),
    definition_ko: cleanTermString(d.definition_ko || d.def_ko),
    definition_en: cleanTermString(d.definition_en || d.def_en),
    definition_uz: cleanTermString(d.definition_uz || d.def_uz),
    causal_chain: cleanTermString(d.causal_chain || d.formula),
    why: cleanTermString(d.why),
    moa: cleanTermString(d.moa),
    clinical_uses: cleanTermString(d.clinical_uses || d.uses),
    adverse_effects: cleanTermString(d.adverse_effects || d.side_effects),
    precautions: cleanTermString(d.precautions || d.contraindications),
    usmle_strategy: cleanTermString(d.usmle_strategy),
    memory_line: cleanTermString(d.memory_line),
    refs: Array.isArray(d.refs) ? d.refs : [],
    createdAt: d.createdAt || d.created_at || d.updatedAt || now,
    updatedAt: d.updatedAt || d.updated_at || now,
    deletedAt: d.deletedAt || d.deleted_at || null,
    hiddenAt: d.hiddenAt || d.hidden_at || null,
  };
}

function normalizeFormulaForStorage(f) {
  const now = new Date().toISOString();
  return {
    id: Number(f.id) || nextFormulaId(),
    name: cleanTermString(f.name || f.formula_name || f.title),
    short_name: cleanTermString(f.short_name || f.shortName || f.abbrev),
    formula: cleanTermString(f.formula || f.expression),
    category: cleanTermString(f.category || f.formula_category || 'Acid-base'),
    system: normalizeSystemCategory(f.system || f.category_system || 'General'),
    use_case: cleanTermString(f.use_case || f.useCase || f.when_to_use),
    normal_range: cleanTermString(f.normal_range || f.normalRange || f.reference_range),
    interpretation: cleanTermString(f.interpretation || f.meaning),
    example: cleanTermString(f.example || f.sample_calculation),
    memory_tip: cleanTermString(f.memory_tip || f.memoryTip || f.mnemonic),
    usmle_trap: cleanTermString(f.usmle_trap || f.usmleTrap || f.trap),
    variables: cleanTermString(f.variables || f.variable_notes),
    tags: normalizeSystemTags(f.tags || f.system_tags || f.systemTags),
    createdAt: f.createdAt || f.created_at || f.updatedAt || now,
    updatedAt: f.updatedAt || f.updated_at || now,
    deletedAt: f.deletedAt || f.deleted_at || null,
    hiddenAt: f.hiddenAt || f.hidden_at || null,
  };
}

function dedupeTermsById(terms) {
  const byId = new Map();
  (Array.isArray(terms) ? terms : []).forEach(raw => {
    const term = normalizeTermForStorage(raw);
    const key = String(term.id);
    const existing = byId.get(key);
    if (!existing || (Date.parse(term.updatedAt) || 0) >= (Date.parse(existing.updatedAt) || 0)) {
      byId.set(key, term);
    }
  });
  return [...byId.values()];
}

function dedupeDrugsById(drugs) {
  const byId = new Map();
  (Array.isArray(drugs) ? drugs : []).forEach(raw => {
    const drug = normalizeDrugForStorage(raw);
    const key = String(drug.id);
    const existing = byId.get(key);
    if (!existing || (Date.parse(drug.updatedAt) || 0) >= (Date.parse(existing.updatedAt) || 0)) {
      byId.set(key, drug);
    }
  });
  return [...byId.values()];
}

function dedupeFormulasById(formulas) {
  const byId = new Map();
  (Array.isArray(formulas) ? formulas : []).forEach(raw => {
    const formula = normalizeFormulaForStorage(raw);
    const key = String(formula.id);
    const existing = byId.get(key);
    if (!existing || (Date.parse(formula.updatedAt) || 0) >= (Date.parse(existing.updatedAt) || 0)) {
      byId.set(key, formula);
    }
  });
  return [...byId.values()];
}

function normalizeSyncText(value) {
  return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function termIdentityKey(t) {
  const en = normalizeSyncText(t.en);
  const ko = normalizeSyncText(t.ko);
  const uz = normalizeSyncText(t.uz);
  if (en) return `en:${en}`;
  if (ko) return `ko:${ko}`;
  if (uz) return `uz:${uz}`;
  return `id:${Number(t.id) || 'empty'}`;
}

function findTermIndexByIdentity(term) {
  const key = termIdentityKey(term);
  if (!key || key.startsWith('id:')) return -1;
  return TERMS.findIndex(existing => termIdentityKey(existing) === key);
}

function drugIdentityKey(d) {
  const generic = normalizeSyncText(d.generic_name || d.genericName || d.en);
  const ko = normalizeSyncText(d.ko_name || d.koName || d.ko);
  const brand = normalizeSyncText(d.brand_name || d.brandName || d.brand);
  if (generic) return `generic:${generic}`;
  if (ko) return `ko:${ko}`;
  if (brand) return `brand:${brand}`;
  return `id:${Number(d.id) || 'empty'}`;
}

function findDrugIndexByIdentity(drug) {
  const key = drugIdentityKey(drug);
  if (!key || key.startsWith('id:')) return -1;
  return DRUGS.findIndex(existing => drugIdentityKey(existing) === key);
}

function isEmptyTermValue(value) {
  return value == null || value === '' || (Array.isArray(value) && value.length === 0);
}

function termCompletenessScore(t) {
  return ['ko','en','uz','concept_category','category','def_ko','def_en','def_uz','usmle','ipa','icd11','fdaDrug','rxclassATC','trials']
    .reduce((score, key) => score + (isEmptyTermValue(t[key]) ? 0 : 1), Array.isArray(t.refs) ? t.refs.length : 0);
}

function mergeDuplicateTerms(a, b) {
  const timeA = Date.parse(a.updatedAt || '') || 0;
  const timeB = Date.parse(b.updatedAt || '') || 0;
  const primary = timeB > timeA || (timeB === timeA && termCompletenessScore(b) >= termCompletenessScore(a)) ? b : a;
  const secondary = primary === a ? b : a;
  const merged = { ...secondary, ...primary };
  Object.keys(secondary).forEach(key => {
    if (isEmptyTermValue(merged[key]) && !isEmptyTermValue(secondary[key])) merged[key] = secondary[key];
  });
  if ((!merged.category || merged.category === '기타') && secondary.category && secondary.category !== '기타') {
    merged.category = secondary.category;
  }
  if ((!merged.concept_category || merged.concept_category === 'Other / Unclassified') && secondary.concept_category && secondary.concept_category !== 'Other / Unclassified') {
    merged.concept_category = secondary.concept_category;
  }
  merged.system_tags = [...new Set([...(Array.isArray(a.system_tags) ? a.system_tags : []), ...(Array.isArray(b.system_tags) ? b.system_tags : [])])];
  merged.refs = [...new Set([...(Array.isArray(a.refs) ? a.refs : []), ...(Array.isArray(b.refs) ? b.refs : [])])];
  const latestTime = Math.max(timeA, timeB);
  merged.updatedAt = latestTime > 0 ? new Date(latestTime).toISOString() : new Date().toISOString();
  return normalizeTermForStorage(merged);
}

function termSyncTime(entry) {
  const term = entry?.term || entry || {};
  return Date.parse(term.updatedAt || term.deletedAt || term.createdAt || '') || 0;
}

function pickSyncWinner(currentEntry, incomingEntry) {
  if (!currentEntry) return incomingEntry;
  const current = currentEntry.term;
  const incoming = incomingEntry.term;
  const currentDeleted = !!current.deletedAt;
  const incomingDeleted = !!incoming.deletedAt;
  const currentTime = termSyncTime(currentEntry);
  const incomingTime = termSyncTime(incomingEntry);

  if (currentDeleted || incomingDeleted) {
    if (currentDeleted && incomingDeleted) return incomingTime >= currentTime ? incomingEntry : currentEntry;
    const deletedEntry = currentDeleted ? currentEntry : incomingEntry;
    const activeEntry = currentDeleted ? incomingEntry : currentEntry;
    const deletedTime = termSyncTime(deletedEntry);
    const activeTime = termSyncTime(activeEntry);

    if (deletedEntry.source === 'cloud' && activeEntry.source !== 'cloud') {
      return activeTime > deletedTime ? activeEntry : deletedEntry;
    }
    if (deletedEntry.source !== 'cloud' && activeEntry.source === 'cloud') {
      return activeTime > deletedTime ? activeEntry : deletedEntry;
    }
    return incomingTime >= currentTime ? incomingEntry : currentEntry;
  }

  return incomingTime >= currentTime ? incomingEntry : currentEntry;
}

function mergeTermsForSync(cloudTerms, localTerms, localTombstones) {
  const merged = new Map();
  const candidates = [
    ...cloudTerms.map(term => ({ term: normalizeTermForStorage(term), source: 'cloud' })),
    ...localTerms.map(term => ({ term: normalizeTermForStorage(term), source: 'local' })),
    ...localTombstones.map(term => ({ term: normalizeTermForStorage(term), source: 'local_tombstone' })),
  ];
  candidates.forEach(entry => {
    if (!entry.term?.id) return;
    const key = String(entry.term.id);
    merged.set(key, pickSyncWinner(merged.get(key), entry));
  });
  return [...merged.values()].map(entry => entry.term);
}

function mergeDrugsForSync(cloudDrugs, localDrugs, localDrugTombstones = []) {
  const merged = new Map();
  [
    ...(Array.isArray(cloudDrugs) ? cloudDrugs : []).map(drug => ({ term: normalizeDrugForStorage(drug), source: 'cloud' })),
    ...(Array.isArray(localDrugs) ? localDrugs : []).map(drug => ({ term: normalizeDrugForStorage(drug), source: 'local' })),
    ...(Array.isArray(localDrugTombstones) ? localDrugTombstones : []).map(drug => ({ term: normalizeDrugForStorage(drug), source: 'local_tombstone' })),
  ].forEach(entry => {
    if (!entry.term?.id) return;
    const key = String(entry.term.id);
    merged.set(key, pickSyncWinner(merged.get(key), entry));
  });
  return [...merged.values()].map(entry => entry.term);
}

function mergeFormulasForSync(cloudFormulas, localFormulas, localFormulaTombstones = []) {

  [

    ...(Array.isArray(localFormulaTombstones) ? localFormulaTombstones : []).map(formula => ({ term: normalizeFormulaForStorage(formula), source: 'local_tombstone' })),
  ].forEach(entry => {
    if (!entry.term?.id) return;
    const key = String(entry.term.id);
    merged.set(key, pickSyncWinner(merged.get(key), entry));
  });
  return [...merged.values()].map(entry => entry.term);
}

function filterLocalRowsAfterCanonicalFence(localRows, cloudTerms, canonicalMeta) {
  const canonicalTime = Date.parse(canonicalMeta?.updatedAt || '') || 0;
  if (!canonicalTime) return { rows: localRows, skipped: 0 };
  const cloudIds = new Set((Array.isArray(cloudTerms) ? cloudTerms : []).map(t => String(t.id)));
  const rows = (Array.isArray(localRows) ? localRows : []).filter(row => {
    const id = String(row.id);
    if (cloudIds.has(id)) return true;
    if (row.deletedAt) return false;
    const createdTime = Date.parse(row.createdAt || '') || 0;
    const updatedTime = Date.parse(row.updatedAt || '') || 0;
    return createdTime > canonicalTime && updatedTime > canonicalTime;
  });
  return { rows, skipped: (Array.isArray(localRows) ? localRows.length : 0) - rows.length };
}

async function sbUpsertLearningState(state) {
  const cfg = getSupabaseConfig();
  if (!cfg) return false;
  const res = await fetch(`${cfg.url}/rest/v1/${LEARNING_TABLE}`, {
    method: 'POST',
    headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify(learningStateToRow(state))
  });
  if (!res.ok) throw new Error(`learning state upsert failed: ${res.status}`);
  return true;
}

async function sbBatchUpsertLearningStates(states) {
  const cfg = getSupabaseConfig();
  if (!cfg) throw new Error('Supabase 설정이 없습니다.');
  const rows = (Array.isArray(states) ? states : Object.values(states || {}))
    .filter(Boolean)
    .map(learningStateToRow);
  for (let i = 0; i < rows.length; i += 100) {
    const res = await fetch(`${cfg.url}/rest/v1/${LEARNING_TABLE}`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify(rows.slice(i, i + 100))
    });
    if (!res.ok) throw new Error(`learning state batch upsert failed: ${res.status} ${await res.text()}`);
  }
}

async function pushLocalLearningStateToCloud() {
  await sbBatchUpsertLearningStates(Object.values(getLearningStateMap()));
}

async function sbLoadLearningStates() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  try {
    const res = await fetch(`${cfg.url}/rest/v1/${LEARNING_TABLE}?select=*&order=updated_at.desc`, { headers: sbHeaders() });
    if (!res.ok) throw new Error(`learning state load failed: ${res.status}`);
    return (await res.json()).map(learningRowToState);
  } catch (e) {
    console.warn('Learning state sync unavailable. Run the schema SQL from Developer Info.', e);
    return null;
  }
}

function applyLearningStates(states, cloudAuthoritative = false) {
  if (!Array.isArray(states)) return;
  const local = cloudAuthoritative ? {} : getLearningStateMap();
  states.forEach(state => {
    const key = String(state.termId);
    const current = local[key];
    if (!current || cloudAuthoritative || (Date.parse(state.updatedAt) || 0) > (Date.parse(current.updatedAt) || 0)) {
      local[key] = state;
    }
  });
  saveLearningStateMap(local);
  bookmarks = new Set(Object.values(local).filter(s => s.bookmarked).map(s => Number(s.termId)));
  safeSetItem('kma_bookmarks', JSON.stringify([...bookmarks]));
}

async function syncLearningStateToCloud() {
  const cloud = await sbLoadLearningStates();
  const local = getLearningStateMap();
  if (Array.isArray(cloud)) applyLearningStates(cloud, false);
  const merged = getLearningStateMap();
  for (const state of Object.values(merged)) await sbUpsertLearningState(state);
}

function getDeviceIdShard() {
  const text = getDeviceId();
  let hash = 0;
  for (let i = 0; i < text.length; i++) hash = (hash * 31 + text.charCodeAt(i)) % 1000;
  return hash;
}

function nextTermId() {

  return ++_idCounter;
}
