<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Bugeon 의학용어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  TERM DRAWER
// ═══════════════════════════════════════════════════════
let _drawerTermId   = null;   // 현재 열린 용어 ID
let _drawerTermList = [];     // 현재 필터된 목록 (이전/다음 네비게이션용)

function openDrawer(id) {
  const t = TERMS.find(x => x.id === id);
  if (!t) return;

  _drawerTermId   = id;
  expandedId      = id;  // 카드 강조 유지

  // 현재 필터된 목록 스냅샷 (네비게이션용)
  _drawerTermList = _lastFilteredTerms || TERMS;

  _renderDrawerContent(t);
  _updateDrawerNav();

  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('termDrawer').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('termDrawer').classList.remove('open');
  document.body.style.overflow = '';
  expandedId = null;
  _drawerTermId = null;
  // 카드 강조만 제거 (리렌더 없이)
  document.querySelectorAll('.term-card.expanded').forEach(el => el.classList.remove('expanded'));
}

function drawerNavigate(dir) {
  const idx = _drawerTermList.findIndex(x => x.id === _drawerTermId);
  if (idx === -1) return;
  const next = _drawerTermList[idx + dir];
  if (!next) return;
  openDrawer(next.id);
  // 해당 카드로 부드럽게 스크롤
  setTimeout(() => {
    const card = document.getElementById('card-' + next.id);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 80);
}

function _updateDrawerNav() {
  const idx   = _drawerTermList.findIndex(x => x.id === _drawerTermId);
  const total = _drawerTermList.length;
  document.getElementById('drawerNavCount').textContent = total ? `${idx + 1} / ${total}` : '';
  document.getElementById('drawerPrevBtn').disabled = idx <= 0;
  document.getElementById('drawerNextBtn').disabled = idx >= total - 1;
}

function drawerToggleBookmark() {
  if (!_drawerTermId) return;
  if (bookmarks.has(_drawerTermId)) {
    bookmarks.delete(_drawerTermId);
    showToast('즐겨찾기에서 제거됨');
  } else {
    bookmarks.add(_drawerTermId);
    showToast('⭐ 즐겨찾기에 추가됨');
  }
  localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  updateLearningState(_drawerTermId, { bookmarked: bookmarks.has(_drawerTermId) });
  updateBookmarkCount();
  _syncDrawerBookmarkBtn();
  // 목록 카드의 즐겨찾기 버튼도 갱신 (리렌더 없이)
  const card = document.getElementById('card-' + _drawerTermId);
  if (card) {
    const btn = card.querySelector('.bookmark-btn');
    if (btn) {
      const saved = bookmarks.has(_drawerTermId);
      btn.textContent = saved ? '⭐' : '☆';
      btn.classList.toggle('saved', saved);
    }
  }
}

function _syncDrawerBookmarkBtn() {
  const btn = document.getElementById('drawerBookmarkBtn');
  if (!btn || !_drawerTermId) return;
  const saved = bookmarks.has(_drawerTermId);
  btn.textContent = saved ? '⭐' : '☆';
  btn.classList.toggle('starred', saved);
}

function drawerOpenEdit() {
  if (!_drawerTermId) return;
  const termId = _drawerTermId;
  closeDrawer();
  setTimeout(() => openEditModal({ stopPropagation: () => {} }, termId), 120);
}

function _renderDrawerContent(t) {
  const termId = Number(t.id) || 0;
  // 헤더 업데이트
  document.getElementById('drawerTitleKo').textContent = t.ko || t.en || '—';
  document.getElementById('drawerTitleEn').textContent = t.en || '';
  _syncDrawerBookmarkBtn();

  // 완성도 배지
  const missing = [];
  if (!t.ko)     missing.push('KO');
  if (!t.uz)     missing.push('UZ');
  if (!t.def_ko) missing.push('정의');
  if (!t.def_en) missing.push('Def');
  if (!t.def_uz) missing.push('Uz');
  if (!t.usmle)  missing.push('USMLE');
  if (!t.ipa)    missing.push('IPA');
  const badgeHtml = missing.length
    ? `<span class="drawer-complete-badge" style="color:#f85149;background:rgba(248,81,73,0.1);border-color:rgba(248,81,73,0.3)">✗ ${missing.join(' · ')}</span>`
    : `<span class="drawer-complete-badge" style="color:#3fb950;background:rgba(63,185,80,0.1);border-color:rgba(63,185,80,0.3)">✓ 완성</span>`;

  // 카테고리 배지
  const catHtml = `<span style="font-size:11px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:2px 8px;color:var(--text3)">${escapeHtml(t.category)}</span>`;

  // 링크 버튼들
  const linksHtml = `
    <div class="drawer-links">
      <a class="drawer-link-btn" href="https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(t.en)}" target="_blank" rel="noopener noreferrer" style="background:rgba(63,185,80,0.08);border-color:#166534;color:#4ade80">📚 PubMed</a>
      <a class="drawer-link-btn" href="${youtubeSearchUrl(t)}" target="_blank" rel="noopener noreferrer" style="background:rgba(255,0,0,0.08);border-color:#991b1b;color:#fca5a5">▶️ YouTube</a>
      <a class="drawer-link-btn" href="${googleUsageSearchUrl(t)}" target="_blank" rel="noopener noreferrer" style="background:rgba(251,191,36,0.08);border-color:#92400e;color:#fbbf24">🔎 Google 사용례</a>
      <button class="drawer-link-btn" onclick="showICD11ForTerm(${termId});" style="background:rgba(139,92,246,0.08);border-color:#5b21b6;color:#a78bfa;font-family:'Noto Sans KR',sans-serif">🏷️ ICD-11</button>
      <a class="drawer-link-btn" href="https://medlineplus.gov/search.html?query=${encodeURIComponent(t.en)}" target="_blank" rel="noopener noreferrer" style="background:rgba(88,166,255,0.08);border-color:#1d4ed8;color:#74b0ff">💊 MedlinePlus</a>
      <a class="drawer-link-btn" href="https://clinicaltrials.gov/search?cond=${encodeURIComponent(t.en)}&recrs=a" target="_blank" rel="noopener noreferrer" style="background:rgba(34,197,94,0.08);border-color:#166534;color:#4ade80">🔬 ClinicalTrials</a>
      <a class="drawer-link-btn" href="https://www.fda.gov/search?s=${encodeURIComponent(t.en)}" target="_blank" rel="noopener noreferrer" style="background:rgba(248,81,73,0.08);border-color:#991b1b;color:#f87171">⚠️ FDA</a>
    </div>`;

  document.getElementById('drawerBody').innerHTML = `
    <!-- 상단 메타 -->
    <div class="drawer-section" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 18px">
      ${catHtml}
      ${badgeHtml}
    </div>

    <!-- 한국어 -->
    <div class="drawer-section">
      <div class="drawer-lang-badge" style="background:var(--tag-ko);color:#74b0ff;border:1px solid #1d4ed8">🇰🇷 한국어</div>
      ${t.ko
        ? `<div class="drawer-term-main" style="font-family:'Noto Serif KR',serif">${escapeHtml(t.ko)}</div>`
        : `<div class="drawer-missing">한국어 명칭 없음</div>`}
      ${t.def_ko
        ? `<div class="drawer-term-def" style="margin-top:6px">${escapeHtml(t.def_ko)}</div>`
        : `<div class="drawer-missing">한국어 정의 없음</div>`}
    </div>

    <!-- 영어 -->
    <div class="drawer-section">
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;margin-bottom:8px">
        <div class="drawer-lang-badge" style="background:var(--tag-en);color:#4ade80;border:1px solid #166534;margin-bottom:0">🇺🇸 English</div>
        <button class="speak-btn" id="drawer-speak-term" onclick="speakTermField(event,${termId},'en','term')">
          <div class="wave"><span></span><span></span><span></span><span></span></div>
          발음 듣기
        </button>
      </div>
      ${t.en
        ? `<div class="drawer-term-main">${escapeHtml(t.en)}</div>`
        : `<div class="drawer-missing">영어 명칭 없음</div>`}
      ${t.ipa ? `
        <div class="drawer-ipa">
          <span style="font-size:10px;color:var(--text3);font-family:'Noto Sans KR',sans-serif">IPA</span>
          ${escapeHtml(t.ipa)}
        </div>
        <div class="drawer-ipa-tip">Cambridge 방식 · 강세: ˈ(1차) ˌ(2차) · 장모음: ː</div>` : ''}
      ${t.def_en
        ? `<div class="drawer-term-def" style="margin-top:6px">${escapeHtml(t.def_en)}</div>`
        : `<div class="drawer-missing">영어 정의 없음</div>`}
      <div class="drawer-speak-row">
        <button class="speak-btn" id="drawer-speak-def" onclick="speakTermField(event,${termId},'def_en','def')" style="font-size:11px;padding:4px 10px">
          <div class="wave"><span></span><span></span><span></span><span></span></div>
          정의 읽기
        </button>
      </div>
      <div class="tts-speed-row" style="margin-top:10px">
        <span class="tts-speed-label">🐢 속도</span>
        <input class="tts-speed-slider" type="range" min="0.5" max="1.5" step="0.1" value="${ttsSpeed}" oninput="ttsSpeed=parseFloat(this.value);document.querySelectorAll('.tts-speed-val').forEach(el=>el.textContent=ttsSpeed.toFixed(1)+'×')">
        <span class="tts-speed-val">${ttsSpeed.toFixed(1)}×</span>
      </div>
    </div>

    <!-- 우즈베크어 -->
    <div class="drawer-section">
      <div class="drawer-lang-badge" style="background:var(--tag-uz);color:#fbbf24;border:1px solid #92400e">🇺🇿 O'zbek</div>
      ${t.uz
        ? `<div class="drawer-term-main">${escapeHtml(t.uz)}</div>`

    </div>

    <div class="drawer-section" style="background:rgba(88,166,255,0.03)">

  `;
}

// 키보드 단축키: ESC=닫기, ←→=이전/다음
document.addEventListener('keydown', e => {
  if (!document.getElementById('termDrawer').classList.contains('open')) return;
  if (e.key === 'Escape')     closeDrawer();
  if (e.key === 'ArrowRight') drawerNavigate(1);
  if (e.key === 'ArrowLeft')  drawerNavigate(-1);
});

  .drawer-complete-badge {

  @media (max-width: 600px) {

  .term-card .term-detail { display: none !important; }

const TERMS = [];
const TERMS_STORAGE_KEY = 'kma_medical_terms_v2_terms';
const TERMS_STORAGE_META_KEY = 'kma_medical_terms_v2_meta';
const AI_CONFIG_STORAGE_KEY = 'kma_medical_terms_v2_ai_config';
const SUPABASE_CONFIG_KEY = 'kma_supabase_config';
const SYNC_META_STORAGE_KEY = 'kma_medical_terms_v2_sync_meta';
const LEARNING_STORAGE_KEY = 'kma_medical_terms_v2_learning';
const TOMBSTONE_STORAGE_KEY = 'kma_medical_terms_v2_tombstones';
const DEVICE_ID_STORAGE_KEY = 'kma_medical_terms_v2_device_id';
const SYNC_META_TABLE = 'language_sync_meta';
const LEARNING_TABLE = 'medical_term_learning_state';
const CANONICAL_META_KEY = 'medical_terms_canonical_version';
const TOMBSTONE_PRUNE_DAYS = 90;

function getDeviceId() {
  let id = localStorage.getItem(DEVICE_ID_STORAGE_KEY);
  if (!id) {
    id = (crypto.randomUUID ? crypto.randomUUID() : `device-${Date.now()}-${Math.random().toString(16).slice(2)}`);
    localStorage.setItem(DEVICE_ID_STORAGE_KEY, id);
  }
  return id;
}

function getLocalSyncMeta() {
  return safeJsonParse(localStorage.getItem(SYNC_META_STORAGE_KEY), {}) || {};
}

function saveLocalSyncMeta(patch) {
  const next = { ...getLocalSyncMeta(), ...patch, deviceId: getDeviceId(), savedAt: new Date().toISOString() };
  localStorage.setItem(SYNC_META_STORAGE_KEY, JSON.stringify(next));
  return next;
}

// ─── Supabase 동기화 ───
function getSupabaseConfig() {
  return safeJsonParse(localStorage.getItem(SUPABASE_CONFIG_KEY), null);
}

function saveSupabaseConfig(url, key) {
  localStorage.setItem(SUPABASE_CONFIG_KEY, JSON.stringify({ url, key }));
}

function sbHeaders() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  return {
    'Content-Type': 'application/json',
    'apikey': cfg.key,
    'Authorization': 'Bearer ' + cfg.key,
    'Prefer': 'resolution=merge-duplicates'
  };
}

function termToRow(t) {
  const now = new Date().toISOString();
  return {
    id:          Number(t.id),
    ko:          t.ko || '',
    en:          t.en || '',
    uz:          t.uz || '',
    category:    t.category || '',
    def_ko:      t.def_ko || '',
    def_en:      t.def_en || '',
    def_uz:      t.def_uz || '',
    usmle:       t.usmle || '',
    ipa:         t.ipa || '',
    refs:        Array.isArray(t.refs) ? t.refs : [],
    icd11:       t.icd11 || null,
    fda_drug:    t.fdaDrug || null,
    rxclass_atc: t.rxclassATC || null,
    trials:      t.trials || null,
    created_at:  t.createdAt || t.updatedAt || now,
    updated_at:  t.updatedAt || now,
    deleted_at:  t.deletedAt || null,
  };
}

function rowToTerm(r) {
  return {
    id:          Number(r.id),
    ko:          r.ko || '',
    en:          r.en || '',
    uz:          r.uz || '',
    category:    r.category || '기타',
    def_ko:      r.def_ko || '',
    def_en:      r.def_en || '',
    def_uz:      r.def_uz || '',
    usmle:       r.usmle || '',
    ipa:         r.ipa || '',
    refs:        Array.isArray(r.refs) ? r.refs : [],
    icd11:       r.icd11 || null,
    fdaDrug:     r.fda_drug || null,
    rxclassATC:  r.rxclass_atc || null,
    trials:      r.trials || null,
    createdAt:   r.created_at || r.updated_at || new Date().toISOString(),
    updatedAt:   r.updated_at || new Date().toISOString(),
    deletedAt:   r.deleted_at || null,
  };
}

// Supabase에 용어 upsert (추가/수정)
async function sbUpsertTerm(t) {
  const cfg = getSupabaseConfig();
  if (!cfg) return;
  try {
    const res = await fetch(`${cfg.url}/rest/v1/medical_terms`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify(termToRow(t))
    });
    if (!res.ok) throw new Error(`upsert failed: ${res.status} ${await res.text()}`);
    return true;
  } catch(e) { console.warn('Supabase upsert failed:', e); }
  return false;
}

// 삭제도 변경 이력으로 동기화되도록 soft delete 처리
async function sbDeleteTerm(id, deletedAt = new Date().toISOString()) {
  const cfg = getSupabaseConfig();
  if (!cfg) return false;
  try {
    const res = await fetch(`${cfg.url}/rest/v1/medical_terms?id=eq.${encodeURIComponent(id)}`, {
      method: 'PATCH',
      headers: sbHeaders(),
      body: JSON.stringify({ deleted_at: deletedAt, updated_at: deletedAt })
    });
    if (!res.ok) throw new Error(`soft delete failed: ${res.status} ${await res.text()}`);
    return true;
  } catch(e) { console.warn('Supabase delete failed:', e); }
  return false;
}

// Supabase에서 전체 로드
async function sbLoadAll() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  try {
    const rows = [];
    const pageSize = 1000;
    for (let offset = 0; ; offset += pageSize) {
      const res = await fetch(`${cfg.url}/rest/v1/medical_terms?select=*&order=updated_at.desc&limit=${pageSize}&offset=${offset}`, {
        headers: sbHeaders()
      });
      if (!res.ok) return null;
      const page = await res.json();
      if (!Array.isArray(page)) return null;
      rows.push(...page);
      if (page.length < pageSize) break;
    }
    return dedupeTermsById(rows.map(rowToTerm));
  } catch(e) { console.warn('Supabase load failed:', e); return null; }
}

async function sbLoadCanonicalMeta() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  try {
    const res = await fetch(`${cfg.url}/rest/v1/${SYNC_META_TABLE}?key=eq.${CANONICAL_META_KEY}&select=value,updated_at&limit=1`, {
      headers: sbHeaders()
    });
    if (!res.ok) throw new Error(`meta load failed: ${res.status}`);
    const rows = await res.json();
    if (!rows?.length) return { version: null, updatedAt: null };
    return { version: rows[0].value || null, updatedAt: rows[0].updated_at || null };
  } catch (e) {
    console.warn('Supabase canonical meta load failed:', e);
    return null;
  }
}

async function sbSetCanonicalMeta(version) {
  const cfg = getSupabaseConfig();
  if (!cfg) return false;
  const now = new Date().toISOString();
  const res = await fetch(`${cfg.url}/rest/v1/${SYNC_META_TABLE}`, {
    method: 'POST',
    headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify({ key: CANONICAL_META_KEY, value: version, updated_at: now })
  });
  if (!res.ok) throw new Error(`canonical meta save failed: ${res.status} ${await res.text()}`);
  return true;
}

async function sbBatchUpsertRows(rows) {
  const cfg = getSupabaseConfig();
  if (!cfg) throw new Error('Supabase 설정이 없습니다.');
  for (let i = 0; i < rows.length; i += 100) {
    const res = await fetch(`${cfg.url}/rest/v1/medical_terms`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify(rows.slice(i, i + 100))
    });
    if (!res.ok) throw new Error(`batch upsert failed: ${res.status} ${await res.text()}`);
  }
}

// 현재 기기 데이터로 클라우드 최종본 덮어쓰기: 데이터 저장이 모두 성공한 뒤 canonical_version 갱신
async function sbPushAll(options = {}) {
  const cfg = getSupabaseConfig();
  if (!cfg) { showToast('⚠️ Supabase 설정을 먼저 저장하세요'); return; }
  const { confirmOverwrite = false } = options;
  if (confirmOverwrite) {
    const ok = window.confirm(
      `현재 이 기기의 ${TERMS.length}개 용어로 클라우드 최종본을 덮어쓸까요?\n\n` +
      `현재 이 기기에 없는 항목은 PC·모바일·태블릿 등 다른 기기에 있더라도 최종본에서 제외될 수 있습니다.\n` +
      `먼저 데이터 관리에서 전체 백업 JSON을 저장하는 것을 권장합니다.`
    );
    if (!ok) return;
  }
  try {
    const cleanTerms = dedupeTermsById(TERMS).filter(t => !t.deletedAt);
    showToast('☁️ 새 기준본을 안전하게 저장 중...');
    const cloudTerms = await sbLoadAll();
    if (cloudTerms === null) throw new Error('기존 클라우드 데이터를 읽지 못했습니다.');
    const pendingVersion = `${Date.now()}-${getDeviceId()}`;
    saveLocalSyncMeta({
      pendingCanonicalVersion: pendingVersion,
      pendingCanonicalAt: new Date().toISOString(),
      pendingCanonicalCount: cleanTerms.length,
      pendingCanonicalStatus: 'uploading'
    });
    const rows = cleanTerms.map(termToRow);
    await sbBatchUpsertRows(rows);

    const localIds = new Set(cleanTerms.map(t => String(t.id)));
    const removedCloudTerms = cloudTerms.filter(t => !t.deletedAt && !localIds.has(String(t.id)));
    for (const oldTerm of removedCloudTerms) {
      const ok = await sbDeleteTerm(oldTerm.id);
      if (!ok) throw new Error(`누락 항목 삭제 표시 실패: ${oldTerm.id}`);
    }

    saveLocalSyncMeta({ pendingCanonicalStatus: 'meta-saving' });
    await sbSetCanonicalMeta(pendingVersion);
    TERMS.length = 0;
    TERMS.push(...cleanTerms);
    saveTermsToLocalStorage();
    saveLocalSyncMeta({
      canonicalVersion: pendingVersion,
      pendingCanonicalVersion: null,
      pendingCanonicalAt: null,
      pendingCanonicalCount: null,
      pendingCanonicalStatus: null,
      lastCanonicalPushAt: new Date().toISOString()
    });
    await syncLearningStateToCloud();
    updateBookmarkCount();
    applyFilters();
    showToast(`☁️ 이 기기 데이터로 클라우드 최종본을 덮어썼습니다 (${cleanTerms.length}개)`);
  } catch(e) {
    console.error('Canonical push failed:', e);
    saveLocalSyncMeta({ pendingCanonicalStatus: 'failed', pendingCanonicalError: String(e?.message || e) });
    showToast('⚠️ 클라우드 최종본 덮어쓰기 실패 · 데이터 탭에서 다시 실행하세요');
  }
}

function confirmPushLocalToCloud() {
  return sbPushAll({ confirmOverwrite: true });
}

function safeJsonParse(value, fallback) {
  try { return JSON.parse(value); } catch { return fallback; }
}

function cleanTermString(value) {
  return String(value || '').trim();
}

function capitalizeTermInitial(value) {
  const text = cleanTermString(value);
  if (!text) return '';

  const firstLetterIndex = text.search(/[A-Za-zÀ-ÖØ-öø-ÿ]/);
  if (firstLetterIndex === -1) return text;

  const firstWord = text.slice(firstLetterIndex).split(/\s+/)[0] || '';
  if (/[A-ZÀ-ÖØ-Þ]/.test(firstWord.slice(1))) return text; // preserve pH, mRNA, eGFR, etc.

  return text.slice(0, firstLetterIndex)
    + text.charAt(firstLetterIndex).toLocaleUpperCase('en-US')
    + text.slice(firstLetterIndex + 1);
}

function normalizeTermForStorage(t) {
  const now = new Date().toISOString();
  return {
    id: Number(t.id) || nextTermId(),
    ko: cleanTermString(t.ko),
    en: capitalizeTermInitial(t.en),
    uz: capitalizeTermInitial(t.uz),
    category: cleanTermString(t.category) || '기타',
    def_ko: cleanTermString(t.def_ko),
    def_en: cleanTermString(t.def_en),
    def_uz: cleanTermString(t.def_uz),
    usmle: cleanTermString(t.usmle),
    ipa: cleanTermString(t.ipa),
    refs: Array.isArray(t.refs) ? t.refs : [],
    icd11: t.icd11 || null,
    fdaDrug: t.fdaDrug || null,
    rxclassATC: t.rxclassATC || null,
    trials: t.trials || null,
    createdAt: t.createdAt || t.updatedAt || now,
    updatedAt: t.updatedAt || now,
    deletedAt: t.deletedAt || null,
    hiddenAt: t.hiddenAt || null,
  };
}

function dedupeTermsById(terms) {
  const byId = new Map();
  (Array.isArray(terms) ? terms : []).forEach(raw => {
    const term = normalizeTermForStorage(raw);
    const key = String(term.id);
    const existing = byId.get(key);
    if (!existing || (Date.parse(term.updatedAt) || 0) >= (Date.parse(existing.updatedAt) || 0)) {
      byId.set(key, term);
    }
  });
  return [...byId.values()];
}

function normalizeSyncText(value) {
  return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function termIdentityKey(t) {
  const en = normalizeSyncText(t.en);
  const ko = normalizeSyncText(t.ko);
  const uz = normalizeSyncText(t.uz);
  if (en) return `en:${en}`;
  if (ko) return `ko:${ko}`;
  if (uz) return `uz:${uz}`;
  return `id:${Number(t.id) || 'empty'}`;
}

function findTermIndexByIdentity(term) {
  const key = termIdentityKey(term);
  if (!key || key.startsWith('id:')) return -1;
  return TERMS.findIndex(existing => termIdentityKey(existing) === key);
}

function isEmptyTermValue(value) {
  return value == null || value === '' || (Array.isArray(value) && value.length === 0);
}

function termCompletenessScore(t) {
  return ['ko','en','uz','category','def_ko','def_en','def_uz','usmle','ipa','icd11','fdaDrug','rxclassATC','trials']
    .reduce((score, key) => score + (isEmptyTermValue(t[key]) ? 0 : 1), Array.isArray(t.refs) ? t.refs.length : 0);
}

function mergeDuplicateTerms(a, b) {
  const timeA = Date.parse(a.updatedAt || '') || 0;
  const timeB = Date.parse(b.updatedAt || '') || 0;
  const primary = timeB > timeA || (timeB === timeA && termCompletenessScore(b) >= termCompletenessScore(a)) ? b : a;
  const secondary = primary === a ? b : a;
  const merged = { ...secondary, ...primary };
  Object.keys(secondary).forEach(key => {
    if (isEmptyTermValue(merged[key]) && !isEmptyTermValue(secondary[key])) merged[key] = secondary[key];
  });
  if ((!merged.category || merged.category === '기타') && secondary.category && secondary.category !== '기타') {
    merged.category = secondary.category;
  }
  merged.refs = [...new Set([...(Array.isArray(a.refs) ? a.refs : []), ...(Array.isArray(b.refs) ? b.refs : [])])];
  const latestTime = Math.max(timeA, timeB);
  merged.updatedAt = latestTime > 0 ? new Date(latestTime).toISOString() : new Date().toISOString();
  return normalizeTermForStorage(merged);
}

function saveTermsToLocalStorage() {
  try {
    const payload = dedupeTermsById(TERMS).filter(t => !t.deletedAt);
    TERMS.length = 0;
    TERMS.push(...payload);
    localStorage.setItem(TERMS_STORAGE_KEY, JSON.stringify(payload));
    localStorage.setItem(TERMS_STORAGE_META_KEY, JSON.stringify({
      count: payload.length,
      savedAt: new Date().toISOString(),
      app: 'DrBugeon Medical Terms',
    }));
    return true;
  } catch (err) {
    console.warn('Local save failed', err);
    if (typeof showToast === 'function') showToast('⚠️ 브라우저 저장공간이 부족합니다');
    return false;
  }
}

function loadLocalTombstones() {
  const rows = safeJsonParse(localStorage.getItem(TOMBSTONE_STORAGE_KEY), []);
  return Array.isArray(rows) ? dedupeTermsById(rows).filter(t => t.deletedAt) : [];
}

function saveLocalTombstones(rows) {
  localStorage.setItem(TOMBSTONE_STORAGE_KEY, JSON.stringify(dedupeTermsById(rows).filter(t => t.deletedAt)));
}

function hideLocalTombstonesFromTrash(ids) {
  const hiddenAt = new Date().toISOString();
  const idSet = new Set(ids.map(id => String(id)));
  const rows = loadLocalTombstones().map(t => idSet.has(String(t.id)) ? { ...t, hiddenAt } : t);
  saveLocalTombstones(rows);
}

function pruneOldLocalTombstones(days = TOMBSTONE_PRUNE_DAYS) {
  const cutoff = Date.now() - days * 86400000;
  const rows = loadLocalTombstones().filter(t => {
    const deletedAt = Date.parse(t.deletedAt || t.updatedAt || '');
    return !Number.isFinite(deletedAt) || deletedAt >= cutoff;
  });
  saveLocalTombstones(rows);
  return rows.length;
}

function recordLocalTombstone(term) {
  if (!term) return;
  const deletedAt = new Date().toISOString();
  const tombstone = normalizeTermForStorage({ ...term, updatedAt: deletedAt, deletedAt, hiddenAt: null });
  const rows = loadLocalTombstones().filter(t => String(t.id) !== String(term.id));
  rows.push(tombstone);
  saveLocalTombstones(rows);
  return tombstone;
}

// Supabase에 단일 용어 저장 (로컬 저장 후 비동기로 호출)
function saveTermToCloud(t) {
  if (getSupabaseConfig()) sbUpsertTerm(t).catch(() => {});
}

function deleteTermFromCloud(id, deletedAt) {
  if (getSupabaseConfig()) sbDeleteTerm(id, deletedAt).catch(() => {});
}

function getLearningStateMap() {
  return safeJsonParse(localStorage.getItem(LEARNING_STORAGE_KEY), {}) || {};
}

function saveLearningStateMap(map) {
  localStorage.setItem(LEARNING_STORAGE_KEY, JSON.stringify(map || {}));
}

function updateLearningState(termId, patch, pushCloud = true) {
  const map = getLearningStateMap();
  const key = String(termId);
  const previous = map[key] || { termId: Number(termId), createdAt: new Date().toISOString() };
  map[key] = { ...previous, ...patch, termId: Number(termId), updatedAt: new Date().toISOString() };
  saveLearningStateMap(map);
  if (pushCloud && getSupabaseConfig()) sbUpsertLearningState(map[key]).catch(() => {});
  return map[key];
}

function learningStateToRow(state) {
  return {
    term_id: Number(state.termId),
    bookmarked: !!state.bookmarked,
    correct_count: Number(state.correctCount) || 0,
    wrong_count: Number(state.wrongCount) || 0,
    study_status: state.studyStatus || 'new',
    due_at: state.dueAt || null,
    last_reviewed_at: state.lastReviewedAt || null,
    created_at: state.createdAt || state.updatedAt || new Date().toISOString(),
    updated_at: state.updatedAt || new Date().toISOString(),
  };
}

function learningRowToState(row) {
  return {
    termId: Number(row.term_id),
    bookmarked: !!row.bookmarked,
    correctCount: Number(row.correct_count) || 0,
    wrongCount: Number(row.wrong_count) || 0,
    studyStatus: row.study_status || 'new',
    dueAt: row.due_at || null,
    lastReviewedAt: row.last_reviewed_at || null,
    createdAt: row.created_at || row.updated_at || new Date().toISOString(),
    updatedAt: row.updated_at || new Date().toISOString(),
  };
}

async function sbUpsertLearningState(state) {
  const cfg = getSupabaseConfig();
  if (!cfg) return false;
  const res = await fetch(`${cfg.url}/rest/v1/${LEARNING_TABLE}`, {
    method: 'POST',
    headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
    body: JSON.stringify(learningStateToRow(state))
  });
  if (!res.ok) throw new Error(`learning state upsert failed: ${res.status}`);
  return true;
}

async function sbLoadLearningStates() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  try {
    const res = await fetch(`${cfg.url}/rest/v1/${LEARNING_TABLE}?select=*&order=updated_at.desc`, { headers: sbHeaders() });
    if (!res.ok) throw new Error(`learning state load failed: ${res.status}`);
    return (await res.json()).map(learningRowToState);
  } catch (e) {
    console.warn('Learning state sync unavailable. Run the schema SQL from Developer Info.', e);
    return null;
  }
}

function applyLearningStates(states, cloudAuthoritative = false) {
  if (!Array.isArray(states)) return;
  const local = cloudAuthoritative ? {} : getLearningStateMap();
  states.forEach(state => {
    const key = String(state.termId);
    const current = local[key];
    if (!current || cloudAuthoritative || (Date.parse(state.updatedAt) || 0) > (Date.parse(current.updatedAt) || 0)) {
      local[key] = state;
    }
  });
  saveLearningStateMap(local);
  bookmarks = new Set(Object.values(local).filter(s => s.bookmarked).map(s => Number(s.termId)));
  localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
}

async function syncLearningStateToCloud() {
  const cloud = await sbLoadLearningStates();
  const local = getLearningStateMap();
  if (Array.isArray(cloud)) applyLearningStates(cloud, false);
  const merged = getLearningStateMap();
  for (const state of Object.values(merged)) await sbUpsertLearningState(state);
}

function loadTermsFromLocalStorage() {
  const saved = safeJsonParse(localStorage.getItem(TERMS_STORAGE_KEY), []);
  if (!Array.isArray(saved) || saved.length === 0) return 0;
  TERMS.length = 0;
  TERMS.push(...saved.map(normalizeTermForStorage));
  return TERMS.length;
}

function clearTermsLocalStorage() {
  localStorage.removeItem(TERMS_STORAGE_KEY);
  localStorage.removeItem(TERMS_STORAGE_META_KEY);
}

function nextTermId() {
  const maxId = TERMS.reduce((max, t) => Math.max(max, Number(t.id) || 0), 999);
  _idCounter = Math.max(_idCounter, Date.now(), maxId);
  return ++_idCounter;
}

function getStorageStatusText() {
  const meta = safeJsonParse(localStorage.getItem(TERMS_STORAGE_META_KEY), null);
  if (!meta?.savedAt) return '자동저장 대기';
  const d = new Date(meta.savedAt);
  return `자동저장 ${meta.count || 0}개 · ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

let currentFilter = 'all';
let currentSort = 'default'; // 'default' | 'en_asc' | 'ko_asc' | 'uz_asc'
let _idCounter = Date.now();
function makeId() { return nextTermId(); }
let aiStopRequested = false; // AI 중지 플래그

// ─── Render ───
function renderTerms(terms, bookmarkDivider = 0) {
  const list = document.getElementById('termList');

        </div>

          <div class="lang-badge" style="background:rgba(255,255,255,0.05);color:var(--text3);border:1px solid var(--border)">🔗 더 알아보기</div>

            <a href="https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(t.en)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="text-decoration:none;background:rgba(63,185,80,0.08);border:1px solid #166534;border-radius:8px;padding:4px 10px;font-size:11px;color:#4ade80">📚 PubMed</a>

            <a href="${googleUsageSearchUrl(t)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" title="Google에서 실제 사용례 검색" style="text-decoration:none;background:rgba(251,191,36,0.08);border:1px solid #92400e;border-radius:8px;padding:4px 10px;font-size:11px;color:#fbbf24">🔎 Google 사용례</a>
            <button onclick="event.stopPropagation();showICD11ForTerm(${termId});" style="background:rgba(139,92,246,0.08);border:1px solid #5b21b6;border-radius:8px;padding:4px 10px;font-size:11px;color:#a78bfa;cursor:pointer;font-family:'Noto Sans KR',sans-serif">🏷️ ICD-11</button>
            <a href="https://medlineplus.gov/search.html?query=${encodeURIComponent(t.en)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="text-decoration:none;background:rgba(88,166,255,0.08);border:1px solid #1d4ed8;border-radius:8px;padding:4px 10px;font-size:11px;color:#74b0ff">💊 MedlinePlus</a>
            <a href="https://clinicaltrials.gov/search?cond=${encodeURIComponent(t.en)}&recrs=a" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="text-decoration:none;background:rgba(34,197,94,0.08);border:1px solid #166534;border-radius:8px;padding:4px 10px;font-size:11px;color:#4ade80">🔬 ClinicalTrials</a>
            <a href="https://www.fda.gov/search?s=${encodeURIComponent(t.en)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="text-decoration:none;background:rgba(248,81,73,0.08);border:1px solid #991b1b;border-radius:8px;padding:4px 10px;font-size:11px;color:#f87171">⚠️ FDA</a>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  const loadMoreHtml = hiddenCount > 0
    ? `<div class="load-more-wrap"><button class="load-more-btn" onclick="showMoreTerms()">더보기 +${Math.min(LIST_PAGE_SIZE, hiddenCount)}개 · 남은 ${hiddenCount}개</button></div>`
    : '';

  list.innerHTML = actionBar + cardsHtml + loadMoreHtml;
  updateCounts(visibleTerms.length, terms.length);
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeJsString(value) {
  return String(value || '')
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\x22')
    .replace(/'/g, "\\'")
    .replace(/\r/g, '\\r')
    .replace(/\n/g, '\\n')
    .replace(/</g, '\\x3c')
    .replace(/>/g, '\\x3e');
}

function escapeRegExp(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function termSearchText(t) {
  return (t?.en || t?.ko || t?.uz || '').trim();
}

function termText(t, field) {
  return String(t?.[field] || '');
}

function findTermById(id) {
  return TERMS.find(t => String(t.id) === String(id)) || null;
}

function copyTermField(event, id, field, lang) {
  const text = termText(findTermById(id), field);
  copyTermText(event, text, lang);
}

function speakTermField(event, id, field, type) {
  const text = termText(findTermById(id), field);
  speakText(event, text, type, id);
}

function showICD11ForTerm(id) {
  const term = findTermById(id);
  showICD11Popup(termText(term, 'en'), termText(term, 'ko'));
}

const TERM_COMPLETION_FIELDS = ['ko', 'en', 'uz', 'def_ko', 'def_en', 'def_uz', 'usmle', 'ipa'];

function isTermComplete(t) {
  return TERM_COMPLETION_FIELDS.every(key => String(t?.[key] || '').trim().length > 0);
}

function sortByCompletionThenEnglish(a, b) {
  const completeDiff = Number(isTermComplete(b)) - Number(isTermComplete(a));
  if (completeDiff !== 0) return completeDiff;

  const enDiff = String(a?.en || '').localeCompare(String(b?.en || ''), 'en', { sensitivity: 'base', numeric: true });
  if (enDiff !== 0) return enDiff;

  const koDiff = String(a?.ko || '').localeCompare(String(b?.ko || ''), 'ko', { sensitivity: 'base', numeric: true });
  if (koDiff !== 0) return koDiff;

  return (Number(a?.id) || 0) - (Number(b?.id) || 0);
}

function sortTermsForCurrentMode(terms) {
  const rows = [...terms];
  if (currentSort === 'ko_asc') {
    return rows.sort((a, b) => compareTextWithEmptyLast(a?.ko, b?.ko, 'ko'));
  }
  if (currentSort === 'uz_asc') {
    return rows.sort((a, b) => compareTextWithEmptyLast(a?.uz, b?.uz, 'uz'));
  }
  if (currentSort === 'en_asc') {
    return rows.sort((a, b) => compareTextWithEmptyLast(a?.en, b?.en, 'en'));
  }
  return rows.sort(sortByCompletionThenEnglish);
}

function compareTextWithEmptyLast(a, b, locale) {
  const left = String(a || '').trim();
  const right = String(b || '').trim();
  if (!left && right) return 1;
  if (left && !right) return -1;
  return left.localeCompare(right, locale, { sensitivity: 'base', numeric: true });
}

function youtubeSearchUrl(t) {
  const q = termSearchText(t);
  const query = q ? `${q} medical terminology explanation` : 'medical terminology explanation';
  return `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}`;
}

function googleUsageSearchUrl(t) {
  const q = termSearchText(t);
  const query = q ? `"${q}" medical usage examples` : 'medical terminology usage examples';
  return `https://www.google.com/search?q=${encodeURIComponent(query)}`;
}

function setSectionLabel(text = '') {
  const label = document.getElementById('sectionLabel');
  if (!label) return;
  const clean = String(text || '').trim();
  const labelText = clean && clean !== '전체 용어'
    ? `<span class="section-label-text">${escapeHtml(clean)}</span>`
    : '';
  label.innerHTML = `
    ${labelText}
    <button class="inline-add-btn" onclick="showAddTermModal()">➕ 용어 추가</button>
  `;
}

function highlight(text, query) {
  if (!query || !text) return escapeHtml(text);
  try {
    const safeQuery = escapeRegExp(query);
    const regex = new RegExp(`(${safeQuery})`, 'gi');
    return escapeHtml(text).replace(regex, '<span class="highlight">$1</span>');
  } catch(e) {
    return escapeHtml(text);
  }
}

function toggleCard(id) {
  // 드로어가 이미 이 카드로 열려있으면 닫기, 아니면 열기
  if (_drawerTermId === id) {
    closeDrawer();
  } else {
    openDrawer(id);
    // 카드 강조 (리렌더 없이)
    document.querySelectorAll('.term-card.expanded').forEach(el => el.classList.remove('expanded'));
    const card = document.getElementById('card-' + id);
    if (card) card.classList.add('expanded');
  }
}

function toggleBookmark(e, id) {
  e.stopPropagation();
  if (bookmarks.has(id)) {
    bookmarks.delete(id);
    showToast('즐겨찾기에서 제거됨');
  } else {
    bookmarks.add(id);
    showToast('⭐ 즐겨찾기에 추가됨');
  }
  localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  updateLearningState(id, { bookmarked: bookmarks.has(id) });
  updateBookmarkCount();
  applyFilters();
}

function toggleTermSelection(event, id) {
  event.stopPropagation();
  const termId = Number(id);
  if (!termId) return;
  if (event.target.checked) selectedTermIds.add(termId);
  else selectedTermIds.delete(termId);
  renderTerms(_lastFilteredTerms);
}

function selectVisibleTerms() {
  (_lastFilteredTerms || []).slice(0, visibleTermLimit).forEach(t => {
    const id = Number(t.id);
    if (id) selectedTermIds.add(id);
  });
  renderTerms(_lastFilteredTerms);
}

function clearTermSelection() {
  selectedTermIds.clear();
  renderTerms(_lastFilteredTerms);
}

function showMoreTerms() {
  visibleTermLimit += LIST_PAGE_SIZE;
  renderTerms(_lastFilteredTerms);
}

function deleteSelectedTerms() {
  const ids = [...selectedTermIds].filter(id => TERMS.some(t => Number(t.id) === Number(id)));
  if (!ids.length) { clearTermSelection(); showToast('⚠️ 선택된 용어가 없습니다'); return; }
  showConfirm(
    `선택한 ${ids.length}개 용어를 삭제할까요?<br><span style="font-size:11px;color:#8b949e">삭제 전 자동 JSON 백업을 저장합니다.</span>`,
    () => {
      exportCompleteJsonBackup();
      const idSet = new Set(ids.map(String));
      const targets = TERMS.filter(t => idSet.has(String(t.id)));
      const tombstones = targets.map(recordLocalTombstone).filter(Boolean);
      for (let i = TERMS.length - 1; i >= 0; i--) {
        if (idSet.has(String(TERMS[i].id))) TERMS.splice(i, 1);
      }
      const learning = getLearningStateMap();
      ids.forEach(id => {
        bookmarks.delete(Number(id));
        delete learning[String(id)];
      });
      saveLearningStateMap(learning);
      localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
      saveTermsToLocalStorage();
      tombstones.forEach(tombstone => deleteTermFromCloud(tombstone.id, tombstone.deletedAt));
      selectedTermIds.clear();
      if (_drawerTermId && idSet.has(String(_drawerTermId))) closeDrawer();
      updateBookmarkCount();
      showToast(`🗑️ ${targets.length}개 선택 삭제 완료`);
      applyFilters();
    }
  );
}

function applyFilters() {
  if (!document.getElementById('termList')) return;  // ← bail when export/quiz/add tab active
  const query = document.getElementById('searchInput').value.toLowerCase();
  const signature = `${currentFilter}|${currentSort}|${query}`;
  if (signature !== _lastListSignature) {
    visibleTermLimit = LIST_PAGE_SIZE;
    selectedTermIds.clear();
    _lastListSignature = signature;
  }
  let results = TERMS;

  if (currentFilter === '즐겨찾기') {
    results = results.filter(t => bookmarks.has(t.id));
    setSectionLabel(`⭐ 즐겨찾기 — ${results.length}개`);
  } else if (currentFilter !== 'all') {
    results = results.filter(t => t.category === currentFilter);
    setSectionLabel(`${currentFilter} — ${results.length}개`);
  } else {
    setSectionLabel(query ? `검색 결과` : `전체 용어`);
  }

  if (query) {
    results = results.filter(t =>
      termText(t, 'ko').toLowerCase().includes(query) ||
      termText(t, 'en').toLowerCase().includes(query) ||
      termText(t, 'uz').toLowerCase().includes(query) ||
      termText(t, 'def_ko').toLowerCase().includes(query) ||
      termText(t, 'def_en').toLowerCase().includes(query)
    );
  }

  document.getElementById('searchClear').classList.toggle('visible', query.length > 0);

  // 데이터 없을 때 홈 화면: 즐겨찾기 or 빈 안내
  if (TERMS.length === 0 && !query) {
    renderHome();
    return;
  }

  // 기본 정렬: 완성된 용어 먼저, 그 안에서 영어 A-Z
  results = sortTermsForCurrentMode(results);
  _lastFilteredTerms = results;
  renderTerms(results);
}

function renderHome() {
  const list = document.getElementById('termList');
  const empty = document.getElementById('emptyState');
  if (!list || !empty) return;   // ← null guard
  empty.style.display = 'none';
  setSectionLabel('');

  const bookmarked = TERMS.filter(t => bookmarks.has(t.id));

  if (bookmarked.length > 0) {
    setSectionLabel(`⭐ 즐겨찾기 — ${bookmarked.length}개`);
    _lastFilteredTerms = bookmarked;
    renderTerms(bookmarked);
  } else {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">📂</div>
        <h3>용어 데이터가 없습니다</h3>
        <p>우측 상단 파일 업로드로 TSV·Excel을 올리거나<br>데이터 탭에서 백업을 복원하세요</p>
      </div>`;
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  applyFilters();
}

function setSort(val) {
  currentSort = val;
  const sel = document.getElementById('sortSelect');
  if (sel) sel.value = val;
  applyFilters();
}

function searchUMLSFromInput() {
  const q = document.getElementById('searchInput')?.value.trim();
  if (!q) { showToast('⚠️ 검색어를 입력하세요'); return; }
  searchUMLS(q);
}

function updateCounts(shown, filtered = shown) {
  const el = document.getElementById('totalCount');
  if (!el) return;
  el.textContent = filtered === TERMS.length
    ? `${shown}개 표시 / 전체 ${TERMS.length}개`
    : `${shown}개 표시 / 결과 ${filtered}개 / 전체 ${TERMS.length}개`;
}

function updateBookmarkCount() {
  const validCount = TERMS.filter(t => bookmarks.has(t.id)).length;
  // Prune stale IDs that no longer exist in TERMS
  [...bookmarks].forEach(id => { if (!TERMS.some(t => t.id === id)) bookmarks.delete(id); });
  localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  document.getElementById('bookmarkCount').textContent = `즐겨찾기 ${validCount}`;
}

  </div>`;

function restoreHomeTab() {
  const main = document.getElementById('mainContent');
  main.innerHTML = HOME_HTML;
  updateBookmarkCount();
  applyFilters();
}

function getNavButton(tab) {
  return [...document.querySelectorAll('.nav-btn')]
    .find(btn => (btn.getAttribute('onclick') || '').includes(`'${tab}'`)) || null;
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  if (tab === 'export')   showExportMenu();
  else if (tab === 'guide') showGuide();
  else if (tab === 'ai')      showAISettings();
  else if (tab === 'quiz')    showQuizSetup();
  else if (tab === 'add')     { showAddTermModal(); }
  else if (tab === 'bookmark') {
    restoreHomeTab();
    setFilter('즐겨찾기', document.getElementById('filterBookmarkBtn'));
  } else {
    restoreHomeTab();
    setFilter('all', document.querySelector('.filter-btn.active') || document.querySelector('.filter-btn'));
  }
}

};

function renderModelPresetOptions(presets, currentValue) {
  const presetValues = presets.map(p => p.value);
  const selectedValue = presetValues.includes(currentValue) ? currentValue : 'custom';
  return presets.map(p => `<option value="${p.value}" ${p.value === selectedValue ? 'selected' : ''}>${p.label}</option>`).join('');
}

function onModelPresetChange(provider) {
  const select = document.getElementById(provider === 'openai' ? 'ai_model_openai_preset' : 'ai_model_anthropic_preset');
  const input = document.getElementById(provider === 'openai' ? 'ai_model_openai' : 'ai_model_anthropic');
  if (!select || !input) return;
  if (select.value !== 'custom') input.value = select.value;
  input.readOnly = select.value !== 'custom';
  input.style.opacity = select.value === 'custom' ? '1' : '0.75';
}

function onAIRouteChange() {
  const route = document.getElementById('ai_route')?.value || 'auto';
  const openaiBox = document.getElementById('openaiConfigBox');
  const anthropicBox = document.getElementById('anthropicConfigBox');
  const routeTip = document.getElementById('aiRouteTip');
  if (openaiBox) openaiBox.style.display = (route === 'openai' || route === 'auto') ? 'block' : 'none';
  if (anthropicBox) anthropicBox.style.display = (route === 'anthropic' || route === 'auto') ? 'block' : 'none';
  // Gemini + UMLS 박스는 항상 표시
  if (routeTip) routeTip.textContent = AI_ROUTE_LABELS[route] || '';
}

function migrateOldAIConfig(cfg) {
  if (!cfg) return {};
  // v2-3/v2-4 compatibility: old config had { provider, apiKey, modelOpenAI, modelAnthropic }
  if (cfg.apiKey && !cfg.openaiKey && !cfg.anthropicKey) {
    if ((cfg.provider || 'openai') === 'anthropic') cfg.anthropicKey = cfg.apiKey;
    else cfg.openaiKey = cfg.apiKey;
  }
  return cfg;
}

function getAIConfig() {
  const cfg = migrateOldAIConfig(safeJsonParse(localStorage.getItem(AI_CONFIG_STORAGE_KEY), null) || {});
  return {
    route:          cfg.route          || cfg.provider || 'auto',
    openaiKey:      cfg.openaiKey      || '',
    anthropicKey:   cfg.anthropicKey   || '',
    geminiKey:      cfg.geminiKey      || '',
    umlsKey:        cfg.umlsKey        || localStorage.getItem('kma_umls_key') || '',
    modelOpenAI:    cfg.modelOpenAI    || 'gpt-4o-mini',
    modelAnthropic: cfg.modelAnthropic || 'claude-sonnet-4-6',
    modelGemini:    cfg.modelGemini    || 'gemini-2.0-flash',
  };
}

function hasConfiguredAIKey(cfg = getAIConfig()) {
  if (cfg.route === 'openai') return !!cfg.openaiKey;
  if (cfg.route === 'anthropic') return !!cfg.anthropicKey;
  if (cfg.route === 'gemini') return !!cfg.geminiKey;
  return !!(cfg.openaiKey || cfg.anthropicKey || cfg.geminiKey);
}

function saveAIConfigFromForm(silent = false) {
  const route = document.getElementById('ai_route')?.value || 'auto';
  const openaiKey = document.getElementById('ai_openai_key')?.value.trim() || '';
  const anthropicKey = document.getElementById('ai_anthropic_key')?.value.trim() || '';
  const geminiKey = document.getElementById('ai_gemini_key')?.value.trim() || '';
  const umlsKey = document.getElementById('ai_umls_key')?.value.trim() || '';
  const modelOpenAI = document.getElementById('ai_model_openai')?.value.trim() || 'gpt-4o-mini';
  const modelAnthropic = document.getElementById('ai_model_anthropic')?.value.trim() || 'claude-sonnet-4-6';
  const modelGemini = document.getElementById('ai_model_gemini')?.value.trim() || 'gemini-2.0-flash';

  if (route === 'openai' && !openaiKey) { showToast('⚠️ OpenAI API 키를 입력해주세요'); return false; }
  if (route === 'anthropic' && !anthropicKey) { showToast('⚠️ Anthropic API 키를 입력해주세요'); return false; }
  if (route === 'gemini' && !geminiKey) { showToast('⚠️ Gemini API 키를 입력해주세요'); return false; }

  const cfg = { route, openaiKey, anthropicKey, geminiKey, umlsKey, modelOpenAI, modelAnthropic, modelGemini, savedAt: new Date().toISOString() };
  localStorage.setItem(AI_CONFIG_STORAGE_KEY, JSON.stringify(cfg));
  if (umlsKey) localStorage.setItem('kma_umls_key', umlsKey);
  if (!silent) { showToast('✅ AI API 설정 저장 완료'); showAISettings(); }
  return true;
}

function clearSingleKey(provider) {
  const labels = { openai: 'OpenAI', anthropic: 'Anthropic', gemini: 'Gemini', umls: 'UMLS' };
  showConfirm(`${labels[provider]} API 키를 해제할까요?`, () => {
    const cfg = getAIConfig();
    if (provider === 'openai')    { cfg.openaiKey = ''; cfg.modelOpenAI = 'gpt-4o-mini'; }
    if (provider === 'anthropic') { cfg.anthropicKey = ''; cfg.modelAnthropic = 'claude-sonnet-4-6'; }
    if (provider === 'gemini')    { cfg.geminiKey = ''; cfg.modelGemini = 'gemini-2.0-flash'; }
    if (provider === 'umls')      { cfg.umlsKey = ''; localStorage.removeItem('kma_umls_key'); }
    localStorage.setItem(AI_CONFIG_STORAGE_KEY, JSON.stringify(cfg));
    showToast(`🔌 ${labels[provider]} API 키 해제 완료`);
    showAISettings();
  });
}

function clearAIConfig() {
  showConfirm('저장된 OpenAI/Anthropic API 키와<br>모델 설정을 모두 삭제할까요?', () => {
    localStorage.removeItem(AI_CONFIG_STORAGE_KEY);
    showToast('🗑️ AI API 설정 삭제 완료');
    showAISettings();
  });

function maskApiKey(key) {
  if (!key) return '저장 안 됨';
  if (key.length <= 12) return '••••';
  return key.slice(0, 6) + '••••••••' + key.slice(-4);
}

async function pullFromCloud() {
  if (!getSupabaseConfig()) { showToast('⚠️ Supabase 설정 먼저 저장하세요'); return; }
  showToast('⬇️ 클라우드에서 불러오는 중...');
  const cloudTerms = await sbLoadAll();
  if (!cloudTerms || cloudTerms.length === 0) { showToast('⚠️ 클라우드에 데이터가 없습니다'); return; }
  const cleanCloudTerms = dedupeTermsById(cloudTerms).filter(t => !t.deletedAt);
  TERMS.length = 0;
  TERMS.push(...cleanCloudTerms);
  saveTermsToLocalStorage();
  saveLocalTombstones(cloudTerms.filter(t => t.deletedAt));
  const meta = await sbLoadCanonicalMeta();
  if (meta?.version) saveLocalSyncMeta({ canonicalVersion: meta.version });
  const learning = await sbLoadLearningStates();
  if (learning) applyLearningStates(learning, true);
  updateBookmarkCount();
  applyFilters();
  showToast(`⬇️ 클라우드 기준본 ${cleanCloudTerms.length}개 불러옴`);
}

async function syncWithCloud() {
  if (!getSupabaseConfig()) return false;
  showToast('☁️ 변경사항 동기화 중...');
  const [cloudTerms, canonicalMeta] = await Promise.all([sbLoadAll(), sbLoadCanonicalMeta()]);
  if (cloudTerms === null) {
    showToast('⚠️ 클라우드 데이터를 불러오지 못했습니다');
    return false;
  }

  const localMeta = getLocalSyncMeta();
  if (localMeta.pendingCanonicalStatus) {
    showToast('⚠️ 이전 클라우드 최종본 덮어쓰기가 완료되지 않았습니다 · 먼저 다시 실행하세요');
    return false;
  }
  const canonicalChanged = !!canonicalMeta?.version && canonicalMeta.version !== localMeta.canonicalVersion;

  if (canonicalChanged) {
    TERMS.length = 0;
    TERMS.push(...dedupeTermsById(cloudTerms).filter(t => !t.deletedAt));
    saveTermsToLocalStorage();
    saveLocalTombstones(cloudTerms.filter(t => t.deletedAt));
    const learning = await sbLoadLearningStates();
    if (learning) applyLearningStates(learning, true);
    saveLocalSyncMeta({ canonicalVersion: canonicalMeta.version });
    updateBookmarkCount();
    applyFilters();
    showToast(`☁️ 새 최종본 적용 완료 (${TERMS.length}개)`);
    return true;
  }

  const allLocal = [...TERMS, ...loadLocalTombstones()];
  const merged = new Map();
  [...cloudTerms, ...allLocal].forEach(raw => {
    const term = normalizeTermForStorage(raw);
    const key = String(term.id);
    const current = merged.get(key);
    if (!current || (Date.parse(term.updatedAt) || 0) >= (Date.parse(current.updatedAt) || 0)) merged.set(key, term);
  });

  const mergedRows = [...merged.values()];
  TERMS.length = 0;
  TERMS.push(...mergedRows.filter(t => !t.deletedAt));
  saveTermsToLocalStorage();
  saveLocalTombstones(mergedRows.filter(t => t.deletedAt));
  await sbBatchUpsertRows(mergedRows.map(termToRow));
  await syncLearningStateToCloud();
  if (canonicalMeta?.version) saveLocalSyncMeta({ canonicalVersion: canonicalMeta.version });
  updateBookmarkCount();
  applyFilters();
  showToast(`✅ 양방향 동기화 완료 (${TERMS.length}개)`);
  return true;
}

function chooseAIProvider(task = 'general') {
  const cfg = getAIConfig();
  if (cfg.route === 'openai') return 'openai';
  if (cfg.route === 'anthropic') return 'anthropic';
  if (cfg.route === 'gemini') return 'gemini';
  // Auto route: long enrichment JSON goes to Anthropic; short field generation/test goes to OpenAI/Gemini.
  if (task === 'enrich' && cfg.anthropicKey) return 'anthropic';
  if (cfg.openaiKey) return 'openai';
  if (cfg.geminiKey) return 'gemini';
  if (cfg.anthropicKey) return 'anthropic';
  return 'openai';
}

    return window.location.hostname.includes('claude.ai') ||

           window.parent !== window; // iframe (claude.ai artifact)

// ─── Claude.ai 내장 API 호출 (키 불필요) ───
async function callClaudeBuiltin(prompt, maxTokens = 800) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) throw new Error(`Builtin Claude error: ${res.status}`);
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('\n') || '';
}

async function callAIText(prompt, maxTokens = 800, task = 'general', forceProvider = null) {
  // claude.ai 환경이면 내장 API 우선 시도 (키 불필요)
  if (isClaudeAiEnv()) {
    // 529(과부하) 시 최대 3회 재시도 (1s, 2s, 4s 대기)
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        return await callClaudeBuiltin(prompt, maxTokens);
      } catch (e) {
        const is529 = e.message.includes('529') || e.message.includes('overloaded');
        if (is529 && attempt < 2) {
          const wait = (attempt + 1) * 1500;
          console.warn(`Builtin Claude 529, retry in ${wait}ms...`);
          await new Promise(r => setTimeout(r, wait));
          continue;
        }
        console.warn('Builtin Claude failed, falling back to user key:', e.message);
        break; // 재시도 실패 또는 529 아닌 오류 → 사용자 키 fallback
      }
    }
  }

  const cfg = getAIConfig();
  const provider = forceProvider || chooseAIProvider(task);

  if (provider === 'anthropic') {
    if (!cfg.anthropicKey) throw new Error('Anthropic API key is not configured.');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': cfg.anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: cfg.modelAnthropic,
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) throw new Error(`Anthropic API error: ${res.status}`);
    const data = await res.json();
    return data.content?.map(c => c.text || '').join('\n') || '';
  }

  if (provider === 'gemini') {
    if (!cfg.geminiKey) throw new Error('Gemini API key is not configured.');
    const model = cfg.modelGemini || 'gemini-2.0-flash';
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-goog-api-key': cfg.geminiKey
      },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: maxTokens } })
    });
    if (!res.ok) throw new Error(`Gemini API error: ${res.status}`);
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  if (!cfg.openaiKey) throw new Error('OpenAI API key is not configured.');
  const res = await fetch('https://api.openai.com/v1/responses', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${cfg.openaiKey}`
    },
    body: JSON.stringify({
      model: cfg.modelOpenAI,
      input: prompt,
      max_output_tokens: maxTokens
    })
  });
  if (!res.ok) throw new Error(`OpenAI API error: ${res.status}`);
  const data = await res.json();
  if (data.output_text) return data.output_text;
  return (data.output || []).flatMap(item => item.content || []).map(c => c.text || '').join('\n');
}

function parseTsvPaste(raw) {
  const lines = raw.trim().split('\n').filter(l => l.trim());
  if (!lines.length) return [];
  const COLS = ['ko','en','uz','category','def_ko','def_en','def_uz','usmle','ipa'];

  // 헤더 별칭 매핑 (영문 헤더 → 내부 키)
  const ALIAS = {
    'ko':'ko', 'korean':'ko',
    'en':'en', 'english':'en',
    'uz':'uz', 'uzbek':'uz',
    'category':'category',
    'def_ko':'def_ko',
    'def_en':'def_en',
    'def_uz':'def_uz',
    'usmle':'usmle',
    'ipa':'ipa',
  };

  // 헤더 감지: ko/en 또는 Korean/English 포함 여부
  const firstCols = lines[0].split('\t').map(c => c.trim().toLowerCase());
  const hasHeader = firstCols.some(c => ALIAS[c] !== undefined);

  if (hasHeader) {
    const colMap = firstCols.map(c => ALIAS[c] || null);
    return lines.slice(1)
      .filter(l => l.trim() && !l.startsWith('#'))
      .map(line => {
        const cells = line.split('\t');
        const t = {};
        colMap.forEach((key, idx) => { if (key) t[key] = (cells[idx] || '').trim(); });
        COLS.forEach(c => { if (!t[c]) t[c] = ''; });
        t.category = t.category || '기타';
        return t;
      }).filter(t => t.ko || t.en || t.uz);
  }

  // 헤더 없음 — 순서대로 (Anki TSV #으로 시작하는 줄 제외)
  return lines
    .filter(l => !l.startsWith('#'))
    .map(line => {
      const cells = line.split('\t');
      const t = {};
      COLS.forEach((c, idx) => { t[c] = (cells[idx] || '').trim(); });
      t.category = t.category || '기타';
      return t;
    }).filter(t => t.ko || t.en || t.uz);
}

function previewTsvPaste() {
  const raw = document.getElementById('tsvPasteArea')?.value || '';

}

async function importTsvPaste(mode = 'merge') {
  const raw = document.getElementById('tsvPasteArea')?.value || '';
  const rows = parseTsvPaste(raw);
  if (!rows.length) { showToast('⚠️ 파싱할 데이터가 없습니다'); return; }

  // 영어 → 한국어 → 우즈베크어 순서로 중복 분류: 덮어쓰기 vs 신규
  const overwriteRows = [];  // 기존 용어 덮어쓰기
  const newRows = [];        // 신규 추가
  const seenInBatch = new Set(); // 같은 배치 내 중복 방지

  rows.forEach(t => {
    if (!t.en && !t.ko && !t.uz) return; // 빈 행 스킵
    const key = termIdentityKey(t);
    if (seenInBatch.has(key)) return;
    seenInBatch.add(key);

    const existIdx = findTermIndexByIdentity(t);

    if (existIdx !== -1 && mode !== 'add_only') {
      overwriteRows.push({ t, existIdx });
    } else if (existIdx === -1) {
      newRows.push(t);
    }
  });

  if (!overwriteRows.length && !newRows.length) {
    showToast(mode === 'add_only' ? '⚠️ 새로 추가할 용어가 없습니다 · 기존 용어는 유지됨' : '⚠️ 처리할 데이터가 없습니다');
    return;
  }

  const btn = document.getElementById('tsvImportBtn');
  const addOnlyBtn = document.getElementById('tsvAddOnlyBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 가져오는 중...'; }
  if (addOnlyBtn) { addOnlyBtn.disabled = true; addOnlyBtn.textContent = '⏳ 추가 중...'; }

  // 덮어쓰기 처리: 완전 덮어쓰기 (새 데이터로 전부 교체, 기존 id 유지)
  let overwriteCount = 0;
  overwriteRows.forEach(({ t, existIdx }) => {
    const existing = TERMS[existIdx];
    TERMS[existIdx] = normalizeTermForStorage({
      ...t,
      id: existing.id, // 기존 id 유지
      updatedAt: new Date().toISOString()
    });
    saveTermToCloud(TERMS[existIdx]);
    overwriteCount++;
  });
  if (overwriteCount > 0) { saveTermsToLocalStorage(); applyFilters(); }

  // 전부 즉시 저장 (AI 없음 — 내보내기 탭 '일괄 빈칸 채우기'로 별도 실행)
  newRows.forEach(t => TERMS.push(normalizeTermForStorage({ ...t, id: makeId() })));
  saveTermsToLocalStorage();
  applyFilters();
  updateBookmarkCount();

  updateBookmarkCount();
  saveTermsToLocalStorage();
  const addedCount = newRows.length;
  const msg = [
    overwriteCount > 0 ? `✏️ ${overwriteCount}개 완전 덮어쓰기` : '',
    addedCount > 0     ? `➕ ${addedCount}개 신규 추가` : '',
    mode === 'add_only' && rows.length > addedCount ? `⏭️ 기존 ${rows.length - addedCount}개 유지` : '',
  ].filter(Boolean).join(', ');
  showToast(`✅ ${msg || '처리 완료'}`);
  if (btn) { btn.disabled = false; btn.textContent = '✅ 갱신+추가'; }
  if (addOnlyBtn) { addOnlyBtn.disabled = false; addOnlyBtn.textContent = '➕ 신규만'; }
  finishAddFlow();
}

  const en = document.getElementById('add_en')?.value.trim() || '';
  const uz = document.getElementById('add_uz')?.value.trim() || '';

  if (!ko && !en && !uz) { showToast('⚠️ 하나 이상 입력해주세요'); return; }

  if (TERMS.some(t =>
    (en && termText(t, 'en').toLowerCase() === en.toLowerCase()) ||
    (ko && termText(t, 'ko').toLowerCase() === ko.toLowerCase()) ||
    (uz && termText(t, 'uz').toLowerCase() === uz.toLowerCase())
  )) {
    showToast('⚠️ 이미 존재하는 용어입니다'); return;
  }

  const btn = document.getElementById('addSubmitBtn');
  const cfg = getAIConfig();
  const hasKey = hasConfiguredAIKey(cfg);

  const newTerm = {
    id:       nextTermId(),
    ko, en, uz,
    category: document.getElementById('add_category')?.value || '기타',
    def_ko:   document.getElementById('add_def_ko')?.value.trim() || '',
    def_en:   document.getElementById('add_def_en')?.value.trim() || '',
    def_uz:   document.getElementById('add_def_uz')?.value.trim() || '',
    usmle:    document.getElementById('add_usmle')?.value.trim() || '',
    ipa: '', refs: [], icd11: null, fdaDrug: null, rxclassATC: null, trials: null,
  };

  // claude.ai 환경이거나 API 키 있으면 AI 자동완성
  const canUseAI = isClaudeAiEnv() || hasKey;
  if (!canUseAI) {
    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    saveTermToCloud(TERMS[TERMS.length - 1]);
    showToast(`✅ "${ko || en || uz}" 저장됨 (🤖 설정에서 키 등록 시 자동완성 가능)`);
    finishAddFlow(TERMS[TERMS.length - 1].id);
    return;
  }

  // API 키 있으면 AI 자동완성
  if (btn) { btn.disabled = true; btn.textContent = '🤖 AI 처리 중...'; }

  try {
    const enriched = await enrichTermWithAI(newTerm);
    const finalKo = ko || enriched.ko || '';
    const finalEn = en || enriched.en || '';
    const finalUz = uz || enriched.uz || '';
    TERMS.push(normalizeTermForStorage({
      ...newTerm,
      ko: finalKo, en: finalEn, uz: finalUz,
      category:   newTerm.category !== '기타' ? newTerm.category : (enriched.category || '기타'),
      ipa:        enriched.ipa        || '',
      def_ko:     newTerm.def_ko     || enriched.def_ko     || '',
      def_en:     newTerm.def_en     || enriched.def_en     || '',
      def_uz:     newTerm.def_uz     || enriched.def_uz     || '',
      usmle:      newTerm.usmle      || enriched.usmle      || '',
      refs:       enriched.refs       || [],
      icd11:      enriched.icd11      || null,
      fdaDrug:    enriched.fdaDrug    || null,
      rxclassATC: enriched.rxclassATC || null,
      trials:     enriched.trials     || null,
    }));
    saveTermsToLocalStorage();
    saveTermToCloud(TERMS[TERMS.length - 1]);
    showToast(`✅ "${finalKo || finalEn || finalUz}" AI 자동완성 추가 완료!`);
    finishAddFlow(TERMS[TERMS.length - 1].id);
  } catch (err) {
    console.error(err);
    // AI 실패해도 기본 데이터로 저장
    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    saveTermToCloud(TERMS[TERMS.length - 1]);
    showToast(`⚠️ AI 실패 — "${ko || en || uz}" 기본 저장됨. ✏️ 편집으로 내용 추가 가능`);
    finishAddFlow(TERMS[TERMS.length - 1].id);
    if (btn) { btn.disabled = false; btn.textContent = '🤖 AI 자동완성으로 추가'; }
  }
}

  ['algia', 'æl.dʒə'],

function normalizeIpaLookupTerm(value) {
  return String(value || '')
    .trim()
    .toLowerCase()
    .replace(/\([^)]*\)/g, ' ')
    .replace(/[^a-z\s-]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function roughIpaStem(word) {
  let s = String(word || '').toLowerCase().replace(/[^a-z]/g, '');
  if (!s) return '';
  s = s
    .replace(/tion/g, 'ʃən')
    .replace(/sion/g, 'ʒən')
    .replace(/ph/g, 'f')
    .replace(/th/g, 'θ')
    .replace(/sh/g, 'ʃ')
    .replace(/ch/g, 'k')
    .replace(/qu/g, 'kw')
    .replace(/ck/g, 'k')
    .replace(/x/g, 'ks');
  s = s.replace(/c(?=[eiy])/g, 's').replace(/c/g, 'k');
  s = s.replace(/g(?=[eiy])/g, 'dʒ').replace(/g/g, 'ɡ');
  s = s
    .replace(/ee/g, 'iː')
    .replace(/ea/g, 'iː')
    .replace(/oo/g, 'uː')
    .replace(/ou/g, 'aʊ')
    .replace(/ai/g, 'eɪ')
    .replace(/ay/g, 'eɪ')
    .replace(/oa/g, 'oʊ')
    .replace(/a/g, 'æ')
    .replace(/e/g, 'e')
    .replace(/i/g, 'ɪ')
    .replace(/o/g, 'ɑː')
    .replace(/u/g, 'ʌ')
    .replace(/y$/g, 'i');
  return s;
}

function localIpaForWord(word) {
  const clean = String(word || '').toLowerCase().replace(/[^a-z]/g, '');
  if (!clean || /^[ivxlcdm]+$/.test(clean)) return '';
  if (LOCAL_IPA_WORDS[clean]) return LOCAL_IPA_WORDS[clean];
  for (const [suffix, ipa] of LOCAL_IPA_SUFFIXES) {
    if (clean.endsWith(suffix) && clean.length > suffix.length + 1) {
      const stem = clean.slice(0, -suffix.length);
      const stemIpa = LOCAL_IPA_WORDS[stem] || roughIpaStem(stem);
      return stemIpa ? `${stemIpa}.${ipa}` : ipa;
    }
  }
  return roughIpaStem(clean);
}

function generateLocalIPA(term) {
  const normalized = normalizeIpaLookupTerm(term);
  if (!normalized) return '';
  if (LOCAL_IPA_PHRASES[normalized]) return `/${LOCAL_IPA_PHRASES[normalized]}/`;
  const parts = normalized
    .split(/[\s-]+/)
    .map(localIpaForWord)
    .filter(Boolean);
  return parts.length ? `/${parts.join(' ')}/` : '';
}

async function regenField(id, field) {
  const t = TERMS.find(x => x.id === id);
  if (!t) { showToast('⚠️ 용어를 찾을 수 없습니다'); return; }
  if (!FIELD_PROMPTS[field]) { showToast('⚠️ 이 항목은 AI 재생성을 지원하지 않습니다'); return; }

  const inputEl = document.getElementById(`edit_${field}`);
  if (!inputEl) { showToast('⚠️ 편집 칸을 찾을 수 없습니다'); return; }
  const current = {
    ...t,
    ko: document.getElementById('edit_ko')?.value.trim() || t.ko,
    en: document.getElementById('edit_en')?.value.trim() || t.en,
    uz: document.getElementById('edit_uz')?.value.trim() || t.uz,
    ipa: document.getElementById('edit_ipa')?.value.trim() || t.ipa,
    def_ko: document.getElementById('edit_def_ko')?.value.trim() || t.def_ko,
    def_en: document.getElementById('edit_def_en')?.value.trim() || t.def_en,
    def_uz: document.getElementById('edit_def_uz')?.value.trim() || t.def_uz,
    usmle: document.getElementById('edit_usmle')?.value.trim() || t.usmle,
  };

  // Visual loading state
  const btn = inputEl.closest('div').querySelector('button');
  const prev = btn?.textContent || '🔄';
  if (btn) {
    btn.textContent = '⏳';
    btn.disabled = true;
  }
  inputEl.style.opacity = '0.4';
  showToast(field === 'ipa' ? '🔤 IPA 자동생성 중...' : '🤖 AI 재생성 중...');

  try {
    if (field === 'ipa') {
      const localIpa = generateLocalIPA(current.en || current.ko || current.uz);
      if (localIpa) {
        inputEl.value = localIpa;
        showToast('✅ 앱 내부 IPA 자동생성 완료');
        return;
      }
    }

    if (!isClaudeAiEnv() && !hasConfiguredAIKey()) {
      showToast('⚠️ 설정에서 API 키를 먼저 저장하세요');
      return;
    }

    const result = (await callAIText(FIELD_PROMPTS[field](current), 300, 'field')).trim().replace(/^["']|["']$/g, '');
    if (result) inputEl.value = result;
    showToast(`✅ ${field} 재생성 완료`);
  } catch (err) {
    console.error(err);
    showToast(`⚠️ 재생성 실패: ${err.message || 'AI 설정 확인'}`);
  } finally {
    if (btn) {
      btn.textContent = prev;
      btn.disabled = false;
    }
    inputEl.style.opacity = '1';
  }
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function saveEdit(id) {
  const idx = TERMS.findIndex(x => x.id === id);
  if (idx === -1) return;

  const editedCategory = document.getElementById('edit_category')?.value?.trim();
  TERMS[idx] = normalizeTermForStorage({
    ...TERMS[idx],
    ko:       document.getElementById('edit_ko')?.value.trim()       || TERMS[idx].ko,
    en:       document.getElementById('edit_en')?.value.trim()       || TERMS[idx].en,
    uz:       document.getElementById('edit_uz')?.value.trim()       || '',
    ipa:      document.getElementById('edit_ipa')?.value.trim()      || '',
    category: editedCategory || TERMS[idx].category || '기타',
    def_ko:   document.getElementById('edit_def_ko')?.value.trim()   || '',
    def_en:   document.getElementById('edit_def_en')?.value.trim()   || '',
    def_uz:   document.getElementById('edit_def_uz')?.value.trim()   || '',
    usmle:    document.getElementById('edit_usmle')?.value.trim()    || '',
  });

  TERMS[idx].updatedAt = new Date().toISOString();
  saveTermsToLocalStorage();
  saveTermToCloud(TERMS[idx]);
  document.getElementById('editModal')?.remove();
  showToast('✅ 수정 완료');
  applyFilters();
  // 드로어가 이 용어로 열려있으면 내용 갱신
  if (_drawerTermId === id) {
    const updated = TERMS.find(x => x.id === id);
    if (updated) _renderDrawerContent(updated);
  }
}

function deleteTerm(id) {
  const t = TERMS.find(x => x.id === id);
  const label = t?.ko || t?.en || '이 용어';
  showConfirm(`"${escapeHtml(label)}"을 삭제할까요?`, () => {
    const idx = TERMS.findIndex(x => x.id === id);
    if (idx !== -1) TERMS.splice(idx, 1);
    const tombstone = recordLocalTombstone(t);
    bookmarks.delete(id);
    localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
    saveTermsToLocalStorage();
    deleteTermFromCloud(id, tombstone?.deletedAt);
    document.getElementById('editModal')?.remove();
    if (expandedId === id) { expandedId = null; closeDrawer(); }
    showToast('🗑️ 삭제 완료');
    updateBookmarkCount();
    applyFilters();
  });
}

function formatDataDate(value) {
  if (!value) return '기록 없음';
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? '기록 없음' : date.toLocaleString('ko-KR');
}

function safeFilePart(value) {
  return String(value || '전체').replace(/[\\/:*?"<>|]+/g, '-').replace(/\s+/g, '_');
}

function dataFilePrefix(label) {
  const now = new Date();
  const date = now.toISOString().slice(0, 10);
  const time = [now.getHours(), now.getMinutes(), now.getSeconds()].map(v => String(v).padStart(2, '0')).join('-');
  return `${date}_${time}_Dr_Bugeon_의학용어_${safeFilePart(label)}`;
}

function downloadBlobFile(content, filename, mime = 'application/octet-stream') {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = filename;
  document.body.appendChild(anchor);
  anchor.click();
  anchor.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function createCompleteBackupObject() {

}

function exportCompleteJsonBackup() {
  const backup = createCompleteBackupObject();

  showToast(`💾 전체 백업 완료 · 용어 ${backup.terms.length}개`);
}

function getTermsByScope(scope) {
  const learning = getLearningStateMap();
  const now = Date.now();
  if (scope === 'visible') return Array.isArray(_lastFilteredTerms) ? [..._lastFilteredTerms] : [...TERMS];
  if (scope === 'bookmarks') return TERMS.filter(t => bookmarks.has(t.id));
  if (scope === 'learning') return TERMS.filter(t => ['learning', 'review'].includes(learning[String(t.id)]?.studyStatus));
  if (scope === 'due') return TERMS.filter(t => {
    const dueAt = learning[String(t.id)]?.dueAt;
    return dueAt && Date.parse(dueAt) <= now;
  });
  if (scope === 'mastered') return TERMS.filter(t => learning[String(t.id)]?.studyStatus === 'mastered');
  if (scope === 'incomplete') return TERMS.filter(t => !t.ko || !t.en || !t.uz || !t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa);
  return [...TERMS];
}

function termExportRows(terms) {
  return terms.map(t => ({
    id: t.id,
    Korean: t.ko || '',
    English: t.en || '',
    Uzbek: t.uz || '',
    Category: t.category || '기타',
    Def_ko: t.def_ko || '',
    Def_en: t.def_en || '',
    Def_uz: t.def_uz || '',
    USMLE: t.usmle || '',
    IPA: t.ipa || '',
    Created_at: t.createdAt || '',
    Updated_at: t.updatedAt || '',
  }));
}

function csvCell(value) {
  const text = String(value ?? '');
  return /[",\r\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
}

function exportTermCollection(terms, label, format) {
  if (!terms.length) { showToast('⚠️ 선택한 범위에 용어가 없습니다'); return; }
  const prefix = dataFilePrefix(label);
  if (format === 'xlsx') {
    if (!window.XLSX) { showToast('⚠️ Excel 모듈을 불러오지 못했습니다'); return; }
    const worksheet = XLSX.utils.json_to_sheet(termExportRows(terms));
    worksheet['!cols'] = [16,14,20,20,18,38,38,38,48,16,24,24].map(wch => ({ wch }));
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, 'Medical Terms');
    XLSX.writeFile(workbook, `${prefix}.xlsx`);
  } else if (format === 'csv') {
    const rows = termExportRows(terms);
    const headers = Object.keys(rows[0]);
    const csv = [headers.join(','), ...rows.map(row => headers.map(key => csvCell(row[key])).join(','))].join('\r\n');
    downloadBlobFile('\uFEFF' + csv, `${prefix}.csv`, 'text/csv;charset=utf-8');
  } else {
    const header = '#separator:tab\n#html:true\n#columns:Front\tBack\tTags';
    const rows = terms.map(t => {
      const front = `<b>${cleanAnkiHtml(t.en)}</b>${t.ipa ? `<br>${cleanAnkiHtml(t.ipa)}` : ''}`;
      const back = [
        t.ko ? `<b>한국어</b>: ${cleanAnkiHtml(t.ko)}` : '',
        t.uz ? `<b>O'zbek</b>: ${cleanAnkiHtml(t.uz)}` : '',
        t.def_ko ? `<br><b>정의</b>: ${cleanAnkiHtml(t.def_ko)}` : '',
        t.usmle ? `<br><b>USMLE</b>: ${cleanAnkiHtml(t.usmle)}` : '',
      ].filter(Boolean).join('<br>');
      return [front, back, ankiTags(t)].join('\t');
    });
    downloadBlobFile('\uFEFF' + [header, ...rows].join('\n'), `${prefix}_Anki.tsv`, 'text/tab-separated-values;charset=utf-8');
  }
  showToast(`✅ ${label} ${terms.length}개 내보내기 완료`);
}

async function readDataImportFile(file, kind) {
  if (kind === 'json') {
    const parsed = JSON.parse(await file.text());
    if (!parsed || !Array.isArray(parsed.terms)) throw new Error('지원되는 전체 백업 JSON이 아닙니다.');
    return {
      kind,
      fileName: file.name,
      terms: dedupeTermsById(parsed.terms),
      learningStates: parsed.learningStates || {},
      tombstones: Array.isArray(parsed.tombstones) ? parsed.tombstones : [],
      syncMeta: parsed.syncMeta || {},
    };
  }

  let rows;
  if (/\.xlsx?$/i.test(file.name)) {
    const workbook = XLSX.read(new Uint8Array(await file.arrayBuffer()), { type: 'array' });
    rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: '' });
  } else {
    const text = await file.text();
    const workbook = XLSX.read(text, { type: 'string' });
    rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: '' });
  }
  return { kind, fileName: file.name, terms: normalizeImportedTableRows(rows), learningStates: {}, tombstones: [] };
}

function calculateImportPreview(importData) {
  const existingById = new Map(TERMS.map(t => [String(t.id), t]));
  const existingByName = new Map(TERMS.map(t => [termIdentityKey(t), t]));
  let added = 0;
  let updated = 0;
  importData.terms.forEach(term => {
    const existing = importData.kind === 'json' ? existingById.get(String(term.id)) : existingByName.get(termIdentityKey(term));
    if (existing) updated++;
    else added++;
  });
  const incomingIds = new Set(importData.terms.map(t => String(t.id)));
  const replaced = importData.kind === 'json' ? TERMS.filter(t => !incomingIds.has(String(t.id))).length : Math.max(0, TERMS.length - updated);
  return { added, updated, replaced };
}

async function previewDataImport(event, kind) {
  const file = event.target.files?.[0];
  if (!file) return;
  try {
    pendingDataImport = await readDataImportFile(file, kind);
    const preview = calculateImportPreview(pendingDataImport);
    const target = document.getElementById('dataImportPreview');
    target.innerHTML = `
      <div class="import-preview">
        <div style="font-size:11px;font-weight:700;color:var(--text);overflow-wrap:anywhere">${escapeHtml(file.name)}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin:9px 0">
          <span style="font-size:10px;color:#4ade80">추가 ${preview.added}</span>
          <span style="font-size:10px;color:#74b0ff">갱신 ${preview.updated}</span>
          <span style="font-size:10px;color:#f87171">교체 시 제거 ${preview.replaced}</span>
        </div>
        <select id="dataImportMode" class="data-select">
          <option value="merge">최신 항목 병합</option>
          <option value="append">신규만 추가</option>
          <option value="replace">현재 데이터 교체</option>
        </select>
        <button class="data-action-btn green" onclick="applyPendingDataImport()">미리보기대로 적용</button>
      </div>`;
  } catch (e) {
    console.error(e);
    pendingDataImport = null;
    showToast(`⚠️ 파일 분석 실패: ${e.message}`);
  }
}

async function applyPendingDataImport() {
  if (!pendingDataImport) return;
  const mode = document.getElementById('dataImportMode')?.value || 'merge';
  const incoming = dedupeTermsById(pendingDataImport.terms);

  if (mode === 'replace') {
    exportCompleteJsonBackup();
    const incomingIds = new Set(incoming.map(t => String(t.id)));
    const removed = TERMS.filter(t => !incomingIds.has(String(t.id))).map(recordLocalTombstone);
    TERMS.length = 0;
    TERMS.push(...incoming.filter(t => !t.deletedAt));
    if (pendingDataImport.kind === 'json') {
      saveLearningStateMap(pendingDataImport.learningStates);
      saveLocalTombstones(pendingDataImport.tombstones);
      if (pendingDataImport.syncMeta?.canonicalVersion) saveLocalSyncMeta(pendingDataImport.syncMeta);
    } else {
      saveLocalTombstones([...loadLocalTombstones(), ...removed]);
    }
  } else {
    const byId = new Map(TERMS.map(t => [String(t.id), t]));
    const byName = new Map(TERMS.map(t => [termIdentityKey(t), t]));
    incoming.forEach(term => {
      const existing = pendingDataImport.kind === 'json' ? byId.get(String(term.id)) : byName.get(termIdentityKey(term));
      if (!existing) {
        TERMS.push(term);
      } else if (mode === 'merge' && (Date.parse(term.updatedAt) || Date.now()) >= (Date.parse(existing.updatedAt) || 0)) {
        const index = TERMS.findIndex(t => String(t.id) === String(existing.id));
        TERMS[index] = normalizeTermForStorage({ ...term, id: existing.id });
      }
    });
    if (pendingDataImport.kind === 'json' && mode === 'merge') {
      applyLearningStates(Object.values(pendingDataImport.learningStates || {}), false);
      saveLocalTombstones([...loadLocalTombstones(), ...(pendingDataImport.tombstones || [])]);
    }
  }

  saveTermsToLocalStorage();
  updateBookmarkCount();
  pendingDataImport = null;
  showToast(`✅ 가져오기 완료 · 현재 ${TERMS.length}개`);
  showExportMenu();
}
