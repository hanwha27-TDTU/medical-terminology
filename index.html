    filterButtonHtml({ value: '즐겨찾기', label: '⭐ 즐겨찾기', active: currentFilter === '즐겨찾기', onclick: 'setFilter', id: 'filterBookmarkBtn' })
  ].join('');
}

function renderDrugFilterControls() {
  const conceptTitle = document.getElementById('primaryFilterTitle');
  const systemTitle = document.getElementById('secondaryFilterTitle');
  const conceptRow = document.getElementById('conceptFilterRow');
  const systemRow = document.getElementById('filterRow');
  if (!conceptRow || !systemRow) return;
  const classOptions = countOptionsFromDrugs(drugClassValue);
  const systemOptions = countOptionsFromDrugs(drugSystemValues);
  if (currentDrugClassFilter !== 'all' && !classOptions.some(o => o.value === currentDrugClassFilter)) currentDrugClassFilter = 'all';
  if (currentDrugSystemFilter !== 'all' && !systemOptions.some(o => o.value === currentDrugSystemFilter)) currentDrugSystemFilter = 'all';
  if (conceptTitle) conceptTitle.innerHTML = '📚 USMLE 계열 <span>시험에서 어떤 계열인가?</span>';
  if (systemTitle) systemTitle.innerHTML = '🎯 관련 장기계 <span>어디에 쓰이는가?</span>';

  conceptRow.innerHTML = [
    filterButtonHtml({ value: 'all', label: '전체', active: currentDrugClassFilter === 'all', onclick: 'setDrugClassFilter', extraClass: 'concept drug-mode' }),
    ...classOptions.map(option => filterButtonHtml({
      value: option.value,
      label: drugClassDisplay(option.value),
      active: currentDrugClassFilter === option.value,
      onclick: 'setDrugClassFilter',
      extraClass: 'concept drug-mode',
      count: option.count
    }))
  ].join('');

  systemRow.innerHTML = [
    filterButtonHtml({ value: 'all', label: '전체', active: currentDrugSystemFilter === 'all', onclick: 'setDrugSystemFilter', extraClass: 'drug-mode' }),
    ...systemOptions.map(option => filterButtonHtml({
      value: option.value,
      label: drugSystemDisplay(option.value),
      active: currentDrugSystemFilter === option.value,
      onclick: 'setDrugSystemFilter',
      extraClass: 'drug-mode',
      count: option.count
    }))
  ].join('');
}

function getActiveFormulas() {
  return dedupeFormulasById(FORMULAS).filter(f => !f.deletedAt);
}

function formulaSystemValues(f) {
  const values = [
    normalizeSystemCategory(f?.system || 'General'),
    ...(Array.isArray(f?.tags) ? f.tags : [])
  ].map(v => normalizeDrugFilterValue(v, '')).filter(Boolean);
  return [...new Set(values.length ? values : ['General'])];
}

function renderFormulaFilterControls() {
  const conceptTitle = document.getElementById('primaryFilterTitle');
  const systemTitle = document.getElementById('secondaryFilterTitle');
  const conceptRow = document.getElementById('conceptFilterRow');
  const systemRow = document.getElementById('filterRow');
  if (!conceptRow || !systemRow) return;
  const categoryOptions = countOptionsFromFormulas(f => f.category || 'General');
  const systemOptions = countOptionsFromFormulas(formulaSystemValues);
  if (currentDrugClassFilter !== 'all' && !categoryOptions.some(o => o.value === currentDrugClassFilter)) currentDrugClassFilter = 'all';
  if (currentDrugSystemFilter !== 'all' && !systemOptions.some(o => o.value === currentDrugSystemFilter)) currentDrugSystemFilter = 'all';
  if (conceptTitle) conceptTitle.innerHTML = '∑ 공식 분야 <span>어떤 계산인가?</span>';
  if (systemTitle) systemTitle.innerHTML = '🎯 관련 장기계 <span>어디에 쓰이는가?</span>';
  conceptRow.innerHTML = [
    filterButtonHtml({ value: 'all', label: '전체', active: currentDrugClassFilter === 'all', onclick: 'setDrugClassFilter', extraClass: 'concept formula-mode' }),
    ...categoryOptions.map(option => filterButtonHtml({
      value: option.value,
      label: `∑ ${option.value}`,
      active: currentDrugClassFilter === option.value,
      onclick: 'setDrugClassFilter',
      extraClass: 'concept formula-mode',
      count: option.count
    }))
  ].join('');
  systemRow.innerHTML = [
    filterButtonHtml({ value: 'all', label: '전체', active: currentDrugSystemFilter === 'all', onclick: 'setDrugSystemFilter', extraClass: 'formula-mode' }),
    ...systemOptions.map(option => filterButtonHtml({
      value: option.value,
      label: drugSystemDisplay(option.value),
      active: currentDrugSystemFilter === option.value,
      onclick: 'setDrugSystemFilter',
      extraClass: 'formula-mode',
      count: option.count
    }))
  ].join('');
}

function countOptionsFromFormulas(valueGetter) {
  const map = new Map();
  getActiveFormulas().forEach(formula => {
    const values = valueGetter(formula);
    (Array.isArray(values) ? values : [values]).forEach(value => {
      const clean = normalizeDrugFilterValue(value);
      map.set(clean, (map.get(clean) || 0) + 1);
    });
  });
  return [...map.entries()]
    .map(([value, count]) => ({ value, count }))
    .sort((a, b) => b.count - a.count || a.value.localeCompare(b.value, 'ko', { sensitivity: 'base', numeric: true }));
}

function renderFilterControls() {
  if (currentLibraryMode === 'drugs') renderDrugFilterControls();
  else if (currentLibraryMode === 'formulas') renderFormulaFilterControls();
  else renderTermFilterControls();
}

function updateLibraryModeControls() {
  const isDrugs = currentLibraryMode === 'drugs';
  const isFormulas = currentLibraryMode === 'formulas';
  const termsBtn = document.getElementById('libraryModeTermsBtn');
  const drugsBtn = document.getElementById('libraryModeDrugsBtn');
  const formulasBtn = document.getElementById('libraryModeFormulasBtn');
  const hint = document.getElementById('libraryModeHint');
  const search = document.getElementById('searchInput');
  termsBtn?.classList.toggle('active', !isDrugs && !isFormulas);
  drugsBtn?.classList.toggle('active', isDrugs);
  formulasBtn?.classList.toggle('active', isFormulas);
  termsBtn?.setAttribute('aria-selected', String(!isDrugs && !isFormulas));
  drugsBtn?.setAttribute('aria-selected', String(isDrugs));
  formulasBtn?.setAttribute('aria-selected', String(isFormulas));
  if (hint) hint.textContent = isFormulas
    ? '주요 의학계산공식을 공식 분야와 관련 장기계 기준으로 봅니다.'
    : (isDrugs
      ? '약물명 및 정보를 USMLE 계열과 관련 장기계 기준으로 봅니다.'
      : '일반 의학용어를 개념분류와 대표 장기계로 봅니다.');
  if (search) search.placeholder = isFormulas
    ? '공식명, 계산식, 암기 포인트, USMLE 함정으로 검색...'
    : (isDrugs
      ? '약물명(영어/한국어), USMLE 계열, Target, MOA로 검색...'
      : '한국어, 영어, 우즈베크어로 검색...');
  const stat = document.getElementById('bookmarkCount');
  if (stat) {
    const validCount = TERMS.filter(t => bookmarks.has(t.id)).length;
    stat.textContent = isFormulas ? `공식 ${getActiveFormulas().length}개` : (isDrugs ? `약물 ${getActiveDrugs().length}개` : `즐겨찾기 ${validCount}`);
  }
}

function setLibraryMode(mode, silent = false) {
  const nextMode = mode === 'drugs' ? 'drugs' : (mode === 'formulas' ? 'formulas' : 'terms');
  if (nextMode !== currentLibraryMode) {
    selectedTermIds.clear();
    visibleTermLimit = LIST_PAGE_SIZE;
    _lastListSignature = '';
  }
  currentLibraryMode = nextMode;
  updateLibraryModeControls();
  renderFilterControls();
  if (!silent) applyFilters();
}

function setDrugClassFilter(filter, btn) {
  currentDrugClassFilter = filter || 'all';
  document.querySelectorAll('#conceptFilterRow .filter-btn').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  applyFilters();
}

function setDrugSystemFilter(filter, btn) {
  currentDrugSystemFilter = filter || 'all';
  document.querySelectorAll('#filterRow .filter-btn').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  applyFilters();
}

function drugSearchText(d) {
  return [
    d.generic_name, d.ko_name, d.brand_name, d.drug_class, d.same_class_drugs, d.drug_form, d.atc_class, d.target, d.route,
    d.category, d.usmle_yield, d.definition_ko, d.definition_en, d.definition_uz,
    d.causal_chain, d.why, d.moa, d.clinical_uses, d.adverse_effects,
    d.precautions, d.usmle_strategy, d.memory_line,
    ...(Array.isArray(d.system_tags) ? d.system_tags : []),
    ...(Array.isArray(d.refs) ? d.refs.flatMap(ref => [ref?.source, ref?.title, ref?.name, ref?.rxcui]) : [])
  ].join(' ').toLowerCase();
}

function filterDrugsForQuery(query = '') {
  const q = String(query || '').toLowerCase().trim();
  const active = dedupeDrugsById(DRUGS).filter(d => !d.deletedAt);
  let filtered = active;
  if (currentDrugClassFilter !== 'all') {
    filtered = filtered.filter(d => drugClassValue(d) === currentDrugClassFilter);
  }
  if (currentDrugSystemFilter !== 'all') {
    filtered = filtered.filter(d => drugSystemValues(d).includes(currentDrugSystemFilter));
  }
  if (q) filtered = filtered.filter(d => drugSearchText(d).includes(q));
  return filtered.sort((a, b) =>
    String(a.generic_name || a.ko_name || '').localeCompare(String(b.generic_name || b.ko_name || ''), 'en', { sensitivity: 'base', numeric: true })
  );
}

function drugRefsHtml(d) {
  const refs = Array.isArray(d?.refs) ? d.refs : [];
  if (!refs.length) return '';
  return `
    <div class="drug-section-box" style="margin-top:10px">
      <div class="drug-section-label">공식 API 출처</div>
      <div class="drug-section-text">
        ${refs.map(ref => {
          const label = ref.title || [ref.source, ref.name, ref.rxcui].filter(Boolean).join(' · ') || '출처';
          const url = ref.url || '';
          return url
            ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()" style="color:#9cc7ff;text-decoration:none">${escapeHtml(label)}</a>`
            : `<span>${escapeHtml(label)}</span>`;
        }).join('<br>')}
      </div>
    </div>`;
}

function filterFormulasForQuery(query = '') {
  const q = String(query || '').trim().toLowerCase();
  let filtered = getActiveFormulas();
  if (currentDrugClassFilter !== 'all') filtered = filtered.filter(f => (f.category || 'General') === currentDrugClassFilter);
  if (currentDrugSystemFilter !== 'all') filtered = filtered.filter(f => formulaSystemValues(f).includes(currentDrugSystemFilter));
  if (q) filtered = filtered.filter(f => formulaSearchText(f).includes(q));
  return filtered.sort((a, b) =>
    String(a.name || a.short_name || '').localeCompare(String(b.name || b.short_name || ''), 'ko', { sensitivity: 'base', numeric: true })
  );
}

function saveDrugEdit(id) {
  const idx = DRUGS.findIndex(x => Number(x.id) === Number(id));
  if (idx === -1) return;
  const next = normalizeDrugForStorage({
    ...DRUGS[idx],
    generic_name: document.getElementById('drug_edit_generic')?.value.trim() || '',
    ko_name: document.getElementById('drug_edit_ko')?.value.trim() || '',
    brand_name: document.getElementById('drug_edit_brand')?.value.trim() ?? DRUGS[idx].brand_name ?? '',
    drug_class: document.getElementById('drug_edit_class')?.value.trim() || '',
    same_class_drugs: document.getElementById('drug_edit_same_class')?.value.trim() || '',
    drug_form: document.getElementById('drug_edit_form')?.value.trim() || '',
    atc_class: document.getElementById('drug_edit_atc')?.value.trim() || '',
    target: document.getElementById('drug_edit_target')?.value.trim() || '',
    route: document.getElementById('drug_edit_route')?.value.trim() || '',
    category: document.getElementById('drug_edit_category')?.value || 'General',
    system_tags: document.getElementById('drug_edit_tags')?.value || '',
    usmle_yield: document.getElementById('drug_edit_yield')?.value.trim() || '',
    ipa: document.getElementById('drug_edit_ipa')?.value.trim() || '',
    ...Object.fromEntries(drugDetailFields().map(([, key]) => [key, document.getElementById(`drug_edit_${key}`)?.value.trim() || ''])),
    refs: mergeDrugRefs(DRUGS[idx].refs || [], collectDrugApiRefs('edit')),
    updatedAt: new Date().toISOString(),
  });
  if (!next.generic_name && !next.ko_name && !next.brand_name) {
    showToast('⚠️ 약물명(영어) 또는 약물명(한국어) 중 하나 이상 필요합니다');
    return;
  }
  const duplicateIdx = DRUGS.findIndex((drug, i) => i !== idx && drugIdentityKey(drug) === drugIdentityKey(next));
  if (duplicateIdx >= 0) {
    showToast('⚠️ 중복된 약물입니다.');
    return;
  }
  DRUGS[idx] = next;
  saveDrugsToLocalStorage();
  saveDrugToCloud(next);
  document.getElementById('drugEditModal')?.remove();
  showToast('✅ 약물 항목 수정 완료');
  applyFilters();
  setTimeout(() => openDrugDetailModal(next.id), 80);
}

function insertTextIntoTextarea(id, rawText) {
  const textarea = document.getElementById(id);
  if (!textarea) return;
  const cursorMarker = '▮';
  let text = String(rawText || '');
  const markerIndex = text.indexOf(cursorMarker);
  text = text.replace(cursorMarker, '');
  const start = textarea.selectionStart ?? textarea.value.length;
  const end = textarea.selectionEnd ?? textarea.value.length;
  const before = textarea.value.slice(0, start);
  const after = textarea.value.slice(end);
  const needsLeadingBreak = before && !before.endsWith('\n') && !text.startsWith('\n');
  textarea.value = `${before}${needsLeadingBreak ? '\n' : ''}${text}${after}`;
  const cursor = (needsLeadingBreak ? start + 1 : start) + (markerIndex >= 0 ? markerIndex : text.length);
  textarea.focus();
  textarea.setSelectionRange(cursor, cursor);
}

function parseMarkdownTableLine(line) {
  return String(line || '')
    .trim()
    .replace(/^\|/, '')
    .replace(/\|$/, '')
    .split('|')
    .map(cell => cell.replace(/\\\|/g, '|').trim());
}

function isMarkdownTableSeparator(line) {
  const cells = parseMarkdownTableLine(line);
  return cells.length > 1 && cells.every(cell => /^:?-{3,}:?$/.test(cell.trim()));
}

function markdownTableToHtml(headerLine, separatorLine, bodyLines) {
  const headers = parseMarkdownTableLine(headerLine);
  const rows = bodyLines.map(parseMarkdownTableLine).filter(row => row.some(Boolean));
  const colCount = Math.max(headers.length, ...rows.map(row => row.length), 1);
  const pad = row => Array.from({ length: colCount }, (_, i) => row[i] || '');
  return `<table><thead><tr>${pad(headers).map(cell => `<th>${escapeHtml(cell)}</th>`).join('')}</tr></thead><tbody>${
    rows.length
      ? rows.map(row => `<tr>${pad(row).map(cell => `<td>${escapeHtml(cell)}</td>`).join('')}</tr>`).join('')
      : `<tr>${Array.from({ length: colCount }, () => '<td></td>').join('')}</tr>`
  }</tbody></table>`;
}

function renderRichTextWithTables(text) {
  const lines = String(text || '').split(/\r?\n/);
  const chunks = [];
  let plain = [];
  const flushPlain = () => {
    if (plain.length) {
      chunks.push(`<div>${escapeHtml(plain.join('\n'))}</div>`);
      plain = [];
    }
  };

  for (let i = 0; i < lines.length; i++) {
    if (lines[i].includes('|') && i + 1 < lines.length && isMarkdownTableSeparator(lines[i + 1])) {
      flushPlain();
      const header = lines[i];
      const separator = lines[i + 1];
      const body = [];
      i += 2;
      while (i < lines.length && lines[i].includes('|') && lines[i].trim()) {
        body.push(lines[i]);
        i++;
      }
      i--;
      chunks.push(markdownTableToHtml(header, separator, body));
    } else {
      plain.push(lines[i]);
    }
  }
  flushPlain();
  return `<div class="rendered-rich-text">${chunks.join('')}</div>`;
}

function usmleTablePreset(type = 'compare') {
  if (type === 'core') return [
    ['항목', '핵심 포인트', '시험 함정'],
    ['', '', ''],
    ['', '', ''],
    ['', '', ''],
  ];
  if (type === 'dxTx') return [
    ['상황', '진단 단서', '다음 조치'],
    ['', '', ''],
    ['', '', ''],
    ['', '', ''],
  ];
  return [
    ['구분', 'A', 'B', '구별포인트'],
    ['', '', '', ''],
    ['', '', '', ''],
    ['', '', '', ''],
  ];
}

function renderUsmleVisualTable(data) {
  const rows = Array.isArray(data) && data.length ? data : usmleTablePreset('compare');
  const colCount = Math.max(...rows.map(row => row.length), 1);
  const normalized = rows.map(row => Array.from({ length: colCount }, (_, i) => row[i] || ''));
  return `
    <table class="usmle-visual-table" id="usmleVisualTable">
      <thead>
        <tr>${normalized[0].map(cell => `<th><input value="${escapeHtml(cell)}" aria-label="표 머리글"></th>`).join('')}</tr>
      </thead>
      <tbody>
        ${normalized.slice(1).map(row => `<tr>${row.map(cell => `<td><input value="${escapeHtml(cell)}" aria-label="표 셀"></td>`).join('')}</tr>`).join('')}
      </tbody>
    </table>`;
}

function readUsmleVisualTable() {
  const table = document.getElementById('usmleVisualTable');
  if (!table) return usmleTablePreset('compare');
  return [...table.querySelectorAll('tr')].map(tr => [...tr.querySelectorAll('input')].map(input => input.value.trim()));
}

function setUsmleVisualTable(data) {
  const wrap = document.getElementById('usmleVisualTableWrap');
  if (wrap) wrap.innerHTML = renderUsmleVisualTable(data);
}

function addUsmleVisualTableRow() {
  const data = readUsmleVisualTable();
  const colCount = Math.max(data[0]?.length || 0, 1);
  data.push(Array.from({ length: colCount }, () => ''));
  setUsmleVisualTable(data);
}

function removeUsmleVisualTableRow() {
  const data = readUsmleVisualTable();
  if (data.length > 2) data.pop();
  setUsmleVisualTable(data);
}

function addUsmleVisualTableColumn() {
  const data = readUsmleVisualTable().map(row => [...row, '']);
  setUsmleVisualTable(data);
}

function removeUsmleVisualTableColumn() {
  const data = readUsmleVisualTable();
  if ((data[0]?.length || 0) > 2) {
    data.forEach(row => row.pop());
  }
  setUsmleVisualTable(data);
}

function tableDataToMarkdown(data) {
  const rows = (Array.isArray(data) ? data : []).map(row => row.map(cell => String(cell || '').replace(/\|/g, '\\|').trim()));
  const usable = rows.filter((row, idx) => idx === 0 || row.some(Boolean));
  const header = usable[0] || ['구분', 'A', 'B', '구별포인트'];
  const body = usable.slice(1);
  const separator = header.map(() => '---');
  return [
    `| ${header.join(' | ')} |`,
    `| ${separator.join(' | ')} |`,
    ...(body.length ? body : [header.map(() => '')]).map(row => `| ${row.join(' | ')} |`)
  ].join('\n');
}

function insertUsmleVisualTable(targetId) {
  const markdown = `\n${tableDataToMarkdown(readUsmleVisualTable())}\n`;
  insertTextIntoTextarea(targetId, markdown);
  document.getElementById('usmleTableEditorModal')?.remove();
}

function updateFormulaPreview(prefix) {
  const textarea = document.getElementById(`${prefix}_formula`);
  const preview = document.getElementById(`${prefix}_formula_preview`);
  if (!textarea || !preview) return;
  preview.textContent = textarea.value.trim() || '계산식을 입력하거나 칩을 누르면 미리보기가 표시됩니다.';
}

function insertFormulaText(prefix, rawText) {
  const textarea = document.getElementById(`${prefix}_formula`);
  if (!textarea) return;
  const selected = textarea.value.slice(textarea.selectionStart || 0, textarea.selectionEnd || 0);
  let text = String(rawText || '').replaceAll('{selection}', selected);
  const cursorMarker = '▮';
  const markerIndex = text.indexOf(cursorMarker);
  text = text.replace(cursorMarker, '');
  const start = textarea.selectionStart ?? textarea.value.length;
  const end = textarea.selectionEnd ?? textarea.value.length;
  textarea.value = `${textarea.value.slice(0, start)}${text}${textarea.value.slice(end)}`;
  const cursor = markerIndex >= 0 ? start + markerIndex : start + text.length;
  textarea.focus();
  textarea.setSelectionRange(cursor, cursor);
  updateFormulaPreview(prefix);
}

function upsertFormulaFromForm(id = null) {
  const isEdit = id !== null && id !== undefined;
  const prefix = isEdit ? 'formula_edit' : 'add_formula';
  const existing = isEdit ? FORMULAS.find(f => Number(f.id) === Number(id)) : null;
  const next = normalizeFormulaForStorage({
    ...(existing || {}),
    id: existing?.id || nextFormulaId(),
    name: formulaFieldValue(`${prefix}_name`),
    short_name: formulaFieldValue(`${prefix}_short`),
    formula: formulaFieldValue(`${prefix}_formula`),
    category: formulaFieldValue(`${prefix}_category`) || 'General',
    system: formulaFieldValue(`${prefix}_system`) || 'General',
    use_case: formulaFieldValue(`${prefix}_use`),
    normal_range: formulaFieldValue(`${prefix}_normal`),
    interpretation: formulaFieldValue(`${prefix}_interpretation`),
    example: formulaFieldValue(`${prefix}_example`),
    memory_tip: formulaFieldValue(`${prefix}_memory`),
    usmle_trap: formulaFieldValue(`${prefix}_trap`),
    variables: formulaFieldValue(`${prefix}_variables`),
    tags: formulaFieldValue(`${prefix}_tags`),
    updatedAt: new Date().toISOString(),
  });
  if (!next.name && !next.short_name) { showToast('⚠️ 공식명 또는 약어를 입력해주세요'); return null; }
  if (!next.formula) { showToast('⚠️ 계산식을 입력해주세요'); return null; }
  const duplicateIdx = FORMULAS.findIndex((f, idx) => {
    if (isEdit && Number(f.id) === Number(id)) return false;
    return normalizeSyncText(f.name || f.short_name) === normalizeSyncText(next.name || next.short_name);
  });
  if (duplicateIdx >= 0) { showToast('⚠️ 중복된 공식입니다.'); return null; }
  const idx = FORMULAS.findIndex(f => Number(f.id) === Number(next.id));
  if (idx >= 0) FORMULAS[idx] = next;
  else FORMULAS.push(next);
  saveFormulasToLocalStorage();
  saveFormulaToCloud(next);
  applyFilters();
  return next;
}

  const ids = drugApiFieldIds(mode);

function drugApiClassText(classes) {
  return (Array.isArray(classes) ? classes : [])
    .map(c => [c.name, c.id].filter(Boolean).join(' '))
    .filter(Boolean)
    .slice(0, 4)
    .join(' · ');
}

function combineUniqueText(existing, incoming) {
  const parts = [
    ...String(existing || '').split(/[;,·]/),
    ...String(incoming || '').split(/[;,·]/)
  ].map(v => v.trim()).filter(Boolean);
  return [...new Set(parts)].join(' · ');
}

function drugApiSetInput(id, value, mode = 'blank') {
  const el = document.getElementById(id);
  if (!el || !value) return false;
  const current = el.value.trim();
  if (mode === 'append') {
    const next = combineUniqueText(current, value);
    if (next !== current) {
      el.value = next;
      return true;
    }
    return false;
  }
  if (!current) {
    el.value = value;
    return true;
  }
  return false;
}

function rxNormLooksBrand(rx) {
  return ['BN', 'SBD', 'BPCK'].includes(String(rx?.tty || '').toUpperCase());
}

function rxNormLooksGeneric(rx) {
  return ['IN', 'PIN', 'MIN', 'SCD', 'GPCK'].includes(String(rx?.tty || '').toUpperCase());
}

function drugApiRefKey(ref) {
  return [
    ref?.source || '',
    ref?.rxcui || '',
    ref?.url || '',
    ref?.title || ''
  ].join('|');
}

function mergeDrugRefs(existing, incoming) {
  const out = [];
  const seen = new Set();
  [...(Array.isArray(existing) ? existing : []), ...(Array.isArray(incoming) ? incoming : [])].forEach(ref => {
    if (!ref) return;
    const key = drugApiRefKey(ref);
    if (seen.has(key)) return;
    seen.add(key);
    out.push(ref);
  });
  return out;
}

function buildDrugApiRefs(bundle) {
  const refs = [];
  const rx = bundle?.rxnorm;
  const classes = Array.isArray(bundle?.rxclass) ? bundle.rxclass : [];
  const retrievedAt = new Date().toISOString();
  if (rx?.rxcui) {
    refs.push({
      source: 'RxNorm',
      title: `RxNorm ${rx.name || bundle.query || ''} (${rx.rxcui})`.trim(),
      name: rx.name || '',
      synonym: rx.synonym || '',
      tty: rx.tty || '',
      rxcui: rx.rxcui,
      url: rx.url || `https://mor.nlm.nih.gov/RxNav/search?searchBy=RXCUI&searchTerm=${encodeURIComponent(rx.rxcui)}`,
      retrievedAt,
    });
  }
  if (classes.length) {
    refs.push({
      source: 'RxClass',
      title: `RxClass ATC · ${drugApiClassText(classes)}`,
      rxcui: rx?.rxcui || '',
      classes,
      url: rx?.rxcui ? `https://mor.nlm.nih.gov/RxNav/search?searchBy=RXCUI&searchTerm=${encodeURIComponent(rx.rxcui)}` : 'https://mor.nlm.nih.gov/RxNav/',
      retrievedAt,
    });
  }
  return refs;
}

function parseDrugApiRefs(mode) {
  const el = document.getElementById(drugApiFieldIds(mode).refs);
  if (!el) return [];
  return safeJsonParse(el.value || '[]', []);
}

function storeDrugApiRefs(mode, refs) {
  const el = document.getElementById(drugApiFieldIds(mode).refs);
  if (!el) return;
  el.value = JSON.stringify(mergeDrugRefs(parseDrugApiRefs(mode), refs));
}

function collectDrugApiRefs(mode) {

}

      </label>` : '',

        <span class="drug-api-source">나중에 라벨 API를 붙일 때도 같은 출처 구조를 재사용합니다.</span></span>

async function fetchDrugApiForForm(mode) {
  const ids = drugApiFieldIds(mode);
  const btn = document.getElementById(ids.button);
  const preview = document.getElementById(ids.preview);
  const query = drugApiQuery(mode);
  if (!query) {
    showToast('⚠️ 약물명(영어)을 먼저 입력해주세요');
    return;
  }
  if (btn) {
    btn.disabled = true;
    btn.textContent = '🔎 API 조회 중...';
  }
  if (preview) preview.innerHTML = `<div class="drug-api-source">RxNorm/RxClass 조회 중...</div>`;
  const requestId = ++drugApiRequestSeq[mode];
  try {
    const rxnorm = await fetchRxNorm(query);
    const rxclass = rxnorm?.rxcui ? await fetchRxClass(rxnorm.rxcui) : null;
    if (requestId !== drugApiRequestSeq[mode] || !document.body.contains(preview) || drugApiQuery(mode) !== query) {
      return;
    }
    const bundle = { query, rxnorm, rxclass: Array.isArray(rxclass) ? rxclass : [] };
    renderDrugApiPreview(mode, bundle);
  } catch (err) {
    console.warn('Drug API enrichment failed:', err);
    if (requestId === drugApiRequestSeq[mode] && document.body.contains(preview)) {
      preview.innerHTML = `<div class="drug-empty-note">API 조회에 실패했습니다. 네트워크 연결 또는 API 응답을 확인해주세요.</div>`;
    }
  } finally {
    if (requestId === drugApiRequestSeq[mode] && document.body.contains(btn)) {
      btn.disabled = false;
      btn.textContent = '🔎 무료 API로 보강';
    }
  }
}

function applyDrugApiEnrichment(mode) {
  const bundle = pendingDrugApiEnrichment[mode];
  const ids = drugApiFieldIds(mode);
  const preview = document.getElementById(ids.preview);
  if (!bundle || !preview) {
    showToast('⚠️ 먼저 API 조회를 실행해주세요');
    return;
  }
  const selected = new Set([...preview.querySelectorAll('input[type="checkbox"]:checked')].map(input => input.value));
  let applied = 0;
  const rx = bundle.rxnorm;
  if (selected.has('standard') && rx?.name) {
    if (rxNormLooksBrand(rx)) {
      if (drugApiSetInput(ids.brand, rx.name) || drugApiSetInput(ids.generic, rx.name)) applied++;
    } else if (rxNormLooksGeneric(rx)) {
      if (drugApiSetInput(ids.generic, rx.name)) applied++;
    } else {
      if (drugApiSetInput(ids.generic, rx.name) || drugApiSetInput(ids.brand, rx.name)) applied++;
    }
  }
  const classText = drugApiClassText(bundle.rxclass);
  if (selected.has('class') && classText) {
    if (drugApiSetInput(ids.atcClass, classText, 'append')) applied++;
  }
  if (selected.has('refs')) {
    storeDrugApiRefs(mode, buildDrugApiRefs(bundle));
    applied++;
  }
  showToast(applied ? '✅ 무료 API 보강값을 적용했습니다' : 'ℹ️ 적용할 새 값이 없습니다');
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escapeJsString(value) {
  return String(value || '')
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\x22')
    .replace(/'/g, "\\'")
    .replace(/\r/g, '\\r')
    .replace(/\n/g, '\\n')
    .replace(/</g, '\\x3c')
    .replace(/>/g, '\\x3e');
}

function escapeRegExp(str) {
  return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function termSearchText(t) {
  return (t?.en || t?.ko || t?.uz || '').trim();
}

function termText(t, field) {

}

function findTermById(id) {

}

const TERM_COMPLETION_FIELDS = ['ko', 'en', 'uz', 'def_ko', 'def_en', 'def_uz', 'usmle', 'ipa'];

function isTermComplete(t) {
  return TERM_COMPLETION_FIELDS.every(key => String(t?.[key] || '').trim().length > 0);
}

function sortByCompletionThenEnglish(a, b) {
  const completeDiff = Number(isTermComplete(b)) - Number(isTermComplete(a));
  if (completeDiff !== 0) return completeDiff;

  const enDiff = String(a?.en || '').localeCompare(String(b?.en || ''), 'en', { sensitivity: 'base', numeric: true });
  if (enDiff !== 0) return enDiff;

  const koDiff = String(a?.ko || '').localeCompare(String(b?.ko || ''), 'ko', { sensitivity: 'base', numeric: true });
  if (koDiff !== 0) return koDiff;

  return (Number(a?.id) || 0) - (Number(b?.id) || 0);
}

function sortTermsForCurrentMode(terms) {
  const rows = [...terms];
  if (currentSort === 'ko_asc') {
    return rows.sort((a, b) => compareTextWithEmptyLast(a?.ko, b?.ko, 'ko'));
  }
  if (currentSort === 'uz_asc') {
    return rows.sort((a, b) => compareTextWithEmptyLast(a?.uz, b?.uz, 'uz'));
  }
  if (currentSort === 'en_asc') {
    return rows.sort((a, b) => compareTextWithEmptyLast(a?.en, b?.en, 'en'));
  }
  return rows.sort(sortByCompletionThenEnglish);
}

function compareTextWithEmptyLast(a, b, locale) {
  const left = String(a || '').trim();
  const right = String(b || '').trim();
  if (!left && right) return 1;
  if (left && !right) return -1;
  return left.localeCompare(right, locale, { sensitivity: 'base', numeric: true });
}

function openKmaTermSearch(event) {
  event?.preventDefault();
  event?.stopPropagation();
  const url = 'https://term.kma.org/search/list.asp';
  const ua = navigator.userAgent || '';
  const isSmallScreen = Math.min(window.innerWidth || 9999, screen.availWidth || 9999) <= 720;
  const isMobile = /Mobi|Android|iPhone|iPad/i.test(ua);

  if (isSmallScreen || isMobile) {
    window.open(url, '_blank', 'noopener,noreferrer');
    return;
  }

  const availLeft = Number(screen.availLeft || 0);
  const availTop = Number(screen.availTop || 0);
  const availW = Number(screen.availWidth || window.innerWidth || 1280);
  const availH = Number(screen.availHeight || window.innerHeight || 820);
  const width = Math.min(Math.max(Math.round(availW * 0.72), 900), Math.max(availW - 40, 640));
  const height = Math.min(Math.max(Math.round(availH * 0.84), 680), Math.max(availH - 40, 520));
  const left = Math.max(availLeft, availLeft + Math.round((availW - width) / 2));
  const top = Math.max(availTop, availTop + Math.round((availH - height) / 2));
  const features = [
    'popup=yes',
    `width=${width}`,
    `height=${height}`,
    `left=${left}`,
    `top=${top}`,
    'resizable=yes',
    'scrollbars=yes'
  ].join(',');

  const win = window.open('', 'kmaTermSearch', features);
  if (!win) {
    window.open(url, '_blank', 'noopener,noreferrer');
    return;
  }
  win.opener = null;
  win.location.href = url;
  win.focus();
}

function highlight(text, query) {
  if (!query || !text) return escapeHtml(text);
  try {
    const safeQuery = escapeRegExp(query);
    const regex = new RegExp(`(${safeQuery})`, 'gi');
    return escapeHtml(text).replace(regex, '<span class="highlight">$1</span>');
  } catch(e) {
    return escapeHtml(text);
  }
}

function deleteSelectedTerms() {
  const ids = [...selectedTermIds].filter(id => TERMS.some(t => Number(t.id) === Number(id)));
  if (!ids.length) { clearTermSelection(); showToast('⚠️ 선택된 용어가 없습니다'); return; }
  showConfirm(
    `선택한 ${ids.length}개 용어를 삭제할까요?<br><span style="font-size:11px;color:var(--text3)">삭제 전 자동 JSON 백업을 저장합니다.</span>`,
    () => {
      exportCompleteJsonBackup();
      const idSet = new Set(ids.map(String));
      const targets = TERMS.filter(t => idSet.has(String(t.id)));
      const tombstones = targets.map(recordLocalTombstone).filter(Boolean);
      for (let i = TERMS.length - 1; i >= 0; i--) {
        if (idSet.has(String(TERMS[i].id))) TERMS.splice(i, 1);
      }
      const learning = getLearningStateMap();
      ids.forEach(id => {
        bookmarks.delete(Number(id));
        delete learning[String(id)];
      });
      saveLearningStateMap(learning);
      safeSetItem('kma_bookmarks', JSON.stringify([...bookmarks]));
      saveTermsToLocalStorage();
      tombstones.forEach(tombstone => deleteTermFromCloud(tombstone.id, tombstone.deletedAt));
      selectedTermIds.clear();
      if (_drawerTermId && idSet.has(String(_drawerTermId))) closeDrawer();
      updateBookmarkCount();
      showToast(`🗑️ ${targets.length}개 선택 삭제 완료`);
      applyFilters();
    }
  );
}

function applyFilters() {
  if (!document.getElementById('termList')) return;  // ← bail when export/quiz/add tab active
  updateLibraryModeControls();
  renderFilterControls();
  const query = document.getElementById('searchInput').value.toLowerCase();
  const signature = `${currentLibraryMode}|${currentFilter}|${currentConceptFilter}|${currentDrugClassFilter}|${currentDrugSystemFilter}|${currentSort}|${query}`;
  if (signature !== _lastListSignature) {
    visibleTermLimit = LIST_PAGE_SIZE;
    selectedTermIds.clear();
    _lastListSignature = signature;
  }
  document.getElementById('searchClear').classList.toggle('visible', query.length > 0);

  // 데이터 없을 때 홈 화면: 즐겨찾기 or 빈 안내
  if (TERMS.length === 0 && DRUGS.length === 0 && FORMULAS.length === 0 && !query) {
    renderHome();
    return;
  }

  if (currentLibraryMode === 'drugs') {
    const list = document.getElementById('termList');
    if (list) list.innerHTML = '';
    const formulaFrame = document.getElementById('formulaFrame');
    if (formulaFrame) formulaFrame.innerHTML = '';
    const results = filterDrugsForQuery(query);
    const labelParts = [];
    if (currentDrugClassFilter !== 'all') labelParts.push(drugClassDisplay(currentDrugClassFilter));
    if (currentDrugSystemFilter !== 'all') labelParts.push(drugSystemDisplay(currentDrugSystemFilter));
    const baseLabel = query ? '약물명 및 정보 검색 결과' : '전체 약물명 및 정보';
    const sectionLabel = labelParts.length ? `${baseLabel} · ${labelParts.join(' · ')}` : baseLabel;
    setSectionLabel(`${sectionLabel} — ${results.length}개`);
    renderDrugFrame(results);
    return;
  }

  if (currentLibraryMode === 'formulas') {
    const list = document.getElementById('termList');
    const drugFrame = document.getElementById('drugFrame');
    if (list) list.innerHTML = '';
    if (drugFrame) drugFrame.innerHTML = '';
    const results = filterFormulasForQuery(query);
    const labelParts = [];
    if (currentDrugClassFilter !== 'all') labelParts.push(`∑ ${currentDrugClassFilter}`);
    if (currentDrugSystemFilter !== 'all') labelParts.push(drugSystemDisplay(currentDrugSystemFilter));
    const baseLabel = query ? '공식 검색 결과' : '전체 주요 의학계산공식';
    const sectionLabel = labelParts.length ? `${baseLabel} · ${labelParts.join(' · ')}` : baseLabel;
    setSectionLabel(`${sectionLabel} — ${results.length}개`);
    renderFormulaFrame(results);
    return;
  }

  const drugFrame = document.getElementById('drugFrame');
  if (drugFrame) drugFrame.innerHTML = '';
  const formulaFrame = document.getElementById('formulaFrame');
  if (formulaFrame) formulaFrame.innerHTML = '';
  let results = TERMS;

  if (currentFilter === '즐겨찾기') {
    results = results.filter(t => bookmarks.has(t.id));
    setSectionLabel(`⭐ 즐겨찾기 — ${results.length}개`);
  } else if (currentFilter !== 'all') {
    results = results.filter(t => t.category === currentFilter);
    setSectionLabel(`${currentFilter} — ${results.length}개`);
  } else {
    setSectionLabel(query ? `검색 결과` : `전체 용어`);
  }

  if (currentConceptFilter !== 'all') {
    results = results.filter(t => (t.concept_category || 'Other / Unclassified') === currentConceptFilter);
    setSectionLabel(`${conceptDisplay(currentConceptFilter)} — ${results.length}개`);
  }

  if (query) {
    results = results.filter(t =>
      termText(t, 'ko').toLowerCase().includes(query) ||
      termText(t, 'en').toLowerCase().includes(query) ||
      termText(t, 'uz').toLowerCase().includes(query) ||
      String(t.concept_category || '').toLowerCase().includes(query) ||
      String(t.category || '').toLowerCase().includes(query) ||
      termText(t, 'def_ko').toLowerCase().includes(query) ||
      termText(t, 'def_en').toLowerCase().includes(query)
    );
  }

  // 기본 정렬: 완성된 용어 먼저, 그 안에서 영어 A-Z
  results = sortTermsForCurrentMode(results);
  _lastFilteredTerms = results;
  renderTerms(results);
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('#filterRow .filter-btn').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  applyFilters();
}

function setConceptFilter(filter, btn) {
  currentConceptFilter = filter || 'all';
  document.querySelectorAll('#conceptFilterRow .filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) {
    btn.classList.add('active');
  } else {
    const targetBtn = [...document.querySelectorAll('#conceptFilterRow .filter-btn')]
      .find(b => (b.getAttribute('onclick') || '').includes(`'${currentConceptFilter}'`));
    (targetBtn || document.querySelector('#conceptFilterRow .filter-btn'))?.classList.add('active');
  }
  applyFilters();
}

function clearSearch() {
  window.clearTimeout(searchInputDebounceTimer);
  document.getElementById('searchInput').value = '';
  applyFilters();
  closeAutocomplete();
}

function setSort(val) {
  currentSort = val;
  const sel = document.getElementById('sortSelect');
  if (sel) sel.value = val;
  applyFilters();
}

function searchUMLSFromInput() {
  const q = document.getElementById('searchInput')?.value.trim();
  if (!q) { showToast('⚠️ 검색어를 입력하세요'); return; }
  searchUMLS(q);
}

function updateCounts(shown, filtered = shown, mode = currentLibraryMode) {
  const el = document.getElementById('totalCount');
  if (!el) return;
  const isDrugs = mode === 'drugs';
  const isFormulas = mode === 'formulas';
  const total = isFormulas ? getActiveFormulas().length : (isDrugs ? getActiveDrugs().length : TERMS.length);
  const label = isFormulas ? '공식' : (isDrugs ? '약물' : '용어');
  el.textContent = filtered === total
    ? `${shown}개 표시 / 전체 ${label} ${total}개`
    : `${shown}개 표시 / 결과 ${filtered}개 / 전체 ${label} ${total}개`;
}

function updateBookmarkCount() {
  const validCount = TERMS.filter(t => bookmarks.has(t.id)).length;
  // Prune stale IDs that no longer exist in TERMS
  [...bookmarks].forEach(id => { if (!TERMS.some(t => t.id === id)) bookmarks.delete(id); });
  safeSetItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  const el = document.getElementById('bookmarkCount');
  if (!el) return;
  el.textContent = currentLibraryMode === 'formulas'
    ? `공식 ${getActiveFormulas().length}개`
    : (currentLibraryMode === 'drugs'
      ? `약물 ${getActiveDrugs().length}개`
      : `즐겨찾기 ${validCount}`);
}

const HOME_HTML = `
  <div class="section-label" id="sectionLabel"></div>
  <div id="termList"></div>
  <div id="drugFrame"></div>
  <div id="formulaFrame"></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="icon">📂</div>
    <h3>용어 데이터가 없습니다</h3>
    <p>데이터 관리에서 TSV·Excel을 가져오거나<br>전체 백업 JSON을 복원하세요</p>
  </div>`;

function restoreHomeTab(skipApply = false) {
  const main = document.getElementById('mainContent');
  main.innerHTML = HOME_HTML;
  updateBookmarkCount();
  if (!skipApply) applyFilters();
}

function getNavButton(tab) {
  return [...document.querySelectorAll('.nav-btn')]
    .find(btn => (btn.getAttribute('onclick') || '').includes(`'${tab}'`)) || null;
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  if (tab === 'export')   showExportMenu();
  else if (tab === 'guide') showGuide();
  else if (tab === 'ai')      showAISettings();
  else if (tab === 'quiz')    showQuizSetup();
  else if (tab === 'add')     { showAddTermModal(); }
  else if (tab === 'bookmark') {
    restoreHomeTab(true);
    setLibraryMode('terms', true);
    setFilter('즐겨찾기', document.getElementById('filterBookmarkBtn'));
  } else {
    restoreHomeTab(true);
    if (currentLibraryMode === 'drugs' || currentLibraryMode === 'formulas') {
      currentDrugClassFilter = 'all';
      currentDrugSystemFilter = 'all';
      renderFilterControls();
      applyFilters();
    } else {
      setFilter('all', document.querySelector('#filterRow .filter-btn') || document.querySelector('.filter-btn'));
    }
  }
}

};

function renderModelPresetOptions(presets, currentValue) {
  const presetValues = presets.map(p => p.value);
  const selectedValue = presetValues.includes(currentValue) ? currentValue : 'custom';
  return presets.map(p => `<option value="${p.value}" ${p.value === selectedValue ? 'selected' : ''}>${p.label}</option>`).join('');
}

function onModelPresetChange(provider) {
  const select = document.getElementById(provider === 'openai' ? 'ai_model_openai_preset' : 'ai_model_anthropic_preset');
  const input = document.getElementById(provider === 'openai' ? 'ai_model_openai' : 'ai_model_anthropic');
  if (!select || !input) return;
  if (select.value !== 'custom') input.value = select.value;
  input.readOnly = select.value !== 'custom';
  input.style.opacity = select.value === 'custom' ? '1' : '0.75';
}

function onAIRouteChange() {
  const route = document.getElementById('ai_route')?.value || 'auto';
  const openaiBox = document.getElementById('openaiConfigBox');
  const anthropicBox = document.getElementById('anthropicConfigBox');
  const routeTip = document.getElementById('aiRouteTip');
  if (openaiBox) openaiBox.style.display = (route === 'openai' || route === 'auto') ? 'block' : 'none';
  if (anthropicBox) anthropicBox.style.display = (route === 'anthropic' || route === 'auto') ? 'block' : 'none';
  // Gemini + UMLS 박스는 항상 표시
  if (routeTip) routeTip.textContent = AI_ROUTE_LABELS[route] || '';
}

function migrateOldAIConfig(cfg) {
  if (!cfg) return {};
  // v2-3/v2-4 compatibility: old config had { provider, apiKey, modelOpenAI, modelAnthropic }
  if (cfg.apiKey && !cfg.openaiKey && !cfg.anthropicKey) {
    if ((cfg.provider || 'openai') === 'anthropic') cfg.anthropicKey = cfg.apiKey;
    else cfg.openaiKey = cfg.apiKey;
  }
  return cfg;
}

function getAIConfig() {
  const cfg = migrateOldAIConfig(safeJsonParse(localStorage.getItem(AI_CONFIG_STORAGE_KEY), null) || {});
  return {
    route:          cfg.route          || cfg.provider || 'auto',
    openaiKey:      cfg.openaiKey      || '',
    anthropicKey:   cfg.anthropicKey   || '',
    geminiKey:      cfg.geminiKey      || '',
    umlsKey:        cfg.umlsKey        || localStorage.getItem('kma_umls_key') || '',
    modelOpenAI:    cfg.modelOpenAI    || 'gpt-4o-mini',
    modelAnthropic: cfg.modelAnthropic || 'claude-sonnet-4-6',
    modelGemini:    cfg.modelGemini    || 'gemini-2.0-flash',
  };
}

function hasConfiguredAIKey(cfg = getAIConfig()) {
  if (cfg.route === 'openai') return !!cfg.openaiKey;
  if (cfg.route === 'anthropic') return !!cfg.anthropicKey;
  if (cfg.route === 'gemini') return !!cfg.geminiKey;
  return !!(cfg.openaiKey || cfg.anthropicKey || cfg.geminiKey);
}

function saveAIConfigFromForm(silent = false) {
  const route = document.getElementById('ai_route')?.value || 'auto';
  const openaiKey = document.getElementById('ai_openai_key')?.value.trim() || '';
  const anthropicKey = document.getElementById('ai_anthropic_key')?.value.trim() || '';
  const geminiKey = document.getElementById('ai_gemini_key')?.value.trim() || '';
  const umlsKey = document.getElementById('ai_umls_key')?.value.trim() || '';
  const modelOpenAI = document.getElementById('ai_model_openai')?.value.trim() || 'gpt-4o-mini';
  const modelAnthropic = document.getElementById('ai_model_anthropic')?.value.trim() || 'claude-sonnet-4-6';
  const modelGemini = document.getElementById('ai_model_gemini')?.value.trim() || 'gemini-2.0-flash';

  if (route === 'openai' && !openaiKey) { showToast('⚠️ OpenAI API 키를 입력해주세요'); return false; }
  if (route === 'anthropic' && !anthropicKey) { showToast('⚠️ Anthropic API 키를 입력해주세요'); return false; }
  if (route === 'gemini' && !geminiKey) { showToast('⚠️ Gemini API 키를 입력해주세요'); return false; }

  const cfg = { route, openaiKey, anthropicKey, geminiKey, umlsKey, modelOpenAI, modelAnthropic, modelGemini, savedAt: new Date().toISOString() };
  safeSetItem(AI_CONFIG_STORAGE_KEY, JSON.stringify(cfg));
  if (umlsKey) safeSetItem('kma_umls_key', umlsKey);
  if (!silent) { showToast('✅ AI API 설정 저장 완료'); showAISettings(); }
  return true;
}

function clearSingleKey(provider) {
  const labels = { openai: 'OpenAI', anthropic: 'Anthropic', gemini: 'Gemini', umls: 'UMLS' };
  showConfirm(`${labels[provider]} API 키를 해제할까요?`, () => {
    const cfg = getAIConfig();
    if (provider === 'openai')    { cfg.openaiKey = ''; cfg.modelOpenAI = 'gpt-4o-mini'; }
    if (provider === 'anthropic') { cfg.anthropicKey = ''; cfg.modelAnthropic = 'claude-sonnet-4-6'; }
    if (provider === 'gemini')    { cfg.geminiKey = ''; cfg.modelGemini = 'gemini-2.0-flash'; }
    if (provider === 'umls')      { cfg.umlsKey = ''; localStorage.removeItem('kma_umls_key'); }
    safeSetItem(AI_CONFIG_STORAGE_KEY, JSON.stringify(cfg));
    showToast(`🔌 ${labels[provider]} API 키 해제 완료`);
    showAISettings();
  });
}

function clearAIConfig() {
  showConfirm('저장된 OpenAI/Anthropic API 키와<br>모델 설정을 모두 삭제할까요?', () => {
    localStorage.removeItem(AI_CONFIG_STORAGE_KEY);
    showToast('🗑️ AI API 설정 삭제 완료');
    showAISettings();
  });
}

function maskApiKey(key) {
  if (!key) return '저장 안 됨';
  if (key.length <= 12) return '••••';
  return key.slice(0, 6) + '••••••••' + key.slice(-4);
}

    modal.innerHTML = `
      <section class="developer-modal" role="dialog" aria-modal="true" aria-labelledby="settingsModalTitle">

function saveSupabaseFromForm() {

  if (el) el.textContent = '✅ 연결됨';

async function testAndSyncSupabase() {
  if (!saveSupabaseFromForm()) return;

async function pullFromCloud() {
  if (!getSupabaseConfig()) { showToast('⚠️ Supabase 설정 먼저 저장하세요'); return; }
  showToast('⬇️ 클라우드에서 불러오는 중...');
  const [cloudTerms, cloudDrugs, cloudFormulas, meta] = await Promise.all([sbLoadAll(), sbLoadAllDrugs(), sbLoadAllFormulas(), sbLoadCanonicalMeta()]);
  if (cloudTerms === null) { showToast('⚠️ 클라우드 데이터를 불러오지 못했습니다'); return; }
  if (meta === null) { showToast('⚠️ 최종본 기준값을 확인하지 못했습니다'); return; }
  if (!hasCanonicalVersion(meta)) {
    showToast('⚠️ canonical_version이 없어 클라우드 기준 교체를 중단했습니다 · 먼저 최종본 덮어쓰기를 실행하세요');
    return;
  }
  const cleanCloudTerms = dedupeTermsById(cloudTerms).filter(t => !t.deletedAt);
  TERMS.length = 0;
  TERMS.push(...cleanCloudTerms);
  saveTermsToLocalStorage();
  let cleanCloudDrugs = null;
  if (cloudDrugs === null) {
    showToast('⚠️ 약물 테이블을 불러오지 못했습니다 · 통합 SQL을 먼저 실행해주세요');
  } else {
    cleanCloudDrugs = dedupeDrugsById(cloudDrugs).filter(d => !d.deletedAt);
    DRUGS.length = 0;
    DRUGS.push(...cleanCloudDrugs);
    saveDrugsToLocalStorage();
    saveLocalDrugTombstones(cloudDrugs.filter(d => d.deletedAt));
  }
  if (cloudFormulas === null) {
    showToast('⚠️ 공식 테이블을 불러오지 못했습니다 · 통합 SQL을 먼저 실행해주세요');
  } else {
    const cleanCloudFormulas = dedupeFormulasById(cloudFormulas).filter(f => !f.deletedAt);
    FORMULAS.length = 0;
    FORMULAS.push(...cleanCloudFormulas);
    saveFormulasToLocalStorage();
    saveLocalFormulaTombstones(cloudFormulas.filter(f => f.deletedAt));
  }
  saveLocalTombstones(cloudTerms.filter(t => t.deletedAt));
  saveLocalSyncMeta({ canonicalVersion: meta.version });
  const learning = await sbLoadLearningStates();
  if (learning) applyLearningStates(learning, true);
  updateBookmarkCount();
  applyFilters();
  showToast(`⬇️ 클라우드 기준본 불러옴 · 용어 ${TERMS.length}개 · 약물 ${DRUGS.length}개 · 공식 ${FORMULAS.length}개`);
}

async function syncWithCloud() {
  if (!getSupabaseConfig()) return false;
  showToast('☁️ 변경사항 동기화 중...');
  const [cloudTerms, cloudDrugs, cloudFormulas, canonicalMeta] = await Promise.all([sbLoadAll(), sbLoadAllDrugs(), sbLoadAllFormulas(), sbLoadCanonicalMeta()]);
  if (cloudTerms === null) {
    showToast('⚠️ 클라우드 데이터를 불러오지 못했습니다');
    return false;
  }
  if (canonicalMeta === null) {
    showToast('⚠️ 최종본 기준값을 확인하지 못해 동기화를 중단했습니다');
    return false;
  }
  if (!hasCanonicalVersion(canonicalMeta)) {
    showToast('⚠️ canonical_version이 없어 일반 병합을 중단했습니다 · 현재 기기 또는 클라우드를 최종본으로 먼저 지정하세요');
    return false;
  }

  const localMeta = getLocalSyncMeta();
  if (localMeta.pendingCanonicalStatus) {
    if (!reconcilePendingCanonicalStatus(canonicalMeta)) {
      showToast('⚠️ 이전 클라우드 최종본 덮어쓰기가 완료되지 않았습니다 · 데이터 관리에서 상태 재확인 또는 잠금 해제를 실행하세요');
      return false;
    }
  }
  const canSyncDrugs = Array.isArray(cloudDrugs);
  if (!canSyncDrugs) showToast('⚠️ 약물 테이블 동기화는 건너뜁니다 · 통합 SQL을 실행해주세요');
  const canSyncFormulas = Array.isArray(cloudFormulas);
  if (!canSyncFormulas) showToast('⚠️ 공식 테이블 동기화는 건너뜁니다 · 통합 SQL을 실행해주세요');

  const refreshedMeta = getLocalSyncMeta();
  const canonicalChanged = !!canonicalMeta?.version && canonicalMeta.version !== refreshedMeta.canonicalVersion;

  if (canonicalChanged) {
    TERMS.length = 0;
    TERMS.push(...dedupeTermsById(cloudTerms).filter(t => !t.deletedAt));
    saveTermsToLocalStorage();
    if (canSyncDrugs) {
      DRUGS.length = 0;
      DRUGS.push(...dedupeDrugsById(cloudDrugs).filter(d => !d.deletedAt));
      saveDrugsToLocalStorage();
      saveLocalDrugTombstones(cloudDrugs.filter(d => d.deletedAt));
    }
    if (canSyncFormulas) {
      FORMULAS.length = 0;
      FORMULAS.push(...dedupeFormulasById(cloudFormulas).filter(f => !f.deletedAt));
      saveFormulasToLocalStorage();
      saveLocalFormulaTombstones(cloudFormulas.filter(f => f.deletedAt));
    }
    saveLocalTombstones(cloudTerms.filter(t => t.deletedAt));
    const learning = await sbLoadLearningStates();
    if (learning) applyLearningStates(learning, true);
    saveLocalSyncMeta({ canonicalVersion: canonicalMeta.version });
    updateBookmarkCount();
    applyFilters();
    showToast(`☁️ 새 최종본 적용 완료 · 용어 ${TERMS.length}개 · 약물 ${DRUGS.length}개 · 공식 ${FORMULAS.length}개`);
    return true;
  }

  const localActiveFence = filterLocalRowsAfterCanonicalFence(TERMS, cloudTerms, canonicalMeta);
  const localTombstoneFence = filterLocalRowsAfterCanonicalFence(loadLocalTombstones(), cloudTerms, canonicalMeta);
  let skippedStaleLocalRows = localActiveFence.skipped + localTombstoneFence.skipped;
  const mergedRows = mergeTermsForSync(cloudTerms, localActiveFence.rows, localTombstoneFence.rows);
  TERMS.length = 0;
  TERMS.push(...mergedRows.filter(t => !t.deletedAt));
  saveTermsToLocalStorage();
  saveLocalTombstones(mergedRows.filter(t => t.deletedAt));
  if (canSyncDrugs) {
    const localDrugActiveFence = filterLocalRowsAfterCanonicalFence(DRUGS, cloudDrugs, canonicalMeta);
    const localDrugTombstoneFence = filterLocalRowsAfterCanonicalFence(loadLocalDrugTombstones(), cloudDrugs, canonicalMeta);
    skippedStaleLocalRows += localDrugActiveFence.skipped + localDrugTombstoneFence.skipped;
    const mergedDrugs = mergeDrugsForSync(cloudDrugs, localDrugActiveFence.rows, localDrugTombstoneFence.rows);
    DRUGS.length = 0;
    DRUGS.push(...mergedDrugs.filter(d => !d.deletedAt));
    saveDrugsToLocalStorage();
    saveLocalDrugTombstones(mergedDrugs.filter(d => d.deletedAt));
    await sbBatchUpsertDrugRows(mergedDrugs.map(drugToRow));
  }
  if (canSyncFormulas) {
    const localFormulaActiveFence = filterLocalRowsAfterCanonicalFence(FORMULAS, cloudFormulas, canonicalMeta);
    const localFormulaTombstoneFence = filterLocalRowsAfterCanonicalFence(loadLocalFormulaTombstones(), cloudFormulas, canonicalMeta);
    skippedStaleLocalRows += localFormulaActiveFence.skipped + localFormulaTombstoneFence.skipped;
    const mergedFormulas = mergeFormulasForSync(cloudFormulas, localFormulaActiveFence.rows, localFormulaTombstoneFence.rows);
    FORMULAS.length = 0;
    FORMULAS.push(...mergedFormulas.filter(f => !f.deletedAt));
    saveFormulasToLocalStorage();
    saveLocalFormulaTombstones(mergedFormulas.filter(f => f.deletedAt));
    await sbBatchUpsertFormulaRows(mergedFormulas.map(formulaToRow));
  }
  await sbBatchUpsertRows(mergedRows.map(termToRow));
  await syncLearningStateToCloud();
  if (canonicalMeta?.version) saveLocalSyncMeta({ canonicalVersion: canonicalMeta.version });
  updateBookmarkCount();
  applyFilters();
  showToast(`✅ 양방향 동기화 완료 · 용어 ${TERMS.length}개 · 약물 ${DRUGS.length}개 · 공식 ${FORMULAS.length}개${skippedStaleLocalRows ? ` · 오래된 로컬 전용 ${skippedStaleLocalRows}개 제외` : ''}`);
  return true;
}

function chooseAIProvider(task = 'general') {
  const cfg = getAIConfig();
  if (cfg.route === 'openai') return 'openai';
  if (cfg.route === 'anthropic') return 'anthropic';
  if (cfg.route === 'gemini') return 'gemini';
  // Auto route: long enrichment JSON goes to Anthropic; short field generation/test goes to OpenAI/Gemini.
  if (task === 'enrich' && cfg.anthropicKey) return 'anthropic';
  if (cfg.openaiKey) return 'openai';
  if (cfg.geminiKey) return 'gemini';
  if (cfg.anthropicKey) return 'anthropic';
  return 'openai';
}

async function testAIConnection() {
  if (!saveAIConfigFromForm(true)) return;
  const cfg = getAIConfig();
  const providers = cfg.route === 'auto'
    ? [
        cfg.openaiKey ? 'openai' : null,
        cfg.anthropicKey ? 'anthropic' : null,
        cfg.geminiKey ? 'gemini' : null,
      ].filter(Boolean)
    : [chooseAIProvider('test')];
  if (!providers.length) { showToast('⚠️ 테스트할 API 키가 없습니다'); return; }
  try {
    for (const p of providers) await callAIText('Return exactly: OK', 20, 'test', p);
    showToast('✅ AI 연결 성공');
  } catch (err) {
    console.error(err);
    showToast('⚠️ AI 연결 실패: API 키/모델/CORS 확인');
  }
}

async function testSingleAIProvider(provider) {
  if (!saveAIConfigFromForm(true)) return;
  try {
    const text = await callAIText('Return exactly: OK', 20, 'test', provider);
    if (text.trim().toUpperCase().includes('OK')) showToast(`✅ ${provider} 연결 성공`);
    else showToast(`⚠️ ${provider} 응답 형식 확인 필요`);
  } catch (err) {
    console.error(err);
    showToast(`⚠️ ${provider} 연결 실패`);
  }
}

// ─── 커스텀 Confirm (claude.ai에서 confirm() 차단 대응) ───
function showConfirm(message, onOk, onCancel, options = {}) {
  const existing = document.getElementById('confirmModal');
  if (existing) existing.remove();
  const okText = options.okText || '삭제';
  const cancelText = options.cancelText || '취소';
  const okColor = options.okColor || '#f85149';
  const okBg = options.okBg || 'rgba(248,81,73,0.15)';
  const okBorder = options.okBorder || okColor;

  const modal = document.createElement('div');
  modal.id = 'confirmModal';
  modal.style.cssText = 'position:fixed;inset:0;background:var(--overlay-bg);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(6px);padding:24px;';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:320px;text-align:center">
      <div style="font-size:22px;margin-bottom:12px">⚠️</div>
      <div style="font-size:14px;color:var(--text);line-height:1.6;margin-bottom:20px">${message}</div>
      <div style="display:flex;gap:8px">
        <button id="confirmCancel" style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:11px;color:var(--text3);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif">${cancelText}</button>
        <button id="confirmOk" style="flex:1;background:${okBg};border:1px solid ${okBorder};border-radius:8px;padding:11px;color:${okColor};font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif">${okText}</button>
      </div>
    </div>`;

  document.body.appendChild(modal);
  document.getElementById('confirmOk').onclick = () => { modal.remove(); if (onOk) onOk(); };
  document.getElementById('confirmCancel').onclick = () => { modal.remove(); if (onCancel) onCancel(); };
  modal.addEventListener('click', e => { if (e.target === modal) { modal.remove(); if (onCancel) onCancel(); } });
}

// ─── Claude.ai 환경 감지 ───
function isClaudeAiEnv() {
  try {
    return window.location.hostname.includes('claude.ai') ||
           window.location.hostname.includes('anthropic.com') ||
           window.parent !== window; // iframe (claude.ai artifact)
  } catch { return true; } // cross-origin iframe → assume claude.ai
}

// ─── Claude.ai 내장 API 호출 (키 불필요) ───
async function callClaudeBuiltin(prompt, maxTokens = 800) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) throw new Error(`Builtin Claude error: ${res.status}`);
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('\n') || '';
}

async function callAIText(prompt, maxTokens = 800, task = 'general', forceProvider = null) {
  // claude.ai 환경이면 내장 API 우선 시도 (키 불필요)
  if (isClaudeAiEnv()) {
    // 529(과부하) 시 최대 3회 재시도 (1s, 2s, 4s 대기)
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        return await callClaudeBuiltin(prompt, maxTokens);
      } catch (e) {
        const is529 = e.message.includes('529') || e.message.includes('overloaded');
        if (is529 && attempt < 2) {
          const wait = (attempt + 1) * 1500;
          console.warn(`Builtin Claude 529, retry in ${wait}ms...`);
          await new Promise(r => setTimeout(r, wait));
          continue;
        }
        console.warn('Builtin Claude failed, falling back to user key:', e.message);
        break; // 재시도 실패 또는 529 아닌 오류 → 사용자 키 fallback
      }
    }
  }

  const cfg = getAIConfig();
  const provider = forceProvider || chooseAIProvider(task);

  if (provider === 'anthropic') {
    if (!cfg.anthropicKey) throw new Error('Anthropic API key is not configured.');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': cfg.anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: cfg.modelAnthropic,
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) throw new Error(`Anthropic API error: ${res.status}`);
    const data = await res.json();
    return data.content?.map(c => c.text || '').join('\n') || '';
  }

  if (provider === 'gemini') {
    if (!cfg.geminiKey) throw new Error('Gemini API key is not configured.');
    const model = cfg.modelGemini || 'gemini-2.0-flash';
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-goog-api-key': cfg.geminiKey
      },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: maxTokens } })
    });
    if (!res.ok) throw new Error(`Gemini API error: ${res.status}`);
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  if (!cfg.openaiKey) throw new Error('OpenAI API key is not configured.');
  const res = await fetch('https://api.openai.com/v1/responses', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${cfg.openaiKey}`
    },
    body: JSON.stringify({
      model: cfg.modelOpenAI,
      input: prompt,
      max_output_tokens: maxTokens
    })
  });
  if (!res.ok) throw new Error(`OpenAI API error: ${res.status}`);
  const data = await res.json();
  if (data.output_text) return data.output_text;
  return (data.output || []).flatMap(item => item.content || []).map(c => c.text || '').join('\n');
}

function parseTsvPaste(raw) {
  const lines = raw.trim().split('\n').filter(l => l.trim());
  if (!lines.length) return [];
  parseTsvPaste.lastError = '';
  const COLS = ['ko','en','uz','concept_category','category','system_tags','def_ko','def_en','def_uz','usmle','ipa'];

  // 헤더 별칭 매핑 (영문 헤더 → 내부 키)
  const ALIAS = {
    'ko':'ko', 'korean':'ko',
    'en':'en', 'english':'en',
    'uz':'uz', 'uzbek':'uz',
    'category':'category',
    'system':'category',
    'system_category':'category',
    'concept':'concept_category',
    'concept_category':'concept_category',
    'conceptcategory':'concept_category',
    'system_tags':'system_tags',
    'systemtags':'system_tags',
    'tags':'system_tags',
    'def_ko':'def_ko',
    'def_en':'def_en',
    'def_uz':'def_uz',
    'usmle':'usmle',
    'ipa':'ipa',
  };

  // 헤더 감지: ko/en 또는 Korean/English 포함 여부
  const firstCols = lines[0].split('\t').map(c => c.trim().toLowerCase());
  const hasHeader = firstCols.some(c => ALIAS[c] !== undefined);

  if (hasHeader) {
    const colMap = firstCols.map(c => ALIAS[c] || null);
    return lines.slice(1)
      .filter(l => l.trim() && !l.startsWith('#'))
      .map(line => {
        const cells = line.split('\t');
        const t = {};
        colMap.forEach((key, idx) => { if (key) t[key] = (cells[idx] || '').trim(); });
        COLS.forEach(c => { if (!t[c]) t[c] = ''; });
        t.category = t.category || 'General';
        t.concept_category = t.concept_category || 'Other / Unclassified';
        return t;
      }).filter(t => t.ko || t.en || t.uz);
  }

  // 헤더 없음 — 11열 표준 또는 9열 legacy만 허용
  const LEGACY_COLS = ['ko','en','uz','category','def_ko','def_en','def_uz','usmle','ipa'];
  const dataLines = lines.filter(l => !l.startsWith('#'));
  const invalidLine = dataLines.find(line => {
    const count = line.split('\t').length;
    return !(count >= COLS.length || count === LEGACY_COLS.length);
  });
  if (invalidLine) {
    parseTsvPaste.lastError = '헤더 없는 TSV는 11열 표준 또는 9열 legacy 형식만 지원합니다. 안전을 위해 헤더를 추가해 주세요.';
    return [];
  }
  return dataLines.map(line => {
      const cells = line.split('\t');
      const t = {};
      const schema = cells.length >= COLS.length ? COLS : LEGACY_COLS;
      schema.forEach((c, idx) => { t[c] = (cells[idx] || '').trim(); });
      t.category = t.category || 'General';
      t.concept_category = t.concept_category || 'Other / Unclassified';
      return t;
    }).filter(t => t.ko || t.en || t.uz);
}

  const raw = document.getElementById('tsvPasteArea')?.value || '';

async function importTsvPaste(mode = 'merge') {
  const raw = document.getElementById('tsvPasteArea')?.value || '';
  const rows = parseTsvPaste(raw);
  if (!rows.length) { showToast(parseTsvPaste.lastError || '⚠️ 파싱할 데이터가 없습니다'); return; }

  // 영어 → 한국어 → 우즈베크어 순서로 중복 분류: 덮어쓰기 vs 신규
  const overwriteRows = [];  // 기존 용어 덮어쓰기
  const newRows = [];        // 신규 추가
  const seenInBatch = new Set(); // 같은 배치 내 중복 방지

  rows.forEach(t => {
    if (!t.en && !t.ko && !t.uz) return; // 빈 행 스킵
    const key = termIdentityKey(t);
    if (seenInBatch.has(key)) return;
    seenInBatch.add(key);

    const existIdx = findTermIndexByIdentity(t);

    if (existIdx !== -1 && mode !== 'add_only') {
      overwriteRows.push({ t, existIdx });
    } else if (existIdx === -1) {
      newRows.push(t);
    }
  });

  if (!overwriteRows.length && !newRows.length) {
    showToast(mode === 'add_only' ? '⚠️ 새로 추가할 용어가 없습니다 · 기존 용어는 유지됨' : '⚠️ 처리할 데이터가 없습니다');
    return;
  }

  const btn = document.getElementById('tsvImportBtn');
  const addOnlyBtn = document.getElementById('tsvAddOnlyBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 가져오는 중...'; }
  if (addOnlyBtn) { addOnlyBtn.disabled = true; addOnlyBtn.textContent = '⏳ 추가 중...'; }

  // 덮어쓰기 처리: 완전 덮어쓰기 (새 데이터로 전부 교체, 기존 id 유지)
  let overwriteCount = 0;
  overwriteRows.forEach(({ t, existIdx }) => {
    const existing = TERMS[existIdx];
    TERMS[existIdx] = normalizeTermForStorage({
      ...t,
      id: existing.id, // 기존 id 유지
      updatedAt: new Date().toISOString()
    });
    saveTermToCloud(TERMS[existIdx]);
    overwriteCount++;
  });
  if (overwriteCount > 0) { saveTermsToLocalStorage(); applyFilters(); }

  // 전부 즉시 저장 (AI 없음 — 내보내기 탭 '일괄 빈칸 채우기'로 별도 실행)
  const addedTerms = newRows.map(t => normalizeTermForStorage({ ...t, id: makeId() }));
  TERMS.push(...addedTerms);
  addedTerms.forEach(saveTermToCloud);
  saveTermsToLocalStorage();
  applyFilters();
  updateBookmarkCount();

  updateBookmarkCount();
  saveTermsToLocalStorage();
  const addedCount = newRows.length;
  const msg = [
    overwriteCount > 0 ? `✏️ ${overwriteCount}개 완전 덮어쓰기` : '',
    addedCount > 0     ? `➕ ${addedCount}개 신규 추가` : '',
    mode === 'add_only' && rows.length > addedCount ? `⏭️ 기존 ${rows.length - addedCount}개 유지` : '',
  ].filter(Boolean).join(', ');
  showToast(`✅ ${msg || '처리 완료'}`);
  if (btn) { btn.disabled = false; btn.textContent = '✅ 갱신+추가'; }
  if (addOnlyBtn) { addOnlyBtn.disabled = false; addOnlyBtn.textContent = '➕ 신규만'; }
  finishAddFlow();
}

async function submitAddTerm() {
  const addKind = document.getElementById('add_kind')?.value || 'term';
  if (addKind === 'formula') {
    submitAddFormula();
    return;
  }
  if (addKind === 'drug') {
    await submitAddDrug();
    return;
  }

  const ko = document.getElementById('add_ko')?.value.trim() || '';
  const en = document.getElementById('add_en')?.value.trim() || '';
  const uz = document.getElementById('add_uz')?.value.trim() || '';

  if (!ko && !en && !uz) { showToast('⚠️ 하나 이상 입력해주세요'); return; }

  const duplicateTerm = TERMS.find(t =>
    (en && normalizeSyncText(termText(t, 'en')) === normalizeSyncText(en)) ||
    (ko && normalizeSyncText(termText(t, 'ko')) === normalizeSyncText(ko)) ||
    (uz && normalizeSyncText(termText(t, 'uz')) === normalizeSyncText(uz))
  );
  if (duplicateTerm) {
    showAddFormNotice('⚠️ 중복된 용어입니다.');
    return;
  }

  const btn = document.getElementById('addSubmitBtn');
  const cfg = getAIConfig();
  const hasKey = hasConfiguredAIKey(cfg);

  const newTerm = {
    id:       nextTermId(),
    ko, en, uz,
    category: document.getElementById('add_category')?.value || 'General',
    concept_category: document.getElementById('add_concept_category')?.value || 'Other / Unclassified',
    system_tags: normalizeSystemTags(document.getElementById('add_system_tags')?.value || ''),
    def_ko:   document.getElementById('add_def_ko')?.value.trim() || '',
    def_en:   document.getElementById('add_def_en')?.value.trim() || '',
    def_uz:   document.getElementById('add_def_uz')?.value.trim() || '',
    usmle:    document.getElementById('add_usmle')?.value.trim() || '',
    ipa:      document.getElementById('add_ipa')?.value.trim() || '',
    refs: [], icd11: null, fdaDrug: null, rxclassATC: null, trials: null,
  };

  // claude.ai 환경이거나 API 키 있으면 AI 자동완성
  const canUseAI = isClaudeAiEnv() || hasKey;
  if (!canUseAI) {
    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    saveTermToCloud(TERMS[TERMS.length - 1]);
    showToast(`✅ "${ko || en || uz}" 저장됨 (🤖 설정에서 키 등록 시 자동완성 가능)`);
    finishAddFlow(TERMS[TERMS.length - 1].id);
    return;
  }

  // API 키 있으면 AI 자동완성
  if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

  try {
    const enriched = await enrichTermWithAI(newTerm);
    const finalKo = ko || enriched.ko || '';
    const finalEn = en || enriched.en || '';
    const finalUz = uz || enriched.uz || '';
    TERMS.push(normalizeTermForStorage({
      ...newTerm,
      ko: finalKo, en: finalEn, uz: finalUz,
      category:   newTerm.category !== 'General' ? newTerm.category : (enriched.system || enriched.category || 'General'),
      concept_category: newTerm.concept_category !== 'Other / Unclassified' ? newTerm.concept_category : (enriched.concept_category || enriched.conceptCategory || 'Other / Unclassified'),
      system_tags: newTerm.system_tags.length ? newTerm.system_tags : (enriched.system_tags || enriched.systemTags || []),
      ipa:        newTerm.ipa        || enriched.ipa        || '',
      def_ko:     newTerm.def_ko     || enriched.def_ko     || '',
      def_en:     newTerm.def_en     || enriched.def_en     || '',
      def_uz:     newTerm.def_uz     || enriched.def_uz     || '',
      usmle:      newTerm.usmle      || enriched.usmle      || '',
      refs:       enriched.refs       || [],
      icd11:      enriched.icd11      || null,
      fdaDrug:    enriched.fdaDrug    || null,
      rxclassATC: enriched.rxclassATC || null,
      trials:     enriched.trials     || null,
    }));
    saveTermsToLocalStorage();
    saveTermToCloud(TERMS[TERMS.length - 1]);
    showToast(`✅ "${finalKo || finalEn || finalUz}" AI 자동완성 추가 완료!`);
    finishAddFlow(TERMS[TERMS.length - 1].id);
  } catch (err) {
    console.error(err);
    // AI 실패해도 기본 데이터로 저장
    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    saveTermToCloud(TERMS[TERMS.length - 1]);
    showToast(`⚠️ AI 실패 — "${ko || en || uz}" 기본 저장됨. ✏️ 편집으로 내용 추가 가능`);
    finishAddFlow(TERMS[TERMS.length - 1].id);
    if (btn) { btn.disabled = false; btn.textContent = '➕ 용어 추가'; }
  }
}

async function enrichDrugWithAI(seed) {
  const name = [seed.generic_name, seed.brand_name, seed.ko_name].filter(Boolean).join(' / ');
  const prompt = `You are creating a concise USMLE-oriented drug learning card.

Use only pharmacology facts that are broadly accepted. If unsure, leave the field empty or write "검토 필요".
Preserve the user's existing information conceptually. Do not invent dosage.

Drug:
- generic_name: ${seed.generic_name || ''}
- ko_name: ${seed.ko_name || ''}
- brand_name: ${seed.brand_name || ''}
- usmle_class: ${seed.drug_class || ''}
- same_class_drugs: ${seed.same_class_drugs || ''}
- target: ${seed.target || ''}
- route: ${seed.route || ''}
- system: ${seed.category || ''}

Return ONLY valid JSON with these keys:
{
  "drug_class": "USMLE class, concise",
  "same_class_drugs": "comma-separated peer drugs in the same or commonly contrasted class",
  "drug_form": "drug form, e.g. human monoclonal antibody / biologic",
  "atc_class": "ATC/RxClass-like broad class if known",
  "target": "molecular target",
  "route": "route, if commonly known",
  "category": "one representative system from: General|Cardiovascular|Pulmonary|Renal|GI & Hepatobiliary|Endocrine|Neurology|Hematology & Oncology|Infectious Disease|Musculoskeletal|Dermatology|Ophthalmology|ENT|Reproductive|Psychiatry|Pediatrics|Immunology",
  "system_tags": ["secondary systems from the same list"],
  "usmle_yield": "High Yield|Moderate Yield|Low Yield",
  "ipa": "IPA for English generic name if confident",
  "causal_chain": "one high-yield formula chain",
  "definition_ko": "Korean definition, 1 sentence",
  "definition_en": "English definition, 1 sentence",
  "definition_uz": "Uzbek definition, 1 sentence",
  "why": "why it is used, pathophysiology connection",
  "moa": "mechanism of action, Step 1 style",
  "clinical_uses": "representative clinical uses and test clues",
  "adverse_effects": "representative adverse effects",
  "precautions": "key contraindications/precautions, no dosage",
  "usmle_strategy": "answer clue + common wrong-answer traps",
  "memory_line": "one-line memory point"
}`;
  try {
    const text = await callAIText(prompt, 1200, 'enrich');
    const clean = text.replace(/```json|```/g, '').trim();
    return JSON.parse(clean);
  } catch (err) {
    console.warn('drug AI enrichment failed:', name, err);
    return {};
  }
}

function mergeDrugAiSuggestion(seed, enriched) {
  const next = { ...seed };
  [
    'drug_class','same_class_drugs','drug_form','atc_class','target','route','category','usmle_yield','ipa',
    'causal_chain','definition_ko','definition_en','definition_uz','why','moa','clinical_uses',
    'adverse_effects','precautions','usmle_strategy','memory_line'
  ].forEach(key => {
    if (!String(next[key] || '').trim() && enriched?.[key]) next[key] = enriched[key];
  });
  if ((!next.system_tags || !String(next.system_tags).trim()) && Array.isArray(enriched?.system_tags)) {
    next.system_tags = enriched.system_tags.join(', ');
  }
  return next;
}
