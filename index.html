<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Bugeon의 의학용어 v2.6</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #d29922;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --red: #f85149;
    --tag-ko: #1f4068;
    --tag-en: #1a3a2a;
    --tag-uz: #3d2b0a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .update-badge {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .update-badge span:first-child {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .update-badge span:last-child {
    font-size: 11px;
    color: var(--text2);
    font-weight: 500;
  }

  .logo-badge {
    background: linear-gradient(135deg, #1d4ed8, #0284c7);
    border-radius: 10px;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(29,78,216,0.4);
  }

  .header-titles h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-titles p {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px 11px 42px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
  }

  .search-input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 16px;
    pointer-events: none;
  }

  .search-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--border);
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .search-clear.visible { display: flex; }

  /* Filter tabs */
  .filter-row {
    display: flex;
    gap: 6px;
    padding: 12px 24px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-row::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-btn.active {
    background: rgba(88,166,255,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text3);
  }

  .stat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  /* Main content */
  main { padding: 16px 24px 80px; }

  /* Section header */
  .section-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 10px;
    margin-top: 20px;
    font-weight: 500;
  }

  .section-label:first-child { margin-top: 0; }

  /* Term card */
  .term-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }

  .term-card:hover {
    border-color: #3d444d;
    transform: translateY(-1px);
  }

  .term-card.expanded {
    border-color: var(--accent);
  }

  .term-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .term-main {
    flex: 1;
    min-width: 0;
  }

  .term-korean {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
  }

  .term-english {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.2px;
  }

  .term-category {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .chevron {
    color: var(--text3);
    font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .term-card.expanded .chevron { transform: rotate(180deg); }

  /* Expanded detail */
  .term-detail {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .term-card.expanded .term-detail { display: block; }

  .detail-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .detail-section:last-child { border-bottom: none; }

  .lang-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 500;
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .lang-badge.ko { background: var(--tag-ko); color: #74b0ff; border: 1px solid #1d4ed8; }
  .lang-badge.en { background: var(--tag-en); color: #4ade80; border: 1px solid #166534; }
  .lang-badge.uz { background: var(--tag-uz); color: #fbbf24; border: 1px solid #92400e; }

  .detail-text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text2);
  }

  .detail-term {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 4px;
  }

  /* TTS Speak button */
  .speak-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(63,185,80,0.1);
    border: 1px solid rgba(63,185,80,0.3);
    border-radius: 20px;
    padding: 5px 12px;
    color: var(--accent2);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }

  .speak-btn:hover {
    background: rgba(63,185,80,0.2);
    border-color: var(--accent2);
  }

  .speak-btn.speaking {
    background: rgba(63,185,80,0.25);
    border-color: var(--accent2);
    animation: pulse-green 1s infinite;
  }

  .speak-btn .wave {
    display: flex;
    gap: 2px;
    align-items: center;
    height: 14px;
  }

  .speak-btn .wave span {
    display: inline-block;
    width: 3px;
    background: var(--accent2);
    border-radius: 2px;
    height: 6px;
    transition: height 0.1s;
  }

  .speak-btn.speaking .wave span:nth-child(1) { animation: bar 0.6s infinite 0.0s; }
  .speak-btn.speaking .wave span:nth-child(2) { animation: bar 0.6s infinite 0.1s; }
  .speak-btn.speaking .wave span:nth-child(3) { animation: bar 0.6s infinite 0.2s; }
  .speak-btn.speaking .wave span:nth-child(4) { animation: bar 0.6s infinite 0.15s; }

  @keyframes bar {
    0%, 100% { height: 3px; }
    50% { height: 13px; }
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.3); }
    50% { box-shadow: 0 0 0 4px rgba(63,185,80,0); }
  }

  .tts-speed-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .tts-speed-label {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
  }

  .tts-speed-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

  .tts-speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--accent2);
    cursor: pointer;
  }

  .tts-speed-val {
    font-size: 11px;
    color: var(--accent2);
    min-width: 24px;
  }

  /* IPA phonetics */
  .ipa-block {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(210,153,34,0.08);
    border: 1px solid rgba(210,153,34,0.25);
    border-radius: 8px;
    padding: 5px 11px;
    margin: 6px 0 4px;
  }

  .ipa-label {
    font-size: 9px;
    color: var(--accent3);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    white-space: nowrap;
  }

  .ipa-text {
    font-family: 'Noto Sans KR', 'DejaVu Sans', serif;
    font-size: 14px;
    color: var(--accent3);
    letter-spacing: 0.5px;
    line-height: 1.4;
  }

  .ipa-tip {
    font-size: 10px;
    color: var(--text3);
    margin-bottom: 6px;
    line-height: 1.5;
  }

  /* Highlight on search */
  .highlight {
    background: rgba(210,153,34,0.25);
    color: var(--accent3);
    border-radius: 3px;
    padding: 0 2px;
  }

  /* Bookmark button */
  .bookmark-btn {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 16px;
    cursor: pointer;
    padding: 2px;
    transition: color 0.15s;
    flex-shrink: 0;
  }

  .bookmark-btn:hover { color: var(--accent3); }
  .bookmark-btn.saved { color: var(--accent3); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text3);
  }

  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 15px; color: var(--text2); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    backdrop-filter: blur(12px);
  }

  .nav-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 12px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    color: var(--text3);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 10px;
    transition: color 0.15s;
  }

  .nav-btn .nav-icon { font-size: 20px; }
  .nav-btn.active { color: var(--accent); }

  /* Upload prompt */
  .upload-card {
    background: linear-gradient(135deg, rgba(88,166,255,0.08), rgba(63,185,80,0.05));
    border: 1px dashed #3d6b9e;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    margin-bottom: 20px;
  }

  .upload-card .icon { font-size: 28px; margin-bottom: 8px; }
  .upload-card h3 { font-size: 14px; color: var(--text); margin-bottom: 5px; }
  .upload-card p { font-size: 12px; color: var(--text3); line-height: 1.5; margin-bottom: 12px; }

  .upload-btn {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    color: #0d1117;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 12px;
    color: var(--text2);
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Count badge */
  .count-badge {
    background: var(--accent);
    color: #0d1117;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 700;
    margin-left: 6px;
  }

  .result-info {
    font-size: 11px;
    color: var(--text3);
    padding: 8px 0 4px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .term-card { animation: fadeIn 0.2s ease both; }

  /* ── New API Badges ── */
  .api-badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-top: 8px;
  }

  .api-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.4px;
    white-space: nowrap;
  }

  .api-tag.icd11   { background: rgba(139,92,246,0.12); color: #a78bfa; border: 1px solid #5b21b6; }
  .api-tag.fda     { background: rgba(248,81,73,0.10);  color: #f87171; border: 1px solid #991b1b; }
  .api-tag.rxclass { background: rgba(251,191,36,0.10); color: #fbbf24; border: 1px solid #92400e; }
  .api-tag.trials  { background: rgba(34,197,94,0.10);  color: #4ade80; border: 1px solid #166534; }

  /* ── Search Autocomplete ── */
  .autocomplete-wrap { position: relative; }

  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-radius: 10px;
    z-index: 300;
    max-height: 240px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .autocomplete-list:empty { display: none; }

  .ac-item {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }

  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover { background: rgba(88,166,255,0.08); }

  .ac-name {
    font-size: 13px;
    color: var(--text);
    font-weight: 500;
  }

  .ac-code {
    font-size: 10px;
    color: var(--text3);
    margin-top: 2px;
    font-family: monospace;
  }

  .ac-source {
    font-size: 9px;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    float: right;
    margin-top: 1px;
  }

  /* ── FDA Warning panel ── */
  .fda-panel {
    background: rgba(248,81,73,0.05);
    border-left: 3px solid #f85149;
    border-radius: 0 6px 6px 0;
    padding: 8px 10px;
    margin-top: 6px;
  }

  .fda-panel .fda-title {
    font-size: 10px;
    color: #f87171;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 4px;
  }

  .fda-panel .fda-text {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.55;
  }

  /* ── Trials badge ── */
  .trials-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(34,197,94,0.08);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: #4ade80;
    text-decoration: none;
    margin-top: 6px;
  }

  .trials-link:hover { background: rgba(34,197,94,0.15); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo-badge">🩺</div>
    <div class="header-titles">
      <h1>Dr. Bugeon의 의학용어</h1>
      <p>Medical Terminology · Tibbiy terminologiya</p>
    </div>
    <div class="update-badge">
      <span>업데이트</span>
      <span id="updateDate"></span>
    </div>
  </div>
  <div class="search-wrap autocomplete-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="text" placeholder="한국어, 영어, 우즈베크어로 검색..." autocomplete="off">
    <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    <div class="autocomplete-list" id="acList"></div>
  </div>
</header>

<div class="filter-row" id="filterRow">
  <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
  <button class="filter-btn" onclick="setFilter('Cardiovascular', this)">❤️ Cardiovascular</button>
  <button class="filter-btn" onclick="setFilter('Pulmonary', this)">🫁 Pulmonary</button>
  <button class="filter-btn" onclick="setFilter('Renal', this)">🫘 Renal</button>
  <button class="filter-btn" onclick="setFilter('GI & Hepatobiliary', this)">🫁 GI & Hepato</button>
  <button class="filter-btn" onclick="setFilter('Endocrine', this)">⚗️ Endocrine</button>
  <button class="filter-btn" onclick="setFilter('Neurology', this)">🧠 Neurology</button>
  <button class="filter-btn" onclick="setFilter('Hematology & Oncology', this)">🩸 Heme/Onc</button>
  <button class="filter-btn" onclick="setFilter('Infectious Disease', this)">🦠 Infectious</button>
  <button class="filter-btn" onclick="setFilter('Musculoskeletal', this)">🦴 MSK</button>
  <button class="filter-btn" onclick="setFilter('Dermatology', this)">🩹 Derm</button>
  <button class="filter-btn" onclick="setFilter('Reproductive', this)">🧬 Reproductive</button>
  <button class="filter-btn" onclick="setFilter('Psychiatry', this)">💬 Psychiatry</button>
  <button class="filter-btn" onclick="setFilter('Immunology', this)">🛡️ Immunology</button>
  <button class="filter-btn" onclick="setFilter('즐겨찾기', this)">⭐ 즐겨찾기</button>
</div>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-dot" style="background:#58a6ff"></div>
    <span id="totalCount">0개</span>
  </div>
  <div class="stat-item">
    <div class="stat-dot" style="background:#3fb950"></div>
    <span>3개 언어</span>
  </div>
  <div class="stat-item">
    <div class="stat-dot" style="background:#d29922"></div>
    <span id="bookmarkCount">즐겨찾기 0</span>
  </div>
  <div class="stat-item">
    <div class="stat-dot" style="background:#a78bfa"></div>
    <span>8개 API</span>
  </div>
</div>

<main id="mainContent">
  <div class="upload-card">
    <div class="icon">🤖</div>
    <h3>AI 자동완성 업로드</h3>
    <p>한국어 · 영어 · 우즈베크어만 입력하면<br>8개 API + AI가 자동으로 모든 정보를 채웁니다</p>
    <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:14px">
      <span style="background:rgba(88,166,255,0.12);border:1px solid #1d4ed8;border-radius:12px;padding:3px 10px;font-size:11px;color:#74b0ff">PubMed</span>
      <span style="background:rgba(88,166,255,0.12);border:1px solid #1d4ed8;border-radius:12px;padding:3px 10px;font-size:11px;color:#74b0ff">MedlinePlus</span>
      <span style="background:rgba(88,166,255,0.12);border:1px solid #1d4ed8;border-radius:12px;padding:3px 10px;font-size:11px;color:#74b0ff">RxNorm</span>
      <span style="background:rgba(139,92,246,0.12);border:1px solid #5b21b6;border-radius:12px;padding:3px 10px;font-size:11px;color:#a78bfa">ICD-11</span>
      <span style="background:rgba(248,81,73,0.1);border:1px solid #991b1b;border-radius:12px;padding:3px 10px;font-size:11px;color:#f87171">OpenFDA</span>
      <span style="background:rgba(251,191,36,0.1);border:1px solid #92400e;border-radius:12px;padding:3px 10px;font-size:11px;color:#fbbf24">RxClass</span>
      <span style="background:rgba(34,197,94,0.1);border:1px solid #166534;border-radius:12px;padding:3px 10px;font-size:11px;color:#4ade80">ClinicalTrials</span>
      <span style="background:rgba(63,185,80,0.1);border:1px solid #166534;border-radius:12px;padding:3px 10px;font-size:11px;color:#4ade80">NLM 자동완성 ✨</span>
    </div>
    <button class="upload-btn" onclick="document.getElementById('fileInput').click()">📂 파일 업로드 (TSV / Excel)</button>
    <input type="file" id="fileInput" accept=".tsv,.csv,.txt,.xlsx,.xls" style="display:none" onchange="confirmUpload(event)">
  </div>

  <div class="section-label" id="sectionLabel"></div>
  <div id="termList"></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="icon">🔍</div>
    <h3>결과 없음</h3>
    <p>다른 검색어를 입력하거나<br>필터를 변경해 보세요</p>
  </div>
</main>

  <button class="nav-btn active" onclick="switchTab('search', this)">
    <span class="nav-icon">🔍</span>검색
  </button>

    <span class="nav-icon">⭐</span>즐겨찾기
  </button>
  <button class="nav-btn" onclick="switchTab('add', this)">
    <span class="nav-icon">➕</span>추가
  </button>
  <button class="nav-btn" onclick="switchTab('quiz', this)">
    <span class="nav-icon">📝</span>퀴즈
  </button>
  <button class="nav-btn" onclick="switchTab('ai', this)">
    <span class="nav-icon">🤖</span>AI
  </button>
  <button class="nav-btn" onclick="switchTab('export', this)">
    <span class="nav-icon">📤</span>내보내기
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── Data ───
const TERMS = [];
const TERMS_STORAGE_KEY = 'kma_medical_terms_v2_terms';
const TERMS_STORAGE_META_KEY = 'kma_medical_terms_v2_meta';
const AI_CONFIG_STORAGE_KEY = 'kma_medical_terms_v2_ai_config';
const SUPABASE_CONFIG_KEY = 'kma_supabase_config';

// ─── Supabase 동기화 ───
function getSupabaseConfig() {
  return safeJsonParse(localStorage.getItem(SUPABASE_CONFIG_KEY), null);
}

function saveSupabaseConfig(url, key) {
  localStorage.setItem(SUPABASE_CONFIG_KEY, JSON.stringify({ url, key }));
}

function sbHeaders() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  return {
    'Content-Type': 'application/json',
    'apikey': cfg.key,
    'Authorization': 'Bearer ' + cfg.key,
    'Prefer': 'resolution=merge-duplicates'
  };
}

function termToRow(t) {
  return {
    id:          Number(t.id),
    ko:          t.ko || '',
    en:          t.en || '',
    uz:          t.uz || '',
    category:    t.category || '',
    def_ko:      t.def_ko || '',
    def_en:      t.def_en || '',
    def_uz:      t.def_uz || '',
    usmle:       t.usmle || '',
    ipa:         t.ipa || '',
    refs:        Array.isArray(t.refs) ? t.refs : [],
    icd11:       t.icd11 || null,
    fda_drug:    t.fdaDrug || null,
    rxclass_atc: t.rxclassATC || null,
    trials:      t.trials || null,
    updated_at:  t.updatedAt || new Date().toISOString(),
  };
}

function rowToTerm(r) {
  return {
    id:          Number(r.id),
    ko:          r.ko || '',
    en:          r.en || '',
    uz:          r.uz || '',
    category:    r.category || '기타',
    def_ko:      r.def_ko || '',
    def_en:      r.def_en || '',
    def_uz:      r.def_uz || '',
    usmle:       r.usmle || '',
    ipa:         r.ipa || '',
    refs:        Array.isArray(r.refs) ? r.refs : [],
    icd11:       r.icd11 || null,
    fdaDrug:     r.fda_drug || null,
    rxclassATC:  r.rxclass_atc || null,
    trials:      r.trials || null,
    updatedAt:   r.updated_at || new Date().toISOString(),
  };
}

// Supabase에 용어 upsert (추가/수정)
async function sbUpsertTerm(t) {
  const cfg = getSupabaseConfig();
  if (!cfg) return;
  try {
    await fetch(`${cfg.url}/rest/v1/medical_terms`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify(termToRow(t))
    });
  } catch(e) { console.warn('Supabase upsert failed:', e); }
}

// Supabase에서 용어 삭제
async function sbDeleteTerm(id) {
  const cfg = getSupabaseConfig();
  if (!cfg) return;
  try {
    await fetch(`${cfg.url}/rest/v1/medical_terms?id=eq.${id}`, {
      method: 'DELETE',
      headers: sbHeaders()
    });
  } catch(e) { console.warn('Supabase delete failed:', e); }
}

// Supabase에서 전체 로드
async function sbLoadAll() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  try {
    const res = await fetch(`${cfg.url}/rest/v1/medical_terms?select=*&order=id.asc&limit=2000`, {
      headers: sbHeaders()
    });
    if (!res.ok) return null;
    const rows = await res.json();
    return Array.isArray(rows) ? rows.map(rowToTerm) : null;
  } catch(e) { console.warn('Supabase load failed:', e); return null; }
}

// Supabase에 전체 업로드 (현재 TERMS → DB)
async function sbPushAll() {
  const cfg = getSupabaseConfig();
  if (!cfg || TERMS.length === 0) return;
  try {
    const rows = TERMS.map(termToRow);
    // 100개씩 배치
    for (let i = 0; i < rows.length; i += 100) {
      await fetch(`${cfg.url}/rest/v1/medical_terms`, {
        method: 'POST',
        headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify(rows.slice(i, i + 100))
      });
    }
    showToast(`☁️ Supabase 동기화 완료 (${TERMS.length}개)`);
  } catch(e) { showToast('⚠️ Supabase 업로드 실패'); }
}

// Supabase에서 전체 삭제
async function sbDeleteAll() {
  const cfg = getSupabaseConfig();
  if (!cfg) return;
  try {
    await fetch(`${cfg.url}/rest/v1/medical_terms?id=gte.0`, {
      method: 'DELETE',
      headers: sbHeaders()
    });
  } catch(e) { console.warn('Supabase deleteAll failed:', e); }
}

// 연결 테스트
async function testSupabaseConnection() {
  const cfg = getSupabaseConfig();
  if (!cfg) { showToast('⚠️ Supabase 설정이 없습니다'); return false; }
  try {
    const res = await fetch(`${cfg.url}/rest/v1/medical_terms?select=id&limit=1`, {
      headers: sbHeaders()
    });
    return res.ok;
  } catch { return false; }
}

function safeJsonParse(value, fallback) {
  try { return JSON.parse(value); } catch { return fallback; }
}

function capitalizeFirst(s) {
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function normalizeTermForStorage(t) {
  return {
    id: Number(t.id) || Date.now(),
    ko: capitalizeFirst(t.ko || ''),
    en: capitalizeFirst(t.en || ''),
    uz: capitalizeFirst(t.uz || ''),
    category: t.category || '기타',
    def_ko: t.def_ko || '',
    def_en: t.def_en || '',
    def_uz: t.def_uz || '',
    usmle: t.usmle || '',
    ipa: t.ipa || '',
    refs: Array.isArray(t.refs) ? t.refs : [],
    icd11: t.icd11 || null,
    fdaDrug: t.fdaDrug || null,
    rxclassATC: t.rxclassATC || null,
    trials: t.trials || null,
    updatedAt: t.updatedAt || new Date().toISOString(),
  };
}

function saveTermsToLocalStorage() {
  try {
    const payload = TERMS.map(normalizeTermForStorage);
    localStorage.setItem(TERMS_STORAGE_KEY, JSON.stringify(payload));
    localStorage.setItem(TERMS_STORAGE_META_KEY, JSON.stringify({
      count: payload.length,
      savedAt: new Date().toISOString(),
      app: 'DrBugeon Medical Terms',
    }));
    return true;
  } catch (err) {
    console.warn('Local save failed', err);
    if (typeof showToast === 'function') showToast('⚠️ 브라우저 저장공간이 부족합니다');
    return false;
  }
}

// Supabase에 단일 용어 저장 (로컬 저장 후 비동기로 호출)
function saveTermToCloud(t) {
  if (getSupabaseConfig()) sbUpsertTerm(t).catch(() => {});
}

function deleteTermFromCloud(id) {
  if (getSupabaseConfig()) sbDeleteTerm(id).catch(() => {});
}

function loadTermsFromLocalStorage() {
  const saved = safeJsonParse(localStorage.getItem(TERMS_STORAGE_KEY), []);
  if (!Array.isArray(saved) || saved.length === 0) return 0;
  TERMS.length = 0;
  TERMS.push(...saved.map(normalizeTermForStorage));
  return TERMS.length;
}

function clearTermsLocalStorage() {
  localStorage.removeItem(TERMS_STORAGE_KEY);
  localStorage.removeItem(TERMS_STORAGE_META_KEY);
}

function nextTermId() {
  const maxId = TERMS.reduce((max, t) => Math.max(max, Number(t.id) || 0), 999);
  return Math.max(Date.now(), maxId + 1);
}

function getStorageStatusText() {
  const meta = safeJsonParse(localStorage.getItem(TERMS_STORAGE_META_KEY), null);
  if (!meta?.savedAt) return '자동저장 대기';
  const d = new Date(meta.savedAt);
  return `자동저장 ${meta.count || 0}개 · ${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

let currentFilter = 'all';
let currentSort = 'default'; // 'default' | 'en_asc' | 'ko_asc'

let bookmarks = new Set(JSON.parse(localStorage.getItem('kma_bookmarks') || '[]'));
let expandedId = null;
let currentTab = 'search';

// ─── Render ───
function renderTerms(terms, bookmarkDivider = 0) {
  const list = document.getElementById('termList');
  const empty = document.getElementById('emptyState');
  if (!list || !empty) return;   // ← null guard (export/quiz tab replaces mainContent)

  if (terms.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  const query = document.getElementById('searchInput').value.toLowerCase();

  list.innerHTML = terms.map((t, i) => {
    const divider = (bookmarkDivider > 0 && i === bookmarkDivider)
      ? `<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;padding:14px 0 6px;font-weight:500">전체 용어</div>`
      : '';
    return `${divider}<div class="term-card ${expandedId === t.id ? 'expanded' : ''}" id="card-${t.id}" style="animation-delay:${Math.min(i,10)*30}ms" onclick="toggleCard(${t.id})">
      <div class="term-header">
        <div class="term-main">
          <div class="term-korean">${highlight(t.ko, query)}</div>
          <div class="term-english">${highlight(t.en, query)}</div>
        </div>
        <span class="term-category">${t.category}</span>
        <button class="bookmark-btn ${bookmarks.has(t.id) ? 'saved' : ''}" onclick="toggleBookmark(event, ${t.id})">${bookmarks.has(t.id) ? '⭐' : '☆'}</button>
        <button class="bookmark-btn" onclick="openEditModal(event, ${t.id})" title="편집" style="font-size:14px">✏️</button>
        <span class="chevron">▼</span>
      </div>
      <div class="term-detail">
        <div class="detail-section">
          <div class="lang-badge ko">🇰🇷 한국어</div>
          <div class="detail-term">${t.ko}</div>
          <div class="detail-text">${t.def_ko}</div>
        </div>
        <div class="detail-section">
          <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px">
            <div class="lang-badge en">🇺🇸 English</div>
            <button class="speak-btn" id="speak-term-${t.id}" onclick="speakText(event, '${t.en.replace(/'/g,"\\'")}', 'term', ${t.id})">
              <div class="wave"><span></span><span></span><span></span><span></span></div>
              발음 듣기
            </button>
          </div>
          <div class="detail-term">${t.en}</div>
          ${t.ipa ? `
          <div class="ipa-block">
            <span class="ipa-label">IPA</span>
            <span class="ipa-text">${t.ipa}</span>
          </div>
          <div class="ipa-tip">Cambridge 방식 · 강세: ˈ(1차) ˌ(2차) · 장모음: ː</div>` : ''}
          <div class="detail-text">${t.def_en}</div>
          <button class="speak-btn" id="speak-def-${t.id}" onclick="speakText(event, '${t.def_en.replace(/'/g,"\\'")}', 'def', ${t.id})" style="font-size:11px;padding:4px 10px">
            <div class="wave"><span></span><span></span><span></span><span></span></div>
            정의 읽기
          </button>
          <div class="tts-speed-row">
            <span class="tts-speed-label">🐢 속도</span>
            <input class="tts-speed-slider" type="range" min="0.5" max="1.5" step="0.1" value="0.9" oninput="ttsSpeed=parseFloat(this.value);document.querySelectorAll('.tts-speed-val').forEach(el=>el.textContent=ttsSpeed.toFixed(1)+'×')">
            <span class="tts-speed-val">0.9×</span>
          </div>
        </div>
        <div class="detail-section">
          <div class="lang-badge uz">🇺🇿 O'zbek</div>
          <div class="detail-term">${t.uz}</div>
          <div class="detail-text">${t.def_uz}</div>
        </div>
        <div class="detail-section" style="background:rgba(88,166,255,0.04)">
          <div class="lang-badge" style="background:rgba(88,166,255,0.15);color:#58a6ff;border:1px solid #1d3a5e">📋 USMLE High-Yield</div>
          <div class="detail-text" style="font-family:monospace;font-size:12px;color:#8b949e">${t.usmle}</div>
        </div>
        ${(t.icd11 || t.fdaDrug || t.rxclassATC || t.trials) ? `
        <div class="detail-section" style="background:rgba(0,0,0,0.15)">
          <div class="lang-badge" style="background:rgba(255,255,255,0.05);color:var(--text2);border:1px solid var(--border)">🌐 외부 데이터베이스</div>
          <div class="api-badge-row">
            ${t.icd11?.code ? `<span class="api-tag icd11">🏷️ ICD-11: ${t.icd11.code}</span>` : ''}
            ${t.fdaDrug?.hasBoxedWarning ? `<span class="api-tag fda">⚠️ FDA Boxed Warning</span>` : (t.fdaDrug?.brandName ? `<span class="api-tag fda">💊 FDA: ${t.fdaDrug.brandName}</span>` : '')}
            ${t.rxclassATC?.length ? `<span class="api-tag rxclass">🔬 ATC: ${t.rxclassATC[0].name}</span>` : ''}
            ${t.trials?.count > 0 ? `<a class="trials-link" href="https://clinicaltrials.gov/search?cond=${encodeURIComponent(t.en)}&recrs=a" target="_blank" onclick="event.stopPropagation()">🔬 ${t.trials.count} 활성 임상시험 ↗</a>` : ''}
          </div>
          ${t.fdaDrug?.warnings ? `
          <div class="fda-panel" style="margin-top:8px">
            <div class="fda-title">${t.fdaDrug.hasBoxedWarning ? '⚠️ Boxed Warning' : '⚠️ FDA Warning'}</div>
            <div class="fda-text">${t.fdaDrug.warnings}</div>
          </div>` : ''}
          ${t.fdaDrug?.drugClass ? `<div style="font-size:11px;color:var(--text3);margin-top:6px">약물 분류: <span style="color:var(--text2)">${t.fdaDrug.drugClass}</span></div>` : ''}
          ${t.icd11?.title ? `<div style="font-size:11px;color:var(--text3);margin-top:4px">ICD-11: <span style="color:#a78bfa">${t.icd11.title}</span></div>` : ''}
        </div>` : ''}
        ${t.refs && t.refs.length > 0 ? `
        <div class="detail-section" style="background:rgba(63,185,80,0.03)">
          <div class="lang-badge" style="background:rgba(63,185,80,0.12);color:#4ade80;border:1px solid #166534">📄 PubMed 참고문헌</div>
          ${t.refs.map(r => `
            <a href="${r.url}" target="_blank" onclick="event.stopPropagation()" style="display:block;margin-top:7px;text-decoration:none">
              <div style="font-size:11px;color:#58a6ff;line-height:1.5;border-left:2px solid #1d4ed8;padding-left:8px">
                <span style="color:#e6edf3;font-weight:500">${r.title}</span><br>
                <span style="color:#8b949e">${r.authors} · ${r.journal} · ${r.year}</span><br>
                <span style="color:#3fb950;font-size:10px">PMID: ${r.pmid} → PubMed 열기 ↗</span>
              </div>
            </a>`).join('')}
        </div>` : ''}
      </div>
    </div>`;
  }).join('');

  updateCounts(terms.length);
}

function highlight(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${query})`, 'gi');
  return text.replace(regex, '<span class="highlight">$1</span>');
}

function toggleCard(id) {
  expandedId = expandedId === id ? null : id;
  applyFilters();
}

function toggleBookmark(e, id) {
  e.stopPropagation();
  if (bookmarks.has(id)) {
    bookmarks.delete(id);
    showToast('즐겨찾기에서 제거됨');
  } else {
    bookmarks.add(id);
    showToast('⭐ 즐겨찾기에 추가됨');
  }
  localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  updateBookmarkCount();
  applyFilters();
}

function applyFilters() {
  if (!document.getElementById('termList')) return;  // ← bail when export/quiz/add tab active
  const query = document.getElementById('searchInput').value.toLowerCase();
  const label = document.getElementById('sectionLabel');
  let results = TERMS;

  if (currentFilter === '즐겨찾기') {
    results = results.filter(t => bookmarks.has(t.id));
    if (label) label.textContent = `⭐ 즐겨찾기 — ${results.length}개`;
  } else if (currentFilter !== 'all') {
    results = results.filter(t => t.category === currentFilter);
    if (label) label.textContent = `${currentFilter} — ${results.length}개`;
  } else {
    if (label) label.textContent = query ? `검색 결과` : `전체 용어`;
  }

  if (query) {
    results = results.filter(t =>
      t.ko.toLowerCase().includes(query) ||
      t.en.toLowerCase().includes(query) ||
      t.uz.toLowerCase().includes(query) ||
      t.def_ko.toLowerCase().includes(query) ||
      t.def_en.toLowerCase().includes(query)
    );
  }

  document.getElementById('searchClear').classList.toggle('visible', query.length > 0);

  // 데이터 없을 때 홈 화면: 즐겨찾기 or 빈 안내
  if (TERMS.length === 0 && !query) {
    renderHome();
    return;
  }

  // 검색/필터 없고 즐겨찾기 있으면 → 즐겨찾기 먼저 보여주기
  if (!query && currentFilter === 'all' && bookmarks.size > 0) {
    const bookmarked = TERMS.filter(t => bookmarks.has(t.id));
    const rest = TERMS.filter(t => !bookmarks.has(t.id));
    if (label) label.textContent = `⭐ 즐겨찾기 ${bookmarked.length}개 · 전체 ${TERMS.length}개`;
    renderTerms([...bookmarked, ...rest], bookmarked.length);
    return;
  }

  // 정렬 적용
  if (currentSort === 'en_asc') {
    results = [...results].sort((a, b) => (a.en || '').localeCompare(b.en || '', 'en'));
  } else if (currentSort === 'ko_asc') {
    results = [...results].sort((a, b) => (a.ko || '').localeCompare(b.ko || '', 'ko'));
  }
  renderTerms(results);
}

function renderHome() {
  const list = document.getElementById('termList');
  const empty = document.getElementById('emptyState');
  const label = document.getElementById('sectionLabel');
  if (!list || !empty) return;   // ← null guard
  empty.style.display = 'none';
  if (label) label.textContent = '';

  const bookmarked = TERMS.filter(t => bookmarks.has(t.id));

  if (bookmarked.length > 0) {
    if (label) label.textContent = `⭐ 즐겨찾기 — ${bookmarked.length}개`;
    renderTerms(bookmarked);
  } else {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">📂</div>
        <h3>용어 데이터가 없습니다</h3>
        <p>위 업로드 버튼으로 TSV 파일을 올리거나<br>즐겨찾기한 용어가 여기에 표시됩니다</p>
      </div>`;
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  applyFilters();
}

function setSort(val) {
  currentSort = val;
  const sel = document.getElementById('sortSelect');
  if (sel) sel.value = val;
  applyFilters();
}

function searchUMLSFromInput() {
  const q = document.getElementById('searchInput')?.value.trim();
  if (!q) { showToast('⚠️ 검색어를 입력하세요'); return; }
  searchUMLS(q);
}

function updateCounts(shown) {
  document.getElementById('totalCount').textContent = `${shown}개 표시 / 전체 ${TERMS.length}개`;
}

function updateBookmarkCount() {
  const validCount = TERMS.filter(t => bookmarks.has(t.id)).length;
  // Prune stale IDs that no longer exist in TERMS
  [...bookmarks].forEach(id => { if (!TERMS.some(t => t.id === id)) bookmarks.delete(id); });
  localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  document.getElementById('bookmarkCount').textContent = `즐겨찾기 ${validCount}`;
}

function restoreHomeTab() {
  const main = document.getElementById('mainContent');
  main.innerHTML = HOME_HTML;
  updateBookmarkCount();
  applyFilters();
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (tab === 'export')   showExportMenu();
  else if (tab === 'ai')      showAISettings();
  else if (tab === 'quiz')    startQuiz();
  else if (tab === 'add')     { showAddTermForm(); setTimeout(updateAddKeyHint, 0); }
  else if (tab === 'bookmark') {
    restoreHomeTab();
    setFilter('즐겨찾기', document.querySelector('.filter-btn:last-child'));
  } else {
    restoreHomeTab();
    setFilter('all', document.querySelector('.filter-btn.active') || document.querySelector('.filter-btn'));
  }
}

};

function renderModelPresetOptions(presets, currentValue) {
  const presetValues = presets.map(p => p.value);
  const selectedValue = presetValues.includes(currentValue) ? currentValue : 'custom';
  return presets.map(p => `<option value="${p.value}" ${p.value === selectedValue ? 'selected' : ''}>${p.label}</option>`).join('');
}

function onModelPresetChange(provider) {
  const select = document.getElementById(provider === 'openai' ? 'ai_model_openai_preset' : 'ai_model_anthropic_preset');
  const input = document.getElementById(provider === 'openai' ? 'ai_model_openai' : 'ai_model_anthropic');
  if (!select || !input) return;
  if (select.value !== 'custom') input.value = select.value;
  input.readOnly = select.value !== 'custom';
  input.style.opacity = select.value === 'custom' ? '1' : '0.75';
}

function onAIRouteChange() {
  const route = document.getElementById('ai_route')?.value || 'openai';
  const openaiBox = document.getElementById('openaiConfigBox');
  const anthropicBox = document.getElementById('anthropicConfigBox');
  const routeTip = document.getElementById('aiRouteTip');
  if (openaiBox) openaiBox.style.display = (route === 'openai' || route === 'auto') ? 'block' : 'none';
  if (anthropicBox) anthropicBox.style.display = (route === 'anthropic' || route === 'auto') ? 'block' : 'none';
  if (routeTip) routeTip.textContent = AI_ROUTE_LABELS[route] || '';
}

function migrateOldAIConfig(cfg) {
  if (!cfg) return {};
  // v2-3/v2-4 compatibility: old config had { provider, apiKey, modelOpenAI, modelAnthropic }
  if (cfg.apiKey && !cfg.openaiKey && !cfg.anthropicKey) {
    if ((cfg.provider || 'openai') === 'anthropic') cfg.anthropicKey = cfg.apiKey;
    else cfg.openaiKey = cfg.apiKey;
  }
  return cfg;
}

function getAIConfig() {
  const cfg = migrateOldAIConfig(safeJsonParse(localStorage.getItem(AI_CONFIG_STORAGE_KEY), null) || {});
  return {
    route: cfg.route || cfg.provider || 'openai',
    openaiKey: cfg.openaiKey || '',
    anthropicKey: cfg.anthropicKey || '',
    modelOpenAI: cfg.modelOpenAI || 'gpt-5.5',
    modelAnthropic: cfg.modelAnthropic || 'claude-sonnet-4-6',
  };
}

function saveAIConfigFromForm(silent = false) {
  const route = document.getElementById('ai_route')?.value || 'auto';
  const openaiKey = document.getElementById('ai_openai_key')?.value.trim() || '';
  const anthropicKey = document.getElementById('ai_anthropic_key')?.value.trim() || '';
  const geminiKey = document.getElementById('ai_gemini_key')?.value.trim() || '';
  const umlsKey = document.getElementById('ai_umls_key')?.value.trim() || '';
  const modelOpenAI = document.getElementById('ai_model_openai')?.value.trim() || 'gpt-4o-mini';
  const modelAnthropic = document.getElementById('ai_model_anthropic')?.value.trim() || 'claude-sonnet-4-6';
  const modelGemini = document.getElementById('ai_model_gemini')?.value.trim() || 'gemini-2.0-flash';

  if (route === 'openai' && !openaiKey) { showToast('⚠️ OpenAI API 키를 입력해주세요'); return false; }
  if (route === 'anthropic' && !anthropicKey) { showToast('⚠️ Anthropic API 키를 입력해주세요'); return false; }
  if (route === 'gemini' && !geminiKey) { showToast('⚠️ Gemini API 키를 입력해주세요'); return false; }

  const cfg = { route, openaiKey, anthropicKey, geminiKey, umlsKey, modelOpenAI, modelAnthropic, modelGemini, savedAt: new Date().toISOString() };
  localStorage.setItem(AI_CONFIG_STORAGE_KEY, JSON.stringify(cfg));
  if (umlsKey) localStorage.setItem('kma_umls_key', umlsKey);
  if (!silent) { showToast('✅ AI API 설정 저장 완료'); showAISettings(); }
  return true;
}

function clearAIConfig() {
  showConfirm('저장된 OpenAI/Anthropic API 키와<br>모델 설정을 모두 삭제할까요?', () => {
    localStorage.removeItem(AI_CONFIG_STORAGE_KEY);
    showToast('🗑️ AI API 설정 삭제 완료');
    showAISettings();
  });
}

function maskApiKey(key) {
  if (!key) return '저장 안 됨';
  if (key.length <= 12) return '••••';
  return key.slice(0, 6) + '••••••••' + key.slice(-4);
}

function saveSupabaseFromForm() {
  const url = document.getElementById('sb_url')?.value.trim().replace(/\/+$/, '');
  const key = document.getElementById('sb_key')?.value.trim();
  if (!url || !key) { showToast('⚠️ URL과 키를 모두 입력해주세요'); return; }
  saveSupabaseConfig(url, key);
  showToast('✅ Supabase 설정 저장됨');
  const el = document.getElementById('sbStatus');
  if (el) el.textContent = '✅ 연결됨';
}

async function testAndSyncSupabase() {
  saveSupabaseFromForm();
  showToast('☁️ 연결 테스트 중...');
  const ok = await testSupabaseConnection();
  if (ok) {
    showToast('✅ 연결 성공! 동기화 시작...');
    await initApp();
  } else {
    showToast('⚠️ 연결 실패 — URL/키 확인');
  }
}

async function pullFromCloud() {
  if (!getSupabaseConfig()) { showToast('⚠️ Supabase 설정 먼저 저장하세요'); return; }
  showToast('⬇️ 클라우드에서 불러오는 중...');
  const cloudTerms = await sbLoadAll();
  if (!cloudTerms || cloudTerms.length === 0) { showToast('⚠️ 클라우드에 데이터가 없습니다'); return; }
  TERMS.length = 0;
  TERMS.push(...cloudTerms);
  saveTermsToLocalStorage();
  updateBookmarkCount();
  applyFilters();
  showToast(`⬇️ 클라우드에서 ${cloudTerms.length}개 불러옴`);
}

function chooseAIProvider(task = 'general') {
  const cfg = getAIConfig();
  if (cfg.route === 'openai') return 'openai';
  if (cfg.route === 'anthropic') return 'anthropic';
  // Auto route: long enrichment JSON goes to Anthropic; short field generation/test goes to OpenAI.
  if (task === 'enrich' && cfg.anthropicKey) return 'anthropic';
  if (cfg.openaiKey) return 'openai';
  if (cfg.anthropicKey) return 'anthropic';
  return 'openai';
}

async function testAIConnection() {
  if (!saveAIConfigFromForm(true)) return;
  const cfg = getAIConfig();
  const providers = cfg.route === 'auto' ? ['openai', 'anthropic'] : [chooseAIProvider('test')];
  try {
    for (const p of providers) await callAIText('Return exactly: OK', 20, 'test', p);
    showToast('✅ AI 연결 성공');
  } catch (err) {
    console.error(err);
    showToast('⚠️ AI 연결 실패: API 키/모델/CORS 확인');
  }
}

async function testSingleAIProvider(provider) {
  if (!saveAIConfigFromForm(true)) return;
  try {
    const text = await callAIText('Return exactly: OK', 20, 'test', provider);
    if (text.trim().toUpperCase().includes('OK')) showToast(`✅ ${provider} 연결 성공`);
    else showToast(`⚠️ ${provider} 응답 형식 확인 필요`);
  } catch (err) {
    console.error(err);
    showToast(`⚠️ ${provider} 연결 실패`);
  }
}

  modal.id = 'confirmModal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(13,17,23,0.88);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(6px);padding:24px;';
  modal.innerHTML = `

// ─── Claude.ai 환경 감지 ───
function isClaudeAiEnv() {
  try {
    return window.location.hostname.includes('claude.ai') ||
           window.location.hostname.includes('anthropic.com') ||
           window.parent !== window; // iframe (claude.ai artifact)
  } catch { return true; } // cross-origin iframe → assume claude.ai
}

// ─── Claude.ai 내장 API 호출 (키 불필요) ───
async function callClaudeBuiltin(prompt, maxTokens = 800) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) throw new Error(`Builtin Claude error: ${res.status}`);
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('\n') || '';
}

async function callAIText(prompt, maxTokens = 800, task = 'general', forceProvider = null) {
  // claude.ai 환경이면 내장 API 우선 시도 (키 불필요)
  if (isClaudeAiEnv()) {
    try {
      return await callClaudeBuiltin(prompt, maxTokens);
    } catch (e) {
      console.warn('Builtin Claude failed, falling back to user key:', e.message);
      // 실패 시 아래 사용자 키 방식으로 fallback
    }
  }

  const cfg = getAIConfig();
  const provider = forceProvider || chooseAIProvider(task);

  if (provider === 'anthropic') {
    if (!cfg.anthropicKey) throw new Error('Anthropic API key is not configured.');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': cfg.anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: cfg.modelAnthropic,
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) throw new Error(`Anthropic API error: ${res.status}`);
    const data = await res.json();
    return data.content?.map(c => c.text || '').join('\n') || '';
  }

  if (provider === 'gemini') {
    if (!cfg.geminiKey) throw new Error('Gemini API key is not configured.');
    const model = cfg.modelGemini || 'gemini-2.0-flash';
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${cfg.geminiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: maxTokens } })
    });
    if (!res.ok) throw new Error(`Gemini API error: ${res.status}`);
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  if (!cfg.openaiKey) throw new Error('OpenAI API key is not configured.');
  const res = await fetch('https://api.openai.com/v1/responses', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${cfg.openaiKey}`
    },
    body: JSON.stringify({
      model: cfg.modelOpenAI,
      input: prompt,
      max_output_tokens: maxTokens
    })
  });
  if (!res.ok) throw new Error(`OpenAI API error: ${res.status}`);
  const data = await res.json();
  if (data.output_text) return data.output_text;
  return (data.output || []).flatMap(item => item.content || []).map(c => c.text || '').join('\n');
}

function parseTsvPaste(raw) {
  const lines = raw.trim().split('\n').filter(l => l.trim());
  if (!lines.length) return [];
  const COLS = ['ko','en','uz','category','def_ko','def_en','def_uz','usmle','ipa'];
  // 헤더 감지
  const firstCols = lines[0].split('\t').map(c => c.trim().toLowerCase());
  if (firstCols.includes('ko') || firstCols.includes('en')) {
    // 헤더 있음 — 컬럼 순서 파악
    const colMap = firstCols.map(c => COLS.indexOf(c));
    return lines.slice(1).map(line => {
      const cells = line.split('\t');
      const t = {};
      colMap.forEach((ci, idx) => { if (ci !== -1) t[COLS[ci]] = (cells[idx] || '').trim(); });
      COLS.forEach(c => { if (!t[c]) t[c] = ''; });
      t.category = t.category || '기타';
      return t;
    }).filter(t => t.ko || t.en);
  }
  // 헤더 없음 — 순서대로
  return lines.map(line => {
    const cells = line.split('\t');
    const t = {};
    COLS.forEach((c, idx) => { t[c] = (cells[idx] || '').trim(); });
    t.category = t.category || '기타';
    return t;
  }).filter(t => t.ko || t.en);
}

async function importTsvPaste() {
  const raw = document.getElementById('tsvPasteArea')?.value || '';
  const rows = parseTsvPaste(raw);
  if (!rows.length) { showToast('⚠️ 파싱할 데이터가 없습니다'); return; }

  // 영어 기준으로 중복 분류: 덮어쓰기 vs 신규
  let _idCounter = Date.now();
  const makeId = () => ++_idCounter;

  const overwriteRows = [];  // 기존 용어 덮어쓰기
  const newRows = [];        // 신규 추가
  const seenInBatch = new Set(); // 같은 배치 내 중복 방지

  rows.forEach(t => {
    const enKey = (t.en || '').toLowerCase().trim();
    if (!enKey && !t.ko) return; // 빈 행 스킵
    if (seenInBatch.has(enKey)) return;
    seenInBatch.add(enKey);

    const existIdx = enKey
      ? TERMS.findIndex(x => (x.en || '').toLowerCase().trim() === enKey)
      : -1;

    if (existIdx !== -1) {
      overwriteRows.push({ t, existIdx });
    } else {
      newRows.push(t);
    }
  });

  if (!overwriteRows.length && !newRows.length) {
    showToast('⚠️ 처리할 데이터가 없습니다'); return;
  }

  const btn = document.getElementById('tsvImportBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 가져오는 중...'; }

  // 덮어쓰기 처리: 빈 칸만 채우기 (기능1 — 이미 있는 필드는 유지)
  let overwriteCount = 0;
  overwriteRows.forEach(({ t, existIdx }) => {
    const existing = TERMS[existIdx];
    let changed = false;
    const updated = { ...existing };
    // 빈 필드만 채움
    ['ko','uz','def_ko','def_en','def_uz','usmle','ipa'].forEach(f => {
      if (!existing[f] && t[f]) { updated[f] = t[f]; changed = true; }
    });
    if (!existing.category || existing.category === '기타') {
      if (t.category && t.category !== '기타') { updated.category = t.category; changed = true; }
    }
    if (changed) {
      updated.updatedAt = new Date().toISOString();
      TERMS[existIdx] = normalizeTermForStorage(updated);
      saveTermToCloud(TERMS[existIdx]);
      overwriteCount++;
    }
  });
  if (overwriteCount > 0) { saveTermsToLocalStorage(); applyFilters(); }

  const hasData = newRows.filter(t => t.def_ko || t.def_en || t.usmle);
  const needsAI = newRows.filter(t => !t.def_ko && !t.def_en && !t.usmle);

  // 신규 + 정의 있는 것 → 즉시 저장
  hasData.forEach(t => TERMS.push(normalizeTermForStorage({ ...t, id: makeId() })));
  if (hasData.length) { saveTermsToLocalStorage(); applyFilters(); }

  // 정의 없는 것 → AI 자동완성 (순차 처리)
  if (needsAI.length) {
    showAIProgress(needsAI.length);
    let done = 0;
    const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey);

    for (let i = 0; i < needsAI.length; i++) {
      const term = { ...needsAI[i], id: makeId() };
      try {
        if (canAI) {
          const enriched = await enrichTermWithAI(term);
          TERMS.push(normalizeTermForStorage({
            ...term,
            def_ko:   term.def_ko || enriched.def_ko || '',
            def_en:   term.def_en || enriched.def_en || '',
            def_uz:   term.def_uz || enriched.def_uz || '',
            usmle:    term.usmle  || enriched.usmle  || '',
            ipa:      term.ipa    || enriched.ipa     || '',
            category: (term.category && term.category !== '기타') ? term.category : (enriched.category || '기타'),
            refs:       enriched.refs       || [],
            icd11:      enriched.icd11      || null,
            fdaDrug:    enriched.fdaDrug    || null,
            rxclassATC: enriched.rxclassATC || null,
            trials:     enriched.trials     || null,
          }));
        } else {
          TERMS.push(normalizeTermForStorage(term));
        }
      } catch (e) {
        console.warn('AI enrichment failed for', term.en, e);
        TERMS.push(normalizeTermForStorage(term));
      }
      done++;
      updateAIProgress(done, needsAI.length);
      saveTermsToLocalStorage();
      applyFilters();
    }
    hideAIProgress();
  }

  updateBookmarkCount();
  saveTermsToLocalStorage();
  const addedCount = newRows.length;
  const msg = [
    overwriteCount > 0 ? `✏️ ${overwriteCount}개 덮어쓰기` : '',
    addedCount > 0     ? `➕ ${addedCount}개 신규 추가` : '',
  ].filter(Boolean).join(', ');
  showToast(`✅ ${msg || '처리 완료'}`);
  if (btn) { btn.disabled = false; btn.textContent = '✅ 가져오기'; }
  switchTab('search', document.querySelector('.nav-btn'));
  applyFilters();
}

async function submitAddTerm() {
  const ko = document.getElementById('add_ko')?.value.trim() || '';
  const en = document.getElementById('add_en')?.value.trim() || '';
  const uz = document.getElementById('add_uz')?.value.trim() || '';

  if (!ko && !en && !uz) { showToast('⚠️ 하나 이상 입력해주세요'); return; }

  if (TERMS.some(t =>
    (en && t.en.toLowerCase() === en.toLowerCase()) ||
    (ko && t.ko === ko) ||
    (uz && t.uz === uz)
  )) {
    showToast('⚠️ 이미 존재하는 용어입니다'); return;
  }

  const btn = document.getElementById('addSubmitBtn');
  const cfg = getAIConfig();
  const hasKey = cfg.route === 'openai' ? !!cfg.openaiKey
               : cfg.route === 'anthropic' ? !!cfg.anthropicKey
               : !!(cfg.openaiKey || cfg.anthropicKey);

  const newTerm = {
    id:       Date.now(),
    ko, en, uz,
    category: document.getElementById('add_category')?.value || '기타',
    def_ko:   document.getElementById('add_def_ko')?.value.trim() || '',
    def_en:   document.getElementById('add_def_en')?.value.trim() || '',
    def_uz:   document.getElementById('add_def_uz')?.value.trim() || '',
    usmle:    document.getElementById('add_usmle')?.value.trim() || '',
    ipa: '', refs: [], icd11: null, fdaDrug: null, rxclassATC: null, trials: null,
  };

  // claude.ai 환경이거나 API 키 있으면 AI 자동완성
  const canUseAI = isClaudeAiEnv() || hasKey;
  if (!canUseAI) {
    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    showToast(`✅ "${ko || en || uz}" 저장됨 (🤖 AI탭에서 키 등록 시 자동완성 가능)`);
    switchTab('search', document.querySelector('.nav-btn'));
    expandedId = TERMS[TERMS.length - 1].id;
    applyFilters();
    return;
  }

  // API 키 있으면 AI 자동완성
  if (btn) { btn.disabled = true; btn.textContent = '🤖 AI 처리 중...'; }

  try {
    const enriched = await enrichTermWithAI(newTerm);
    const finalKo = ko || enriched.ko || '';
    const finalEn = en || enriched.en || '';
    const finalUz = uz || enriched.uz || '';
    TERMS.push(normalizeTermForStorage({
      ...newTerm,
      ko: finalKo, en: finalEn, uz: finalUz,
      category:   newTerm.category !== '기타' ? newTerm.category : (enriched.category || '기타'),
      ipa:        enriched.ipa        || '',
      def_ko:     newTerm.def_ko     || enriched.def_ko     || '',
      def_en:     newTerm.def_en     || enriched.def_en     || '',
      def_uz:     newTerm.def_uz     || enriched.def_uz     || '',
      usmle:      newTerm.usmle      || enriched.usmle      || '',
      refs:       enriched.refs       || [],
      icd11:      enriched.icd11      || null,
      fdaDrug:    enriched.fdaDrug    || null,
      rxclassATC: enriched.rxclassATC || null,
      trials:     enriched.trials     || null,
    }));
    saveTermsToLocalStorage();
    showToast(`✅ "${finalKo || finalEn || finalUz}" AI 자동완성 추가 완료!`);
    switchTab('search', document.querySelector('.nav-btn'));
    expandedId = TERMS[TERMS.length - 1].id;
    applyFilters();
  } catch (err) {
    console.error(err);
    // AI 실패해도 기본 데이터로 저장
    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    showToast(`⚠️ AI 실패 — "${ko || en || uz}" 기본 저장됨. ✏️ 편집으로 내용 추가 가능`);
    switchTab('search', document.querySelector('.nav-btn'));
    expandedId = TERMS[TERMS.length - 1].id;
    applyFilters();
    if (btn) { btn.disabled = false; btn.textContent = '🤖 AI 자동완성으로 추가'; }
  }
}

// ─── Per-field AI Regeneration ───
const FIELD_PROMPTS = {
  ko:     (t) => `Translate this medical term to Korean (한국어). Return ONLY the Korean term name, nothing else.\nEnglish: ${t.en || t.uz}`,
  en:     (t) => `Translate this medical term to English. Return ONLY the English term name, nothing else.\nKorean: ${t.ko || t.uz}`,
  uz:     (t) => `Translate this medical term to Uzbek (O'zbek). Return ONLY the Uzbek term name, nothing else.\nEnglish: ${t.en}\nKorean: ${t.ko}`,
  ipa:    (t) => `Provide the Cambridge-style IPA pronunciation for this English medical term. Return ONLY the IPA string (e.g. /ˈsep.sɪs/), nothing else.\nTerm: ${t.en}`,
  def_ko: (t) => `Write a Korean (한국어) medical definition for "${t.ko || t.en}" at medical student level for USMLE. 1-2 sentences. Return ONLY the definition text.`,
  def_en: (t) => `Write an English medical definition for "${t.en || t.ko}" at medical student level for USMLE. 1-2 sentences. Return ONLY the definition text.`,
  def_uz: (t) => `Write an Uzbek (O'zbek) medical definition for "${t.uz || t.en}" at medical student level. 1-2 sentences. Return ONLY the definition text.`,
  usmle:  (t) => `Give a USMLE Step 1/2 CK high-yield one-liner for "${t.en || t.ko}". Format strictly: ↑X, ↓Y | Tx: Z | Trap: W. Return ONLY that one line, nothing else.`,
};

async function regenField(id, field) {
  const t = TERMS.find(x => x.id === id);
  if (!t) return;

  const inputEl = document.getElementById(`edit_${field}`);
  if (!inputEl) return;

  // Visual loading state
  const btn = inputEl.closest('div').querySelector('button');
  const prev = btn.textContent;
  btn.textContent = '⏳';
  btn.disabled = true;
  inputEl.style.opacity = '0.4';

  try {
    const result = (await callAIText(FIELD_PROMPTS[field](t), 300)).trim().replace(/^["']|["']$/g, '');
    if (result) inputEl.value = result;
    showToast(`✅ ${field} 재생성 완료`);
  } catch (err) {
    console.error(err);
    showToast('⚠️ 재생성 실패: AI 탭에서 API 설정 확인');
  } finally {
    btn.textContent = prev;
    btn.disabled = false;
    inputEl.style.opacity = '1';
  }
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

    ...TERMS[idx],
    ko:       document.getElementById('edit_ko')?.value.trim()       || TERMS[idx].ko,

    ipa:      document.getElementById('edit_ipa')?.value.trim()      || '',

function deleteTerm(id) {
  const t = TERMS.find(x => x.id === id);
  const label = t?.ko || t?.en || '이 용어';
  showConfirm(`"${label}"을 삭제할까요?`, () => {
    const idx = TERMS.findIndex(x => x.id === id);
    if (idx !== -1) TERMS.splice(idx, 1);
    bookmarks.delete(id);
    localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
    saveTermsToLocalStorage();
    deleteTermFromCloud(id);
    document.getElementById('editModal')?.remove();
    if (expandedId === id) expandedId = null;
    showToast('🗑️ 삭제 완료');
    updateBookmarkCount();
    applyFilters();
  });
}

async function bulkDeleteTerms() {
  const sel = document.getElementById('bulkDeleteCategory')?.value || '__all__';
  const targets = sel === '__all__' ? [...TERMS] : TERMS.filter(t => t.category === sel);
  if (targets.length === 0) { showToast('⚠️ 삭제할 용어가 없습니다'); return; }

  const label = sel === '__all__' ? `전체 ${targets.length}개 용어` : `${sel} 카테고리 ${targets.length}개 용어`;
  const hasCloud = !!getSupabaseConfig();
  const cloudNote = hasCloud ? '<br><span style="font-size:11px;color:#f87171">☁️ 클라우드에서도 삭제됩니다</span>' : '';

  showConfirm(
    `<b style="color:#f87171">${label}</b>를<br>모두 삭제할까요?<br><span style="font-size:11px;color:#6e7681">삭제 후 복구할 수 없습니다</span>${cloudNote}`,
    async () => {
      const deletedIds = targets.map(t => t.id);

      if (sel === '__all__') {
        TERMS.length = 0;
        bookmarks.clear();
        localStorage.setItem('kma_bookmarks', JSON.stringify([]));
      } else {
        const ids = new Set(deletedIds);
        for (let i = TERMS.length - 1; i >= 0; i--) {
          if (ids.has(TERMS[i].id)) TERMS.splice(i, 1);
        }
        ids.forEach(id => bookmarks.delete(id));
        localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
      }

      if (expandedId && !TERMS.some(t => t.id === expandedId)) expandedId = null;
      clearTermsLocalStorage();
      saveTermsToLocalStorage();
      updateBookmarkCount();
      applyFilters();
      showToast(`🗑️ ${label} 삭제 중...`);

      // 클라우드에서도 삭제
      if (hasCloud) {
        try {
          if (sel === '__all__') {
            await sbDeleteAll();
          } else {
            for (const id of deletedIds) await sbDeleteTerm(id);
          }
          showToast(`🗑️ ${label} 로컬 + 클라우드 삭제 완료`);
        } catch(e) {
          showToast(`⚠️ 로컬 삭제됨, 클라우드 삭제 실패 — 수동으로 동기화하세요`);
        }
      } else {
        showToast(`🗑️ ${label} 삭제 완료`);
      }
      showExportMenu();
    }
  );
}

// ─── 일괄 빈칸 채우기 (기능2) ───
async function bulkFillBlanks(scope = 'all') {
  const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey);
  if (!canAI) { showToast('⚠️ AI 키 필요 — AI탭에서 등록해주세요'); return; }

  const targets = scope === 'all'
    ? TERMS.filter(t => !t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa)
    : TERMS.filter(t => t.id === scope && (!t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa));

  if (!targets.length) { showToast('✅ 모든 용어가 완성되어 있습니다'); return; }

  showAIProgress(targets.length);
  let done = 0;
  for (const term of targets) {
    try {
      const enriched = await enrichTermWithAI(term);
      const idx = TERMS.findIndex(t => t.id === term.id);
      if (idx === -1) continue;
      const updated = { ...TERMS[idx] };
      let changed = false;
      ['def_ko','def_en','def_uz','usmle','ipa','ko','uz','category'].forEach(f => {
        if (!updated[f] && enriched[f]) { updated[f] = enriched[f]; changed = true; }
      });
      if (changed) {
        updated.updatedAt = new Date().toISOString();
        TERMS[idx] = normalizeTermForStorage(updated);
        saveTermToCloud(TERMS[idx]);
      }
    } catch(e) { console.warn('bulkFill error', e); }
    done++;
    updateAIProgress(done, targets.length);
  }
  hideAIProgress();
  saveTermsToLocalStorage();
  applyFilters();
  showToast(`✅ ${targets.length}개 용어 빈칸 채우기 완료`);
}

function exportFullBackup() {
  const header = 'ko\ten\tuz\tcategory\tdef_ko\tdef_en\tdef_uz\tusmle\tipa';
  const rows = TERMS.map(t => [
    cleanTsvCell(t.ko), cleanTsvCell(t.en), cleanTsvCell(t.uz || ''), cleanTsvCell(t.category || '기타'),
    cleanTsvCell(t.def_ko || ''), cleanTsvCell(t.def_en || ''), cleanTsvCell(t.def_uz || ''),
    cleanTsvCell(t.usmle || ''), cleanTsvCell(t.ipa || '')
  ].join('\t'));
  const tsv = [header, ...rows].join('\n');

  downloadTextFile(tsv, `DrBugeon_의학용어_백업_${new Date().toISOString().slice(0,10)}.tsv`);
  saveTermsToLocalStorage();
  showToast('💾 전체 데이터 저장 완료!');
}

function exportExcel() {
  if (!TERMS.length) { showToast('⚠️ 내보낼 용어가 없습니다'); return; }
  try {
    const header = ['ko','en','uz','category','def_ko','def_en','def_uz','usmle','ipa'];
    const rows = TERMS.map(t => header.map(k => t[k] || ''));
    const ws = XLSX.utils.aoa_to_sheet([header, ...rows]);
    // 컬럼 너비
    ws['!cols'] = [12,18,18,12,40,40,40,50,14].map(w => ({ wch: w }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '의학용어');
    const filename = `DrBugeon_의학용어_${new Date().toISOString().slice(0,10)}.xlsx`;
    XLSX.writeFile(wb, filename);
    showToast('📊 Excel 내보내기 완료!');
  } catch(e) {
    console.error(e);
    showToast('⚠️ Excel 내보내기 실패 — TSV를 사용해주세요');
  }
}

function cleanTsvCell(value) {
  return String(value ?? '')
    .replace(/\r?\n/g, ' ')
    .replace(/\t/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function cleanAnkiHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\r?\n/g, '<br>')
    .replace(/\t/g, ' ')
    .trim();
}

function ankiTags(t) {
  const cat = String(t.category || '기타').replace(/[^A-Za-z0-9가-힣_]+/g, '_');
  return `DrBugeon MedicalTerms ${cat}`;
}

function downloadTextFile(text, filename) {
  // claude.ai 환경: 클립보드 복사 + 텍스트 뷰어 모달
  if (isClaudeAiEnv()) {
    showExportViewer(text, filename);
    return;
  }
  // 일반 브라우저: Blob 다운로드
  try {
    const blob = new Blob(['\uFEFF' + text], { type: 'text/tab-separated-values;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) {
    showExportViewer(text, filename);
  }
}

  const ta = document.getElementById('evTextarea');
  if (!ta) return;

  const onSuccess = () => {
    const btn = document.getElementById('evCopyBtn');
    if (btn) {
      btn.textContent = '✅ 복사됨!';
      btn.style.background = '#1a7f37';
      setTimeout(() => { btn.textContent = '📋 전체 복사'; btn.style.background = '#238636'; }, 2500);
    }
    showToast('📋 클립보드에 복사됐습니다!');
  };

  const onFail = () => {
    // execCommand fallback (모바일 구형 브라우저)
    try {
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      if (ok) { onSuccess(); return; }
    } catch(e2) {}
    // 마지막 수단: 전체 선택만
    evSelectAll();
    showToast('전체 선택됨 — 길게 눌러 복사하세요 (Ctrl+C / Cmd+C)');
  };

  // Clipboard API (HTTPS / 현대 브라우저)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(onSuccess).catch(onFail);
  } else {
    onFail();
  }
}

function evSelectAll() {
  const ta = document.getElementById('evTextarea');
  if (!ta) return;
  ta.focus();
  ta.select();
  // iOS 대응
  ta.setSelectionRange(0, ta.value.length);
}

function exportAnki() {
  if (TERMS.length === 0) { showToast('⚠️ 내보낼 용어가 없습니다'); return; }

  const header = '#separator:tab\n#html:true\n#columns:Front\tBack\tTags';
  const rows = TERMS.map(t => {
    const front = [
      `<b>${cleanAnkiHtml(t.en || t.ko || t.uz)}</b>`,
      t.ipa ? `<br><span style="color:#888">${cleanAnkiHtml(t.ipa)}</span>` : ''
    ].join('');

    const back = [
      t.ko ? `<b>한국어</b>: ${cleanAnkiHtml(t.ko)}` : '',
      t.uz ? `<br><b>O'zbek</b>: ${cleanAnkiHtml(t.uz)}` : '',
      t.def_ko ? `<hr><b>정의</b><br>${cleanAnkiHtml(t.def_ko)}` : '',
      t.def_en ? `<br><br><b>English definition</b><br>${cleanAnkiHtml(t.def_en)}` : '',
      t.def_uz ? `<br><br><b>O'zbek ta'rif</b><br>${cleanAnkiHtml(t.def_uz)}` : '',
      t.usmle ? `<hr><b>USMLE High-Yield</b><br>${cleanAnkiHtml(t.usmle)}` : '',
      t.category ? `<hr><small>Category: ${cleanAnkiHtml(t.category)}</small>` : ''
    ].join('');

    return [front, back, ankiTags(t)].map(cleanTsvCell).join('\t');
  });

  const tsv = [header, ...rows].join('\n');
  downloadTextFile(tsv, `DrBugeon_Anki_의학용어_${new Date().toISOString().slice(0,10)}.tsv`);
  showToast(`📋 Anki TSV ${TERMS.length}개 내보내기 완료`);
}

let quizStep   = 0;   // 0=Korean 1=Uzbek 2=Meaning
let quizScore  = { correct: 0, total: 0 };
let quizPool   = [];
let quizIdx    = 0;

const QUIZ_STEPS = [
  { label: '① 한국어',   question: '영어 용어의 한국어는?',            ansKey: 'ko',     ansLabel: '🇰🇷 한국어' },

  { label: '③ 의미',     question: '이 용어의 뜻을 설명할 수 있나요?',   ansKey: 'def_en', ansLabel: '📖 English Definition' },
];

function startQuiz() {
  const available = currentFilter === '즐겨찾기'
    ? TERMS.filter(t => bookmarks.has(t.id))
    : TERMS.filter(t => currentFilter === 'all' || t.category === currentFilter);

  if (available.length === 0) { showToast('퀴즈할 용어가 없습니다'); return; }

  // Shuffle pool
  quizPool  = [...available].sort(() => Math.random() - 0.5);
  quizIdx   = 0;
  quizScore = { correct: 0, total: 0 };
  quizTerm  = quizPool[0];
  quizStep  = 0;
  renderQuizStep();
}

function renderQuizStep() {
  const main = document.getElementById('mainContent');
  if (!main) return;
  const t    = quizTerm;
  const step = QUIZ_STEPS[quizStep];
  const totalCards = quizPool.length * 3;
  const doneCards  = quizIdx * 3 + quizStep;
  const pct = Math.round(doneCards / totalCards * 100);

  // Step indicator dots
  const dots = QUIZ_STEPS.map((s, i) => `
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
      <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;

        <div style="font-size:11px;color:var(--text3);margin-top:6px">${step.question}</div>
      </div>

      <!-- Answer reveal -->
      <button id="revealBtn" onclick="revealQuizStep()" style="width:100%;background:var(--accent);border:none;border-radius:10px;padding:14px;color:#0d1117;font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-bottom:8px">

function revealQuizStep() {
  const ans = document.getElementById('quizAnswer');
  const btn = document.getElementById('revealBtn');
  if (ans) ans.style.display = 'block';
  if (btn) btn.style.display = 'none';
}

function quizNext(correct) {
  quizScore.total++;
  if (correct) quizScore.correct++;

  quizStep++;
  if (quizStep < 3) {
    // Next step on same term
    renderQuizStep();
    return;
  }

  // Move to next term
  quizStep = 0;
  quizIdx++;
  if (quizIdx >= quizPool.length) {
    showQuizResult();
    return;
  }
  quizTerm = quizPool[quizIdx];
  renderQuizStep();
}

// ─── External Medical APIs ───

async function fetchMedlinePlus(term) {
  try {
    const url = `https://connect.medlineplus.gov/application?mainSearchCriteria.v.cs=2.16.840.1.113883.6.90&mainSearchCriteria.v.dn=${encodeURIComponent(term)}&knowledgeResponseType=application/json&informationRecipient.languageCode.c=en`;
    const res = await fetch(url);
    const data = await res.json();
    const entries = data.feed?.entry || [];
    if (entries.length === 0) return null;
    const entry = entries[0];
    return {
      title:   entry.title?._value || '',
      summary: entry.summary?._value?.replace(/<[^>]+>/g, '').slice(0, 400) || '',
      url:     entry.link?.[0]?.href || ''
    };
  } catch { return null; }
}

async function fetchRxNorm(term) {
  try {
    const searchRes = await fetch(`https://rxnav.nlm.nih.gov/REST/rxcui.json?name=${encodeURIComponent(term)}&search=2`);
    const searchData = await searchRes.json();
    const rxcui = searchData.idGroup?.rxnormId?.[0];
    if (!rxcui) return null;
    const propRes = await fetch(`https://rxnav.nlm.nih.gov/REST/rxcui/${rxcui}/properties.json`);
    const propData = await propRes.json();
    const props = propData.properties;
    return {
      rxcui,
      name:     props?.name || '',
      synonym:  props?.synonym || '',
      tty:      props?.tty || '',
      url:      `https://mor.nlm.nih.gov/RxNav/search?searchBy=RXCUI&searchTerm=${rxcui}`
    };
  } catch { return null; }
}

async function fetchPubMed(term, maxResults = 3) {
  try {
    const searchRes = await fetch(
      `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(term + '[MeSH Terms]')}&retmax=${maxResults}&sort=relevance&retmode=json`
    );
    const searchData = await searchRes.json();
    const ids = searchData.esearchresult?.idlist || [];
    if (ids.length === 0) return [];

    const summaryRes = await fetch(
      `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`
    );
    const summaryData = await summaryRes.json();
    const result = summaryData.result || {};

    return ids.map(id => {
      const item = result[id] || {};
      const authors = (item.authors || []).slice(0, 2).map(a => a.name).join(', ');
      return {
        pmid:    id,
        title:   item.title || '',
        authors: authors + (item.authors?.length > 2 ? ' et al.' : ''),
        journal: item.fulljournalname || item.source || '',
        year:    item.pubdate?.slice(0, 4) || '',
        url:     `https://pubmed.ncbi.nlm.nih.gov/${id}/`
      };
    }).filter(r => r.title);
  } catch { return []; }
}

// ── NEW API 1: NLM Clinical Tables — disease autocomplete + ICD-10 ──
async function fetchNLMConditions(query, maxResults = 6) {
  try {
    const res = await fetch(
      `https://clinicaltables.nlm.nih.gov/api/conditions/v3/search?terms=${encodeURIComponent(query)}&maxList=${maxResults}&df=primary_name,consumer_name,icd10cm_codes`
    );
    const data = await res.json();
    // data = [total, codes_array, extra, display_array]
    const total = data[0] || 0;
    const codes = data[1] || [];
    const display = data[3] || [];
    if (total === 0) return [];
    return codes.map((code, i) => ({
      code,
      name: display[i]?.[0] || code,
      consumer: display[i]?.[1] || '',
      icd10: display[i]?.[2] || ''
    }));
  } catch { return []; }
}

// ── NEW API 2: OpenFDA — drug adverse events & warnings ──
async function fetchFDADrug(term) {
  try {
    // Search drug label for warnings
    const res = await fetch(
      `https://api.fda.gov/drug/label.json?search=openfda.generic_name:"${encodeURIComponent(term)}"&limit=1`
    );
    if (!res.ok) return null;
    const data = await res.json();
    const result = data.results?.[0];
    if (!result) return null;

    const warnings = result.warnings?.[0] || result.boxed_warning?.[0] || '';
    const indications = result.indications_and_usage?.[0] || '';
    const adverseRaw = result.adverse_reactions?.[0] || '';

    return {
      brandName:   result.openfda?.brand_name?.[0] || '',
      genericName: result.openfda?.generic_name?.[0] || '',
      drugClass:   result.openfda?.pharm_class_epc?.[0] || '',
      warnings:    warnings.replace(/<[^>]+>/g, '').slice(0, 300),
      indications: indications.replace(/<[^>]+>/g, '').slice(0, 200),
      adverse:     adverseRaw.replace(/<[^>]+>/g, '').slice(0, 250),
      hasBoxedWarning: !!result.boxed_warning
    };
  } catch { return null; }
}

// ── NEW API 3: RxClass — drug class (ATC, MeSH, VA) ──
async function fetchRxClass(rxcui) {
  if (!rxcui) return null;
  try {
    const res = await fetch(
      `https://rxnav.nlm.nih.gov/REST/rxclass/class/byRxcui.json?rxcui=${rxcui}&relaSource=ATC`
    );
    const data = await res.json();
    const classes = data.rxclassDrugInfoList?.rxclassDrugInfo || [];
    const atcClasses = classes
      .filter(c => c.rxclassMinConceptItem?.classType === 'ATC1-4')
      .slice(0, 3)
      .map(c => ({
        name: c.rxclassMinConceptItem?.className || '',
        id:   c.rxclassMinConceptItem?.classId || ''
      }));
    return atcClasses.length > 0 ? atcClasses : null;
  } catch { return null; }
}

// ── NEW API 4: WHO ICD-11 — get ICD-11 code ──
// Uses the public linearization search (no token needed for read)
async function fetchICD11(term) {
  try {
    const res = await fetch(
      `https://id.who.int/icd/release/11/2024-01/mms/search?q=${encodeURIComponent(term)}&subtreesFilter=&includeKeywordResult=true&useFlexisearch=false&flatResults=true&highlightingEnabled=false`,
      { headers: { 'Accept': 'application/json', 'Accept-Language': 'en', 'API-Version': 'v2' } }
    );
    if (!res.ok) return null;
    const data = await res.json();
    const dest = data.destinationEntities;
    if (!dest || dest.length === 0) return null;
    const top = dest[0];
    return {
      code:  top.theCode || '',
      title: top.title || '',
      url:   top['@id'] || ''
    };
  } catch { return null; }
}

// ── NEW API 5: ClinicalTrials.gov v2 — active trial count ──
async function fetchClinicalTrials(term) {
  try {
    const res = await fetch(
      `https://clinicaltrials.gov/api/v2/studies?query.cond=${encodeURIComponent(term)}&filter.overallStatus=RECRUITING&pageSize=1&countTotal=true`
    );
    if (!res.ok) return null;
    const data = await res.json();
    return { count: data.totalCount || 0 };
  } catch { return null; }
}
