function normalizeIpaLookupTerm(value) {
  return String(value || '')
    .trim()
    .toLowerCase()
    .replace(/\([^)]*\)/g, ' ')
    .replace(/[^a-z\s-]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function formatIpa(value) {
  const text = String(value || '').trim().replace(/^\/|\/$/g, '');
  return text ? `/${text}/` : '';
}

function arpabetToIPA(arpabet) {
  const tokens = String(arpabet || '').trim().split(/\s+/).filter(Boolean);
  if (!tokens.length) return '';
  return tokens.map(token => {
    if (token === '|') return ' ';
    const match = token.match(/^([A-Z]+)([012])?$/);
    if (!match) return '';
    const base = match[1];
    const stress = match[2];
    const ipa = CMU_ARPABET_TO_IPA[base] || '';
    if (!ipa) return '';
    if (stress === '1') return `ˈ${ipa}`;
    if (stress === '2') return `ˌ${ipa}`;
    if (base === 'AH' && stress === '0') return 'ə';
    if (base === 'ER' && stress === '0') return 'ɚ';
    return ipa;
  }).join('')
    .replace(/([pbtdkɡfvθðszʃʒhmnŋlrwj]+)([ˈˌ])(?=[ɑæʌɔəeɪiːoʊuɛɝɚʊ])/g, '$2$1')
    .replace(/\s+/g, ' ')
    .trim();
}

function generateCmuMiniIPA(term) {
  const normalized = normalizeIpaLookupTerm(term);
  if (!normalized) return '';
  if (CMU_MEDICAL_ARPABET[normalized]) return formatIpa(arpabetToIPA(CMU_MEDICAL_ARPABET[normalized]));
  const words = normalized.split(/[\s-]+/).filter(Boolean);
  if (!words.length) return '';
  const parts = words.map(word => CMU_MEDICAL_ARPABET[word] ? arpabetToIPA(CMU_MEDICAL_ARPABET[word]) : '');
  return parts.every(Boolean) ? formatIpa(parts.join(' ')) : '';
}

const IPA_API_CACHE = new Map();

function cleanDictionaryIpaText(value) {
  const text = String(value || '').trim();
  if (!text) return '';
  const withoutSlashes = text.replace(/^\/|\/$/g, '').trim();
  if (!withoutSlashes || withoutSlashes.length > 80) return '';
  return formatIpa(withoutSlashes);
}

async function fetchDictionaryWordIPA(word) {
  const clean = String(word || '').toLowerCase().replace(/[^a-z-]/g, '').trim();
  if (!clean) return '';
  if (IPA_API_CACHE.has(clean)) return IPA_API_CACHE.get(clean);
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 3500);
    const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(clean)}`, {
      signal: controller.signal
    });
    clearTimeout(timer);
    if (!res.ok) {
      IPA_API_CACHE.set(clean, '');
      return '';
    }
    const data = await res.json();
    const entries = Array.isArray(data) ? data : [];
    const candidates = [];
    entries.forEach(entry => {
      if (entry.phonetic) candidates.push(entry.phonetic);
      (entry.phonetics || []).forEach(p => { if (p.text) candidates.push(p.text); });
    });
    const ipa = candidates.map(cleanDictionaryIpaText).find(Boolean) || '';
    IPA_API_CACHE.set(clean, ipa);
    return ipa;
  } catch {
    IPA_API_CACHE.set(clean, '');
    return '';
  }
}

async function fetchDictionaryIPA(term) {
  const normalized = normalizeIpaLookupTerm(term);
  if (!normalized) return '';
  const exact = await fetchDictionaryWordIPA(normalized.replace(/\s+/g, '-'));
  if (exact) return exact;
  const words = normalized.split(/[\s-]+/).filter(Boolean);
  if (!words.length || words.length > 5) return '';
  const parts = [];
  for (const word of words) {
    const ipa = await fetchDictionaryWordIPA(word);
    if (!ipa) return '';
    parts.push(ipa.replace(/^\/|\/$/g, ''));
  }
  return parts.length ? formatIpa(parts.join(' ')) : '';
}

function roughIpaStem(word) {
  let s = String(word || '').toLowerCase().replace(/[^a-z]/g, '');
  if (!s) return '';
  s = s
    .replace(/tion/g, 'ʃən')
    .replace(/sion/g, 'ʒən')
    .replace(/ph/g, 'f')
    .replace(/th/g, 'θ')
    .replace(/sh/g, 'ʃ')
    .replace(/ch/g, 'k')
    .replace(/qu/g, 'kw')
    .replace(/ck/g, 'k')
    .replace(/x/g, 'ks');
  s = s.replace(/c(?=[eiy])/g, 's').replace(/c/g, 'k');
  s = s.replace(/g(?=[eiy])/g, 'dʒ').replace(/g/g, 'ɡ');
  s = s
    .replace(/ee/g, 'iː')
    .replace(/ea/g, 'iː')
    .replace(/oo/g, 'uː')
    .replace(/ou/g, 'aʊ')
    .replace(/ai/g, 'eɪ')
    .replace(/ay/g, 'eɪ')
    .replace(/oa/g, 'oʊ')
    .replace(/a/g, 'æ')
    .replace(/e/g, 'e')
    .replace(/i/g, 'ɪ')
    .replace(/o/g, 'ɑː')
    .replace(/u/g, 'ʌ')
    .replace(/y$/g, 'i');
  return s;
}

function localIpaForWord(word) {
  const clean = String(word || '').toLowerCase().replace(/[^a-z]/g, '');
  if (!clean || /^[ivxlcdm]+$/.test(clean)) return '';
  if (LOCAL_IPA_WORDS[clean]) return LOCAL_IPA_WORDS[clean];
  for (const [suffix, ipa] of LOCAL_IPA_SUFFIXES) {
    if (clean.endsWith(suffix) && clean.length > suffix.length + 1) {
      const stem = clean.slice(0, -suffix.length);
      const stemIpa = LOCAL_IPA_WORDS[stem] || roughIpaStem(stem);
      return stemIpa ? `${stemIpa}.${ipa}` : ipa;
    }
  }
  return roughIpaStem(clean);
}

function generateLocalIPA(term) {
  const normalized = normalizeIpaLookupTerm(term);
  if (!normalized) return '';
  if (LOCAL_IPA_PHRASES[normalized]) return `/${LOCAL_IPA_PHRASES[normalized]}/`;
  const parts = normalized
    .split(/[\s-]+/)
    .map(localIpaForWord)
    .filter(Boolean);
  return parts.length ? `/${parts.join(' ')}/` : '';
}

async function generateBestIPA(term) {
  const cmuIpa = generateCmuMiniIPA(term);
  if (cmuIpa) return { ipa: cmuIpa, source: 'CMU mini' };
  const dictionaryIpa = await fetchDictionaryIPA(term);
  if (dictionaryIpa) return { ipa: dictionaryIpa, source: 'Free Dictionary' };
  const localIpa = generateLocalIPA(term);
  if (localIpa) return { ipa: localIpa, source: '앱 내부 규칙' };
  return { ipa: '', source: '' };
}

async function regenField(id, field) {
  const t = TERMS.find(x => x.id === id);
  if (!t) { showToast('⚠️ 용어를 찾을 수 없습니다'); return; }
  if (!FIELD_PROMPTS[field]) { showToast('⚠️ 이 항목은 AI 재생성을 지원하지 않습니다'); return; }

  const inputEl = document.getElementById(`edit_${field}`);
  if (!inputEl) { showToast('⚠️ 편집 칸을 찾을 수 없습니다'); return; }
  const editModal = document.getElementById('editModal');
  const requestStartValue = inputEl.value;
  const canApplyRegenResult = () => (
    document.body.contains(inputEl) &&
    document.getElementById('editModal') === editModal &&
    inputEl.value === requestStartValue
  );
  const current = {
    ...t,
    ko: document.getElementById('edit_ko')?.value.trim() || t.ko,
    en: document.getElementById('edit_en')?.value.trim() || t.en,
    uz: document.getElementById('edit_uz')?.value.trim() || t.uz,
    ipa: document.getElementById('edit_ipa')?.value.trim() || t.ipa,
    def_ko: document.getElementById('edit_def_ko')?.value.trim() || t.def_ko,
    def_en: document.getElementById('edit_def_en')?.value.trim() || t.def_en,
    def_uz: document.getElementById('edit_def_uz')?.value.trim() || t.def_uz,
    usmle: document.getElementById('edit_usmle')?.value.trim() || t.usmle,
  };

  // Visual loading state
  const btn = inputEl.closest('div').querySelector('button');
  const prev = btn?.textContent || '🔄';
  if (btn) {
    btn.textContent = '⏳';
    btn.disabled = true;
  }
  inputEl.style.opacity = '0.4';
  showToast(field === 'ipa' ? '🔤 IPA 자동생성 중...' : '🤖 AI 재생성 중...');

  try {
    if (field === 'ipa') {
      const generated = await generateBestIPA(current.en || current.ko || current.uz);
      if (generated.ipa) {
        if (!canApplyRegenResult()) {
          if (document.body.contains(inputEl)) showToast('ℹ️ 입력값이 바뀌어 IPA 결과를 적용하지 않았습니다');
          return;
        }
        inputEl.value = generated.ipa;
        showToast(`✅ IPA 자동생성 완료 · ${generated.source}`);
        return;
      }
    }

    if (!isClaudeAiEnv() && !hasConfiguredAIKey()) {
      showToast('⚠️ 설정에서 API 키를 먼저 저장하세요');
      return;
    }

    const result = (await callAIText(FIELD_PROMPTS[field](current), 300, 'field')).trim().replace(/^["']|["']$/g, '');
    if (!canApplyRegenResult()) {
      if (document.body.contains(inputEl)) showToast('ℹ️ 입력값이 바뀌어 AI 결과를 적용하지 않았습니다');
      return;
    }
    if (result) inputEl.value = result;
    showToast(`✅ ${field} 재생성 완료`);
  } catch (err) {
    console.error(err);
    showToast(`⚠️ 재생성 실패: ${err.message || 'AI 설정 확인'}`);
  } finally {
    if (document.body.contains(inputEl) && document.getElementById('editModal') === editModal && btn) {
      btn.textContent = prev;
      btn.disabled = false;
      inputEl.style.opacity = '1';
    }
  }
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function saveEdit(id) {
  const idx = TERMS.findIndex(x => x.id === id);
  if (idx === -1) return;

  const editedCategory = document.getElementById('edit_category')?.value?.trim();
  const editedConcept = document.getElementById('edit_concept_category')?.value?.trim();
  TERMS[idx] = normalizeTermForStorage({
    ...TERMS[idx],
    ko:       document.getElementById('edit_ko')?.value.trim()       || TERMS[idx].ko,
    en:       document.getElementById('edit_en')?.value.trim()       || TERMS[idx].en,
    uz:       document.getElementById('edit_uz')?.value.trim()       || '',
    ipa:      document.getElementById('edit_ipa')?.value.trim()      || '',
    category: editedCategory || TERMS[idx].category || '기타',
    concept_category: editedConcept || TERMS[idx].concept_category || 'Other / Unclassified',
    system_tags: document.getElementById('edit_system_tags')?.value.trim() || '',
    def_ko:   document.getElementById('edit_def_ko')?.value.trim()   || '',
    def_en:   document.getElementById('edit_def_en')?.value.trim()   || '',
    def_uz:   document.getElementById('edit_def_uz')?.value.trim()   || '',
    usmle:    document.getElementById('edit_usmle')?.value.trim()    || '',
  });

  TERMS[idx].updatedAt = new Date().toISOString();
  saveTermsToLocalStorage();
  saveTermToCloud(TERMS[idx]);
  document.getElementById('editModal')?.remove();
  showToast('✅ 수정 완료');
  applyFilters();
  // 드로어가 이 용어로 열려있으면 내용 갱신
  if (_drawerTermId === id) {
    const updated = TERMS.find(x => x.id === id);
    if (updated) _renderDrawerContent(updated);
  }
}

function deleteTerm(id) {
  const t = TERMS.find(x => x.id === id);
  const label = t?.ko || t?.en || '이 용어';
  showConfirm(`"${escapeHtml(label)}"을 삭제할까요?`, () => {
    const idx = TERMS.findIndex(x => x.id === id);
    if (idx !== -1) TERMS.splice(idx, 1);
    const tombstone = recordLocalTombstone(t);
    bookmarks.delete(id);
    safeSetItem('kma_bookmarks', JSON.stringify([...bookmarks]));
    saveTermsToLocalStorage();
    deleteTermFromCloud(id, tombstone?.deletedAt);
    document.getElementById('editModal')?.remove();
    if (expandedId === id) { expandedId = null; closeDrawer(); }
    showToast('🗑️ 삭제 완료');
    updateBookmarkCount();
    applyFilters();
  });
}

  const tombstones = loadLocalTombstones();
  const drugTombstones = loadLocalDrugTombstones();
  const formulaTombstones = loadLocalFormulaTombstones();
  const visibleTrashCount = tombstones.filter(t => !t.hiddenAt).length;
  const visibleDrugTrashCount = drugTombstones.filter(d => !d.hiddenAt).length;
  const visibleFormulaTrashCount = formulaTombstones.filter(f => !f.hiddenAt).length;
  const localMeta = getLocalSyncMeta();
  const cacheMeta = safeJsonParse(localStorage.getItem(LOCAL_CACHE_META_KEY), {}) || {};
  const categories = [...new Set(TERMS.map(t => t.category || '기타'))].sort();
  const drugSystems = [...new Set(DRUGS.map(d => d.category || 'General'))].sort();
  const formulaSystems = [...new Set(FORMULAS.map(f => f.system || 'General'))].sort();
  const reviewed = Object.values(learning).filter(s => s.lastReviewedAt).length;
  const due = Object.values(learning).filter(s => s.dueAt && new Date(s.dueAt) <= new Date()).length;
  const activeTerms = dedupeTermsById(TERMS).filter(t => !t.deletedAt);
  const activeDrugs = dedupeDrugsById(DRUGS).filter(d => !d.deletedAt);
  const activeFormulas = dedupeFormulasById(FORMULAS).filter(f => !f.deletedAt);
  const incompleteTerms = activeTerms.filter(t => !t.ko || !t.en || !t.uz || !t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa).length;

function formatDataDate(value) {
  if (!value) return '기록 없음';
  const date = new Date(value);
  return Number.isNaN(date.getTime()) ? '기록 없음' : date.toLocaleString('ko-KR');
}

function safeFilePart(value) {
  return String(value || '전체').replace(/[\\/:*?"<>|]+/g, '-').replace(/\s+/g, '_');
}

function dataFilePrefix(label) {
  const now = new Date();
  const date = [
    now.getFullYear(),
    String(now.getMonth() + 1).padStart(2, '0'),
    String(now.getDate()).padStart(2, '0')
  ].join('-');
  const time = [now.getHours(), now.getMinutes(), now.getSeconds()].map(v => String(v).padStart(2, '0')).join('-');
  return `${date}_${time}_Dr_Bugeon_의학용어_${safeFilePart(label)}`;
}

function downloadBlobFile(content, filename, mime = 'application/octet-stream') {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement('a');
  anchor.href = url;
  anchor.download = filename;
  document.body.appendChild(anchor);
  anchor.click();
  anchor.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function getTermsByScope(scope) {
  const learning = getLearningStateMap();
  const now = Date.now();
  if (scope === 'visible') return Array.isArray(_lastFilteredTerms) ? [..._lastFilteredTerms] : [...TERMS];
  if (scope === 'bookmarks') return TERMS.filter(t => bookmarks.has(t.id));
  if (scope === 'learning') return TERMS.filter(t => ['learning', 'review'].includes(learning[String(t.id)]?.studyStatus));
  if (scope === 'due') return TERMS.filter(t => {
    const dueAt = learning[String(t.id)]?.dueAt;
    return dueAt && Date.parse(dueAt) <= now;
  });
  if (scope === 'mastered') return TERMS.filter(t => learning[String(t.id)]?.studyStatus === 'mastered');
  if (scope === 'incomplete') return TERMS.filter(t => !t.ko || !t.en || !t.uz || !t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa);
  return [...TERMS];
}

function getDrugsByExportScope(scope) {
  const active = dedupeDrugsById(DRUGS).filter(d => !d.deletedAt);
  if (scope === 'visible') return filterDrugsForQuery(document.getElementById('searchInput')?.value || '');
  if (scope && scope.startsWith('system:')) {
    const system = scope.slice(7);
    return active.filter(d => drugSystemValues(d).includes(system));
  }
  if (scope && scope.startsWith('class:')) {
    const cls = scope.slice(6);
    return active.filter(d => drugClassValue(d) === cls);
  }
  return active;
}

function getFormulasByExportScope(scope) {
  const active = dedupeFormulasById(FORMULAS).filter(f => !f.deletedAt);
  if (scope === 'visible') return filterFormulasForQuery(document.getElementById('searchInput')?.value || '');
  if (scope && scope.startsWith('system:')) {
    const system = scope.slice(7);
    return active.filter(f => formulaSystemValues(f).includes(system));
  }
  if (scope && scope.startsWith('category:')) {
    const category = scope.slice(9);
    return active.filter(f => (f.category || 'General') === category);
  }
  return active;
}

function updateDataExportPanel(keepScope = false) {

  if (!domainSelect || !scopeSelect || !output) return;
  const domain = domainSelect.value || 'terms';
  const previous = keepScope ? scopeSelect.value : '';
  let options = [];
  if (domain === 'drugs') {
    const systems = countOptionsFromDrugs(drugSystemValues);
    const classes = countOptionsFromDrugs(drugClassValue);
    options = [
      ['all', `전체 약물명 및 정보 (${getDrugsByExportScope('all').length}개)`],
      ['visible', `현재 검색·필터 결과 (${getDrugsByExportScope('visible').length}개)`],
      ...classes.map(o => [`class:${o.value}`, `USMLE 계열 · ${drugClassDisplay(o.value)} (${o.count}개)`]),
      ...systems.map(o => [`system:${o.value}`, `장기계 · ${drugSystemDisplay(o.value)} (${o.count}개)`]),
    ];
  } else if (domain === 'formulas') {
    const systems = countOptionsFromFormulas(formulaSystemValues);
    const categories = countOptionsFromFormulas(f => f.category || 'General');
    options = [
      ['all', `전체 주요 의학계산공식 (${getFormulasByExportScope('all').length}개)`],
      ['visible', `현재 검색·필터 결과 (${getFormulasByExportScope('visible').length}개)`],
      ...categories.map(o => [`category:${o.value}`, `공식 분야 · ${o.value} (${o.count}개)`]),
      ...systems.map(o => [`system:${o.value}`, `장기계 · ${drugSystemDisplay(o.value)} (${o.count}개)`]),
    ];
  } else {
    const cats = [...new Set(TERMS.map(t => t.category || '기타'))].sort();
    options = [
      ['all', `전체 일반용어 (${getTermsByScope('all').length}개)`],
      ['visible', `현재 검색·필터 결과 (${getTermsByScope('visible').length}개)`],
      ['bookmarks', `즐겨찾기 (${getTermsByScope('bookmarks').length}개)`],
      ['learning', `학습 중 (${getTermsByScope('learning').length}개)`],
      ['due', `복습 예정 (${getTermsByScope('due').length}개)`],
      ['mastered', `숙달 (${getTermsByScope('mastered').length}개)`],
      ['incomplete', `빈칸 · 검토 필요 (${getTermsByScope('incomplete').length}개)`],
      ...cats.map(cat => [`category:${cat}`, `의학 분야 · ${cat} (${TERMS.filter(t => (t.category || '기타') === cat).length}개)`]),
    ];
  }
  scopeSelect.innerHTML = options.map(([value, label]) => `<option value="${escapeHtml(value)}">${escapeHtml(label)}</option>`).join('');
  if (previous && options.some(([value]) => value === previous)) scopeSelect.value = previous;
  const rows = domain === 'drugs' ? getDrugsByExportScope(scopeSelect.value)
    : domain === 'formulas' ? getFormulasByExportScope(scopeSelect.value)
    : scopeSelect.value.startsWith('category:') ? TERMS.filter(t => (t.category || '기타') === scopeSelect.value.slice(9))
    : getTermsByScope(scopeSelect.value);
  output.textContent = `내보낼 항목 ${rows.length}개`;

function exportTermCollection(terms, label, format) {
  if (!terms.length) { showToast('⚠️ 선택한 범위에 용어가 없습니다'); return; }
  const prefix = dataFilePrefix(label);
  if (format === 'xlsx') {
    if (!window.XLSX) { showToast('⚠️ Excel 모듈을 불러오지 못했습니다'); return; }
    const worksheet = XLSX.utils.json_to_sheet(termExportRows(terms));
    worksheet['!cols'] = [10,16,18,18,20,18,24,38,38,38,48,16,28,28,28,28,28,24,24].map(wch => ({ wch }));
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, 'Medical Terms');
    XLSX.writeFile(workbook, `${prefix}.xlsx`);
  } else if (format === 'csv') {
    const rows = termExportRows(terms);
    const headers = Object.keys(rows[0]);
    const csv = [headers.join(','), ...rows.map(row => headers.map(key => csvCell(row[key])).join(','))].join('\r\n');
    downloadBlobFile('\uFEFF' + csv, `${prefix}.csv`, 'text/csv;charset=utf-8');
  } else {
    const header = '#separator:tab\n#html:true\n#columns:Front\tBack\tTags';
    const rows = terms.map(t => {
      const front = `<b>${cleanAnkiHtml(t.en)}</b>${t.ipa ? `<br>${cleanAnkiHtml(t.ipa)}` : ''}`;
      const back = [
        t.ko ? `<b>한국어</b>: ${cleanAnkiHtml(t.ko)}` : '',
        t.uz ? `<b>O'zbek</b>: ${cleanAnkiHtml(t.uz)}` : '',
        t.def_ko ? `<br><b>정의</b>: ${cleanAnkiHtml(t.def_ko)}` : '',
        t.usmle ? `<br><b>USMLE</b>: ${cleanAnkiHtml(t.usmle)}` : '',
      ].filter(Boolean).join('<br>');
      return [front, back, ankiTags(t)].join('\t');
    });
    downloadBlobFile('\uFEFF' + [header, ...rows].join('\n'), `${prefix}_Anki.tsv`, 'text/tab-separated-values;charset=utf-8');
  }
  showToast(`✅ ${label} ${terms.length}개 내보내기 완료`);
}

async function showSyncDiagnostics() {
  if (!getSupabaseConfig()) {
    showToast('⚠️ Supabase 설정 먼저 저장하세요');
    return;
  }
  showToast('☁️ 동기화 상태 점검 중...');
  const [cloudTerms, cloudDrugs, cloudFormulas, canonicalMeta] = await Promise.all([sbLoadAll(), sbLoadAllDrugs(), sbLoadAllFormulas(), sbLoadCanonicalMeta()]);
  if (cloudTerms === null || canonicalMeta === null) {
    showToast('⚠️ 클라우드 상태 확인 실패 · Supabase 설정을 확인하세요');
    return;
  }

  const localMeta = getLocalSyncMeta();
  const cloudActive = dedupeTermsById(cloudTerms).filter(t => !t.deletedAt);
  const cloudDeleted = dedupeTermsById(cloudTerms).filter(t => t.deletedAt);
  const cloudActiveDrugs = Array.isArray(cloudDrugs) ? dedupeDrugsById(cloudDrugs).filter(d => !d.deletedAt) : [];
  const cloudDeletedDrugs = Array.isArray(cloudDrugs) ? dedupeDrugsById(cloudDrugs).filter(d => d.deletedAt) : [];
  const cloudActiveFormulas = Array.isArray(cloudFormulas) ? dedupeFormulasById(cloudFormulas).filter(f => !f.deletedAt) : [];
  const cloudDeletedFormulas = Array.isArray(cloudFormulas) ? dedupeFormulasById(cloudFormulas).filter(f => f.deletedAt) : [];
  const cloudIds = new Set(cloudActive.map(t => String(t.id)));
  const localIds = new Set(TERMS.map(t => String(t.id)));
  const localOnly = TERMS.filter(t => !cloudIds.has(String(t.id)));
  const cloudOnly = cloudActive.filter(t => !localIds.has(String(t.id)));
  const localActiveFence = filterLocalRowsAfterCanonicalFence(TERMS, cloudTerms, canonicalMeta);
  const localTombstoneFence = filterLocalRowsAfterCanonicalFence(loadLocalTombstones(), cloudTerms, canonicalMeta);
  const localDrugActiveFence = Array.isArray(cloudDrugs) ? filterLocalRowsAfterCanonicalFence(DRUGS, cloudDrugs, canonicalMeta) : { skipped: 0 };
  const localDrugTombstoneFence = Array.isArray(cloudDrugs) ? filterLocalRowsAfterCanonicalFence(loadLocalDrugTombstones(), cloudDrugs, canonicalMeta) : { skipped: 0 };
  const localFormulaActiveFence = Array.isArray(cloudFormulas) ? filterLocalRowsAfterCanonicalFence(FORMULAS, cloudFormulas, canonicalMeta) : { skipped: 0 };
  const localFormulaTombstoneFence = Array.isArray(cloudFormulas) ? filterLocalRowsAfterCanonicalFence(loadLocalFormulaTombstones(), cloudFormulas, canonicalMeta) : { skipped: 0 };
  const staleSkipped = localActiveFence.skipped + localTombstoneFence.skipped + localDrugActiveFence.skipped + localDrugTombstoneFence.skipped + localFormulaActiveFence.skipped + localFormulaTombstoneFence.skipped;

function compactHash(value) {
  const text = String(value || '');
  if (!text) return '없음';
  return text.length > 18 ? `${text.slice(0, 10)}...${text.slice(-8)}` : text;
}

async function readDataImportFile(file, kind) {
  if (kind === 'json') {
    const parsed = JSON.parse(await file.text());
    const hasTermPayload = !!parsed && Object.prototype.hasOwnProperty.call(parsed, 'terms') && Array.isArray(parsed.terms);
    const hasDrugPayload = !!parsed && Object.prototype.hasOwnProperty.call(parsed, 'drugs') && Array.isArray(parsed.drugs);
    const hasDrugTombstonePayload = !!parsed && Object.prototype.hasOwnProperty.call(parsed, 'drugTombstones') && Array.isArray(parsed.drugTombstones);
    const hasFormulaPayload = !!parsed && Object.prototype.hasOwnProperty.call(parsed, 'formulas') && Array.isArray(parsed.formulas);
    const hasFormulaTombstonePayload = !!parsed && Object.prototype.hasOwnProperty.call(parsed, 'formulaTombstones') && Array.isArray(parsed.formulaTombstones);
    if (!hasTermPayload && !hasDrugPayload && !hasFormulaPayload && !hasDrugTombstonePayload && !hasFormulaTombstonePayload) {
      throw new Error('지원되는 백업 JSON이 아닙니다.');
    }
    return {
      kind,
      fileName: file.name,
      terms: hasTermPayload ? dedupeTermsById(parsed.terms) : [],
      drugs: hasDrugPayload ? dedupeDrugsById(parsed.drugs) : [],
      formulas: hasFormulaPayload ? dedupeFormulasById(parsed.formulas) : [],
      learningStates: parsed.learningStates || {},
      tombstones: hasTermPayload && Array.isArray(parsed.tombstones) ? parsed.tombstones : [],
      drugTombstones: hasDrugTombstonePayload ? parsed.drugTombstones : [],
      formulaTombstones: hasFormulaTombstonePayload ? parsed.formulaTombstones : [],
      syncMeta: parsed.syncMeta || {},
      hasTermPayload,
      hasDrugPayload,
      hasDrugTombstonePayload,
      hasFormulaPayload,
      hasFormulaTombstonePayload,
    };
  }

  let rows;
  if (/\.xlsx?$/i.test(file.name)) {
    const workbook = XLSX.read(new Uint8Array(await file.arrayBuffer()), { type: 'array' });
    rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: '' });
  } else {
    const text = await file.text();
    const workbook = XLSX.read(text, { type: 'string' });
    rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: '' });
  }
  return { kind, fileName: file.name, terms: normalizeImportedTableRows(rows), drugs: [], formulas: [], learningStates: {}, tombstones: [], drugTombstones: [], formulaTombstones: [], hasTermPayload: true, hasDrugPayload: false, hasDrugTombstonePayload: false, hasFormulaPayload: false, hasFormulaTombstonePayload: false };
}

function calculateImportPreview(importData) {
  const existingById = new Map(TERMS.map(t => [String(t.id), t]));
  const existingByName = new Map(TERMS.map(t => [termIdentityKey(t), t]));
  let added = 0;
  let updated = 0;
  importData.terms.forEach(term => {
    const existing = importData.kind === 'json' ? existingById.get(String(term.id)) : existingByName.get(termIdentityKey(term));
    if (existing) updated++;
    else added++;
  });
  const incomingIds = new Set(importData.terms.map(t => String(t.id)));
  const replaced = importData.kind === 'json' && importData.hasTermPayload ? TERMS.filter(t => !incomingIds.has(String(t.id))).length : Math.max(0, importData.hasTermPayload ? TERMS.length - updated : 0);
  const existingDrugIds = new Set(DRUGS.map(d => String(d.id)));
  const incomingDrugs = Array.isArray(importData.drugs) ? importData.drugs : [];
  const incomingDrugIds = new Set(incomingDrugs.map(d => String(d.id)));
  const drugAdded = importData.hasDrugPayload ? incomingDrugs.filter(d => !existingDrugIds.has(String(d.id))).length : 0;
  const drugUpdated = importData.hasDrugPayload ? incomingDrugs.length - drugAdded : 0;
  const drugReplaced = importData.kind === 'json' && importData.hasDrugPayload ? DRUGS.filter(d => !incomingDrugIds.has(String(d.id))).length : 0;
  const existingFormulaIds = new Set(FORMULAS.map(f => String(f.id)));
  const incomingFormulas = Array.isArray(importData.formulas) ? importData.formulas : [];
  const incomingFormulaIds = new Set(incomingFormulas.map(f => String(f.id)));
  const formulaAdded = importData.hasFormulaPayload ? incomingFormulas.filter(f => !existingFormulaIds.has(String(f.id))).length : 0;
  const formulaUpdated = importData.hasFormulaPayload ? incomingFormulas.length - formulaAdded : 0;
  const formulaReplaced = importData.kind === 'json' && importData.hasFormulaPayload ? FORMULAS.filter(f => !incomingFormulaIds.has(String(f.id))).length : 0;
  return { added, updated, replaced, drugAdded, drugUpdated, drugReplaced, formulaAdded, formulaUpdated, formulaReplaced, hasTermPayload: !!importData.hasTermPayload, hasDrugPayload: !!importData.hasDrugPayload, hasFormulaPayload: !!importData.hasFormulaPayload };
}

async function applyPendingDataImport() {
  if (!pendingDataImport) return;
  const mode = document.getElementById('dataImportMode')?.value || 'merge';
  const incoming = dedupeTermsById(pendingDataImport.terms);
  const incomingDrugs = dedupeDrugsById(pendingDataImport.drugs || []);
  const incomingFormulas = dedupeFormulasById(pendingDataImport.formulas || []);
  const hasTermPayload = !!pendingDataImport.hasTermPayload;
  const hasDrugPayload = !!pendingDataImport.hasDrugPayload;
  const hasFormulaPayload = !!pendingDataImport.hasFormulaPayload;

  if (mode === 'replace') {
    exportCompleteJsonBackup();
    let removed = [];
    if (hasTermPayload) {
      const incomingIds = new Set(incoming.map(t => String(t.id)));
      removed = TERMS.filter(t => !incomingIds.has(String(t.id))).map(recordLocalTombstone);
      TERMS.length = 0;
      TERMS.push(...incoming.filter(t => !t.deletedAt));
    }
    if (pendingDataImport.kind === 'json') {
      let removedDrugs = [];
      let removedFormulas = [];
      if (hasDrugPayload) {
        const incomingDrugIds = new Set(incomingDrugs.map(d => String(d.id)));
        removedDrugs = DRUGS.filter(d => !incomingDrugIds.has(String(d.id))).map(recordLocalDrugTombstone).filter(Boolean);
        DRUGS.length = 0;
        DRUGS.push(...incomingDrugs.filter(d => !d.deletedAt));
      }
      if (hasFormulaPayload) {
        const incomingFormulaIds = new Set(incomingFormulas.map(f => String(f.id)));
        removedFormulas = FORMULAS.filter(f => !incomingFormulaIds.has(String(f.id))).map(recordLocalFormulaTombstone).filter(Boolean);
        FORMULAS.length = 0;
        FORMULAS.push(...incomingFormulas.filter(f => !f.deletedAt));
      }
      if (hasTermPayload) {
        saveLearningStateMap(pendingDataImport.learningStates);
        saveLocalTombstones([...(pendingDataImport.tombstones || []), ...removed.filter(Boolean)]);
      }
      if (hasDrugPayload || pendingDataImport.hasDrugTombstonePayload) {
        saveLocalDrugTombstones([...(pendingDataImport.drugTombstones || []), ...removedDrugs]);
      }
      if (hasFormulaPayload || pendingDataImport.hasFormulaTombstonePayload) {
        saveLocalFormulaTombstones([...(pendingDataImport.formulaTombstones || []), ...removedFormulas]);
      }
      if (hasTermPayload && hasDrugPayload && hasFormulaPayload && pendingDataImport.syncMeta?.canonicalVersion) saveLocalSyncMeta(pendingDataImport.syncMeta);
    } else {
      if (hasTermPayload) saveLocalTombstones([...loadLocalTombstones(), ...removed]);
    }
  } else {
    const byId = new Map(TERMS.map(t => [String(t.id), t]));
    const byName = new Map(TERMS.map(t => [termIdentityKey(t), t]));
    if (hasTermPayload) {
      incoming.forEach(term => {
        const existing = pendingDataImport.kind === 'json' ? byId.get(String(term.id)) : byName.get(termIdentityKey(term));
        if (!existing) {
          TERMS.push(term);
        } else if (mode === 'merge' && (Date.parse(term.updatedAt) || Date.now()) >= (Date.parse(existing.updatedAt) || 0)) {
          const index = TERMS.findIndex(t => String(t.id) === String(existing.id));
          TERMS[index] = mergeDuplicateTerms(existing, normalizeTermForStorage({ ...term, id: existing.id }));
        }
      });
    }
    if (pendingDataImport.kind === 'json' && mode === 'merge') {
      if (hasTermPayload) {
        applyLearningStates(Object.values(pendingDataImport.learningStates || {}), false);
        saveLocalTombstones([...loadLocalTombstones(), ...(pendingDataImport.tombstones || [])]);
      }
      if (hasDrugPayload || pendingDataImport.hasDrugTombstonePayload) {
        const mergedDrugs = mergeDrugsForSync(hasDrugPayload ? incomingDrugs : [], DRUGS, [
          ...loadLocalDrugTombstones(),
          ...(pendingDataImport.drugTombstones || [])
        ]);
        DRUGS.length = 0;
        DRUGS.push(...mergedDrugs.filter(d => !d.deletedAt));
        saveLocalDrugTombstones(mergedDrugs.filter(d => d.deletedAt));
      }
      if (hasFormulaPayload || pendingDataImport.hasFormulaTombstonePayload) {
        const mergedFormulas = mergeFormulasForSync(hasFormulaPayload ? incomingFormulas : [], FORMULAS, [
          ...loadLocalFormulaTombstones(),
          ...(pendingDataImport.formulaTombstones || [])
        ]);
        FORMULAS.length = 0;
        FORMULAS.push(...mergedFormulas.filter(f => !f.deletedAt));
        saveLocalFormulaTombstones(mergedFormulas.filter(f => f.deletedAt));
      }
    } else if (pendingDataImport.kind === 'json' && mode === 'append') {
      if (hasDrugPayload) {
        const drugIds = new Set(DRUGS.map(d => String(d.id)));
        incomingDrugs.forEach(drug => {
          if (!drugIds.has(String(drug.id)) && !drug.deletedAt) {
            DRUGS.push(drug);
            drugIds.add(String(drug.id));
          }
        });
      }
      if (hasFormulaPayload) {
        const formulaIds = new Set(FORMULAS.map(f => String(f.id)));
        incomingFormulas.forEach(formula => {
          if (!formulaIds.has(String(formula.id)) && !formula.deletedAt) {
            FORMULAS.push(formula);
            formulaIds.add(String(formula.id));
          }
        });
      }
    }
  }

  saveTermsToLocalStorage();
  saveDrugsToLocalStorage();
  saveFormulasToLocalStorage();
  updateBookmarkCount();
  pendingDataImport = null;
  const syncHint = getSupabaseConfig()
    ? (mode === 'replace'
      ? ' · 다른 기기도 맞추려면 상단 최종상태 저장을 실행하세요'
      : ' · 클라우드 반영은 일반 양방향 동기화를 실행하세요')
    : '';
  showToast(`✅ 가져오기 완료 · 현재 용어 ${TERMS.length}개 · 약물 ${DRUGS.length}개 · 공식 ${FORMULAS.length}개${syncHint}`);
  showExportMenu();
}

async function confirmDangerousDelete() {
  const category = document.getElementById('bulkDeleteCategory')?.value || '__all__';
  const targets = category === '__all__' ? [...TERMS] : TERMS.filter(t => (t.category || '기타') === category);
  if (!targets.length) { showToast('⚠️ 삭제할 용어가 없습니다'); return; }
  exportCompleteJsonBackup();
  const typed = window.prompt(`자동 백업을 내려받았습니다.\n${targets.length}개 용어를 삭제하려면 "삭제"를 입력하세요.`);
  if (typed !== '삭제') { showToast('삭제가 취소되었습니다'); return; }

  const targetIds = new Set(targets.map(t => String(t.id)));
  const tombstones = targets.map(recordLocalTombstone).filter(Boolean);
  for (let i = TERMS.length - 1; i >= 0; i--) {
    if (targetIds.has(String(TERMS[i].id))) TERMS.splice(i, 1);
  }
  const learning = getLearningStateMap();
  targetIds.forEach(id => {
    delete learning[id];
    bookmarks.delete(Number(id));
  });
  saveLearningStateMap(learning);
  safeSetItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  saveTermsToLocalStorage();
  updateBookmarkCount();

  if (getSupabaseConfig()) {
    try {
      for (const tombstone of tombstones) await sbDeleteTerm(tombstone.id, tombstone.deletedAt);
    } catch (e) {
      console.error(e);
      showToast('⚠️ 로컬 삭제 완료 · 클라우드 반영은 다음 동기화에서 재시도됩니다');
      showExportMenu();
      return;
    }
  }
  showToast(`🗑️ ${targets.length}개 삭제 완료`);
  showExportMenu();
}

function currentFileName() {
  const fallback = `${APP_INFO.name}_${(UPDATE_HISTORY[0]?.title || '저장본').replace(/^최신\s*·\s*/, '')}.html`;
  try {
    const name = decodeURIComponent(location.pathname.split('/').pop() || '');
    return name || fallback;
  } catch {
    return fallback;
  }
}

function categoryDisplay(cat) {
  const meta = CATEGORY_META[cat] || { icon: '📁', label: cat || '기타' };

}

function conceptDisplay(concept) {
  const meta = CONCEPT_META[concept] || { icon: '📁', label: concept || 'Other' };
  return `${meta.icon} ${meta.label}`;
}

function termCompletionPercent(t) {
  const fields = ['ko','en','uz','concept_category','category','def_ko','def_en','def_uz','usmle','ipa'];
  const filled = fields.filter(key => String(t[key] || '').trim()).length;
  return Math.round(filled / fields.length * 100);
}

function drugCompletionPercent(d) {
  const fields = ['generic_name','ko_name','drug_class','same_class_drugs','drug_form','atc_class','target','route','category','definition_ko','definition_en','definition_uz','causal_chain','moa','clinical_uses','adverse_effects','usmle_strategy','memory_line','ipa'];
  const filled = fields.filter(key => {
    const value = d?.[key];
    return Array.isArray(value) ? value.length > 0 : String(value || '').trim();
  }).length;
  const tagsFilled = Array.isArray(d?.system_tags) && d.system_tags.length ? 1 : 0;
  return Math.round((filled + tagsFilled) / (fields.length + 1) * 100);
}

function formulaCompletionPercent(f) {
  const fields = ['name','short_name','formula','category','system','use_case','variables','normal_range','interpretation','example','memory_tip','usmle_trap'];
  const filled = fields.filter(key => String(f?.[key] || '').trim()).length;
  const tagsFilled = Array.isArray(f?.tags) && f.tags.length ? 1 : 0;
  return Math.round((filled + tagsFilled) / (fields.length + 1) * 100);
}

function averagePercent(rows, getter) {
  return rows.length ? Math.round(rows.reduce((sum, item) => sum + getter(item), 0) / rows.length) : 0;
}

function countByValues(rows, valueGetter) {
  const map = new Map();
  rows.forEach(row => {
    const values = valueGetter(row);
    (Array.isArray(values) ? values : [values]).forEach(raw => {
      const value = String(raw || 'General').trim() || 'General';
      map.set(value, (map.get(value) || 0) + 1);
    });
  });
  return [...map.entries()]
    .map(([value, count]) => ({ value, count }))
    .sort((a, b) => b.count - a.count || a.value.localeCompare(b.value));
}

function getCategoryStats() {
  const order = [...VALID_CATS, '기타'];
  const stats = {};
  order.forEach(cat => {
    stats[cat] = { category: cat, count: 0, completionSum: 0, bookmarks: 0 };
  });
  TERMS.filter(t => !t.deletedAt).forEach(t => {
    const rawCat = t.category || '기타';
    const cat = VALID_CATS.includes(rawCat) ? rawCat : '기타';
    stats[cat].count += 1;
    stats[cat].completionSum += termCompletionPercent(t);
    if (bookmarks.has(Number(t.id))) stats[cat].bookmarks += 1;
  });
  return order.map(cat => ({
    ...stats[cat],
    completion: stats[cat].count ? Math.round(stats[cat].completionSum / stats[cat].count) : 0,
  }));
}

function getConceptStats() {
  const stats = {};
  CONCEPT_CATEGORIES.forEach(concept => {
    stats[concept] = { concept, count: 0 };
  });
  TERMS.filter(t => !t.deletedAt).forEach(t => {
    const concept = CONCEPT_CATEGORIES.includes(t.concept_category) ? t.concept_category : 'Other / Unclassified';
    stats[concept].count += 1;
  });
  return CONCEPT_CATEGORIES.map(concept => stats[concept]);
}

function statPillHtml(label, value, onclick = '') {

}

function progressLineHtml(percent) {
  const width = Math.max(3, Math.min(100, Number(percent) || 0));
  return `<div style="height:7px;background:var(--surface);border:1px solid var(--border);border-radius:999px;overflow:hidden"><div style="height:100%;width:${width}%;background:var(--accent);opacity:.72;border-radius:999px"></div></div>`;
}

function termNeedsCompletion(t) {
  return termCompletionPercent(t) < 100;
}

function learningStateForTerm(term, learningMap = getLearningStateMap()) {
  return learningMap[String(term?.id)] || {};
}

function termLearningWeight(term, learningMap = getLearningStateMap()) {
  const state = learningStateForTerm(term, learningMap);
  const completion = termCompletionPercent(term);
  const wrong = Number(state.wrongCount) || 0;
  const correct = Number(state.correctCount) || 0;
  const due = state.dueAt && Date.parse(state.dueAt) <= Date.now();
  const incomplete = completion < 100;
  const newTerm = !state.studyStatus || state.studyStatus === 'new';
  return (due ? 50 : 0) + (incomplete ? (100 - completion) : 0) + wrong * 8 - correct * 2 + (newTerm ? 8 : 0);
}

function openLearningStatsScope(scope, value = '') {
  document.getElementById('categoryStatsModal')?.remove();
  switchTab('search', document.querySelector('.nav-btn'));
  if (scope === 'drugs') {
    setLibraryMode('drugs', true);
    renderFilterControls();
    if (value) setDrugSystemFilter(value);
    else applyFilters();
    return;
  }
  if (scope === 'formulas') {
    setLibraryMode('formulas', true);
    renderFilterControls();
    if (value) setDrugSystemFilter(value);
    else applyFilters();
    return;
  }
  setLibraryMode('terms', true);
  renderFilterControls();
  if (scope === 'concept') setConceptFilter(value || 'all');
  else if (scope === 'system') setFilter(value || 'all');
  else if (scope === 'bookmarks') setFilter('즐겨찾기');
  else applyFilters();
}

function showCategoryStats() {
  document.getElementById('categoryStatsModal')?.remove();

  });
  const learningTerms = activeTerms.filter(t => ['learning', 'review'].includes(learningMap[String(t.id)]?.studyStatus));
  const masteredTerms = activeTerms.filter(t => learningMap[String(t.id)]?.studyStatus === 'mastered');
  const incompleteTerms = activeTerms.filter(termNeedsCompletion);
  const bookmarkedTerms = activeTerms.filter(t => bookmarks.has(Number(t.id)));
  const highPriorityTerms = activeTerms
    .map(t => ({ term: t, score: termLearningWeight(t, learningMap), completion: termCompletionPercent(t), state: learningMap[String(t.id)] || {} }))
    .filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 6);
  const rows = getCategoryStats();
  const conceptRows = getConceptStats();
  const drugSystems = countByValues(activeDrugs, drugSystemValues);
  const formulaSystems = countByValues(activeFormulas, formulaSystemValues);

function selectDupCard(gi, ci, groupLen) {
  // 같은 그룹 내 모든 카드 스타일 초기화
  for (let i = 0; i < groupLen; i++) {
    const card = document.getElementById(`dupCard_${gi}_${i}`);
    const badge = document.getElementById(`dupBadge_${gi}_${i}`);
    if (card) card.style.borderColor = 'var(--border)';
    if (badge) badge.style.display = 'none';
  }
  // 선택한 카드 하이라이트
  const selCard = document.getElementById(`dupCard_${gi}_${ci}`);
  const selBadge = document.getElementById(`dupBadge_${gi}_${ci}`);
  if (selCard) selCard.style.borderColor = '#3fb950';
  if (selBadge) selBadge.style.display = 'block';

  const statusEl = document.getElementById(`dupGroupStatus_${gi}`);
  if (statusEl) statusEl.textContent = '✅ 선택 완료';

  window._dupSelections[gi] = ci;

  // 전체 진행률 업데이트
  const done = window._dupSelections.filter(s => s !== null).length;
  const total = window._dupGroups.length;
  const summary = document.getElementById('dupSummary');
  const applyBtn = document.getElementById('dupApplyBtn');
  if (summary) summary.textContent = `${done} / ${total} 선택 완료`;
  if (applyBtn) {
    if (done === total) {
      applyBtn.disabled = false;
      applyBtn.style.cursor = 'pointer';
      applyBtn.style.opacity = '1';
    }
  }
}

function applyDuplicateCleanup() {
  const groups = window._dupGroups;
  const selections = window._dupSelections;
  if (!groups || selections.some(s => s === null)) {
    showToast('⚠️ 모든 중복 그룹에서 유지할 용어를 선택해주세요'); return;
  }

  // 삭제할 인덱스 수집
  const indicesToDelete = new Set();
  groups.forEach((g, gi) => {
    const keepCi = selections[gi];
    g.forEach(({ idx }, ci) => {
      if (ci !== keepCi) indicesToDelete.add(idx);
    });
  });

  // 역순으로 삭제 (인덱스 밀림 방지)
  const sortedIndices = [...indicesToDelete].sort((a, b) => b - a);
  sortedIndices.forEach(idx => {
    const term = TERMS[idx];
    const tombstone = recordLocalTombstone(term);
    if (term) deleteTermFromCloud(term.id, tombstone?.deletedAt);
    TERMS.splice(idx, 1);
  });

  saveTermsToLocalStorage();
  applyFilters();
  showToast(`✅ ${indicesToDelete.size}개 중복 용어 삭제 완료`);
  switchTab('export', getNavButton('export'));
}

// ─── 일괄 빈칸 채우기 (기능2) ───
async function bulkReclassify() {
  const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey || getAIConfig().geminiKey);
  if (!canAI) { showToast('⚠️ AI 키 필요 — 설정에서 등록해주세요'); return; }

  const targets = TERMS.filter(t =>
    !t.category || t.category === '기타' ||
    !t.concept_category || t.concept_category === 'Other / Unclassified'
  );
  if (!targets.length) { showToast('✅ 재분류할 용어가 없습니다'); return; }

  showAIProgress(targets.length);
  let done = 0;
  let reclassified = 0;

  for (const term of targets) {
    if (aiStopRequested) {
      saveTermsToLocalStorage();
      applyFilters();
      showToast(`⏹ 중지됨 — ${reclassified}개 재분류 완료`);
      hideAIProgress();
      return;
    }

    const termLabel = term.en || term.ko || '';
    try {
      // 카테고리 분류만을 위한 가벼운 프롬프트
      const prompt = `You are a medical terminology classifier.
Classify this medical term into one concept type and one representative organ system.
Term: "${term.en || term.ko}"
${term.def_en ? `Definition: ${term.def_en}` : ''}
${term.usmle ? `USMLE context: ${term.usmle}` : ''}

Return ONLY a JSON object:
{"concept_category": "one of: Anatomy|Physiology|Symptoms & Signs|Diseases|Diagnostics|Procedures|Pharmacology|Pathology|Microbiology|Biochemistry & Genetics|Public Health|Other / Unclassified", "category": "one of: General|Cardiovascular|Pulmonary|Renal|GI & Hepatobiliary|Endocrine|Neurology|Hematology & Oncology|Infectious Disease|Musculoskeletal|Dermatology|Ophthalmology|ENT|Reproductive|Psychiatry|Pediatrics|Immunology", "system_tags": []}
Use General if no organ system is clear.`;

      const text = await callAIText(prompt, 100, 'general');
      const clean = text.replace(/\`\`\`json|\`\`\`/g, '').trim();
      const result = JSON.parse(clean);
      const aiCat = result.category?.trim();
      const aiConcept = result.concept_category?.trim();

      const idx = TERMS.findIndex(t => t.id === term.id);
      if (idx !== -1 && (aiCat || aiConcept)) {
        const finalCat = VALID_CATS.includes(aiCat) ? aiCat : TERMS[idx].category;
        TERMS[idx] = normalizeTermForStorage({
          ...TERMS[idx],
          category: finalCat || TERMS[idx].category,
          concept_category: CONCEPT_CATEGORIES.includes(aiConcept) ? aiConcept : TERMS[idx].concept_category,
          system_tags: result.system_tags || TERMS[idx].system_tags || [],
          updatedAt: new Date().toISOString()
        });
        saveTermToCloud(TERMS[idx]);
        reclassified++;
      }
    } catch(e) { console.warn('reclassify error', termLabel, e); }

    done++;
    updateAIProgress(done, targets.length, termLabel);
    if (done % 5 === 0) { saveTermsToLocalStorage(); applyFilters(); }
  }

  hideAIProgress();
  saveTermsToLocalStorage();
  applyFilters();
  showToast(`🏷️ ${reclassified}개 재분류 완료 (${targets.length - reclassified}개 기타 유지)`);
}

async function bulkFillBlanks(scope = 'all') {
  const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey || getAIConfig().geminiKey);
  if (!canAI) { showToast('⚠️ AI 키 필요 — 설정에서 등록해주세요'); return; }

  const targets = scope === 'all'
    ? TERMS.filter(t => !t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa)
    : TERMS.filter(t => t.id === scope && (!t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa));

  if (!targets.length) { showToast('✅ 모든 용어가 완성되어 있습니다'); return; }

  showAIProgress(targets.length);
  let done = 0;
  for (const term of targets) {
    if (aiStopRequested) {
      saveTermsToLocalStorage();
      applyFilters();
      showToast(`⏹ 중지됨 — ${done}개 빈칸 채우기 완료`);
      hideAIProgress();
      return;
    }
    const termLabel = term.en || term.ko || '';
    try {
      const enriched = await enrichTermWithAI(term);
      const idx = TERMS.findIndex(t => t.id === term.id);
      if (idx === -1) continue;
      const updated = { ...TERMS[idx] };
      let changed = false;

      // 카테고리: '기타'이면 AI 분류 우선 적용
      const aiCategory = enriched.category?.trim();
      if ((!updated.category || updated.category === '기타') && aiCategory) {
        updated.category = VALID_CATS.includes(aiCategory) ? aiCategory : (aiCategory !== '기타' ? aiCategory : '기타');
        changed = true;
      }
      const aiConcept = enriched.concept_category?.trim() || enriched.conceptCategory?.trim();
      if ((!updated.concept_category || updated.concept_category === 'Other / Unclassified') && aiConcept) {
        updated.concept_category = CONCEPT_CATEGORIES.includes(aiConcept) ? aiConcept : 'Other / Unclassified';
        changed = true;
      }
      if ((!updated.system_tags || !updated.system_tags.length) && enriched.system_tags) {
        updated.system_tags = enriched.system_tags;
        changed = true;
      }

      // 나머지 빈 필드 채우기
      ['def_ko','def_en','def_uz','usmle','ipa','ko','uz'].forEach(f => {
        if (!updated[f] && enriched[f]) { updated[f] = enriched[f]; changed = true; }
      });

      if (changed) {
        updated.updatedAt = new Date().toISOString();
        TERMS[idx] = normalizeTermForStorage(updated);
        saveTermToCloud(TERMS[idx]);
      }
    } catch(e) { console.warn('bulkFill error', e); }
    done++;
    updateAIProgress(done, targets.length, termLabel);
  }
  hideAIProgress();
  saveTermsToLocalStorage();
  applyFilters();
  showToast(`✅ ${done}개 용어 빈칸 채우기 완료`);
}

function cleanTsvCell(value) {
  return String(value ?? '')
    .replace(/\r?\n/g, ' ')
    .replace(/\t/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function cleanAnkiHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\r?\n/g, '<br>')
    .replace(/\t/g, ' ')
    .trim();
}

function ankiTags(t) {
  const cat = String(t.category || '기타').replace(/[^A-Za-z0-9가-힣_]+/g, '_');
  return `DrBugeon MedicalTerms ${cat}`;
}

function downloadTextFile(text, filename) {
  // claude.ai 환경: 클립보드 복사 + 텍스트 뷰어 모달
  if (isClaudeAiEnv()) {
    showExportViewer(text, filename);
    return;
  }
  // 일반 브라우저: Blob 다운로드
  try {
    const blob = new Blob(['\uFEFF' + text], { type: 'text/tab-separated-values;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) {
    showExportViewer(text, filename);
  }
}

function evCopyAll() {
  const ta = document.getElementById('evTextarea');
  if (!ta) return;

  const onSuccess = () => {
    const btn = document.getElementById('evCopyBtn');
    if (btn) {
      btn.textContent = '✅ 복사됨!';
      btn.style.background = '#1a7f37';
      setTimeout(() => { btn.textContent = '📋 전체 복사'; btn.style.background = '#238636'; }, 2500);
    }
    showToast('📋 클립보드에 복사됐습니다!');
  };

  const onFail = () => {
    // execCommand fallback (모바일 구형 브라우저)
    try {
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      if (ok) { onSuccess(); return; }
    } catch(e2) {}
    // 마지막 수단: 전체 선택만
    evSelectAll();
    showToast('전체 선택됨 — 길게 눌러 복사하세요 (Ctrl+C / Cmd+C)');
  };

  // Clipboard API (HTTPS / 현대 브라우저)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(onSuccess).catch(onFail);
  } else {
    onFail();
  }
}

function evSelectAll() {
  const ta = document.getElementById('evTextarea');
  if (!ta) return;
  ta.focus();
  ta.select();
  // iOS 대응
  ta.setSelectionRange(0, ta.value.length);
}

  { label: '한국어', question: '영어 용어를 보고 한국어를 떠올려보세요.', ansKey: 'ko', ansLabel: '한국어' },
  { label: '우즈베크어', question: '같은 용어를 우즈베크어로 떠올려보세요.', ansKey: 'uz', ansLabel: "O'zbek" },
  { label: '핵심 이해', question: '정의와 USMLE 포인트를 설명할 수 있나요?', ansKey: 'def_en', ansLabel: '정의 · USMLE' },
];

function activeQuizTerms() {
  return TERMS.filter(t => !t.deletedAt);
}

function quizDueTermList() {
  const learning = getLearningStateMap();
  const now = Date.now();
  return activeQuizTerms().filter(t => {
    const dueAt = learning[String(t.id)]?.dueAt;
    return dueAt && Date.parse(dueAt) <= now;
  });
}

function quizIncompleteTermList() {
  return activeQuizTerms().filter(termNeedsCompletion);
}

function quizWeakTermList() {
  const learning = getLearningStateMap();
  const weighted = activeQuizTerms()
    .map(t => ({ term: t, score: termLearningWeight(t, learning) }))
    .filter(item => item.score > 0)
    .sort((a, b) => b.score - a.score)
    .map(item => item.term);
  return weighted.length ? weighted : quizIncompleteTermList();
}

function quizPoolByScope(scope = 'due', value = '') {
  const terms = activeQuizTerms();
  const learning = getLearningStateMap();
  if (scope === 'due') return quizDueTermList();
  if (scope === 'weak') return quizWeakTermList();
  if (scope === 'incomplete') return quizIncompleteTermList();
  if (scope === 'bookmarks') return terms.filter(t => bookmarks.has(Number(t.id)));
  if (scope === 'learning') return terms.filter(t => ['learning', 'review'].includes(learning[String(t.id)]?.studyStatus));
  if (scope === 'category') return terms.filter(t => (t.category || '기타') === value);
  return [...terms];
}

function shuffledQuizPool(pool, scope) {
  const arr = [...pool];
  if (scope === 'weak' || scope === 'due' || scope === 'incomplete') return arr;
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function quizSessionLabel(scope, value = '') {
  if (scope === 'due') return '오늘 복습';
  if (scope === 'weak') return '취약 우선';
  if (scope === 'incomplete') return '미완성 보강';
  if (scope === 'bookmarks') return '즐겨찾기';
  if (scope === 'learning') return '학습 중';
  if (scope === 'category') return `${categoryDisplay(value)} 집중`;
  return '랜덤 점검';
}

function limitQuizPool(pool, limit) {
  if (limit === 'all') return pool;
  const n = Number(limit) || 20;
  return pool.slice(0, Math.max(1, n));
}

function beginQuizSession(pool, session = {}) {
  if (!pool.length) {
    showToast('퀴즈로 볼 용어가 없습니다');
    showQuizSetup();
    return;
  }
  quizPool = pool;
  quizIdx = 0;
  quizScore = { correct: 0, total: 0, termsPassed: 0, termsFailed: 0 };
  quizTerm = quizPool[0];
  quizStep = 0;
  quizTermResults = [];
  quizSession = { ...quizSession, ...session };
  quizActive = true;
  renderQuizStep();
}

function startQuizWithScope(scope = 'due', value = '', limit = '20') {
  let rawPool = quizPoolByScope(scope, value);
  let finalScope = scope;
  let finalValue = value;
  if (!rawPool.length && scope !== 'all') {
    finalScope = 'all';
    finalValue = '';
    rawPool = quizPoolByScope(finalScope, finalValue);
    showToast('선택한 학습 후보가 없어 랜덤 점검으로 시작합니다');
  }
  const pool = limitQuizPool(shuffledQuizPool(rawPool, finalScope), limit);
  beginQuizSession(pool, { scope: finalScope, value: finalValue, limit, label: quizSessionLabel(finalScope, finalValue) });
}

function startQuizFromSetup() {
  const scope = document.querySelector('input[name="quizScope"]:checked')?.value || 'due';
  const cat = document.getElementById('quizCatSelect')?.value || '';
  const limit = document.getElementById('quizLimit')?.value || '20';
  quizAutoSpeak = document.getElementById('quizAutoSpeak')?.checked || false;
  if (scope === 'category' && !cat) {
    showToast('장기계를 선택해주세요');
    return;
  }
  const value = scope === 'category' ? cat : '';
  startQuizWithScope(scope, value, limit);
}

function startQuiz() {
  startQuizWithScope(quizSession.scope || 'due', quizSession.value || '', quizSession.limit || '20');
}

function revealQuizStep() {
  const ans = document.getElementById('quizAnswer');
  const btn = document.getElementById('revealBtn');
  if (ans) ans.style.display = 'block';
  if (btn) btn.style.display = 'none';
}

function quizNext(correct) {
  quizScore.total++;
  if (correct) quizScore.correct++;
  quizTermResults[quizStep] = !!correct;
  quizStep++;
  if (quizStep < QUIZ_STEPS.length) {
    renderQuizStep();
    return;
  }
  const termPassed = quizTermResults.length === QUIZ_STEPS.length && quizTermResults.every(Boolean);
  if (termPassed) quizScore.termsPassed++;
  else quizScore.termsFailed++;
  const state = getLearningStateMap()[String(quizTerm.id)] || {};
  const correctCount = (Number(state.correctCount) || 0) + (termPassed ? 1 : 0);
  const wrongCount = (Number(state.wrongCount) || 0) + (termPassed ? 0 : 1);
  const intervalDays = termPassed ? Math.min(30, Math.max(1, Math.pow(2, Math.min(correctCount, 5) - 1))) : 0;
  const dueAt = new Date(Date.now() + intervalDays * 86400000).toISOString();
  updateLearningState(quizTerm.id, {
    correctCount,
    wrongCount,
    lastReviewedAt: new Date().toISOString(),
    dueAt,
    studyStatus: correctCount >= 5 && wrongCount <= 2 ? 'mastered' : (termPassed ? 'review' : 'learning'),
    bookmarked: bookmarks.has(quizTerm.id),
  });
  quizStep = 0;
  quizTermResults = [];
  quizIdx++;
  if (quizIdx >= quizPool.length) {
    showQuizResult();
    return;
  }
  quizTerm = quizPool[quizIdx];
  renderQuizStep();
}

// --- External Medical APIs ---
let lastExternalApiNoticeAt = 0;
function shouldNotifyExternalApiStatus(res) {
  return !!res && (res.status === 429 || res.status >= 500);
}

function notifyExternalApiIssue(source, detail = '') {
  console.warn(`${source} external API issue`, detail);
  const now = Date.now();
  if (now - lastExternalApiNoticeAt < 30000) return;
  lastExternalApiNoticeAt = now;
  if (typeof showToast === 'function') {
    showToast(`⚠️ ${source} 외부 API 응답이 지연되거나 제한되었습니다. 잠시 후 다시 시도하세요.`);
  }
}

function externalApiFailed(res, source) {
  if (!res || res.ok) return false;
  if (shouldNotifyExternalApiStatus(res)) notifyExternalApiIssue(source, `HTTP ${res.status}`);
  return true;
}

async function fetchMedlinePlus(term) {
  try {
    const url = `https://connect.medlineplus.gov/application?mainSearchCriteria.v.cs=2.16.840.1.113883.6.90&mainSearchCriteria.v.dn=${encodeURIComponent(term)}&knowledgeResponseType=application/json&informationRecipient.languageCode.c=en`;
    const res = await fetch(url);
    if (externalApiFailed(res, 'MedlinePlus')) return null;
    const data = await res.json();
    const entries = data.feed?.entry || [];
    if (entries.length === 0) return null;
    const entry = entries[0];
    return {
      title:   entry.title?._value || '',
      summary: entry.summary?._value?.replace(/<[^>]+>/g, '').slice(0, 400) || '',
      url:     entry.link?.[0]?.href || ''
    };
  } catch (e) { notifyExternalApiIssue('MedlinePlus', e); return null; }
}

async function fetchRxNorm(term) {
  try {
    const searchRes = await fetch(`https://rxnav.nlm.nih.gov/REST/rxcui.json?name=${encodeURIComponent(term)}&search=2`);
    if (externalApiFailed(searchRes, 'RxNorm')) return null;
    const searchData = await searchRes.json();
    const rxcui = searchData.idGroup?.rxnormId?.[0];
    if (!rxcui) return null;
    const propRes = await fetch(`https://rxnav.nlm.nih.gov/REST/rxcui/${rxcui}/properties.json`);
    if (externalApiFailed(propRes, 'RxNorm')) return null;
    const propData = await propRes.json();
    const props = propData.properties;
    return {
      rxcui,
      name:     props?.name || '',
      synonym:  props?.synonym || '',
      tty:      props?.tty || '',
      url:      `https://mor.nlm.nih.gov/RxNav/search?searchBy=RXCUI&searchTerm=${rxcui}`
    };
  } catch (e) { notifyExternalApiIssue('RxNorm', e); return null; }
}

async function fetchPubMed(term, maxResults = 3) {
  try {
    const searchRes = await fetch(
      `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(term + '[MeSH Terms]')}&retmax=${maxResults}&sort=relevance&retmode=json`
    );
    if (externalApiFailed(searchRes, 'PubMed')) return [];
    const searchData = await searchRes.json();
    const ids = searchData.esearchresult?.idlist || [];
    if (ids.length === 0) return [];

    const summaryRes = await fetch(
      `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`
    );
    if (externalApiFailed(summaryRes, 'PubMed')) return [];
    const summaryData = await summaryRes.json();
    const result = summaryData.result || {};

    return ids.map(id => {
      const item = result[id] || {};
      const authors = (item.authors || []).slice(0, 2).map(a => a.name).join(', ');
      return {
        pmid:    id,
        title:   item.title || '',
        authors: authors + (item.authors?.length > 2 ? ' et al.' : ''),
        journal: item.fulljournalname || item.source || '',
        year:    item.pubdate?.slice(0, 4) || '',
        url:     `https://pubmed.ncbi.nlm.nih.gov/${id}/`
      };
    }).filter(r => r.title);
  } catch (e) { notifyExternalApiIssue('PubMed', e); return []; }
}

// ── NEW API 1: NLM Clinical Tables — disease autocomplete + ICD-10 ──
async function fetchNLMConditions(query, maxResults = 6) {
  try {
    const res = await fetch(
      `https://clinicaltables.nlm.nih.gov/api/conditions/v3/search?terms=${encodeURIComponent(query)}&maxList=${maxResults}&df=primary_name,consumer_name,icd10cm_codes`
    );
    if (externalApiFailed(res, 'NLM Clinical Tables')) return [];
    const data = await res.json();
    // data = [total, codes_array, extra, display_array]
    const total = data[0] || 0;
    const codes = data[1] || [];
    const display = data[3] || [];
    if (total === 0) return [];
    return codes.map((code, i) => ({
      code,
      name: display[i]?.[0] || code,
      consumer: display[i]?.[1] || '',
      icd10: display[i]?.[2] || ''
    }));
  } catch (e) { notifyExternalApiIssue('NLM Clinical Tables', e); return []; }
}

// ── NEW API 2: OpenFDA — drug adverse events & warnings ──
async function fetchFDADrug(term) {
  try {
    // Search drug label for warnings
    const res = await fetch(
      `https://api.fda.gov/drug/label.json?search=openfda.generic_name:"${encodeURIComponent(term)}"&limit=1`
    );
    if (externalApiFailed(res, 'openFDA')) return null;
    const data = await res.json();
    const result = data.results?.[0];
    if (!result) return null;

    const warnings = result.warnings?.[0] || result.boxed_warning?.[0] || '';
    const indications = result.indications_and_usage?.[0] || '';
    const adverseRaw = result.adverse_reactions?.[0] || '';

    return {
      brandName:   result.openfda?.brand_name?.[0] || '',
      genericName: result.openfda?.generic_name?.[0] || '',
      drugClass:   result.openfda?.pharm_class_epc?.[0] || '',
      warnings:    warnings.replace(/<[^>]+>/g, '').slice(0, 300),
      indications: indications.replace(/<[^>]+>/g, '').slice(0, 200),
      adverse:     adverseRaw.replace(/<[^>]+>/g, '').slice(0, 250),
      hasBoxedWarning: !!result.boxed_warning
    };
  } catch (e) { notifyExternalApiIssue('openFDA', e); return null; }
}

// ── NEW API 3: RxClass — drug class (ATC, MeSH, VA) ──
async function fetchRxClass(rxcui) {
  if (!rxcui) return null;
  try {
    const res = await fetch(
      `https://rxnav.nlm.nih.gov/REST/rxclass/class/byRxcui.json?rxcui=${rxcui}&relaSource=ATC`
    );
    if (externalApiFailed(res, 'RxClass')) return null;
    const data = await res.json();
    const classes = data.rxclassDrugInfoList?.rxclassDrugInfo || [];
    const atcClasses = classes
      .filter(c => c.rxclassMinConceptItem?.classType === 'ATC1-4')
      .slice(0, 3)
      .map(c => ({
        name: c.rxclassMinConceptItem?.className || '',
        id:   c.rxclassMinConceptItem?.classId || ''
      }));
    return atcClasses.length > 0 ? atcClasses : null;
  } catch (e) { notifyExternalApiIssue('RxClass', e); return null; }
}

// ─── NIH UMLS 검색 (기능8) ───
async function searchUMLS(query) {
  const cfg = getAIConfig();
  const umlsKey = cfg.umlsKey || localStorage.getItem('kma_umls_key') || '';
  if (!umlsKey) { showToast('⚠️ UMLS API 키 필요 — 설정에서 등록'); return; }

  showToast('🔍 UMLS 검색 중...');
  try {
    // 1. 검색
    const searchUrl = `https://uts-ws.nlm.nih.gov/rest/search/current?string=${encodeURIComponent(query)}&apiKey=${umlsKey}&returnIdType=concept&pageSize=5`;
    const res = await fetch(searchUrl);
    if (!res.ok) throw new Error('UMLS search failed: ' + res.status);
    const data = await res.json();
    const results = data.result?.results || [];
    if (!results.length) { showToast('검색 결과 없음'); return; }

    // 2. 각 CUI의 정의를 병렬로 fetch
    showToast('📖 정의 불러오는 중...');
    await Promise.all(results.map(async r => {
      try {
        const defRes = await fetch(`https://uts-ws.nlm.nih.gov/rest/content/current/CUI/${r.ui}/definitions?apiKey=${umlsKey}&pageSize=10`);
        if (defRes.ok) {
          const defData = await defRes.json();
          const defs = defData.result || [];
          // 영어 소스 우선순위: MSH > NCI > SNOMEDCT_US > HPO > MEDLINEPLUS > 그 외 영어
          const EN_SOURCES = ['MSH','NCI','SNOMEDCT_US','HPO','MEDLINEPLUS','CSP','PDQ','ICF'];
          const preferred =
            EN_SOURCES.reduce((found, src) => found || defs.find(d => d.rootSource === src), null)
            || defs.find(d => /^[A-Za-z]/.test(d.value))  // 영문자로 시작하는 것
            || defs[0];
          r.definition = preferred?.value || '';
          r.defSource  = preferred?.rootSource || '';
        }
      } catch { r.definition = ''; r.defSource = ''; }
    }));

    showUMLSResults(results, query, umlsKey);
  } catch(e) {
    console.error(e);
    showToast('⚠️ UMLS 검색 실패: ' + e.message);
  }
}

async function addUMLSTerm(cui, name, umlsKey) {
  showToast('⏳ UMLS에서 정보 가져오는 중...');
  try {
    // Definition 가져오기
    const defRes = await fetch(`https://uts-ws.nlm.nih.gov/rest/content/current/CUI/${cui}/definitions?apiKey=${umlsKey}&pageSize=10`);
    let def_en = '';
    if (defRes.ok) {
      const defData = await defRes.json();
      const defs = defData.result || [];
      // 영어 소스 우선순위: MSH > NCI > SNOMEDCT_US > HPO > MEDLINEPLUS > 그 외 영어
      const EN_SOURCES = ['MSH','NCI','SNOMEDCT_US','HPO','MEDLINEPLUS','CSP','PDQ','ICF'];
      const preferred =
        EN_SOURCES.reduce((found, src) => found || defs.find(d => d.rootSource === src), null)
        || defs.find(d => /^[A-Za-z]/.test(d.value))
        || defs[0];
      def_en = preferred?.value || '';
    }

    // Atoms(영어 명칭) 가져오기
    const atomRes = await fetch(`https://uts-ws.nlm.nih.gov/rest/content/current/CUI/${cui}/atoms?apiKey=${umlsKey}&language=ENG&pageSize=3`);
    let en = name;
    if (atomRes.ok) {
      const atomData = await atomRes.json();
      const atoms = atomData.result || [];
      if (atoms.length) en = atoms[0].name || name;
    }

    const newTerm = {
      id: nextTermId(),
      ko: '', en, uz: '',
      category: 'General', concept_category: 'Other / Unclassified', system_tags: [],
      def_ko: '', def_en: def_en, def_uz: '',
      usmle: '', ipa: '', refs: [], icd11: null, fdaDrug: null, rxclassATC: null, trials: null,
    };

    // AI로 나머지 채우기 (실패해도 기본 데이터로 저장)
    const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey || getAIConfig().geminiKey);
    if (canAI) {
      showToast('🤖 AI 자동완성 중...');
      try {
        const enriched = await enrichTermWithAI(newTerm);
        Object.keys(enriched).forEach(k => { if (!newTerm[k] && enriched[k]) newTerm[k] = enriched[k]; });
      } catch(aiErr) {
        console.warn('AI enrichment failed, saving with basic data:', aiErr.message);
        showToast('⚠️ AI 자동완성 실패 — 기본 정보로 저장합니다');
      }
    }

    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    saveTermToCloud(TERMS[TERMS.length - 1]);
    applyFilters();
    document.getElementById('umlsModal')?.remove();
    showToast(`✅ "${en}" 추가 완료!`);
  } catch(e) {
    console.error(e);
    showToast(`⚠️ UMLS 용어 추가 실패: ${e.message}`);
  }
}

async function enrichTermWithAI(term) {
  // Fetch ALL external APIs in parallel (original 3 + 5 new)
  const [medline, rxnorm, pubmedRefs, fdaDrug, icd11, trials] = await Promise.all([
    fetchMedlinePlus(term.en),
    fetchRxNorm(term.en),
    fetchPubMed(term.en, 3),
    fetchFDADrug(term.en),
    fetchICD11(term.en),
    fetchClinicalTrials(term.en)
  ]);

  // After RxNorm resolves, get RxClass from rxcui
  const rxclassData = rxnorm?.rxcui ? await fetchRxClass(rxnorm.rxcui) : null;

  // Build context from external APIs
  let externalContext = '';
  if (medline?.summary) {
    externalContext += `\n\n[MedlinePlus / NIH Official Definition]\n${medline.summary}`;
  }
  if (rxnorm?.name) {
    externalContext += `\n\n[RxNorm Drug Info]\nName: ${rxnorm.name} | Type: ${rxnorm.tty} | Synonym: ${rxnorm.synonym}`;
  }
  if (rxclassData?.length) {
    externalContext += `\n\n[RxClass ATC Drug Classes]\n` + rxclassData.map(c => `- ${c.name} (${c.id})`).join('\n');
  }
  if (fdaDrug) {
    if (fdaDrug.drugClass)   externalContext += `\n\n[FDA Drug Class] ${fdaDrug.drugClass}`;
    if (fdaDrug.indications) externalContext += `\n[FDA Indications] ${fdaDrug.indications}`;
    if (fdaDrug.warnings)    externalContext += `\n[FDA Warnings${fdaDrug.hasBoxedWarning ? ' ⚠️ BOXED' : ''}] ${fdaDrug.warnings}`;
    if (fdaDrug.adverse)     externalContext += `\n[FDA Adverse Reactions] ${fdaDrug.adverse}`;
  }
  if (icd11?.code) {
    externalContext += `\n\n[WHO ICD-11 Code] ${icd11.code} — ${icd11.title}`;
  }
  if (trials?.count > 0) {
    externalContext += `\n\n[ClinicalTrials.gov] ${trials.count} active recruiting trials`;
  }
  if (pubmedRefs.length > 0) {
    externalContext += `\n\n[PubMed Top Articles]\n` + pubmedRefs.map(r =>
      `- ${r.title} (${r.authors}, ${r.journal} ${r.year})`
    ).join('\n');
  }

  const prompt = `You are a medical terminology expert specializing in USMLE Step 1/2 CK preparation.

Given this medical term (some fields may be empty — generate them from the provided fields):
- Korean (한국어): ${term.ko || 'NOT PROVIDED — generate from English/Uzbek'}
- English: ${term.en || 'NOT PROVIDED — generate from Korean/Uzbek'}
- Uzbek (O\'zbek): ${term.uz || 'NOT PROVIDED — generate from Korean/English'}
${externalContext ? `\nVerified external reference data (use this to improve accuracy):${externalContext}` : ''}

Return ONLY a valid JSON object (no markdown, no explanation) with these fields:
{
  "ko": "Korean term name — generate if not provided above",
  "en": "English term name — generate if not provided above",
  "uz": "Uzbek term name — generate if not provided above",
  "concept_category": "MUST pick exactly one from: Anatomy|Physiology|Symptoms & Signs|Diseases|Diagnostics|Procedures|Pharmacology|Pathology|Microbiology|Biochemistry & Genetics|Public Health|Other / Unclassified.",
  "category": "Representative organ system. MUST pick exactly one from: General|Cardiovascular|Pulmonary|Renal|GI & Hepatobiliary|Endocrine|Neurology|Hematology & Oncology|Infectious Disease|Musculoskeletal|Dermatology|Ophthalmology|ENT|Reproductive|Psychiatry|Pediatrics|Immunology. Use General if no organ system is clear.",
  "system_tags": ["Optional secondary organ systems from the same system list. Empty array if none."],
  "ipa": "Cambridge-style IPA for the English term only, e.g. /ˈsep.sɪs/",
  "def_ko": "Korean definition, 1-2 sentences, medical student level, informed by external data above",
  "def_en": "English definition, 1-2 sentences, medical student level, informed by external data above",
  "def_uz": "Uzbek definition, 1-2 sentences, medical student level",
  "usmle": "USMLE high-yield one-liner: key labs with arrows (↑↓), first-line Tx, classic trap. Format: ↑X, ↓Y | Tx: Z | Trap: W"
}`;

  const text = await callAIText(prompt, 1000, 'enrich');
  let enriched = {};
  try {
    const clean = text.replace(/```json|```/g, '').trim();
    enriched = JSON.parse(clean);
  } catch { enriched = {}; }

  // Attach all API data to the term
  enriched.refs       = pubmedRefs;
  enriched.icd11      = icd11   || null;
  enriched.fdaDrug    = fdaDrug || null;
  enriched.rxclassATC = rxclassData || null;
  enriched.trials     = trials  || null;
  return enriched;
}

async function handleFileUpload(e, mode = 'replace') {
  const file = e.target.files[0];
  if (!file) return;

  const isExcel = /\.(xlsx|xls)$/i.test(file.name);
  const reader = new FileReader();

  reader.onload = async (ev) => {
    let rows = [];

    if (isExcel) {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
        rows = json.map((row, i) => ({
          id: 1000 + i,
          ko:       String(row['ko']       || row['Korean']   || row['한국어']   || '').trim(),
          en:       String(row['en']       || row['English']  || row['영어']     || '').trim(),
          uz:       String(row['uz']       || row['Uzbek']    || row['우즈베크'] || '').trim(),
          concept_category: String(row['concept_category'] || row['Concept_category'] || row['Concept'] || row['개념분류'] || '').trim(),
          category: String(row['system'] || row['System'] || row['system_category'] || row['category'] || row['Category'] || row['장기계'] || row['분류'] || '').trim(),
          system_tags: String(row['system_tags'] || row['System_tags'] || row['Tags'] || row['보조태그'] || '').trim(),
          def_ko:   String(row['def_ko']   || row['Def_ko']   || '').trim(),
          def_en:   String(row['def_en']   || row['Def_en']   || '').trim(),
          def_uz:   String(row['def_uz']   || row['Def_uz']   || '').trim(),
          usmle:    String(row['usmle']    || row['USMLE']    || '').trim(),
          ipa:      String(row['ipa']      || row['IPA']      || '').trim(),
          refs:     parseImportJson(row['refs'] || row['Refs'] || row['Refs_json'] || row['refs_json'], []),
          icd11:    parseImportJson(row['icd11'] || row['ICD11'] || row['ICD11_json'] || row['icd11_json'], null),
          fdaDrug:  parseImportJson(row['fdaDrug'] || row['fda_drug'] || row['FDA_json'] || row['fda_json'], null),
          rxclassATC: parseImportJson(row['rxclassATC'] || row['rxclass_atc'] || row['RxClass_json'] || row['rxclass_json'], null),
          trials:   parseImportJson(row['trials'] || row['Trials_json'] || row['trials_json'], null),
        }));
      } catch (err) {
        showToast('⚠️ 엑셀 파일 읽기 실패');
        return;
      }
    } else {
      const lines = ev.target.result.split('\n').filter(l => l.trim());
      const ALIAS2 = { ko:0,korean:0, en:1,english:1, uz:2,uzbek:2,
                       concept:3, concept_category:3, conceptcategory:3,
                       category:4, system:4, system_category:4,
                       system_tags:5, systemtags:5, tags:5,
                       def_ko:6, def_en:7, def_uz:8, usmle:9, ipa:10,
                       refs:11, refs_json:11, icd11:12, icd11_json:12,
                       fda_json:13, fda_drug:13, rxclass_json:14, rxclass_atc:14,
                       trials:15, trials_json:15 };
      const firstCols = (lines[0] || '').split('\t').map(c => c.trim().toLowerCase());
      const hasHeader = firstCols.some(c => Object.prototype.hasOwnProperty.call(ALIAS2, c));
      const dataLines = hasHeader ? lines.slice(1) : lines;
      // 헤더가 있으면 컬럼 순서 파악
      const headerCols = hasHeader ? firstCols : null;
      if (!headerCols) {
        const invalidLine = dataLines.find(line => {
          const count = line.split('\t').length;
          return !(count >= 11 || count === 9);
        });
        if (invalidLine) {
          showToast('⚠️ 헤더 없는 TSV/CSV는 11열 표준 또는 9열 legacy 형식만 지원합니다. 헤더를 추가해 주세요.');
          return;
        }
      }
      rows = dataLines.filter(l => l.trim() && !l.startsWith('#')).map((line, i) => {
        const cols = line.split('\t');
        if (!headerCols) {
          return cols.length >= 11
            ? {
                id: 1000 + i,
                ko:       cols[0]?.trim() || '',
                en:       cols[1]?.trim() || '',
                uz:       cols[2]?.trim() || '',
                concept_category: cols[3]?.trim() || '',
                category: cols[4]?.trim() || '',
                system_tags: cols[5]?.trim() || '',
                def_ko:   cols[6]?.trim() || '',
                def_en:   cols[7]?.trim() || '',
                def_uz:   cols[8]?.trim() || '',
                usmle:    cols[9]?.trim() || '',
                ipa:      cols[10]?.trim() || '',
              }
            : {
                id: 1000 + i,
                ko:       cols[0]?.trim() || '',
                en:       cols[1]?.trim() || '',
                uz:       cols[2]?.trim() || '',
                category: cols[3]?.trim() || '',
                def_ko:   cols[4]?.trim() || '',
                def_en:   cols[5]?.trim() || '',
                def_uz:   cols[6]?.trim() || '',
                usmle:    cols[7]?.trim() || '',
                ipa:      cols[8]?.trim() || '',
              };
        }
        const get = (defaultIdx) => {
          const hi = headerCols.findIndex((h, idx) => ALIAS2[h] === defaultIdx);
          return hi !== -1 ? (cols[hi]?.trim() || '') : (cols[defaultIdx]?.trim() || '');
        };
        return {
          id: 1000 + i,
          ko:       get(0),
          en:       get(1),
          uz:       get(2),
          concept_category: get(3),
          category: get(4),
          system_tags: get(5),
          def_ko:   get(6),
          def_en:   get(7),
          def_uz:   get(8),
          usmle:    get(9),
          ipa:      get(10),
          refs:     parseImportJson(get(11), []),
          icd11:    parseImportJson(get(12), null),
          fdaDrug:  parseImportJson(get(13), null),
          rxclassATC: parseImportJson(get(14), null),
          trials:   parseImportJson(get(15), null),
        };
      });
    }

    rows = rows.filter(t => t.ko || t.en || t.uz); // 세 언어 중 하나만 있어도 허용
    if (rows.length === 0) { showToast('⚠️ 유효한 데이터가 없습니다'); return; }

    if (mode === 'replace') {
      exportCompleteJsonBackup();
      TERMS.length = 0;
      bookmarks.clear();
      safeSetItem('kma_bookmarks', JSON.stringify([]));
    }

    rows = rows.map(t => ({ ...t, id: nextTermId(), updatedAt: new Date().toISOString() }));

    if (mode === 'append' || mode === 'add_only') {
      // append: 같은 용어 갱신+신규 추가, add_only: 기존 용어 유지+신규만 추가
      let overwriteCount = 0;
      const newRows = [];
      const seenInBatch = new Set();
      rows.forEach(t => {
        const key = termIdentityKey(t);
        if (!key || seenInBatch.has(key)) return;
        seenInBatch.add(key);
        const existIdx = findTermIndexByIdentity(t);
        if (existIdx !== -1 && mode === 'append') {
          // 새 파일 값은 반영하되 기존 refs/ICD/FDA/RxClass/Trials 보강 데이터는 보존
          TERMS[existIdx] = mergeDuplicateTerms(TERMS[existIdx], normalizeTermForStorage({ ...t, id: TERMS[existIdx].id, updatedAt: new Date().toISOString() }));
          saveTermToCloud(TERMS[existIdx]);
          overwriteCount++;
        } else if (existIdx === -1) {
          newRows.push(t);
        }
      });
      if (overwriteCount > 0) { saveTermsToLocalStorage(); }
      rows = newRows; // 신규만 아래에서 push
      if (rows.length === 0) {
        saveTermsToLocalStorage(); applyFilters(); updateBookmarkCount();
        if (mode === 'add_only') showToast('⚠️ 새로 추가할 용어가 없습니다 · 기존 용어는 유지됨');
        else showToast(`✅ ${overwriteCount}개 보존 병합 완료`);
        return;
      }
    }

    // 업로드 시 AI 자동완성 없이 전부 즉시 저장
    // (빈 칸 채우기는 내보내기 탭 → '일괄 빈칸 채우기'로 별도 실행)
    const importedTerms = rows.map(t => normalizeTermForStorage({ ...t, category: t.category || 'General' }));
    TERMS.push(...importedTerms);
    if (mode === 'append' || mode === 'add_only') importedTerms.forEach(saveTermToCloud);
    saveTermsToLocalStorage();
    applyFilters();
    updateBookmarkCount();

    const emptyCount = rows.filter(t => !t.def_ko || !t.usmle).length;
    const modeLabel = mode === 'add_only' ? '신규만 추가' : '저장';
    const msg = emptyCount > 0
      ? `✅ ${rows.length}개 ${modeLabel} 완료! (빈 칸 ${emptyCount}개 → 내보내기 탭에서 '일괄 빈칸 채우기'로 완성 가능)`
      : `✅ ${rows.length}개 ${modeLabel} 완료!`;
    showToast(msg);
    if (document.getElementById('addTermModal')) finishAddFlow();

  };

  if (isExcel) reader.readAsArrayBuffer(file);
  else reader.readAsText(file, 'UTF-8');
}
