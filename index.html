async function restoreTrashTerm(id) {
  const rows = loadLocalTombstones();
  const term = rows.find(t => String(t.id) === String(id));
  if (!term) return;
  const restored = normalizeTermForStorage({
    ...term,
    deletedAt: null,
    updatedAt: new Date().toISOString(),
  });
  const existingIndex = TERMS.findIndex(t => String(t.id) === String(id));
  if (existingIndex === -1) TERMS.push(restored);
  else TERMS[existingIndex] = restored;
  saveLocalTombstones(rows.filter(t => String(t.id) !== String(id)));
  saveTermsToLocalStorage();
  if (getSupabaseConfig()) await sbUpsertTerm(restored);
  showToast(`✅ ${restored.en || restored.ko} 복원 완료`);
  showTrashManager();
}

function confirmEmptyTrash() {
  const visibleRows = loadLocalTombstones().filter(t => !t.hiddenAt);
  const count = visibleRows.length;
  if (!count) { showToast('✅ 휴지통이 비어 있습니다'); return; }
  showConfirm(`삭제 기록 ${count}개를 휴지통 목록에서 숨길까요?<br><span style="font-size:11px;color:#8b949e">기기 간 부활 방지를 위해 내부 삭제 기록은 보존됩니다.</span>`, () => {
    hideLocalTombstonesFromTrash(visibleRows.map(t => t.id));
    showToast('🗑️ 휴지통 목록 비우기 완료 · 삭제 동기화 기록은 보존됨');
    showExportMenu();
  });
}

async function confirmDangerousDelete() {
  const category = document.getElementById('bulkDeleteCategory')?.value || '__all__';
  const targets = category === '__all__' ? [...TERMS] : TERMS.filter(t => (t.category || '기타') === category);
  if (!targets.length) { showToast('⚠️ 삭제할 용어가 없습니다'); return; }
  exportCompleteJsonBackup();
  const typed = window.prompt(`자동 백업을 내려받았습니다.\n${targets.length}개 용어를 삭제하려면 "삭제"를 입력하세요.`);
  if (typed !== '삭제') { showToast('삭제가 취소되었습니다'); return; }

  const targetIds = new Set(targets.map(t => String(t.id)));
  const tombstones = targets.map(recordLocalTombstone).filter(Boolean);
  for (let i = TERMS.length - 1; i >= 0; i--) {
    if (targetIds.has(String(TERMS[i].id))) TERMS.splice(i, 1);
  }
  const learning = getLearningStateMap();
  targetIds.forEach(id => {
    delete learning[id];
    bookmarks.delete(Number(id));
  });
  saveLearningStateMap(learning);
  localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  saveTermsToLocalStorage();
  updateBookmarkCount();

  if (getSupabaseConfig()) {
    try {
      for (const tombstone of tombstones) await sbDeleteTerm(tombstone.id, tombstone.deletedAt);
    } catch (e) {
      console.error(e);
      showToast('⚠️ 로컬 삭제 완료 · 클라우드 반영은 다음 동기화에서 재시도됩니다');
      showExportMenu();
      return;
    }
  }
  showToast(`🗑️ ${targets.length}개 삭제 완료`);
  showExportMenu();
}

  const stats = {};
  order.forEach(cat => {
    stats[cat] = { category: cat, count: 0, completionSum: 0, bookmarks: 0 };
  });
  TERMS.forEach(t => {
    const rawCat = t.category || '기타';
    const cat = VALID_CATS.includes(rawCat) ? rawCat : '기타';
    stats[cat].count += 1;
    stats[cat].completionSum += termCompletionPercent(t);
    if (bookmarks.has(Number(t.id))) stats[cat].bookmarks += 1;
  });
  return order.map(cat => ({
    ...stats[cat],
    completion: stats[cat].count ? Math.round(stats[cat].completionSum / stats[cat].count) : 0,
  }));
}

function selectDupCard(gi, ci, groupLen) {
  // 같은 그룹 내 모든 카드 스타일 초기화
  for (let i = 0; i < groupLen; i++) {
    const card = document.getElementById(`dupCard_${gi}_${i}`);
    const badge = document.getElementById(`dupBadge_${gi}_${i}`);
    if (card) card.style.borderColor = 'var(--border)';
    if (badge) badge.style.display = 'none';
  }
  // 선택한 카드 하이라이트
  const selCard = document.getElementById(`dupCard_${gi}_${ci}`);
  const selBadge = document.getElementById(`dupBadge_${gi}_${ci}`);
  if (selCard) selCard.style.borderColor = '#3fb950';
  if (selBadge) selBadge.style.display = 'block';

  const statusEl = document.getElementById(`dupGroupStatus_${gi}`);
  if (statusEl) statusEl.textContent = '✅ 선택 완료';

  window._dupSelections[gi] = ci;

  // 전체 진행률 업데이트
  const done = window._dupSelections.filter(s => s !== null).length;
  const total = window._dupGroups.length;
  const summary = document.getElementById('dupSummary');
  const applyBtn = document.getElementById('dupApplyBtn');
  if (summary) summary.textContent = `${done} / ${total} 선택 완료`;
  if (applyBtn) {
    if (done === total) {
      applyBtn.disabled = false;
      applyBtn.style.cursor = 'pointer';
      applyBtn.style.opacity = '1';
    }
  }
}

function applyDuplicateCleanup() {
  const groups = window._dupGroups;
  const selections = window._dupSelections;
  if (!groups || selections.some(s => s === null)) {
    showToast('⚠️ 모든 중복 그룹에서 유지할 용어를 선택해주세요'); return;
  }

  // 삭제할 인덱스 수집
  const indicesToDelete = new Set();
  groups.forEach((g, gi) => {
    const keepCi = selections[gi];
    g.forEach(({ idx }, ci) => {
      if (ci !== keepCi) indicesToDelete.add(idx);
    });
  });

  // 역순으로 삭제 (인덱스 밀림 방지)
  const sortedIndices = [...indicesToDelete].sort((a, b) => b - a);
  sortedIndices.forEach(idx => {
    const term = TERMS[idx];
    const tombstone = recordLocalTombstone(term);
    if (term) deleteTermFromCloud(term.id, tombstone?.deletedAt);
    TERMS.splice(idx, 1);
  });

  saveTermsToLocalStorage();
  applyFilters();
  showToast(`✅ ${indicesToDelete.size}개 중복 용어 삭제 완료`);
  switchTab('export', getNavButton('export'));
}

async function bulkDeleteTerms() {
  const sel = document.getElementById('bulkDeleteCategory')?.value || '__all__';
  const targets = sel === '__all__' ? [...TERMS] : TERMS.filter(t => t.category === sel);
  if (targets.length === 0) { showToast('⚠️ 삭제할 용어가 없습니다'); return; }

  const label = sel === '__all__' ? `전체 ${targets.length}개 용어` : `${escapeHtml(sel)} 카테고리 ${targets.length}개 용어`;
  const hasCloud = !!getSupabaseConfig();
  const cloudNote = hasCloud ? '<br><span style="font-size:11px;color:#f87171">☁️ 클라우드에서도 삭제됩니다</span>' : '';

  showConfirm(
    `<b style="color:#f87171">${label}</b>를<br>모두 삭제할까요?<br><span style="font-size:11px;color:#6e7681">삭제 후 복구할 수 없습니다</span>${cloudNote}`,
    async () => {
      const deletedIds = targets.map(t => t.id);
      const tombstones = targets.map(recordLocalTombstone).filter(Boolean);

      if (sel === '__all__') {
        TERMS.length = 0;
        bookmarks.clear();
        localStorage.setItem('kma_bookmarks', JSON.stringify([]));
      } else {
        const ids = new Set(deletedIds);
        for (let i = TERMS.length - 1; i >= 0; i--) {
          if (ids.has(TERMS[i].id)) TERMS.splice(i, 1);
        }
        ids.forEach(id => bookmarks.delete(id));
        localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
      }

      if (expandedId && !TERMS.some(t => t.id === expandedId)) expandedId = null;
      clearTermsLocalStorage();
      saveTermsToLocalStorage();
      updateBookmarkCount();
      applyFilters();
      showToast(`🗑️ ${label} 삭제 중...`);

      // 클라우드에서도 삭제
      if (hasCloud) {
        try {
          for (const tombstone of tombstones) {
            const ok = await sbDeleteTerm(tombstone.id, tombstone.deletedAt);
            if (!ok) throw new Error(`delete sync failed: ${tombstone.id}`);
          }
          showToast(`🗑️ ${label} 로컬 + 클라우드 삭제 완료`);
        } catch(e) {
          showToast(`⚠️ 로컬 삭제됨, 클라우드 삭제 실패 — 수동으로 동기화하세요`);
        }
      } else {
        showToast(`🗑️ ${label} 삭제 완료`);
      }
      showExportMenu();
    }
  );
}

// ─── 일괄 빈칸 채우기 (기능2) ───
async function bulkReclassify() {
  const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey || getAIConfig().geminiKey);
  if (!canAI) { showToast('⚠️ AI 키 필요 — 설정에서 등록해주세요'); return; }

  const targets = TERMS.filter(t => !t.category || t.category === '기타');
  if (!targets.length) { showToast('✅ 재분류할 용어가 없습니다 (기타 없음)'); return; }

  showAIProgress(targets.length);
  let done = 0;
  let reclassified = 0;

  for (const term of targets) {
    if (aiStopRequested) {
      saveTermsToLocalStorage();
      applyFilters();
      showToast(`⏹ 중지됨 — ${reclassified}개 재분류 완료`);
      hideAIProgress();
      return;
    }

    const termLabel = term.en || term.ko || '';
    try {
      // 카테고리 분류만을 위한 가벼운 프롬프트
      const prompt = `You are a medical terminology classifier.
Classify this medical term into exactly ONE category.
Term: "${term.en || term.ko}"
${term.def_en ? `Definition: ${term.def_en}` : ''}
${term.usmle ? `USMLE context: ${term.usmle}` : ''}

Return ONLY a JSON object:
{"category": "one of: Cardiovascular|Pulmonary|Renal|GI & Hepatobiliary|Endocrine|Neurology|Hematology & Oncology|Infectious Disease|Musculoskeletal|Dermatology|Reproductive|Psychiatry|Immunology|Pharmacology|Pathology|기타"}
Use "기타" ONLY if truly none of the above apply.`;

      const text = await callAIText(prompt, 100, 'general');
      const clean = text.replace(/\`\`\`json|\`\`\`/g, '').trim();
      const result = JSON.parse(clean);
      const aiCat = result.category?.trim();

      const idx = TERMS.findIndex(t => t.id === term.id);
      if (idx !== -1 && aiCat && aiCat !== '기타') {
        const finalCat = VALID_CATS.includes(aiCat) ? aiCat : aiCat;
        TERMS[idx] = normalizeTermForStorage({ ...TERMS[idx], category: finalCat, updatedAt: new Date().toISOString() });
        saveTermToCloud(TERMS[idx]);
        reclassified++;
      }
    } catch(e) { console.warn('reclassify error', termLabel, e); }

    done++;
    updateAIProgress(done, targets.length, termLabel);
    if (done % 5 === 0) { saveTermsToLocalStorage(); applyFilters(); }
  }

  hideAIProgress();
  saveTermsToLocalStorage();
  applyFilters();
  showToast(`🏷️ ${reclassified}개 재분류 완료 (${targets.length - reclassified}개 기타 유지)`);
}

async function bulkFillBlanks(scope = 'all') {
  const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey || getAIConfig().geminiKey);
  if (!canAI) { showToast('⚠️ AI 키 필요 — 설정에서 등록해주세요'); return; }

  const targets = scope === 'all'
    ? TERMS.filter(t => !t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa)
    : TERMS.filter(t => t.id === scope && (!t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa));

  if (!targets.length) { showToast('✅ 모든 용어가 완성되어 있습니다'); return; }

  showAIProgress(targets.length);
  let done = 0;
  for (const term of targets) {
    if (aiStopRequested) {
      saveTermsToLocalStorage();
      applyFilters();
      showToast(`⏹ 중지됨 — ${done}개 빈칸 채우기 완료`);
      hideAIProgress();
      return;
    }
    const termLabel = term.en || term.ko || '';
    try {
      const enriched = await enrichTermWithAI(term);
      const idx = TERMS.findIndex(t => t.id === term.id);
      if (idx === -1) continue;
      const updated = { ...TERMS[idx] };
      let changed = false;

      // 카테고리: '기타'이면 AI 분류 우선 적용
      const aiCategory = enriched.category?.trim();
      if ((!updated.category || updated.category === '기타') && aiCategory) {
        updated.category = VALID_CATS.includes(aiCategory) ? aiCategory : (aiCategory !== '기타' ? aiCategory : '기타');
        changed = true;
      }

      // 나머지 빈 필드 채우기
      ['def_ko','def_en','def_uz','usmle','ipa','ko','uz'].forEach(f => {
        if (!updated[f] && enriched[f]) { updated[f] = enriched[f]; changed = true; }
      });

      if (changed) {
        updated.updatedAt = new Date().toISOString();
        TERMS[idx] = normalizeTermForStorage(updated);
        saveTermToCloud(TERMS[idx]);
      }
    } catch(e) { console.warn('bulkFill error', e); }
    done++;
    updateAIProgress(done, targets.length, termLabel);
  }
  hideAIProgress();
  saveTermsToLocalStorage();
  applyFilters();
  showToast(`✅ ${done}개 용어 빈칸 채우기 완료`);
}

function cleanTsvCell(value) {
  return String(value ?? '')
    .replace(/\r?\n/g, ' ')
    .replace(/\t/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function cleanAnkiHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\r?\n/g, '<br>')
    .replace(/\t/g, ' ')
    .trim();
}

function ankiTags(t) {
  const cat = String(t.category || '기타').replace(/[^A-Za-z0-9가-힣_]+/g, '_');
  return `DrBugeon MedicalTerms ${cat}`;
}

function downloadTextFile(text, filename) {
  // claude.ai 환경: 클립보드 복사 + 텍스트 뷰어 모달
  if (isClaudeAiEnv()) {
    showExportViewer(text, filename);
    return;
  }
  // 일반 브라우저: Blob 다운로드
  try {
    const blob = new Blob(['\uFEFF' + text], { type: 'text/tab-separated-values;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) {
    showExportViewer(text, filename);
  }
}

function evCopyAll() {
  const ta = document.getElementById('evTextarea');
  if (!ta) return;

  const onSuccess = () => {
    const btn = document.getElementById('evCopyBtn');
    if (btn) {
      btn.textContent = '✅ 복사됨!';
      btn.style.background = '#1a7f37';
      setTimeout(() => { btn.textContent = '📋 전체 복사'; btn.style.background = '#238636'; }, 2500);
    }
    showToast('📋 클립보드에 복사됐습니다!');
  };

  const onFail = () => {
    // execCommand fallback (모바일 구형 브라우저)
    try {
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      if (ok) { onSuccess(); return; }
    } catch(e2) {}
    // 마지막 수단: 전체 선택만
    evSelectAll();
    showToast('전체 선택됨 — 길게 눌러 복사하세요 (Ctrl+C / Cmd+C)');
  };

  // Clipboard API (HTTPS / 현대 브라우저)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(onSuccess).catch(onFail);
  } else {
    onFail();
  }
}

function evSelectAll() {
  const ta = document.getElementById('evTextarea');
  if (!ta) return;
  ta.focus();
  ta.select();
  // iOS 대응
  ta.setSelectionRange(0, ta.value.length);
}

function exportAnki() {
  if (TERMS.length === 0) { showToast('⚠️ 내보낼 용어가 없습니다'); return; }

  const header = '#separator:tab\n#html:true\n#columns:Front\tBack\tTags';
  const rows = TERMS.map(t => {
    const front = [
      `<b>${cleanAnkiHtml(t.en || t.ko || t.uz)}</b>`,
      t.ipa ? `<br><span style="color:#888">${cleanAnkiHtml(t.ipa)}</span>` : ''
    ].join('');

    const back = [
      t.ko ? `<b>한국어</b>: ${cleanAnkiHtml(t.ko)}` : '',
      t.uz ? `<br><b>O'zbek</b>: ${cleanAnkiHtml(t.uz)}` : '',
      t.def_ko ? `<hr><b>정의</b><br>${cleanAnkiHtml(t.def_ko)}` : '',
      t.def_en ? `<br><br><b>English definition</b><br>${cleanAnkiHtml(t.def_en)}` : '',
      t.def_uz ? `<br><br><b>O'zbek ta'rif</b><br>${cleanAnkiHtml(t.def_uz)}` : '',
      t.usmle ? `<hr><b>USMLE High-Yield</b><br>${cleanAnkiHtml(t.usmle)}` : '',
      t.category ? `<hr><small>Category: ${cleanAnkiHtml(t.category)}</small>` : ''
    ].join('');

    return [front, back, ankiTags(t)].map(cleanTsvCell).join('\t');
  });

  const tsv = [header, ...rows].join('\n');
  downloadTextFile(tsv, `${new Date().toISOString().slice(0,10).replace(/-/g,'.')} Bugeon Medical Terms Anki.tsv`);
  showToast(`📋 Anki TSV ${TERMS.length}개 내보내기 완료`);
}

function copyTermText(event, text, lang) {
  event.stopPropagation(); // 카드 토글 방지
  if (!text) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showCopyToast(event, lang);
    }).catch(() => {
      fallbackCopy(text, event, lang);
    });
  } else {
    fallbackCopy(text, event, lang);
  }
}

function fallbackCopy(text, event, lang) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showCopyToast(event, lang);
}

function showCopyToast(event, lang) {
  // 기존 복사 툴팁 제거
  document.querySelectorAll('.copy-tooltip').forEach(el => el.remove());
  const tooltip = document.createElement('div');
  tooltip.className = 'copy-tooltip';
  tooltip.textContent = `📋 ${lang} 복사됨`;
  tooltip.style.cssText = `
    position:fixed;
    background:#3fb950;color:#0d1117;
    font-size:11px;font-weight:700;
    padding:4px 10px;border-radius:8px;
    z-index:9999;pointer-events:none;
    font-family:'Noto Sans KR',sans-serif;
    box-shadow:0 2px 8px rgba(0,0,0,0.4);
  `;
  document.body.appendChild(tooltip);
  // 클릭 위치 근처에 표시
  const x = event.clientX;
  const y = event.clientY - 32;
  tooltip.style.left = Math.min(x, window.innerWidth - 120) + 'px';
  tooltip.style.top = Math.max(y, 8) + 'px';
  setTimeout(() => tooltip.remove(), 1200);
}

function speakEnglish(text) {
  if (!text || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'en-US';
  utt.rate = 0.85;
  window.speechSynthesis.speak(utt);
}

function speakEnglishForTerm(event, id) {
  event.stopPropagation();
  speakEnglish(termText(findTermById(id), 'en'));
}

function startQuizFromSetup() {
  const scope = document.querySelector('input[name="quizScope"]:checked')?.value || 'all';
  const cat   = document.getElementById('catSelect')?.value;
  quizAutoSpeak = document.getElementById('quizAutoSpeak')?.checked || false;

  if (scope === 'category' && !cat) {
    showToast('⚠️ 카테고리를 선택해주세요');
    return;
  }

  let pool = [];
  if (scope === 'all')       pool = [...TERMS];
  else if (scope === 'bookmarks') pool = TERMS.filter(t => bookmarks.has(t.id));
  else if (scope === 'category')  pool = TERMS.filter(t => t.category === cat);

  if (!pool.length) {
    if (scope === 'bookmarks') showToast('⚠️ 즐겨찾기한 용어가 없습니다');
    else if (scope === 'category') showToast(`⚠️ "${cat}" 카테고리에 용어가 없습니다`);
    else showToast('⚠️ 용어가 없습니다. 먼저 용어를 추가해주세요');
    return;
  }

  quizPool  = pool.sort(() => Math.random() - 0.5);
  quizIdx   = 0;
  quizScore = { correct: 0, total: 0 };
  quizTerm  = quizPool[0];
  quizStep  = 0;
  renderQuizStep();
}

let quizAutoSpeak = false;

function startQuiz() {
  const available = currentFilter === '즐겨찾기'
    ? TERMS.filter(t => bookmarks.has(t.id))
    : TERMS.filter(t => currentFilter === 'all' || t.category === currentFilter);

  if (available.length === 0) { showToast('퀴즈할 용어가 없습니다'); return; }

  // Shuffle pool
  quizPool  = [...available].sort(() => Math.random() - 0.5);
  quizIdx   = 0;
  quizScore = { correct: 0, total: 0 };
  quizTerm  = quizPool[0];
  quizStep  = 0;
  renderQuizStep();
}

function renderQuizStep() {
  const main = document.getElementById('mainContent');
  if (!main) return;
  const t    = quizTerm;
  const step = QUIZ_STEPS[quizStep];
  if (quizAutoSpeak) setTimeout(() => speakEnglish(t.en), 300);
  const totalCards = quizPool.length * 3;
  const doneCards  = quizIdx * 3 + quizStep;
  const pct = Math.round(doneCards / totalCards * 100);

  // Step indicator dots
  const dots = QUIZ_STEPS.map((s, i) => `
    <div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1">
      <div style="width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;

        border:${i === quizStep ? '2px solid var(--accent)' : '2px solid var(--border)'}">
        ${i < quizStep ? '✓' : i+1}
      </div>
      <div style="font-size:9px;color:${i === quizStep ? 'var(--accent)' : 'var(--text3)'}">${s.label}</div>
    </div>`).join(`<div style="height:2px;background:var(--border);flex:1;margin-top:14px"></div>`);

  main.innerHTML = `
    <div style="padding:4px 0 80px">

      <!-- Progress bar -->
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
        <div style="flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.4s"></div>
        </div>
        <div style="font-size:10px;color:var(--text3);white-space:nowrap">${doneCards}/${totalCards}</div>
      </div>

      <!-- Step indicator -->

function revealQuizStep() {
  const ans = document.getElementById('quizAnswer');
  const btn = document.getElementById('revealBtn');
  if (ans) ans.style.display = 'block';
  if (btn) btn.style.display = 'none';
}

function quizNext(correct) {
  quizScore.total++;
  if (correct) quizScore.correct++;

  const state = getLearningStateMap()[String(quizTerm.id)] || {};
  const correctCount = (Number(state.correctCount) || 0) + (correct ? 1 : 0);
  const wrongCount = (Number(state.wrongCount) || 0) + (correct ? 0 : 1);
  const intervalDays = correct ? Math.min(30, Math.max(1, Math.pow(2, Math.min(correctCount, 5) - 1))) : 0;
  const dueAt = new Date(Date.now() + intervalDays * 86400000).toISOString();
  updateLearningState(quizTerm.id, {
    correctCount,
    wrongCount,
    lastReviewedAt: new Date().toISOString(),
    dueAt,
    studyStatus: correctCount >= 5 && wrongCount <= 2 ? 'mastered' : (correct ? 'review' : 'learning'),
    bookmarked: bookmarks.has(quizTerm.id),
  });

  quizStep++;
  if (quizStep < 3) {
    // Next step on same term
    renderQuizStep();
    return;
  }

  // Move to next term
  quizStep = 0;
  quizIdx++;
  if (quizIdx >= quizPool.length) {
    showQuizResult();
    return;
  }
  quizTerm = quizPool[quizIdx];
  renderQuizStep();
}

function showQuizResult() {
  const main = document.getElementById('mainContent');
  if (!main) return;
  const pct  = Math.round(quizScore.correct / quizScore.total * 100);
  const grade = pct >= 90 ? '🏆 Excellent!' : pct >= 70 ? '👍 Good Job!' : pct >= 50 ? '📚 Keep Studying' : '💪 Need More Practice';
  const color = pct >= 70 ? 'var(--accent2)' : pct >= 50 ? 'var(--accent3)' : 'var(--red)';

  main.innerHTML = `
    <div style="padding:20px 0 80px;text-align:center">

      <div style="font-family:'Noto Serif KR',serif;font-size:20px;color:var(--text);margin-bottom:6px">퀴즈 완료!</div>

        <div style="font-size:52px;font-weight:700;color:${color};font-family:'Noto Serif KR',serif">${pct}%</div>
        <div style="font-size:14px;color:var(--text2);margin-top:6px">${quizScore.correct} / ${quizScore.total} 정답</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">${quizPool.length}개 용어 × 3단계</div>

// ─── External Medical APIs ───

async function fetchMedlinePlus(term) {
  try {
    const url = `https://connect.medlineplus.gov/application?mainSearchCriteria.v.cs=2.16.840.1.113883.6.90&mainSearchCriteria.v.dn=${encodeURIComponent(term)}&knowledgeResponseType=application/json&informationRecipient.languageCode.c=en`;
    const res = await fetch(url);
    const data = await res.json();
    const entries = data.feed?.entry || [];
    if (entries.length === 0) return null;
    const entry = entries[0];
    return {
      title:   entry.title?._value || '',
      summary: entry.summary?._value?.replace(/<[^>]+>/g, '').slice(0, 400) || '',
      url:     entry.link?.[0]?.href || ''
    };
  } catch { return null; }
}

async function fetchRxNorm(term) {
  try {
    const searchRes = await fetch(`https://rxnav.nlm.nih.gov/REST/rxcui.json?name=${encodeURIComponent(term)}&search=2`);
    const searchData = await searchRes.json();
    const rxcui = searchData.idGroup?.rxnormId?.[0];
    if (!rxcui) return null;
    const propRes = await fetch(`https://rxnav.nlm.nih.gov/REST/rxcui/${rxcui}/properties.json`);
    const propData = await propRes.json();
    const props = propData.properties;
    return {
      rxcui,
      name:     props?.name || '',
      synonym:  props?.synonym || '',
      tty:      props?.tty || '',
      url:      `https://mor.nlm.nih.gov/RxNav/search?searchBy=RXCUI&searchTerm=${rxcui}`
    };
  } catch { return null; }
}

async function fetchPubMed(term, maxResults = 3) {
  try {
    const searchRes = await fetch(
      `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(term + '[MeSH Terms]')}&retmax=${maxResults}&sort=relevance&retmode=json`
    );
    const searchData = await searchRes.json();
    const ids = searchData.esearchresult?.idlist || [];
    if (ids.length === 0) return [];

    const summaryRes = await fetch(
      `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`
    );
    const summaryData = await summaryRes.json();
    const result = summaryData.result || {};

    return ids.map(id => {
      const item = result[id] || {};
      const authors = (item.authors || []).slice(0, 2).map(a => a.name).join(', ');
      return {
        pmid:    id,
        title:   item.title || '',
        authors: authors + (item.authors?.length > 2 ? ' et al.' : ''),
        journal: item.fulljournalname || item.source || '',
        year:    item.pubdate?.slice(0, 4) || '',
        url:     `https://pubmed.ncbi.nlm.nih.gov/${id}/`
      };
    }).filter(r => r.title);
  } catch { return []; }
}

// ── NEW API 1: NLM Clinical Tables — disease autocomplete + ICD-10 ──
async function fetchNLMConditions(query, maxResults = 6) {
  try {
    const res = await fetch(
      `https://clinicaltables.nlm.nih.gov/api/conditions/v3/search?terms=${encodeURIComponent(query)}&maxList=${maxResults}&df=primary_name,consumer_name,icd10cm_codes`
    );
    const data = await res.json();
    // data = [total, codes_array, extra, display_array]
    const total = data[0] || 0;
    const codes = data[1] || [];
    const display = data[3] || [];
    if (total === 0) return [];
    return codes.map((code, i) => ({
      code,
      name: display[i]?.[0] || code,
      consumer: display[i]?.[1] || '',
      icd10: display[i]?.[2] || ''
    }));
  } catch { return []; }
}

// ── NEW API 2: OpenFDA — drug adverse events & warnings ──
async function fetchFDADrug(term) {
  try {
    // Search drug label for warnings
    const res = await fetch(
      `https://api.fda.gov/drug/label.json?search=openfda.generic_name:"${encodeURIComponent(term)}"&limit=1`
    );
    if (!res.ok) return null;
    const data = await res.json();
    const result = data.results?.[0];
    if (!result) return null;

    const warnings = result.warnings?.[0] || result.boxed_warning?.[0] || '';
    const indications = result.indications_and_usage?.[0] || '';
    const adverseRaw = result.adverse_reactions?.[0] || '';

    return {
      brandName:   result.openfda?.brand_name?.[0] || '',
      genericName: result.openfda?.generic_name?.[0] || '',
      drugClass:   result.openfda?.pharm_class_epc?.[0] || '',
      warnings:    warnings.replace(/<[^>]+>/g, '').slice(0, 300),
      indications: indications.replace(/<[^>]+>/g, '').slice(0, 200),
      adverse:     adverseRaw.replace(/<[^>]+>/g, '').slice(0, 250),
      hasBoxedWarning: !!result.boxed_warning
    };
  } catch { return null; }
}

// ── NEW API 3: RxClass — drug class (ATC, MeSH, VA) ──
async function fetchRxClass(rxcui) {
  if (!rxcui) return null;
  try {
    const res = await fetch(
      `https://rxnav.nlm.nih.gov/REST/rxclass/class/byRxcui.json?rxcui=${rxcui}&relaSource=ATC`
    );
    const data = await res.json();
    const classes = data.rxclassDrugInfoList?.rxclassDrugInfo || [];
    const atcClasses = classes
      .filter(c => c.rxclassMinConceptItem?.classType === 'ATC1-4')
      .slice(0, 3)
      .map(c => ({
        name: c.rxclassMinConceptItem?.className || '',
        id:   c.rxclassMinConceptItem?.classId || ''
      }));
    return atcClasses.length > 0 ? atcClasses : null;
  } catch { return null; }
}

// Uses the public linearization search (no token needed for read)
async function fetchICD11(term) {

      `https://id.who.int/icd/release/11/2024-01/mms/search?q=${encodeURIComponent(term)}&subtreesFilter=&includeKeywordResult=true&useFlexisearch=false&flatResults=true&highlightingEnabled=false`,
      { headers: { 'Accept': 'application/json', 'Accept-Language': 'en', 'API-Version': 'v2' } }
    );
    if (!res.ok) return null;
    const data = await res.json();
    const dest = data.destinationEntities;
    if (!dest || dest.length === 0) return null;
    const top = dest[0];
    return {
      code:  top.theCode || '',
      title: top.title || '',
      url:   top['@id'] || ''
    };
  } catch { return null; }
}

let acDebounce = null;
const acCache = {};

async function handleSearchAutocomplete(query) {
  const list = document.getElementById('acList');
  if (!list) return;

  if (!query || query.length < 2) { list.innerHTML = ''; return; }

  // Only trigger for English-ish queries (has latin chars)
  if (!/[a-zA-Z]/.test(query)) { list.innerHTML = ''; return; }

  clearTimeout(acDebounce);
  acDebounce = setTimeout(async () => {
    if (acCache[query]) { renderAcList(acCache[query]); return; }
    const results = await fetchNLMConditions(query, 7);
    acCache[query] = results;
    renderAcList(results);
  }, 280);
}

function renderAcList(results) {
  const list = document.getElementById('acList');
  if (!list) return;
  if (!results || results.length === 0) { list.innerHTML = ''; return; }

  list.innerHTML = results.map(r => `
    <div class="ac-item" onclick="selectAcItem('${escapeJsString(r.name)}')">
      <span class="ac-source">NLM</span>
      <div class="ac-name">${escapeHtml(r.name)}</div>
      <div class="ac-code">${r.icd10 ? 'ICD-10: ' + escapeHtml(r.icd10) : ''}${r.consumer && r.consumer !== r.name ? ' · ' + escapeHtml(r.consumer) : ''}</div>
    </div>`).join('');
}

function selectAcItem(name) {
  const input = document.getElementById('searchInput');
  const list  = document.getElementById('acList');
  if (input) input.value = name;
  if (list)  list.innerHTML = '';
  applyFilters();
}

// Close autocomplete on outside click
document.addEventListener('click', e => {
  const list = document.getElementById('acList');
  if (list && !list.contains(e.target) && e.target.id !== 'searchInput') {
    list.innerHTML = '';
  }
});

// ─── NIH UMLS 검색 (기능8) ───
async function searchUMLS(query) {
  const cfg = getAIConfig();
  const umlsKey = cfg.umlsKey || localStorage.getItem('kma_umls_key') || '';
  if (!umlsKey) { showToast('⚠️ UMLS API 키 필요 — 설정에서 등록'); return; }

  showToast('🔍 UMLS 검색 중...');
  try {
    // 1. 검색
    const searchUrl = `https://uts-ws.nlm.nih.gov/rest/search/current?string=${encodeURIComponent(query)}&apiKey=${umlsKey}&returnIdType=concept&pageSize=5`;
    const res = await fetch(searchUrl);
    if (!res.ok) throw new Error('UMLS search failed: ' + res.status);
    const data = await res.json();
    const results = data.result?.results || [];
    if (!results.length) { showToast('검색 결과 없음'); return; }

    // 2. 각 CUI의 정의를 병렬로 fetch
    showToast('📖 정의 불러오는 중...');
    await Promise.all(results.map(async r => {
      try {
        const defRes = await fetch(`https://uts-ws.nlm.nih.gov/rest/content/current/CUI/${r.ui}/definitions?apiKey=${umlsKey}&pageSize=10`);
        if (defRes.ok) {
          const defData = await defRes.json();
          const defs = defData.result || [];
          // 영어 소스 우선순위: MSH > NCI > SNOMEDCT_US > HPO > MEDLINEPLUS > 그 외 영어
          const EN_SOURCES = ['MSH','NCI','SNOMEDCT_US','HPO','MEDLINEPLUS','CSP','PDQ','ICF'];
          const preferred =
            EN_SOURCES.reduce((found, src) => found || defs.find(d => d.rootSource === src), null)
            || defs.find(d => /^[A-Za-z]/.test(d.value))  // 영문자로 시작하는 것
            || defs[0];
          r.definition = preferred?.value || '';
          r.defSource  = preferred?.rootSource || '';
        }
      } catch { r.definition = ''; r.defSource = ''; }
    }));

    showUMLSResults(results, query, umlsKey);
  } catch(e) {
    console.error(e);
    showToast('⚠️ UMLS 검색 실패: ' + e.message);
  }
}

async function addUMLSTerm(cui, name, umlsKey) {
  showToast('⏳ UMLS에서 정보 가져오는 중...');
  try {
    // Definition 가져오기
    const defRes = await fetch(`https://uts-ws.nlm.nih.gov/rest/content/current/CUI/${cui}/definitions?apiKey=${umlsKey}&pageSize=10`);
    let def_en = '';
    if (defRes.ok) {
      const defData = await defRes.json();
      const defs = defData.result || [];
      // 영어 소스 우선순위: MSH > NCI > SNOMEDCT_US > HPO > MEDLINEPLUS > 그 외 영어
      const EN_SOURCES = ['MSH','NCI','SNOMEDCT_US','HPO','MEDLINEPLUS','CSP','PDQ','ICF'];
      const preferred =
        EN_SOURCES.reduce((found, src) => found || defs.find(d => d.rootSource === src), null)
        || defs.find(d => /^[A-Za-z]/.test(d.value))
        || defs[0];
      def_en = preferred?.value || '';
    }

    // Atoms(영어 명칭) 가져오기
    const atomRes = await fetch(`https://uts-ws.nlm.nih.gov/rest/content/current/CUI/${cui}/atoms?apiKey=${umlsKey}&language=ENG&pageSize=3`);
    let en = name;
    if (atomRes.ok) {
      const atomData = await atomRes.json();
      const atoms = atomData.result || [];
      if (atoms.length) en = atoms[0].name || name;
    }

    const newTerm = {
      id: nextTermId(),
      ko: '', en, uz: '',
      category: '기타', def_ko: '', def_en: def_en, def_uz: '',
      usmle: '', ipa: '', refs: [], icd11: null, fdaDrug: null, rxclassATC: null, trials: null,
    };

    // AI로 나머지 채우기 (실패해도 기본 데이터로 저장)
    const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey || getAIConfig().geminiKey);
    if (canAI) {
      showToast('🤖 AI 자동완성 중...');
      try {
        const enriched = await enrichTermWithAI(newTerm);
        Object.keys(enriched).forEach(k => { if (!newTerm[k] && enriched[k]) newTerm[k] = enriched[k]; });
      } catch(aiErr) {
        console.warn('AI enrichment failed, saving with basic data:', aiErr.message);
        showToast('⚠️ AI 자동완성 실패 — 기본 정보로 저장합니다');
      }
    }

    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    saveTermToCloud(TERMS[TERMS.length - 1]);
    applyFilters();
    document.getElementById('umlsModal')?.remove();
    showToast(`✅ "${en}" 추가 완료!`);
  } catch(e) {
    console.error(e);
    showToast(`⚠️ UMLS 용어 추가 실패: ${e.message}`);
  }
}

async function enrichTermWithAI(term) {
  // Fetch ALL external APIs in parallel (original 3 + 5 new)
  const [medline, rxnorm, pubmedRefs, fdaDrug, icd11, trials] = await Promise.all([
    fetchMedlinePlus(term.en),
    fetchRxNorm(term.en),
    fetchPubMed(term.en, 3),
    fetchFDADrug(term.en),
    fetchICD11(term.en),
    fetchClinicalTrials(term.en)
  ]);

  // After RxNorm resolves, get RxClass from rxcui
  const rxclassData = rxnorm?.rxcui ? await fetchRxClass(rxnorm.rxcui) : null;

  // Build context from external APIs
  let externalContext = '';
  if (medline?.summary) {
    externalContext += `\n\n[MedlinePlus / NIH Official Definition]\n${medline.summary}`;
  }
  if (rxnorm?.name) {
    externalContext += `\n\n[RxNorm Drug Info]\nName: ${rxnorm.name} | Type: ${rxnorm.tty} | Synonym: ${rxnorm.synonym}`;
  }
  if (rxclassData?.length) {
    externalContext += `\n\n[RxClass ATC Drug Classes]\n` + rxclassData.map(c => `- ${c.name} (${c.id})`).join('\n');
  }
  if (fdaDrug) {
    if (fdaDrug.drugClass)   externalContext += `\n\n[FDA Drug Class] ${fdaDrug.drugClass}`;
    if (fdaDrug.indications) externalContext += `\n[FDA Indications] ${fdaDrug.indications}`;
    if (fdaDrug.warnings)    externalContext += `\n[FDA Warnings${fdaDrug.hasBoxedWarning ? ' ⚠️ BOXED' : ''}] ${fdaDrug.warnings}`;
    if (fdaDrug.adverse)     externalContext += `\n[FDA Adverse Reactions] ${fdaDrug.adverse}`;
  }
  if (icd11?.code) {
    externalContext += `\n\n[WHO ICD-11 Code] ${icd11.code} — ${icd11.title}`;
  }
  if (trials?.count > 0) {
    externalContext += `\n\n[ClinicalTrials.gov] ${trials.count} active recruiting trials`;
  }
  if (pubmedRefs.length > 0) {
    externalContext += `\n\n[PubMed Top Articles]\n` + pubmedRefs.map(r =>
      `- ${r.title} (${r.authors}, ${r.journal} ${r.year})`
    ).join('\n');
  }

  const prompt = `You are a medical terminology expert specializing in USMLE Step 1/2 CK preparation.

Given this medical term (some fields may be empty — generate them from the provided fields):
- Korean (한국어): ${term.ko || 'NOT PROVIDED — generate from English/Uzbek'}
- English: ${term.en || 'NOT PROVIDED — generate from Korean/Uzbek'}
- Uzbek (O\'zbek): ${term.uz || 'NOT PROVIDED — generate from Korean/English'}
${externalContext ? `\nVerified external reference data (use this to improve accuracy):${externalContext}` : ''}

Return ONLY a valid JSON object (no markdown, no explanation) with these fields:
{
  "ko": "Korean term name — generate if not provided above",
  "en": "English term name — generate if not provided above",
  "uz": "Uzbek term name — generate if not provided above",
  "category": "MUST pick the most specific match from: Cardiovascular|Pulmonary|Renal|GI & Hepatobiliary|Endocrine|Neurology|Hematology & Oncology|Infectious Disease|Musculoskeletal|Dermatology|Reproductive|Psychiatry|Immunology|Pharmacology|Pathology. Use '기타' ONLY if none of the above apply at all.",
  "ipa": "Cambridge-style IPA for the English term only, e.g. /ˈsep.sɪs/",
  "def_ko": "Korean definition, 1-2 sentences, medical student level, informed by external data above",
  "def_en": "English definition, 1-2 sentences, medical student level, informed by external data above",
  "def_uz": "Uzbek definition, 1-2 sentences, medical student level",
  "usmle": "USMLE high-yield one-liner: key labs with arrows (↑↓), first-line Tx, classic trap. Format: ↑X, ↓Y | Tx: Z | Trap: W"
}`;

  const text = await callAIText(prompt, 1000, 'enrich');
  let enriched = {};
  try {
    const clean = text.replace(/```json|```/g, '').trim();
    enriched = JSON.parse(clean);
  } catch { enriched = {}; }

  // Attach all API data to the term
  enriched.refs       = pubmedRefs;
  enriched.icd11      = icd11   || null;
  enriched.fdaDrug    = fdaDrug || null;
  enriched.rxclassATC = rxclassData || null;
  enriched.trials     = trials  || null;
  return enriched;
}

async function handleFileUpload(e, mode = 'replace') {
  const file = e.target.files[0];
  if (!file) return;

  const isExcel = /\.(xlsx|xls)$/i.test(file.name);
  const reader = new FileReader();

  reader.onload = async (ev) => {
    let rows = [];

    if (isExcel) {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
        rows = json.map((row, i) => ({
          id: 1000 + i,
          ko:       String(row['ko']       || row['Korean']   || row['한국어']   || '').trim(),
          en:       String(row['en']       || row['English']  || row['영어']     || '').trim(),
          uz:       String(row['uz']       || row['Uzbek']    || row['우즈베크'] || '').trim(),
          category: String(row['category'] || row['Category'] || row['분류']     || '').trim(),
          def_ko:   String(row['def_ko']   || row['Def_ko']   || '').trim(),
          def_en:   String(row['def_en']   || row['Def_en']   || '').trim(),
          def_uz:   String(row['def_uz']   || row['Def_uz']   || '').trim(),
          usmle:    String(row['usmle']    || row['USMLE']    || '').trim(),
          ipa:      String(row['ipa']      || row['IPA']      || '').trim(),
        }));
      } catch (err) {
        showToast('⚠️ 엑셀 파일 읽기 실패');
        return;
      }
    } else {
      const lines = ev.target.result.split('\n').filter(l => l.trim());
      const firstLine = lines[0].toLowerCase();
      const hasHeader = firstLine.startsWith('ko') || firstLine.startsWith('korean') ||
                        firstLine.startsWith('english') || firstLine.startsWith('en\t');
      const dataLines = hasHeader ? lines.slice(1) : lines;
      // 헤더가 있으면 컬럼 순서 파악
      const headerCols = hasHeader ? lines[0].split('\t').map(c => c.trim().toLowerCase()) : null;
      const ALIAS2 = { ko:0,korean:0, en:1,english:1, uz:2,uzbek:2, category:3,
                       def_ko:4, def_en:5, def_uz:6, usmle:7, ipa:8 };
      rows = dataLines.filter(l => l.trim() && !l.startsWith('#')).map((line, i) => {
        const cols = line.split('\t');
        const get = (defaultIdx) => {
          if (!headerCols) return cols[defaultIdx]?.trim() || '';
          const hi = headerCols.findIndex((h, idx) => ALIAS2[h] === defaultIdx);
          return hi !== -1 ? (cols[hi]?.trim() || '') : (cols[defaultIdx]?.trim() || '');
        };
        return {
          id: 1000 + i,
          ko:       get(0),
          en:       get(1),
          uz:       get(2),
          category: get(3),
          def_ko:   get(4),
          def_en:   get(5),
          def_uz:   get(6),
          usmle:    get(7),
          ipa:      get(8),
        };
      });
    }

    rows = rows.filter(t => t.ko || t.en || t.uz); // 세 언어 중 하나만 있어도 허용
    if (rows.length === 0) { showToast('⚠️ 유효한 데이터가 없습니다'); return; }

    if (mode === 'replace') {
      TERMS.length = 0;
      bookmarks.clear();
      localStorage.setItem('kma_bookmarks', JSON.stringify([]));
    }

    rows = rows.map(t => ({ ...t, id: nextTermId(), updatedAt: new Date().toISOString() }));

    if (mode === 'append' || mode === 'add_only') {
      // append: 같은 용어 갱신+신규 추가, add_only: 기존 용어 유지+신규만 추가
      let overwriteCount = 0;
      const newRows = [];
      const seenInBatch = new Set();
      rows.forEach(t => {
        const key = termIdentityKey(t);
        if (!key || seenInBatch.has(key)) return;
        seenInBatch.add(key);
        const existIdx = findTermIndexByIdentity(t);
        if (existIdx !== -1 && mode === 'append') {
          // 완전 덮어쓰기 (기존 id 유지)
          TERMS[existIdx] = normalizeTermForStorage({ ...t, id: TERMS[existIdx].id, updatedAt: new Date().toISOString() });
          saveTermToCloud(TERMS[existIdx]);
          overwriteCount++;
        } else if (existIdx === -1) {
          newRows.push(t);
        }
      });
      if (overwriteCount > 0) { saveTermsToLocalStorage(); }
      rows = newRows; // 신규만 아래에서 push
      if (rows.length === 0) {
        saveTermsToLocalStorage(); applyFilters(); updateBookmarkCount();
        if (mode === 'add_only') showToast('⚠️ 새로 추가할 용어가 없습니다 · 기존 용어는 유지됨');
        else showToast(`✅ ${overwriteCount}개 완전 덮어쓰기 완료`);
        return;
      }
    }

    // 업로드 시 AI 자동완성 없이 전부 즉시 저장
    // (빈 칸 채우기는 내보내기 탭 → '일괄 빈칸 채우기'로 별도 실행)
    TERMS.push(...rows.map(t => normalizeTermForStorage({ ...t, category: t.category || '기타' })));
    saveTermsToLocalStorage();
    applyFilters();
    updateBookmarkCount();

    const emptyCount = rows.filter(t => !t.def_ko || !t.usmle).length;
    const modeLabel = mode === 'add_only' ? '신규만 추가' : '저장';
    const msg = emptyCount > 0
      ? `✅ ${rows.length}개 ${modeLabel} 완료! (빈 칸 ${emptyCount}개 → 내보내기 탭에서 '일괄 빈칸 채우기'로 완성 가능)`
      : `✅ ${rows.length}개 ${modeLabel} 완료!`;
    showToast(msg);
    if (document.getElementById('addTermModal')) finishAddFlow();

  };

  if (isExcel) reader.readAsArrayBuffer(file);
  else reader.readAsText(file, 'UTF-8');
}

// ─── TTS ───
let ttsSpeed = 0.9;
let currentUtterance = null;
let speakingBtn = null;

function speakText(e, text, type, id) {
  e.stopPropagation();
  if (!window.speechSynthesis) { showToast('⚠️ 이 브라우저는 TTS를 지원하지 않습니다'); return; }
  if (!String(text || '').trim()) { showToast('⚠️ 읽을 영어 문장이 없습니다'); return; }

  const btnId = `speak-${type}-${id}`;
  const btn = document.getElementById(btnId);

  // Stop if already speaking same button
  if (speakingBtn === btnId && speechSynthesis.speaking) {
    speechSynthesis.cancel();
    if (btn) btn.classList.remove('speaking');
    speakingBtn = null;
    return;
  }

  // Stop previous
  speechSynthesis.cancel();
  if (speakingBtn) {
    const prev = document.getElementById(speakingBtn);
    if (prev) prev.classList.remove('speaking');
  }

  const utter = new SpeechSynthesisUtterance(String(text || ''));
  utter.lang = 'en-US';
  utter.rate = ttsSpeed;
  utter.pitch = 1.0;

  // Prefer high-quality US English voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.lang === 'en-US' && (v.name.includes('Samantha') || v.name.includes('Google') || v.name.includes('Alex') || v.name.includes('Natural'))
  ) || voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utter.voice = preferred;

  utter.onstart = () => {
    speakingBtn = btnId;
    if (btn) btn.classList.add('speaking');
  };
  utter.onend = utter.onerror = () => {
    if (btn) btn.classList.remove('speaking');
    if (speakingBtn === btnId) speakingBtn = null;
  };

  speechSynthesis.speak(utter);
  currentUtterance = utter;
}

// Load voices (async in some browsers)
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// ─── Init ───
document.getElementById('searchInput').addEventListener('input', e => {
  applyFilters();
  handleSearchAutocomplete(e.target.value.trim());
});

// 앱 초기화: Supabase가 있으면 클라우드를 기준본으로 사용
async function initApp() {
  const localCount = loadTermsFromLocalStorage();
  const learning = getLearningStateMap();
  bookmarks.forEach(id => {
    const key = String(id);
    if (!learning[key]) {
      learning[key] = {
        termId: Number(id),
        bookmarked: true,
        correctCount: 0,
        wrongCount: 0,
        studyStatus: 'new',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      };
    }
  });
  saveLearningStateMap(learning);
  if (localCount > 0) {
    showToast(`📱 로컬 ${localCount}개 복원됨`);
    updateBookmarkCount();
    applyFilters();
  }

  if (getSupabaseConfig()) {
    try {
      await syncWithCloud();
    } catch (e) {
      console.error('Initial sync failed:', e);
      showToast('⚠️ 동기화 실패 · 개발자 정보에서 Supabase 설정 SQL을 확인하세요');
    }
  } else if (localCount === 0) {
    applyFilters();
  }
}

initApp();
</script>
