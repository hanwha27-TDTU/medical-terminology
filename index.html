<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr Bugeon 의학용어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #d29922;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #6e7681;
    --red: #f85149;
    --tag-ko: #1f4068;
    --tag-en: #1a3a2a;
    --tag-uz: #3d2b0a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    background: linear-gradient(180deg, #0d1117 0%, #161b22 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }

  .update-badge {
    margin-left: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
  }

  .update-badge span:first-child {
    font-size: 9px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .update-badge span:last-child {
    font-size: 11px;
    color: var(--text2);
    font-weight: 500;
  }

  .logo-badge {
    background: linear-gradient(135deg, #1d4ed8, #0284c7);
    border-radius: 10px;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(29,78,216,0.4);
  }

  .header-titles h1 {
    font-family: 'Noto Serif KR', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-titles p {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
  }

  /* Search */
  .search-wrap {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px 11px 42px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(88,166,255,0.15);
  }

  .search-input::placeholder { color: var(--text3); }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 16px;
    pointer-events: none;
  }

  .search-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--border);
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .search-clear.visible { display: flex; }

  /* Filter tabs */
  .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 12px 24px 0;
    overflow-x: visible;
  }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .filter-btn.active {
    background: rgba(88,166,255,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    padding: 10px 24px;
    border-bottom: 1px solid var(--border);
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--text3);
  }

  .stat-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  /* Main content */
  main { padding: 16px 24px 80px; }

  /* Section header */
  .section-label {
    font-size: 11px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 10px;
    margin-top: 20px;
    font-weight: 500;
  }

  .section-label:first-child { margin-top: 0; }

  /* Term card */
  .term-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
    cursor: pointer;
  }

  .term-card:hover {
    border-color: #3d444d;
    transform: translateY(-1px);
  }

  .term-card.expanded {
    border-color: var(--accent);
  }

  .term-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .term-main {
    flex: 1;
    min-width: 0;
  }

  .term-korean {
    font-family: 'Noto Serif KR', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }

  .term-uzbek {
    font-size: 13px;
    color: #fbbf24;
    margin-top: 1px;
    line-height: 1.3;
  }
  .term-english {
    font-size: 14px;
    color: var(--accent);
    letter-spacing: 0.2px;
  }

  .term-category {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .chevron {
    color: var(--text3);
    font-size: 12px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .term-card.expanded .chevron { transform: rotate(180deg); }

  /* Expanded detail */
  .term-detail {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .term-card.expanded .term-detail { display: block; }

  .detail-section {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .detail-section:last-child { border-bottom: none; }

  .lang-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 5px;
    padding: 3px 8px;
    font-size: 10px;
    font-weight: 500;
    margin-bottom: 7px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .lang-badge.ko { background: var(--tag-ko); color: #74b0ff; border: 1px solid #1d4ed8; }
  .lang-badge.en { background: var(--tag-en); color: #4ade80; border: 1px solid #166534; }
  .lang-badge.uz { background: var(--tag-uz); color: #fbbf24; border: 1px solid #92400e; }

  .detail-text {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text2);
  }

  .detail-term {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
    margin-bottom: 4px;
  }

  /* TTS Speak button */
  .speak-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(63,185,80,0.1);
    border: 1px solid rgba(63,185,80,0.3);
    border-radius: 20px;
    padding: 5px 12px;
    color: var(--accent2);
    font-size: 12px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }

  .speak-btn:hover {
    background: rgba(63,185,80,0.2);
    border-color: var(--accent2);
  }

  .speak-btn.speaking {
    background: rgba(63,185,80,0.25);
    border-color: var(--accent2);
    animation: pulse-green 1s infinite;
  }

  .speak-btn .wave {
    display: flex;
    gap: 2px;
    align-items: center;
    height: 14px;
  }

  .speak-btn .wave span {
    display: inline-block;
    width: 3px;
    background: var(--accent2);
    border-radius: 2px;
    height: 6px;
    transition: height 0.1s;
  }

  .speak-btn.speaking .wave span:nth-child(1) { animation: bar 0.6s infinite 0.0s; }
  .speak-btn.speaking .wave span:nth-child(2) { animation: bar 0.6s infinite 0.1s; }
  .speak-btn.speaking .wave span:nth-child(3) { animation: bar 0.6s infinite 0.2s; }
  .speak-btn.speaking .wave span:nth-child(4) { animation: bar 0.6s infinite 0.15s; }

  @keyframes bar {
    0%, 100% { height: 3px; }
    50% { height: 13px; }
  }

  @keyframes pulse-green {
    0%, 100% { box-shadow: 0 0 0 0 rgba(63,185,80,0.3); }
    50% { box-shadow: 0 0 0 4px rgba(63,185,80,0); }
  }

  .tts-speed-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
  }

  .tts-speed-label {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
  }

  .tts-speed-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }

<script>
// ─── Data ───
const TERMS = [];
const TERMS_STORAGE_KEY = 'kma_medical_terms_v2_terms';
const TERMS_STORAGE_META_KEY = 'kma_medical_terms_v2_meta';
const AI_CONFIG_STORAGE_KEY = 'kma_medical_terms_v2_ai_config';
const SUPABASE_CONFIG_KEY = 'kma_supabase_config';

// ─── Supabase 동기화 ───
function getSupabaseConfig() {
  return safeJsonParse(localStorage.getItem(SUPABASE_CONFIG_KEY), null);
}

function saveSupabaseConfig(url, key) {
  localStorage.setItem(SUPABASE_CONFIG_KEY, JSON.stringify({ url, key }));
}

function sbHeaders() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  return {
    'Content-Type': 'application/json',
    'apikey': cfg.key,
    'Authorization': 'Bearer ' + cfg.key,
    'Prefer': 'resolution=merge-duplicates'
  };
}

function termToRow(t) {
  return {
    id:          Number(t.id),
    ko:          t.ko || '',
    en:          t.en || '',
    uz:          t.uz || '',
    category:    t.category || '',
    def_ko:      t.def_ko || '',
    def_en:      t.def_en || '',
    def_uz:      t.def_uz || '',
    usmle:       t.usmle || '',
    ipa:         t.ipa || '',
    refs:        Array.isArray(t.refs) ? t.refs : [],
    icd11:       t.icd11 || null,
    fda_drug:    t.fdaDrug || null,
    rxclass_atc: t.rxclassATC || null,
    trials:      t.trials || null,
    updated_at:  t.updatedAt || new Date().toISOString(),
  };
}

function rowToTerm(r) {
  return {
    id:          Number(r.id),
    ko:          r.ko || '',
    en:          r.en || '',
    uz:          r.uz || '',
    category:    r.category || '기타',
    def_ko:      r.def_ko || '',
    def_en:      r.def_en || '',
    def_uz:      r.def_uz || '',
    usmle:       r.usmle || '',
    ipa:         r.ipa || '',
    refs:        Array.isArray(r.refs) ? r.refs : [],
    icd11:       r.icd11 || null,
    fdaDrug:     r.fda_drug || null,
    rxclassATC:  r.rxclass_atc || null,
    trials:      r.trials || null,
    updatedAt:   r.updated_at || new Date().toISOString(),
  };
}

// Supabase에 용어 upsert (추가/수정)
async function sbUpsertTerm(t) {
  const cfg = getSupabaseConfig();
  if (!cfg) return;
  try {
    await fetch(`${cfg.url}/rest/v1/medical_terms`, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
      body: JSON.stringify(termToRow(t))
    });
  } catch(e) { console.warn('Supabase upsert failed:', e); }
}

// Supabase에서 용어 삭제
async function sbDeleteTerm(id) {
  const cfg = getSupabaseConfig();
  if (!cfg) return;
  try {
    await fetch(`${cfg.url}/rest/v1/medical_terms?id=eq.${id}`, {
      method: 'DELETE',
      headers: sbHeaders()
    });
  } catch(e) { console.warn('Supabase delete failed:', e); }
}

// Supabase에서 전체 로드
async function sbLoadAll() {
  const cfg = getSupabaseConfig();
  if (!cfg) return null;
  try {
    const res = await fetch(`${cfg.url}/rest/v1/medical_terms?select=*&order=id.asc&limit=2000`, {
      headers: sbHeaders()
    });
    if (!res.ok) return null;
    const rows = await res.json();
    return Array.isArray(rows) ? rows.map(rowToTerm) : null;
  } catch(e) { console.warn('Supabase load failed:', e); return null; }
}

// Supabase에 전체 업로드 (현재 TERMS → DB)
async function sbPushAll() {
  const cfg = getSupabaseConfig();
  if (!cfg || TERMS.length === 0) return;
  try {
    const rows = TERMS.map(termToRow);
    // 100개씩 배치
    for (let i = 0; i < rows.length; i += 100) {
      await fetch(`${cfg.url}/rest/v1/medical_terms`, {
        method: 'POST',
        headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates' },
        body: JSON.stringify(rows.slice(i, i + 100))
      });
    }
    showToast(`☁️ Supabase 동기화 완료 (${TERMS.length}개)`);
  } catch(e) { showToast('⚠️ Supabase 업로드 실패'); }
}

// Supabase에서 전체 삭제
async function sbDeleteAll() {
  const cfg = getSupabaseConfig();
  if (!cfg) return;
  try {
    await fetch(`${cfg.url}/rest/v1/medical_terms?id=gte.0`, {
      method: 'DELETE',
      headers: sbHeaders()
    });
  } catch(e) { console.warn('Supabase deleteAll failed:', e); }
}

// 연결 테스트
async function testSupabaseConnection() {
  const cfg = getSupabaseConfig();
  if (!cfg) { showToast('⚠️ Supabase 설정이 없습니다'); return false; }
  try {
    const res = await fetch(`${cfg.url}/rest/v1/medical_terms?select=id&limit=1`, {
      headers: sbHeaders()
    });
    return res.ok;
  } catch { return false; }
}

function safeJsonParse(value, fallback) {
  try { return JSON.parse(value); } catch { return fallback; }
}

function capitalizeFirst(s) {
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function normalizeTermForStorage(t) {
  return {
    id: Number(t.id) || Date.now(),
    ko: capitalizeFirst(t.ko || ''),
    en: capitalizeFirst(t.en || ''),
    uz: capitalizeFirst(t.uz || ''),
    category: t.category || '기타',
    def_ko: t.def_ko || '',
    def_en: t.def_en || '',
    def_uz: t.def_uz || '',
    usmle: t.usmle || '',
    ipa: t.ipa || '',
    refs: Array.isArray(t.refs) ? t.refs : [],
    icd11: t.icd11 || null,
    fdaDrug: t.fdaDrug || null,
    rxclassATC: t.rxclassATC || null,
    trials: t.trials || null,
    updatedAt: t.updatedAt || new Date().toISOString(),
  };
}

function saveTermsToLocalStorage() {
  try {
    const payload = TERMS.map(normalizeTermForStorage);
    localStorage.setItem(TERMS_STORAGE_KEY, JSON.stringify(payload));
    localStorage.setItem(TERMS_STORAGE_META_KEY, JSON.stringify({
      count: payload.length,
      savedAt: new Date().toISOString(),
      app: 'DrBugeon Medical Terms',
    }));
    return true;
  } catch (err) {
    console.warn('Local save failed', err);
    if (typeof showToast === 'function') showToast('⚠️ 브라우저 저장공간이 부족합니다');
    return false;
  }
}

// Supabase에 단일 용어 저장 (로컬 저장 후 비동기로 호출)
function saveTermToCloud(t) {
  if (getSupabaseConfig()) sbUpsertTerm(t).catch(() => {});
}

function deleteTermFromCloud(id) {
  if (getSupabaseConfig()) sbDeleteTerm(id).catch(() => {});
}

function loadTermsFromLocalStorage() {
  const saved = safeJsonParse(localStorage.getItem(TERMS_STORAGE_KEY), []);
  if (!Array.isArray(saved) || saved.length === 0) return 0;
  TERMS.length = 0;
  TERMS.push(...saved.map(normalizeTermForStorage));
  return TERMS.length;
}

function clearTermsLocalStorage() {

function highlight(text, query) {
  if (!query) return text;
  const regex = new RegExp(`(${query})`, 'gi');
  return text.replace(regex, '<span class="highlight">$1</span>');
}

function toggleCard(id) {
  expandedId = expandedId === id ? null : id;
  applyFilters();
}

function toggleBookmark(e, id) {
  e.stopPropagation();
  if (bookmarks.has(id)) {
    bookmarks.delete(id);
    showToast('즐겨찾기에서 제거됨');
  } else {
    bookmarks.add(id);
    showToast('⭐ 즐겨찾기에 추가됨');
  }
  localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  updateBookmarkCount();
  applyFilters();
}

function applyFilters() {
  if (!document.getElementById('termList')) return;  // ← bail when export/quiz/add tab active
  const query = document.getElementById('searchInput').value.toLowerCase();
  const label = document.getElementById('sectionLabel');
  let results = TERMS;

  if (currentFilter === '즐겨찾기') {
    results = results.filter(t => bookmarks.has(t.id));
    if (label) label.textContent = `⭐ 즐겨찾기 — ${results.length}개`;
  } else if (currentFilter !== 'all') {
    results = results.filter(t => t.category === currentFilter);
    if (label) label.textContent = `${currentFilter} — ${results.length}개`;
  } else {
    if (label) label.textContent = query ? `검색 결과` : `전체 용어`;
  }

  if (query) {
    results = results.filter(t =>
      t.ko.toLowerCase().includes(query) ||
      t.en.toLowerCase().includes(query) ||
      t.uz.toLowerCase().includes(query) ||
      t.def_ko.toLowerCase().includes(query) ||
      t.def_en.toLowerCase().includes(query)
    );
  }

  document.getElementById('searchClear').classList.toggle('visible', query.length > 0);

  // 데이터 없을 때 홈 화면: 즐겨찾기 or 빈 안내
  if (TERMS.length === 0 && !query) {
    renderHome();
    return;
  }

  // 검색/필터 없고 즐겨찾기 있으면 → 즐겨찾기 먼저 보여주기
  if (!query && currentFilter === 'all' && bookmarks.size > 0) {
    const bookmarked = TERMS.filter(t => bookmarks.has(t.id));
    const rest = TERMS.filter(t => !bookmarks.has(t.id));
    if (label) label.textContent = `⭐ 즐겨찾기 ${bookmarked.length}개 · 전체 ${TERMS.length}개`;
    renderTerms([...bookmarked, ...rest], bookmarked.length);
    return;
  }

  // 정렬 적용
  if (currentSort === 'en_asc') {
    results = [...results].sort((a, b) => (a.en || '').localeCompare(b.en || '', 'en'));
  } else if (currentSort === 'ko_asc') {
    results = [...results].sort((a, b) => (a.ko || '').localeCompare(b.ko || '', 'ko'));
  } else if (currentSort === 'uz_asc') {
    results = [...results].sort((a, b) => (a.uz || '').localeCompare(b.uz || '', 'uz'));
  }
  renderTerms(results);
}

function renderHome() {
  const list = document.getElementById('termList');
  const empty = document.getElementById('emptyState');
  const label = document.getElementById('sectionLabel');
  if (!list || !empty) return;   // ← null guard
  empty.style.display = 'none';
  if (label) label.textContent = '';

  const bookmarked = TERMS.filter(t => bookmarks.has(t.id));

  if (bookmarked.length > 0) {
    if (label) label.textContent = `⭐ 즐겨찾기 — ${bookmarked.length}개`;
    renderTerms(bookmarked);
  } else {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">📂</div>
        <h3>용어 데이터가 없습니다</h3>
        <p>위 업로드 버튼으로 TSV 파일을 올리거나<br>즐겨찾기한 용어가 여기에 표시됩니다</p>
      </div>`;
  }
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

function clearSearch() {

function setSort(val) {
  currentSort = val;

function updateCounts(shown) {
  document.getElementById('totalCount').textContent = `${shown}개 표시 / 전체 ${TERMS.length}개`;
}

function updateBookmarkCount() {
  const validCount = TERMS.filter(t => bookmarks.has(t.id)).length;
  // Prune stale IDs that no longer exist in TERMS
  [...bookmarks].forEach(id => { if (!TERMS.some(t => t.id === id)) bookmarks.delete(id); });
  localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
  document.getElementById('bookmarkCount').textContent = `즐겨찾기 ${validCount}`;
}

}

  if (route === 'anthropic' && !anthropicKey) { showToast('⚠️ Anthropic API 키를 입력해주세요'); return false; }
  if (route === 'gemini' && !geminiKey) { showToast('⚠️ Gemini API 키를 입력해주세요'); return false; }

  const cfg = { route, openaiKey, anthropicKey, geminiKey, umlsKey, modelOpenAI, modelAnthropic, modelGemini, savedAt: new Date().toISOString() };
  localStorage.setItem(AI_CONFIG_STORAGE_KEY, JSON.stringify(cfg));
  if (umlsKey) localStorage.setItem('kma_umls_key', umlsKey);
  if (!silent) { showToast('✅ AI API 설정 저장 완료'); showAISettings(); }
  return true;
}

function clearSingleKey(provider) {
  const labels = { openai: 'OpenAI', anthropic: 'Anthropic', gemini: 'Gemini', umls: 'UMLS' };
  showConfirm(`${labels[provider]} API 키를 해제할까요?`, () => {
    const cfg = getAIConfig();
    if (provider === 'openai')    { cfg.openaiKey = ''; cfg.modelOpenAI = 'gpt-4o-mini'; }
    if (provider === 'anthropic') { cfg.anthropicKey = ''; cfg.modelAnthropic = 'claude-sonnet-4-6'; }
    if (provider === 'gemini')    { cfg.geminiKey = ''; cfg.modelGemini = 'gemini-2.0-flash'; }
    if (provider === 'umls')      { cfg.umlsKey = ''; localStorage.removeItem('kma_umls_key'); }
    localStorage.setItem(AI_CONFIG_STORAGE_KEY, JSON.stringify(cfg));
    showToast(`🔌 ${labels[provider]} API 키 해제 완료`);
    showAISettings();
  });
}

function clearAIConfig() {
  showConfirm('저장된 OpenAI/Anthropic API 키와<br>모델 설정을 모두 삭제할까요?', () => {
    localStorage.removeItem(AI_CONFIG_STORAGE_KEY);
    showToast('🗑️ AI API 설정 삭제 완료');
    showAISettings();
  });
}

function maskApiKey(key) {
  if (!key) return '저장 안 됨';
  if (key.length <= 12) return '••••';
  return key.slice(0, 6) + '••••••••' + key.slice(-4);
}

function saveSupabaseFromForm() {
  const url = document.getElementById('sb_url')?.value.trim().replace(/\/+$/, '');
  const key = document.getElementById('sb_key')?.value.trim();
  if (!url || !key) { showToast('⚠️ URL과 키를 모두 입력해주세요'); return; }
  saveSupabaseConfig(url, key);
  showToast('✅ Supabase 설정 저장됨');
  const el = document.getElementById('sbStatus');
  if (el) el.textContent = '✅ 연결됨';
}

async function testAndSyncSupabase() {
  saveSupabaseFromForm();
  showToast('☁️ 연결 테스트 중...');
  const ok = await testSupabaseConnection();
  if (ok) {
    showToast('✅ 연결 성공! 동기화 시작...');
    await initApp();
  } else {
    showToast('⚠️ 연결 실패 — URL/키 확인');
  }
}

async function pullFromCloud() {
  if (!getSupabaseConfig()) { showToast('⚠️ Supabase 설정 먼저 저장하세요'); return; }
  showToast('⬇️ 클라우드에서 불러오는 중...');
  const cloudTerms = await sbLoadAll();
  if (!cloudTerms || cloudTerms.length === 0) { showToast('⚠️ 클라우드에 데이터가 없습니다'); return; }
  TERMS.length = 0;
  TERMS.push(...cloudTerms);
  saveTermsToLocalStorage();
  updateBookmarkCount();
  applyFilters();
  showToast(`⬇️ 클라우드에서 ${cloudTerms.length}개 불러옴`);
}

function chooseAIProvider(task = 'general') {
  const cfg = getAIConfig();
  if (cfg.route === 'openai') return 'openai';
  if (cfg.route === 'anthropic') return 'anthropic';
  // Auto route: long enrichment JSON goes to Anthropic; short field generation/test goes to OpenAI.
  if (task === 'enrich' && cfg.anthropicKey) return 'anthropic';
  if (cfg.openaiKey) return 'openai';
  if (cfg.anthropicKey) return 'anthropic';
  return 'openai';
}

async function testAIConnection() {
  if (!saveAIConfigFromForm(true)) return;
  const cfg = getAIConfig();
  const providers = cfg.route === 'auto' ? ['openai', 'anthropic'] : [chooseAIProvider('test')];
  try {
    for (const p of providers) await callAIText('Return exactly: OK', 20, 'test', p);

// ─── Claude.ai 내장 API 호출 (키 불필요) ───
async function callClaudeBuiltin(prompt, maxTokens = 800) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      messages: [{ role: 'user', content: prompt }]
    })
  });
  if (!res.ok) throw new Error(`Builtin Claude error: ${res.status}`);
  const data = await res.json();
  return data.content?.map(c => c.text || '').join('\n') || '';
}

async function callAIText(prompt, maxTokens = 800, task = 'general', forceProvider = null) {
  // claude.ai 환경이면 내장 API 우선 시도 (키 불필요)
  if (isClaudeAiEnv()) {
    // 529(과부하) 시 최대 3회 재시도 (1s, 2s, 4s 대기)
    for (let attempt = 0; attempt < 3; attempt++) {
      try {
        return await callClaudeBuiltin(prompt, maxTokens);
      } catch (e) {
        const is529 = e.message.includes('529') || e.message.includes('overloaded');
        if (is529 && attempt < 2) {
          const wait = (attempt + 1) * 1500;
          console.warn(`Builtin Claude 529, retry in ${wait}ms...`);
          await new Promise(r => setTimeout(r, wait));
          continue;
        }
        console.warn('Builtin Claude failed, falling back to user key:', e.message);
        break; // 재시도 실패 또는 529 아닌 오류 → 사용자 키 fallback
      }
    }
  }

  const cfg = getAIConfig();
  const provider = forceProvider || chooseAIProvider(task);

  if (provider === 'anthropic') {
    if (!cfg.anthropicKey) throw new Error('Anthropic API key is not configured.');
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': cfg.anthropicKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: cfg.modelAnthropic,
        max_tokens: maxTokens,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!res.ok) throw new Error(`Anthropic API error: ${res.status}`);
    const data = await res.json();
    return data.content?.map(c => c.text || '').join('\n') || '';
  }

  if (provider === 'gemini') {
    if (!cfg.geminiKey) throw new Error('Gemini API key is not configured.');
    const model = cfg.modelGemini || 'gemini-2.0-flash';
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${cfg.geminiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: maxTokens } })
    });
    if (!res.ok) throw new Error(`Gemini API error: ${res.status}`);
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
  }

  if (!cfg.openaiKey) throw new Error('OpenAI API key is not configured.');
  const res = await fetch('https://api.openai.com/v1/responses', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${cfg.openaiKey}`
    },
    body: JSON.stringify({
      model: cfg.modelOpenAI,
      input: prompt,
      max_output_tokens: maxTokens
    })
  });
  if (!res.ok) throw new Error(`OpenAI API error: ${res.status}`);
  const data = await res.json();
  if (data.output_text) return data.output_text;
  return (data.output || []).flatMap(item => item.content || []).map(c => c.text || '').join('\n');
}

function parseTsvPaste(raw) {
  const lines = raw.trim().split('\n').filter(l => l.trim());
  if (!lines.length) return [];
  const COLS = ['ko','en','uz','category','def_ko','def_en','def_uz','usmle','ipa'];

  // 헤더 별칭 매핑 (영문 헤더 → 내부 키)
  const ALIAS = {
    'ko':'ko', 'korean':'ko',
    'en':'en', 'english':'en',
    'uz':'uz', 'uzbek':'uz',
    'category':'category',
    'def_ko':'def_ko',
    'def_en':'def_en',
    'def_uz':'def_uz',
    'usmle':'usmle',
    'ipa':'ipa',
  };

  // 헤더 감지: ko/en 또는 Korean/English 포함 여부
  const firstCols = lines[0].split('\t').map(c => c.trim().toLowerCase());
  const hasHeader = firstCols.some(c => ALIAS[c] !== undefined);

  if (hasHeader) {
    const colMap = firstCols.map(c => ALIAS[c] || null);
    return lines.slice(1)
      .filter(l => l.trim() && !l.startsWith('#'))
      .map(line => {
        const cells = line.split('\t');
        const t = {};
        colMap.forEach((key, idx) => { if (key) t[key] = (cells[idx] || '').trim(); });
        COLS.forEach(c => { if (!t[c]) t[c] = ''; });
        t.category = t.category || '기타';
        return t;
      }).filter(t => t.ko || t.en);
  }

  // 헤더 없음 — 순서대로 (Anki TSV #으로 시작하는 줄 제외)
  return lines
    .filter(l => !l.startsWith('#'))
    .map(line => {
      const cells = line.split('\t');
      const t = {};
      COLS.forEach((c, idx) => { t[c] = (cells[idx] || '').trim(); });
      t.category = t.category || '기타';
      return t;
    }).filter(t => t.ko || t.en);
}

// Autocomplete inside add form
let addAcDebounce = null;
function addFormAcSearch(query) {
  const list = document.getElementById('addAcList');
  if (!list) return;
  if (!query || query.length < 2 || !/[a-zA-Z]/.test(query)) { list.style.display = 'none'; return; }
  clearTimeout(addAcDebounce);
  addAcDebounce = setTimeout(async () => {
    const results = await fetchNLMConditions(query, 5);
    if (!results.length) { list.style.display = 'none'; return; }
    list.style.display = 'block';
    list.innerHTML = results.map(r => `
      <div onclick="selectAddAc(${JSON.stringify(r.name).replace(/"/g,'&quot;')})" style="padding:9px 12px;cursor:pointer;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)" onmouseover="this.style.background='rgba(88,166,255,0.08)'" onmouseout="this.style.background='none'">
        <span style="color:var(--text);font-weight:500">${r.name}</span>
        ${r.icd10 ? `<span style="color:var(--text3);font-size:10px;margin-left:6px">ICD-10: ${r.icd10}</span>` : ''}
      </div>`).join('');
  }, 260);
}

async function submitAddTerm() {
  const ko = document.getElementById('add_ko')?.value.trim() || '';
  const en = document.getElementById('add_en')?.value.trim() || '';
  const uz = document.getElementById('add_uz')?.value.trim() || '';

  if (!ko && !en && !uz) { showToast('⚠️ 하나 이상 입력해주세요'); return; }

  if (TERMS.some(t =>
    (en && t.en.toLowerCase() === en.toLowerCase()) ||
    (ko && t.ko === ko) ||
    (uz && t.uz === uz)
  )) {
    showToast('⚠️ 이미 존재하는 용어입니다'); return;
  }

  const btn = document.getElementById('addSubmitBtn');
  const cfg = getAIConfig();
  const hasKey = cfg.route === 'openai' ? !!cfg.openaiKey
               : cfg.route === 'anthropic' ? !!cfg.anthropicKey
               : !!(cfg.openaiKey || cfg.anthropicKey);

  const newTerm = {
    id:       Date.now(),
    ko, en, uz,
    category: document.getElementById('add_category')?.value || '기타',
    def_ko:   document.getElementById('add_def_ko')?.value.trim() || '',
    def_en:   document.getElementById('add_def_en')?.value.trim() || '',
    def_uz:   document.getElementById('add_def_uz')?.value.trim() || '',
    usmle:    document.getElementById('add_usmle')?.value.trim() || '',
    ipa: '', refs: [], icd11: null, fdaDrug: null, rxclassATC: null, trials: null,
  };

  // claude.ai 환경이거나 API 키 있으면 AI 자동완성
  const canUseAI = isClaudeAiEnv() || hasKey;
  if (!canUseAI) {
    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    saveTermToCloud(TERMS[TERMS.length - 1]);
    showToast(`✅ "${ko || en || uz}" 저장됨 (🤖 AI탭에서 키 등록 시 자동완성 가능)`);
    switchTab('search', document.querySelector('.nav-btn'));
    expandedId = TERMS[TERMS.length - 1].id;
    applyFilters();
    return;
  }

  // API 키 있으면 AI 자동완성
  if (btn) { btn.disabled = true; btn.textContent = '🤖 AI 처리 중...'; }

  try {
    const enriched = await enrichTermWithAI(newTerm);
    const finalKo = ko || enriched.ko || '';
    const finalEn = en || enriched.en || '';
    const finalUz = uz || enriched.uz || '';
    TERMS.push(normalizeTermForStorage({
      ...newTerm,
      ko: finalKo, en: finalEn, uz: finalUz,
      category:   newTerm.category !== '기타' ? newTerm.category : (enriched.category || '기타'),
      ipa:        enriched.ipa        || '',
      def_ko:     newTerm.def_ko     || enriched.def_ko     || '',
      def_en:     newTerm.def_en     || enriched.def_en     || '',
      def_uz:     newTerm.def_uz     || enriched.def_uz     || '',
      usmle:      newTerm.usmle      || enriched.usmle      || '',
      refs:       enriched.refs       || [],
      icd11:      enriched.icd11      || null,
      fdaDrug:    enriched.fdaDrug    || null,
      rxclassATC: enriched.rxclassATC || null,
      trials:     enriched.trials     || null,
    }));
    saveTermsToLocalStorage();
    showToast(`✅ "${finalKo || finalEn || finalUz}" AI 자동완성 추가 완료!`);
    switchTab('search', document.querySelector('.nav-btn'));
    expandedId = TERMS[TERMS.length - 1].id;
    applyFilters();
  } catch (err) {
    console.error(err);
    // AI 실패해도 기본 데이터로 저장
    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    showToast(`⚠️ AI 실패 — "${ko || en || uz}" 기본 저장됨. ✏️ 편집으로 내용 추가 가능`);
    switchTab('search', document.querySelector('.nav-btn'));
    expandedId = TERMS[TERMS.length - 1].id;
    applyFilters();
    if (btn) { btn.disabled = false; btn.textContent = '🤖 AI 자동완성으로 추가'; }
  }
}

// ─── Per-field AI Regeneration ───
const FIELD_PROMPTS = {
  ko:     (t) => `Translate this medical term to Korean (한국어). Return ONLY the Korean term name, nothing else.\nEnglish: ${t.en || t.uz}`,
  en:     (t) => `Translate this medical term to English. Return ONLY the English term name, nothing else.\nKorean: ${t.ko || t.uz}`,
  uz:     (t) => `Translate this medical term to Uzbek (O'zbek). Return ONLY the Uzbek term name, nothing else.\nEnglish: ${t.en}\nKorean: ${t.ko}`,
  ipa:    (t) => `Provide the Cambridge-style IPA pronunciation for this English medical term. Return ONLY the IPA string (e.g. /ˈsep.sɪs/), nothing else.\nTerm: ${t.en}`,
  def_ko: (t) => `Write a Korean (한국어) medical definition for "${t.ko || t.en}" at medical student level for USMLE. 1-2 sentences. Return ONLY the definition text.`,
  def_en: (t) => `Write an English medical definition for "${t.en || t.ko}" at medical student level for USMLE. 1-2 sentences. Return ONLY the definition text.`,
  def_uz: (t) => `Write an Uzbek (O'zbek) medical definition for "${t.uz || t.en}" at medical student level. 1-2 sentences. Return ONLY the definition text.`,
  usmle:  (t) => `Give a USMLE Step 1/2 CK high-yield one-liner for "${t.en || t.ko}". Format strictly: ↑X, ↓Y | Tx: Z | Trap: W. Return ONLY that one line, nothing else.`,
};

async function regenField(id, field) {
  const t = TERMS.find(x => x.id === id);
  if (!t) return;

  const inputEl = document.getElementById(`edit_${field}`);
  if (!inputEl) return;

  // Visual loading state
  const btn = inputEl.closest('div').querySelector('button');
  const prev = btn.textContent;
  btn.textContent = '⏳';
  btn.disabled = true;
  inputEl.style.opacity = '0.4';

  try {
    const result = (await callAIText(FIELD_PROMPTS[field](t), 300)).trim().replace(/^["']|["']$/g, '');
    if (result) inputEl.value = result;
    showToast(`✅ ${field} 재생성 완료`);
  } catch (err) {
    console.error(err);
    showToast('⚠️ 재생성 실패: AI 탭에서 API 설정 확인');
  } finally {
    btn.textContent = prev;
    btn.disabled = false;
    inputEl.style.opacity = '1';
  }
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function saveEdit(id) {
  const idx = TERMS.findIndex(x => x.id === id);
  if (idx === -1) return;

  const editedCategory = document.getElementById('edit_category')?.value?.trim();
  TERMS[idx] = normalizeTermForStorage({
    ...TERMS[idx],
    ko:       document.getElementById('edit_ko')?.value.trim()       || TERMS[idx].ko,
    en:       document.getElementById('edit_en')?.value.trim()       || TERMS[idx].en,
    uz:       document.getElementById('edit_uz')?.value.trim()       || '',
    ipa:      document.getElementById('edit_ipa')?.value.trim()      || '',
    category: editedCategory || TERMS[idx].category || '기타',
    def_ko:   document.getElementById('edit_def_ko')?.value.trim()   || '',
    def_en:   document.getElementById('edit_def_en')?.value.trim()   || '',
    def_uz:   document.getElementById('edit_def_uz')?.value.trim()   || '',
    usmle:    document.getElementById('edit_usmle')?.value.trim()    || '',
  });

  TERMS[idx].updatedAt = new Date().toISOString();
  saveTermsToLocalStorage();
  saveTermToCloud(TERMS[idx]);
  document.getElementById('editModal')?.remove();
  showToast('✅ 수정 완료');
  applyFilters();
}

function deleteTerm(id) {
  const t = TERMS.find(x => x.id === id);
  const label = t?.ko || t?.en || '이 용어';
  showConfirm(`"${label}"을 삭제할까요?`, () => {
    const idx = TERMS.findIndex(x => x.id === id);
    if (idx !== -1) TERMS.splice(idx, 1);
    bookmarks.delete(id);
    localStorage.setItem('kma_bookmarks', JSON.stringify([...bookmarks]));
    saveTermsToLocalStorage();
    deleteTermFromCloud(id);
    document.getElementById('editModal')?.remove();
    if (expandedId === id) expandedId = null;
    showToast('🗑️ 삭제 완료');
    updateBookmarkCount();
    applyFilters();
  });
}

function showDuplicateManager() {
  // 중복 그룹 찾기 (영어 기준)
  const groups = {};
  TERMS.forEach((t, idx) => {
    const key = (t.en || t.ko || '').toLowerCase().trim();
    if (!key) return;
    if (!groups[key]) groups[key] = [];
    groups[key].push({ t, idx });
  });
  const dupGroups = Object.values(groups).filter(g => g.length > 1);

  if (!dupGroups.length) { showToast('✅ 중복 용어가 없습니다'); showExportMenu(); return; }

  const main = document.getElementById('mainContent');
  if (!main) return;

  const renderGroup = (g, gi) => {
    const cards = g.map(({ t, idx }, ci) => `
      <div id="dupCard_${gi}_${ci}" onclick="selectDupCard(${gi},${ci},${g.length})"
        style="border:2px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;margin-bottom:8px;background:var(--surface2);transition:border-color 0.2s">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div>
            <div style="font-size:14px;font-weight:600;color:var(--text)">${t.ko || '—'}</div>
            <div style="font-size:12px;color:#58a6ff">${t.en || '—'}</div>
            ${t.uz ? `<div style="font-size:11px;color:#fbbf24">${t.uz}</div>` : ''}
          </div>
          <span style="font-size:10px;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2px 8px">${t.category||'기타'}</span>
        </div>
        <div style="font-size:10px;color:var(--text3);line-height:1.5">
          ${t.def_ko ? `<div>📖 ${t.def_ko.slice(0,60)}...</div>` : '<div style="color:#6e7681">정의 없음</div>'}
          ${t.usmle ? `<div>🏥 USMLE: ${t.usmle.slice(0,50)}...</div>` : ''}
          ${t.ipa ? `<div>🔊 ${t.ipa}</div>` : ''}
        </div>
        <div id="dupBadge_${gi}_${ci}" style="display:none;margin-top:8px;text-align:center;font-size:12px;font-weight:700;color:#3fb950">✅ 유지 선택됨</div>
      </div>`).join('');

    return `
      <div style="background:var(--surface);border:1px solid rgba(251,191,36,0.3);border-radius:12px;padding:14px;margin-bottom:12px">
        <div style="font-size:11px;color:#fbbf24;margin-bottom:8px;font-weight:600">
          ⚠️ 중복 ${gi+1}/${dupGroups.length}: "${g[0].t.en || g[0].t.ko}" (${g.length}개)
        </div>
        <div id="dupGroup_${gi}">${cards}</div>
        <div id="dupGroupStatus_${gi}" style="font-size:11px;color:var(--text3);margin-top:4px;text-align:center">유지할 용어를 선택하세요</div>
      </div>`;
  };

  // 선택 상태 저장
  window._dupGroups = dupGroups;
  window._dupSelections = new Array(dupGroups.length).fill(null);

  main.innerHTML = `
    <div style="padding:16px 0 80px">
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:32px;margin-bottom:8px">⚠️</div>
        <div style="font-size:18px;font-weight:700;color:#fbbf24">중복 용어 정리</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">${dupGroups.length}개 중복 그룹 발견 · 유지할 용어를 선택하세요</div>
      </div>
      <div id="dupGroupList">
        ${dupGroups.map((g,gi) => renderGroup(g,gi)).join('')}
      </div>
      <div style="position:sticky;bottom:60px;background:var(--bg);padding:8px 0;border-top:1px solid var(--border)">
        <div id="dupSummary" style="font-size:12px;color:var(--text3);text-align:center;margin-bottom:8px">0 / ${dupGroups.length} 선택 완료</div>
        <button id="dupApplyBtn" onclick="applyDuplicateCleanup()" disabled
          style="width:100%;background:rgba(251,191,36,0.15);border:1px solid #fbbf24;border-radius:10px;padding:13px;color:#fbbf24;font-size:14px;font-weight:700;cursor:not-allowed;opacity:0.5;font-family:'Noto Sans KR',sans-serif">
          🗑️ 선택한 용어만 유지 (나머지 삭제)
        </button>
        <button onclick="switchTab('export', document.querySelectorAll('.nav-btn')[5])" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px;color:var(--text2);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;margin-top:8px">
          ← 취소
        </button>
      </div>
    </div>`;
}

function selectDupCard(gi, ci, groupLen) {
  // 같은 그룹 내 모든 카드 스타일 초기화
  for (let i = 0; i < groupLen; i++) {
    const card = document.getElementById(`dupCard_${gi}_${i}`);
    const badge = document.getElementById(`dupBadge_${gi}_${i}`);
    if (card) card.style.borderColor = 'var(--border)';
    if (badge) badge.style.display = 'none';
  }
  // 선택한 카드 하이라이트
  const selCard = document.getElementById(`dupCard_${gi}_${ci}`);
  const selBadge = document.getElementById(`dupBadge_${gi}_${ci}`);
  if (selCard) selCard.style.borderColor = '#3fb950';
  if (selBadge) selBadge.style.display = 'block';

  const statusEl = document.getElementById(`dupGroupStatus_${gi}`);
  if (statusEl) statusEl.textContent = '✅ 선택 완료';

  window._dupSelections[gi] = ci;

  // 전체 진행률 업데이트
  const done = window._dupSelections.filter(s => s !== null).length;
  const total = window._dupGroups.length;
  const summary = document.getElementById('dupSummary');
  const applyBtn = document.getElementById('dupApplyBtn');
  if (summary) summary.textContent = `${done} / ${total} 선택 완료`;
  if (applyBtn) {
    if (done === total) {
      applyBtn.disabled = false;
      applyBtn.style.cursor = 'pointer';
      applyBtn.style.opacity = '1';
    }
  }
}

function applyDuplicateCleanup() {
  const groups = window._dupGroups;
  const selections = window._dupSelections;
  if (!groups || selections.some(s => s === null)) {
    showToast('⚠️ 모든 중복 그룹에서 유지할 용어를 선택해주세요'); return;
  }

  // 삭제할 인덱스 수집
  const indicesToDelete = new Set();
  groups.forEach((g, gi) => {
    const keepCi = selections[gi];
    g.forEach(({ idx }, ci) => {
      if (ci !== keepCi) indicesToDelete.add(idx);
    });
  });

  // 역순으로 삭제 (인덱스 밀림 방지)
  const sortedIndices = [...indicesToDelete].sort((a, b) => b - a);
  sortedIndices.forEach(idx => {
    const term = TERMS[idx];
    if (term) deleteTermFromCloud(term.id);
    TERMS.splice(idx, 1);
  });

  saveTermsToLocalStorage();
  applyFilters();
  showToast(`✅ ${indicesToDelete.size}개 중복 용어 삭제 완료`);
  switchTab('export', document.querySelectorAll('.nav-btn')[5]);
}

  const hasCloud = !!getSupabaseConfig();
  const cloudNote = hasCloud ? '<br><span style="font-size:11px;color:#f87171">☁️ 클라우드에서도 삭제됩니다</span>' : '';

async function bulkReclassify() {
  const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey);
  if (!canAI) { showToast('⚠️ AI 키 필요 — AI탭에서 등록해주세요'); return; }

  const targets = TERMS.filter(t => !t.category || t.category === '기타');
  if (!targets.length) { showToast('✅ 재분류할 용어가 없습니다 (기타 없음)'); return; }

  showAIProgress(targets.length);
  let done = 0;
  let reclassified = 0;

  for (const term of targets) {
    if (aiStopRequested) {
      saveTermsToLocalStorage();
      applyFilters();
      showToast(`⏹ 중지됨 — ${reclassified}개 재분류 완료`);
      hideAIProgress();
      return;
    }

    const termLabel = term.en || term.ko || '';
    try {
      // 카테고리 분류만을 위한 가벼운 프롬프트
      const prompt = `You are a medical terminology classifier.
Classify this medical term into exactly ONE category.
Term: "${term.en || term.ko}"
${term.def_en ? `Definition: ${term.def_en}` : ''}
${term.usmle ? `USMLE context: ${term.usmle}` : ''}

Return ONLY a JSON object:
{"category": "one of: Cardiovascular|Pulmonary|Renal|GI & Hepatobiliary|Endocrine|Neurology|Hematology & Oncology|Infectious Disease|Musculoskeletal|Dermatology|Reproductive|Psychiatry|Immunology|Pharmacology|Pathology|기타"}
Use "기타" ONLY if truly none of the above apply.`;

      const text = await callAIText(prompt, 100, 'general');
      const clean = text.replace(/\`\`\`json|\`\`\`/g, '').trim();
      const result = JSON.parse(clean);
      const aiCat = result.category?.trim();

      const idx = TERMS.findIndex(t => t.id === term.id);
      if (idx !== -1 && aiCat && aiCat !== '기타') {
        const finalCat = VALID_CATS.includes(aiCat) ? aiCat : aiCat;
        TERMS[idx] = normalizeTermForStorage({ ...TERMS[idx], category: finalCat, updatedAt: new Date().toISOString() });
        saveTermToCloud(TERMS[idx]);
        reclassified++;
      }
    } catch(e) { console.warn('reclassify error', termLabel, e); }

    done++;
    updateAIProgress(done, targets.length, termLabel);
    if (done % 5 === 0) { saveTermsToLocalStorage(); applyFilters(); }
  }

  hideAIProgress();
  saveTermsToLocalStorage();
  applyFilters();
  showToast(`🏷️ ${reclassified}개 재분류 완료 (${targets.length - reclassified}개 기타 유지)`);
}

async function bulkFillBlanks(scope = 'all') {
  const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey);
  if (!canAI) { showToast('⚠️ AI 키 필요 — AI탭에서 등록해주세요'); return; }

  const targets = scope === 'all'
    ? TERMS.filter(t => !t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa)
    : TERMS.filter(t => t.id === scope && (!t.def_ko || !t.def_en || !t.def_uz || !t.usmle || !t.ipa));

  if (!targets.length) { showToast('✅ 모든 용어가 완성되어 있습니다'); return; }

  showAIProgress(targets.length);
  let done = 0;
  for (const term of targets) {
    if (aiStopRequested) {
      saveTermsToLocalStorage();
      applyFilters();
      showToast(`⏹ 중지됨 — ${done}개 빈칸 채우기 완료`);
      hideAIProgress();
      return;
    }
    const termLabel = term.en || term.ko || '';
    try {
      const enriched = await enrichTermWithAI(term);
      const idx = TERMS.findIndex(t => t.id === term.id);
      if (idx === -1) continue;
      const updated = { ...TERMS[idx] };
      let changed = false;

      // 카테고리: '기타'이면 AI 분류 우선 적용
      const aiCategory = enriched.category?.trim();
      if ((!updated.category || updated.category === '기타') && aiCategory) {
        updated.category = VALID_CATS.includes(aiCategory) ? aiCategory : (aiCategory !== '기타' ? aiCategory : '기타');
        changed = true;
      }

      // 나머지 빈 필드 채우기
      ['def_ko','def_en','def_uz','usmle','ipa','ko','uz'].forEach(f => {
        if (!updated[f] && enriched[f]) { updated[f] = enriched[f]; changed = true; }
      });

      if (changed) {
        updated.updatedAt = new Date().toISOString();
        TERMS[idx] = normalizeTermForStorage(updated);
        saveTermToCloud(TERMS[idx]);
      }
    } catch(e) { console.warn('bulkFill error', e); }
    done++;
    updateAIProgress(done, targets.length, termLabel);
  }
  hideAIProgress();
  saveTermsToLocalStorage();
  applyFilters();
  showToast(`✅ ${done}개 용어 빈칸 채우기 완료`);
}

function cleanTsvCell(value) {
  return String(value ?? '')
    .replace(/\r?\n/g, ' ')
    .replace(/\t/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function cleanAnkiHtml(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\r?\n/g, '<br>')
    .replace(/\t/g, ' ')
    .trim();
}

function ankiTags(t) {
  const cat = String(t.category || '기타').replace(/[^A-Za-z0-9가-힣_]+/g, '_');
  return `DrBugeon MedicalTerms ${cat}`;
}

function downloadTextFile(text, filename) {
  // claude.ai 환경: 클립보드 복사 + 텍스트 뷰어 모달
  if (isClaudeAiEnv()) {
    showExportViewer(text, filename);
    return;
  }
  // 일반 브라우저: Blob 다운로드
  try {
    const blob = new Blob(['\uFEFF' + text], { type: 'text/tab-separated-values;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  } catch(e) {
    showExportViewer(text, filename);
  }
}

function evCopyAll() {
  const ta = document.getElementById('evTextarea');
  if (!ta) return;

  const onSuccess = () => {
    const btn = document.getElementById('evCopyBtn');
    if (btn) {
      btn.textContent = '✅ 복사됨!';
      btn.style.background = '#1a7f37';
      setTimeout(() => { btn.textContent = '📋 전체 복사'; btn.style.background = '#238636'; }, 2500);
    }
    showToast('📋 클립보드에 복사됐습니다!');
  };

  const onFail = () => {
    // execCommand fallback (모바일 구형 브라우저)
    try {
      ta.focus();
      ta.select();
      const ok = document.execCommand('copy');
      if (ok) { onSuccess(); return; }
    } catch(e2) {}
    // 마지막 수단: 전체 선택만
    evSelectAll();
    showToast('전체 선택됨 — 길게 눌러 복사하세요 (Ctrl+C / Cmd+C)');
  };

  // Clipboard API (HTTPS / 현대 브라우저)
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(onSuccess).catch(onFail);
  } else {
    onFail();
  }
}

function evSelectAll() {
  const ta = document.getElementById('evTextarea');
  if (!ta) return;
  ta.focus();
  ta.select();
  // iOS 대응
  ta.setSelectionRange(0, ta.value.length);
}

function copyTermText(event, text, lang) {
  event.stopPropagation(); // 카드 토글 방지
  if (!text) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showCopyToast(event, lang);
    }).catch(() => {
      fallbackCopy(text, event, lang);
    });
  } else {
    fallbackCopy(text, event, lang);
  }
}

function fallbackCopy(text, event, lang) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;top:-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  showCopyToast(event, lang);
}

function showCopyToast(event, lang) {

function startQuizFromSetup() {
  const scope = document.querySelector('input[name="quizScope"]:checked')?.value || 'all';
  const cat   = document.getElementById('catSelect')?.value;
  quizAutoSpeak = document.getElementById('quizAutoSpeak')?.checked || false;

  let pool = [];
  if (scope === 'all')       pool = [...TERMS];
  else if (scope === 'bookmarks') pool = TERMS.filter(t => bookmarks.has(t.id));
  else if (scope === 'category')  pool = TERMS.filter(t => t.category === cat);

  if (!pool.length) { showToast('선택한 범위에 용어가 없습니다'); return; }

  quizPool  = pool.sort(() => Math.random() - 0.5);
  quizIdx   = 0;
  quizScore = { correct: 0, total: 0 };
  quizTerm  = quizPool[0];
  quizStep  = 0;
  renderQuizStep();
}

let quizAutoSpeak = false;

function startQuiz() {
  const available = currentFilter === '즐겨찾기'
    ? TERMS.filter(t => bookmarks.has(t.id))
    : TERMS.filter(t => currentFilter === 'all' || t.category === currentFilter);

  if (available.length === 0) { showToast('퀴즈할 용어가 없습니다'); return; }

  // Shuffle pool
  quizPool  = [...available].sort(() => Math.random() - 0.5);
  quizIdx   = 0;
  quizScore = { correct: 0, total: 0 };
  quizTerm  = quizPool[0];
  quizStep  = 0;
  renderQuizStep();
}

function revealQuizStep() {
  const ans = document.getElementById('quizAnswer');
  const btn = document.getElementById('revealBtn');
  if (ans) ans.style.display = 'block';
  if (btn) btn.style.display = 'none';
}

function quizNext(correct) {
  quizScore.total++;
  if (correct) quizScore.correct++;

  quizStep++;
  if (quizStep < 3) {
    // Next step on same term
    renderQuizStep();
    return;
  }

  // Move to next term
  quizStep = 0;
  quizIdx++;
  if (quizIdx >= quizPool.length) {
    showQuizResult();
    return;
  }
  quizTerm = quizPool[quizIdx];
  renderQuizStep();
}

// ─── External Medical APIs ───

async function fetchMedlinePlus(term) {
  try {
    const url = `https://connect.medlineplus.gov/application?mainSearchCriteria.v.cs=2.16.840.1.113883.6.90&mainSearchCriteria.v.dn=${encodeURIComponent(term)}&knowledgeResponseType=application/json&informationRecipient.languageCode.c=en`;
    const res = await fetch(url);
    const data = await res.json();
    const entries = data.feed?.entry || [];
    if (entries.length === 0) return null;
    const entry = entries[0];
    return {
      title:   entry.title?._value || '',
      summary: entry.summary?._value?.replace(/<[^>]+>/g, '').slice(0, 400) || '',
      url:     entry.link?.[0]?.href || ''
    };
  } catch { return null; }
}

async function fetchRxNorm(term) {
  try {
    const searchRes = await fetch(`https://rxnav.nlm.nih.gov/REST/rxcui.json?name=${encodeURIComponent(term)}&search=2`);
    const searchData = await searchRes.json();
    const rxcui = searchData.idGroup?.rxnormId?.[0];
    if (!rxcui) return null;
    const propRes = await fetch(`https://rxnav.nlm.nih.gov/REST/rxcui/${rxcui}/properties.json`);
    const propData = await propRes.json();
    const props = propData.properties;
    return {
      rxcui,
      name:     props?.name || '',
      synonym:  props?.synonym || '',
      tty:      props?.tty || '',
      url:      `https://mor.nlm.nih.gov/RxNav/search?searchBy=RXCUI&searchTerm=${rxcui}`
    };
  } catch { return null; }
}

async function fetchPubMed(term, maxResults = 3) {
  try {
    const searchRes = await fetch(
      `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(term + '[MeSH Terms]')}&retmax=${maxResults}&sort=relevance&retmode=json`
    );
    const searchData = await searchRes.json();
    const ids = searchData.esearchresult?.idlist || [];
    if (ids.length === 0) return [];

    const summaryRes = await fetch(
      `https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esummary.fcgi?db=pubmed&id=${ids.join(',')}&retmode=json`
    );
    const summaryData = await summaryRes.json();
    const result = summaryData.result || {};

    return ids.map(id => {
      const item = result[id] || {};
      const authors = (item.authors || []).slice(0, 2).map(a => a.name).join(', ');
      return {
        pmid:    id,
        title:   item.title || '',
        authors: authors + (item.authors?.length > 2 ? ' et al.' : ''),
        journal: item.fulljournalname || item.source || '',
        year:    item.pubdate?.slice(0, 4) || '',
        url:     `https://pubmed.ncbi.nlm.nih.gov/${id}/`
      };
    }).filter(r => r.title);
  } catch { return []; }
}

// ── NEW API 1: NLM Clinical Tables — disease autocomplete + ICD-10 ──
async function fetchNLMConditions(query, maxResults = 6) {
  try {
    const res = await fetch(
      `https://clinicaltables.nlm.nih.gov/api/conditions/v3/search?terms=${encodeURIComponent(query)}&maxList=${maxResults}&df=primary_name,consumer_name,icd10cm_codes`
    );
    const data = await res.json();
    // data = [total, codes_array, extra, display_array]
    const total = data[0] || 0;
    const codes = data[1] || [];
    const display = data[3] || [];
    if (total === 0) return [];
    return codes.map((code, i) => ({
      code,
      name: display[i]?.[0] || code,
      consumer: display[i]?.[1] || '',
      icd10: display[i]?.[2] || ''
    }));
  } catch { return []; }
}

// ── NEW API 2: OpenFDA — drug adverse events & warnings ──
async function fetchFDADrug(term) {
  try {
    // Search drug label for warnings
    const res = await fetch(
      `https://api.fda.gov/drug/label.json?search=openfda.generic_name:"${encodeURIComponent(term)}"&limit=1`
    );
    if (!res.ok) return null;
    const data = await res.json();
    const result = data.results?.[0];
    if (!result) return null;

    const warnings = result.warnings?.[0] || result.boxed_warning?.[0] || '';
    const indications = result.indications_and_usage?.[0] || '';
    const adverseRaw = result.adverse_reactions?.[0] || '';

    return {
      brandName:   result.openfda?.brand_name?.[0] || '',
      genericName: result.openfda?.generic_name?.[0] || '',
      drugClass:   result.openfda?.pharm_class_epc?.[0] || '',
      warnings:    warnings.replace(/<[^>]+>/g, '').slice(0, 300),
      indications: indications.replace(/<[^>]+>/g, '').slice(0, 200),
      adverse:     adverseRaw.replace(/<[^>]+>/g, '').slice(0, 250),
      hasBoxedWarning: !!result.boxed_warning
    };
  } catch { return null; }
}

// ── NEW API 3: RxClass — drug class (ATC, MeSH, VA) ──
async function fetchRxClass(rxcui) {
  if (!rxcui) return null;
  try {
    const res = await fetch(
      `https://rxnav.nlm.nih.gov/REST/rxclass/class/byRxcui.json?rxcui=${rxcui}&relaSource=ATC`
    );
    const data = await res.json();
    const classes = data.rxclassDrugInfoList?.rxclassDrugInfo || [];
    const atcClasses = classes
      .filter(c => c.rxclassMinConceptItem?.classType === 'ATC1-4')
      .slice(0, 3)
      .map(c => ({
        name: c.rxclassMinConceptItem?.className || '',
        id:   c.rxclassMinConceptItem?.classId || ''
      }));
    return atcClasses.length > 0 ? atcClasses : null;
  } catch { return null; }
}

function showICD11Popup(enTerm, koTerm) {

// Uses the public linearization search (no token needed for read)
async function fetchICD11(term) {
  try {
    const res = await fetch(
      `https://id.who.int/icd/release/11/2024-01/mms/search?q=${encodeURIComponent(term)}&subtreesFilter=&includeKeywordResult=true&useFlexisearch=false&flatResults=true&highlightingEnabled=false`,
      { headers: { 'Accept': 'application/json', 'Accept-Language': 'en', 'API-Version': 'v2' } }
    );
    if (!res.ok) return null;
    const data = await res.json();
    const dest = data.destinationEntities;
    if (!dest || dest.length === 0) return null;
    const top = dest[0];
    return {
      code:  top.theCode || '',
      title: top.title || '',
      url:   top['@id'] || ''
    };
  } catch { return null; }
}

// ── NEW API 5: ClinicalTrials.gov v2 — active trial count ──
async function fetchClinicalTrials(term) {
  try {
    const res = await fetch(
      `https://clinicaltrials.gov/api/v2/studies?query.cond=${encodeURIComponent(term)}&filter.overallStatus=RECRUITING&pageSize=1&countTotal=true`
    );
    if (!res.ok) return null;
    const data = await res.json();
    return { count: data.totalCount || 0 };
  } catch { return null; }
}

async function addUMLSTerm(cui, name, umlsKey) {
  showToast('⏳ UMLS에서 정보 가져오는 중...');
  try {
    // Definition 가져오기
    const defRes = await fetch(`https://uts-ws.nlm.nih.gov/rest/content/current/CUI/${cui}/definitions?apiKey=${umlsKey}&pageSize=3`);
    let def_en = '';
    if (defRes.ok) {
      const defData = await defRes.json();
      const defs = defData.result || [];
      def_en = defs[0]?.value || '';
    }

    // Atoms(영어 명칭) 가져오기
    const atomRes = await fetch(`https://uts-ws.nlm.nih.gov/rest/content/current/CUI/${cui}/atoms?apiKey=${umlsKey}&language=ENG&pageSize=3`);
    let en = name;
    if (atomRes.ok) {
      const atomData = await atomRes.json();
      const atoms = atomData.result || [];
      if (atoms.length) en = atoms[0].name || name;
    }

    const newTerm = {
      id: Date.now(),
      ko: '', en: capitalizeFirst(en), uz: '',
      category: '기타', def_ko: '', def_en: def_en, def_uz: '',
      usmle: '', ipa: '', refs: [], icd11: null, fdaDrug: null, rxclassATC: null, trials: null,
    };

    // AI로 나머지 채우기
    const canAI = isClaudeAiEnv() || !!(getAIConfig().openaiKey || getAIConfig().anthropicKey);
    if (canAI) {
      showToast('🤖 AI 자동완성 중...');
      const enriched = await enrichTermWithAI(newTerm);
      Object.keys(enriched).forEach(k => { if (!newTerm[k] && enriched[k]) newTerm[k] = enriched[k]; });
    }

    TERMS.push(normalizeTermForStorage(newTerm));
    saveTermsToLocalStorage();
    saveTermToCloud(TERMS[TERMS.length - 1]);
    applyFilters();
    document.getElementById('umlsModal')?.remove();
    showToast(`✅ "${en}" 추가 완료!`);
  } catch(e) {
    console.error(e);
    showToast('⚠️ UMLS 용어 추가 실패');
  }
}

async function enrichTermWithAI(term) {
  // Fetch ALL external APIs in parallel (original 3 + 5 new)
  const [medline, rxnorm, pubmedRefs, fdaDrug, icd11, trials] = await Promise.all([
    fetchMedlinePlus(term.en),
    fetchRxNorm(term.en),
    fetchPubMed(term.en, 3),
    fetchFDADrug(term.en),
    fetchICD11(term.en),
    fetchClinicalTrials(term.en)
  ]);

  // After RxNorm resolves, get RxClass from rxcui
  const rxclassData = rxnorm?.rxcui ? await fetchRxClass(rxnorm.rxcui) : null;

  // Build context from external APIs
  let externalContext = '';
  if (medline?.summary) {
    externalContext += `\n\n[MedlinePlus / NIH Official Definition]\n${medline.summary}`;
  }
  if (rxnorm?.name) {
    externalContext += `\n\n[RxNorm Drug Info]\nName: ${rxnorm.name} | Type: ${rxnorm.tty} | Synonym: ${rxnorm.synonym}`;
  }
  if (rxclassData?.length) {
    externalContext += `\n\n[RxClass ATC Drug Classes]\n` + rxclassData.map(c => `- ${c.name} (${c.id})`).join('\n');
  }
  if (fdaDrug) {
    if (fdaDrug.drugClass)   externalContext += `\n\n[FDA Drug Class] ${fdaDrug.drugClass}`;
    if (fdaDrug.indications) externalContext += `\n[FDA Indications] ${fdaDrug.indications}`;
    if (fdaDrug.warnings)    externalContext += `\n[FDA Warnings${fdaDrug.hasBoxedWarning ? ' ⚠️ BOXED' : ''}] ${fdaDrug.warnings}`;
    if (fdaDrug.adverse)     externalContext += `\n[FDA Adverse Reactions] ${fdaDrug.adverse}`;
  }
  if (icd11?.code) {
    externalContext += `\n\n[WHO ICD-11 Code] ${icd11.code} — ${icd11.title}`;
  }
  if (trials?.count > 0) {
    externalContext += `\n\n[ClinicalTrials.gov] ${trials.count} active recruiting trials`;
  }
  if (pubmedRefs.length > 0) {
    externalContext += `\n\n[PubMed Top Articles]\n` + pubmedRefs.map(r =>
      `- ${r.title} (${r.authors}, ${r.journal} ${r.year})`
    ).join('\n');
  }

  const prompt = `You are a medical terminology expert specializing in USMLE Step 1/2 CK preparation.

Given this medical term (some fields may be empty — generate them from the provided fields):
- Korean (한국어): ${term.ko || 'NOT PROVIDED — generate from English/Uzbek'}
- English: ${term.en || 'NOT PROVIDED — generate from Korean/Uzbek'}
- Uzbek (O\'zbek): ${term.uz || 'NOT PROVIDED — generate from Korean/English'}
${externalContext ? `\nVerified external reference data (use this to improve accuracy):${externalContext}` : ''}

Return ONLY a valid JSON object (no markdown, no explanation) with these fields:
{
  "ko": "Korean term name — generate if not provided above",
  "en": "English term name — generate if not provided above",
  "uz": "Uzbek term name — generate if not provided above",
  "category": "MUST pick the most specific match from: Cardiovascular|Pulmonary|Renal|GI & Hepatobiliary|Endocrine|Neurology|Hematology & Oncology|Infectious Disease|Musculoskeletal|Dermatology|Reproductive|Psychiatry|Immunology|Pharmacology|Pathology. Use '기타' ONLY if none of the above apply at all.",
  "ipa": "Cambridge-style IPA for the English term only, e.g. /ˈsep.sɪs/",
  "def_ko": "Korean definition, 1-2 sentences, medical student level, informed by external data above",
  "def_en": "English definition, 1-2 sentences, medical student level, informed by external data above",
  "def_uz": "Uzbek definition, 1-2 sentences, medical student level",
  "usmle": "USMLE high-yield one-liner: key labs with arrows (↑↓), first-line Tx, classic trap. Format: ↑X, ↓Y | Tx: Z | Trap: W"
}`;

  const text = await callAIText(prompt, 1000, 'enrich');
  let enriched = {};
  try {
    const clean = text.replace(/```json|```/g, '').trim();
    enriched = JSON.parse(clean);
  } catch { enriched = {}; }

  // Attach all API data to the term
  enriched.refs       = pubmedRefs;
  enriched.icd11      = icd11   || null;
  enriched.fdaDrug    = fdaDrug || null;
  enriched.rxclassATC = rxclassData || null;
  enriched.trials     = trials  || null;
  return enriched;
}

async function handleFileUpload(e, mode = 'replace') {
  const file = e.target.files[0];
  if (!file) return;

  const isExcel = /\.(xlsx|xls)$/i.test(file.name);
  const reader = new FileReader();

  reader.onload = async (ev) => {
    let rows = [];

    if (isExcel) {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(ws, { defval: '' });
        rows = json.map((row, i) => ({
          id: 1000 + i,
          ko:       String(row['ko']       || row['Korean']   || row['한국어']   || '').trim(),
          en:       String(row['en']       || row['English']  || row['영어']     || '').trim(),
          uz:       String(row['uz']       || row['Uzbek']    || row['우즈베크'] || '').trim(),
          category: String(row['category'] || row['Category'] || row['분류']     || '').trim(),
          def_ko:   String(row['def_ko']   || row['Def_ko']   || '').trim(),
          def_en:   String(row['def_en']   || row['Def_en']   || '').trim(),
          def_uz:   String(row['def_uz']   || row['Def_uz']   || '').trim(),
          usmle:    String(row['usmle']    || row['USMLE']    || '').trim(),
          ipa:      String(row['ipa']      || row['IPA']      || '').trim(),
        }));
      } catch (err) {
        showToast('⚠️ 엑셀 파일 읽기 실패');
        return;
      }
    } else {
      const lines = ev.target.result.split('\n').filter(l => l.trim());
      const firstLine = lines[0].toLowerCase();
      const hasHeader = firstLine.startsWith('ko') || firstLine.startsWith('korean') ||
                        firstLine.startsWith('english') || firstLine.startsWith('en\t');
      const dataLines = hasHeader ? lines.slice(1) : lines;
      // 헤더가 있으면 컬럼 순서 파악
      const headerCols = hasHeader ? lines[0].split('\t').map(c => c.trim().toLowerCase()) : null;
      const ALIAS2 = { ko:0,korean:0, en:1,english:1, uz:2,uzbek:2, category:3,
                       def_ko:4, def_en:5, def_uz:6, usmle:7, ipa:8 };
      rows = dataLines.filter(l => l.trim() && !l.startsWith('#')).map((line, i) => {
        const cols = line.split('\t');
        const get = (defaultIdx) => {
          if (!headerCols) return cols[defaultIdx]?.trim() || '';
          const hi = headerCols.findIndex((h, idx) => ALIAS2[h] === defaultIdx);
          return hi !== -1 ? (cols[hi]?.trim() || '') : (cols[defaultIdx]?.trim() || '');
        };
        return {
          id: 1000 + i,
          ko:       get(0),
          en:       get(1),
          uz:       get(2),
          category: get(3),
          def_ko:   get(4),
          def_en:   get(5),
          def_uz:   get(6),
          usmle:    get(7),
          ipa:      get(8),
        };
      });
    }

    rows = rows.filter(t => t.ko || t.en); // ko 또는 en 하나만 있어도 허용
    if (rows.length === 0) { showToast('⚠️ 유효한 데이터가 없습니다'); return; }

    if (mode === 'replace') {
      TERMS.length = 0;
      bookmarks.clear();
      localStorage.setItem('kma_bookmarks', JSON.stringify([]));
    }

    const startId = nextTermId();
    rows = rows.map((t, i) => ({ ...t, id: startId + i, updatedAt: new Date().toISOString() }));

    if (mode === 'append') {
      // 영어 기준 중복: 완전 덮어쓰기 (기존 용어를 새 데이터로 교체)
      let overwriteCount = 0;
      const newRows = [];
      const seenInBatch = new Set();
      rows.forEach(t => {
        const key = (t.en || t.ko || '').toLowerCase().trim();
        if (!key || seenInBatch.has(key)) return;
        seenInBatch.add(key);
        const existIdx = TERMS.findIndex(x => (x.en || x.ko || '').toLowerCase().trim() === key);
        if (existIdx !== -1) {
          // 완전 덮어쓰기 (기존 id 유지)
          TERMS[existIdx] = normalizeTermForStorage({ ...t, id: TERMS[existIdx].id, updatedAt: new Date().toISOString() });
          saveTermToCloud(TERMS[existIdx]);
          overwriteCount++;
        } else {
          newRows.push(t);
        }
      });
      if (overwriteCount > 0) { saveTermsToLocalStorage(); }
      rows = newRows; // 신규만 아래에서 push
      if (overwriteCount > 0 && rows.length === 0) {
        saveTermsToLocalStorage(); applyFilters(); updateBookmarkCount();
        showToast(`✅ ${overwriteCount}개 완전 덮어쓰기 완료`); return;
      }
    }

    // 업로드 시 AI 자동완성 없이 전부 즉시 저장
    // (빈 칸 채우기는 내보내기 탭 → '일괄 빈칸 채우기'로 별도 실행)
    TERMS.push(...rows.map(t => normalizeTermForStorage({ ...t, category: t.category || '기타' })));
    saveTermsToLocalStorage();
    applyFilters();
    updateBookmarkCount();

    const emptyCount = rows.filter(t => !t.def_ko || !t.usmle).length;
    const msg = emptyCount > 0
      ? `✅ ${rows.length}개 저장 완료! (빈 칸 ${emptyCount}개 → 내보내기 탭에서 '일괄 빈칸 채우기'로 완성 가능)`
      : `✅ ${rows.length}개 저장 완료!`;
    showToast(msg);

  };

  if (isExcel) reader.readAsArrayBuffer(file);
  else reader.readAsText(file, 'UTF-8');
}

  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── TTS ───
let ttsSpeed = 0.9;
let currentUtterance = null;
let speakingBtn = null;

function speakText(e, text, type, id) {
  e.stopPropagation();
  if (!window.speechSynthesis) { showToast('⚠️ 이 브라우저는 TTS를 지원하지 않습니다'); return; }

  const btnId = `speak-${type}-${id}`;
  const btn = document.getElementById(btnId);

  // Stop if already speaking same button
  if (speakingBtn === btnId && speechSynthesis.speaking) {
    speechSynthesis.cancel();
    if (btn) btn.classList.remove('speaking');
    speakingBtn = null;
    return;
  }

  // Stop previous
  speechSynthesis.cancel();
  if (speakingBtn) {
    const prev = document.getElementById(speakingBtn);
    if (prev) prev.classList.remove('speaking');
  }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = ttsSpeed;
  utter.pitch = 1.0;

  // Prefer high-quality US English voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v =>
    v.lang === 'en-US' && (v.name.includes('Samantha') || v.name.includes('Google') || v.name.includes('Alex') || v.name.includes('Natural'))
  ) || voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
  if (preferred) utter.voice = preferred;

  utter.onstart = () => {
    speakingBtn = btnId;
    if (btn) btn.classList.add('speaking');
  };
  utter.onend = utter.onerror = () => {
    if (btn) btn.classList.remove('speaking');
    if (speakingBtn === btnId) speakingBtn = null;
  };

  speechSynthesis.speak(utter);
  currentUtterance = utter;
}

// Load voices (async in some browsers)
if (window.speechSynthesis) {
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
}

// 앱 초기화: 로컬 먼저 → Supabase에서 최신 데이터 병합
async function initApp() {
  const localCount = loadTermsFromLocalStorage();
  if (localCount > 0) {
    showToast(`📱 로컬 ${localCount}개 복원됨`);
    updateBookmarkCount();
    applyFilters();
  }

  if (getSupabaseConfig()) {
    showToast('☁️ Supabase 동기화 중...');
    const cloudTerms = await sbLoadAll();
    if (cloudTerms && cloudTerms.length > 0) {
      // 클라우드 데이터로 병합 (클라우드 우선)
      const localIds = new Set(TERMS.map(t => t.id));
      const cloudIds = new Set(cloudTerms.map(t => t.id));
      // 클라우드에 없는 로컬 용어 → 클라우드에 업로드
      const onlyLocal = TERMS.filter(t => !cloudIds.has(t.id));
      // 클라우드 데이터로 전체 교체 후 로컬 전용 추가
      TERMS.length = 0;
      TERMS.push(...cloudTerms, ...onlyLocal);
      saveTermsToLocalStorage();
      if (onlyLocal.length > 0) {
        for (const t of onlyLocal) await sbUpsertTerm(t);
      }
      showToast(`☁️ 클라우드 ${cloudTerms.length}개 동기화 완료`);
    } else if (localCount > 0) {
      // 클라우드가 비어있으면 로컬 → 클라우드 업로드
      await sbPushAll();
    } else {
      showToast('☁️ Supabase 연결됨 (데이터 없음)');
    }
    updateBookmarkCount();
    applyFilters();
  } else if (localCount === 0) {
    applyFilters();
  }
}

initApp();
</script>
